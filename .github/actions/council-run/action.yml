name: 'Run Council (S1 or S2)'
description: >-
  Invoke anthropics/claude-code-action with a Council prompt and parse
  its execution output into structured score/verdict/mode/estimate
  fields. Preserves the legacy `continue-on-error: true` so partial
  success (max_turns, etc.) still produces parsable output. Phase 2b
  of CI-1 rewrite (CI-1-REWRITE-PLAN.md C.3). CAB-2175 wires an
  inline fallback fetch: when the Council prompt instructs Claude to
  post the report via `gh issue comment`, the score trailer lives in
  a tool_use.input block rather than assistant.text — the parser would
  return null without a comment-body fallback. The fetch step grabs
  the latest matching comment and feeds it to the parser via
  `--fallback-comment`.

inputs:
  stage:
    description: 'Council stage: `s1` (pertinence) or `s2` (plan).'
    required: true
  prompt:
    description: 'Full Council prompt passed to claude-code-action.'
    required: true
  anthropic-api-key:
    description: 'Anthropic API key.'
    required: true
  issue-number:
    description: >-
      Issue number used to fetch the latest Council/Plan comment as
      parser fallback. The composite always attempts the fetch when
      this is set; absence of a matching comment is a graceful skip
      (parser then runs against the execution file alone).
    required: true
  github-token:
    description: 'GitHub token for `gh issue view` (comments fetch).'
    required: true
  model:
    description: 'Claude model id.'
    required: false
    default: 'claude-sonnet-4-6'
  max-turns:
    description: 'Turn budget passed to claude-code-action.'
    required: false
    default: '5'
  allowed-tools:
    description: 'Comma-separated list of Claude tools permitted for the run.'
    required: false
    default: 'Bash,Read,Glob,Grep'

outputs:
  outcome:
    description: 'Outcome of the inner claude-code-action step (success | failure).'
    value: ${{ steps.claude.outcome }}
  execution-file:
    description: 'Path to the raw execution output JSON (useful for downstream logging).'
    value: ${{ steps.resolve-exec.outputs.path }}
  score:
    description: 'Council score (float as string, empty on missing).'
    value: ${{ steps.parse.outputs.score }}
  verdict:
    description: 'Verdict derived from score: go | fix | redo | "".'
    value: ${{ steps.parse.outputs.verdict }}
  mode:
    description: 'Ship/Show/Ask classification (ship | show | ask).'
    value: ${{ steps.parse.outputs.mode }}
  estimate-points:
    description: 'Estimate in points (int as string, "0" on missing).'
    value: ${{ steps.parse.outputs.estimate-points }}
  source:
    description: 'Parsing source: structured_json | regex | fallback.'
    value: ${{ steps.parse.outputs.source }}

runs:
  using: 'composite'
  steps:
    - name: Mark fallback fetch baseline
      # CAB-2175 stale-comment guard: capture an ISO-8601 UTC
      # timestamp BEFORE claude-code-action runs. The fallback fetch
      # step uses this as a `createdAt >=` floor on the issue's
      # comments, so a prior-run Council comment still sitting on the
      # issue cannot be picked up if the current run fails to post a
      # fresh one. No buffer is applied: clock skew between runner
      # and GitHub API is bounded by NTP and our fail-mode is
      # closed-on-skew (reject ambiguous comments rather than risk
      # acting on stale evidence).
      id: baseline
      shell: bash
      run: |
        set -uo pipefail
        TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        echo "start-ts=${TS}" >> "$GITHUB_OUTPUT"
        echo "::notice::council-run: fallback baseline ts=${TS}"

    - name: Run Claude Council action
      id: claude
      continue-on-error: true
      # Pinned to the v1 tag's referenced commit (resolved via
      # `gh api repos/anthropics/claude-code-action/git/ref/tags/v1`).
      uses: anthropics/claude-code-action@e58dfa55559035499a4982426bb73605e8b5ad8e  # v1
      with:
        anthropic_api_key: ${{ inputs.anthropic-api-key }}
        prompt: ${{ inputs.prompt }}
        claude_args: "--model ${{ inputs.model }} --max-turns ${{ inputs.max-turns }} --allowedTools ${{ inputs.allowed-tools }}"

    - name: Resolve execution file
      id: resolve-exec
      if: always()
      shell: bash
      env:
        REPORTED_PATH: ${{ steps.claude.outputs.execution_file }}
      run: |
        PATH_VAL="${REPORTED_PATH:-/home/runner/work/_temp/claude-execution-output.json}"
        echo "path=${PATH_VAL}" >> "$GITHUB_OUTPUT"
        if [ -f "$PATH_VAL" ]; then
          echo "::notice::council-run: execution file = $PATH_VAL ($(wc -c <"$PATH_VAL" | tr -d ' ') bytes)"
        else
          echo "::warning::council-run: execution file not found at $PATH_VAL"
        fi

    - name: Fetch fallback Council comment
      # CAB-2175: when the Council prompt instructs Claude to post the
      # report via `gh issue comment`, the "Council Score / Plan Score"
      # trailer ends up in a tool_use.input block — the parser sees only
      # assistant.text turns and returns score=null. Fetch the latest
      # comment whose body contains the stage-specific marker AND was
      # created >= the pre-Claude baseline timestamp, then feed its
      # body to the parser via --fallback-comment. The createdAt floor
      # rejects stale Council comments from prior runs on the same
      # issue: if the current run fails to post a fresh comment, no
      # fallback is found and the verdict gate stays closed.
      id: fallback
      if: always()
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        ISSUE_NUMBER: ${{ inputs.issue-number }}
        STAGE: ${{ inputs.stage }}
        REPO: ${{ github.repository }}
        SINCE_TS: ${{ steps.baseline.outputs.start-ts }}
      run: |
        set -uo pipefail
        if [ -z "$ISSUE_NUMBER" ]; then
          echo "::warning::council-run: issue-number empty — fallback skipped"
          echo "path=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if [ -z "$SINCE_TS" ]; then
          # Baseline step is unconditional, so absent SINCE_TS means
          # the composite is being run in an unexpected state. Fail
          # closed by skipping the fetch entirely.
          echo "::warning::council-run: baseline timestamp missing — fallback skipped"
          echo "path=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        case "$STAGE" in
          s1) MARKER="Council Score" ;;
          s2) MARKER="Plan Score" ;;
          *)
            echo "::warning::council-run: unknown stage='$STAGE' — fallback skipped"
            echo "path=" >> "$GITHUB_OUTPUT"
            exit 0
            ;;
        esac
        OUT="$RUNNER_TEMP/council-fallback.md"
        # Last comment whose createdAt is at or after the pre-Claude
        # baseline AND whose body contains the marker. `last(stream)`
        # returns null on empty stream; `// ""` then yields the empty
        # string so $BODY stays empty rather than the literal "null".
        BODY=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json comments \
          --jq "last(.comments[] | select(.createdAt >= \"$SINCE_TS\") | select(.body | contains(\"$MARKER\")) | .body) // \"\"" \
          2>/dev/null || true)
        if [ -n "$BODY" ]; then
          printf '%s' "$BODY" > "$OUT"
          echo "::notice::council-run: fallback comment captured ($(wc -c <"$OUT" | tr -d ' ') bytes, marker=\"$MARKER\", since=$SINCE_TS)"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"
        else
          echo "::notice::council-run: no comment matching \"$MARKER\" since $SINCE_TS on issue #${ISSUE_NUMBER} — fallback skipped"
          echo "path=" >> "$GITHUB_OUTPUT"
        fi

    - name: Parse Council report
      id: parse
      if: always()
      shell: bash
      run: |
        set -uo pipefail
        EXEC_FILE="${{ steps.resolve-exec.outputs.path }}"
        FALLBACK_FILE="${{ steps.fallback.outputs.path }}"
        ARGS=( --execution-file "$EXEC_FILE" --stage "${{ inputs.stage }}" )
        if [ -n "$FALLBACK_FILE" ] && [ -f "$FALLBACK_FILE" ]; then
          ARGS+=( --fallback-comment "$FALLBACK_FILE" )
        fi

        # Run the parser; exit 1 is acceptable (no score + no fallback):
        # we still want to emit empty outputs.
        RAW=$(python3 "${GITHUB_WORKSPACE}/scripts/ci/parse_council_report.py" "${ARGS[@]}" || echo '{"score":null,"verdict":null,"mode":"ask","estimate_points":0,"source":"regex"}')

        SCORE=$(printf '%s' "$RAW" | python3 -c 'import json,sys; d=json.loads(sys.stdin.read()); s=d.get("score"); print("" if s is None else s)')
        VERDICT=$(printf '%s' "$RAW" | python3 -c 'import json,sys; d=json.loads(sys.stdin.read()); print(d.get("verdict") or "")')
        MODE=$(printf '%s' "$RAW" | python3 -c 'import json,sys; d=json.loads(sys.stdin.read()); print(d.get("mode") or "ask")')
        ESTIMATE=$(printf '%s' "$RAW" | python3 -c 'import json,sys; d=json.loads(sys.stdin.read()); print(d.get("estimate_points") or 0)')
        SOURCE=$(printf '%s' "$RAW" | python3 -c 'import json,sys; d=json.loads(sys.stdin.read()); print(d.get("source") or "")')

        {
          echo "score=${SCORE}"
          echo "verdict=${VERDICT}"
          echo "mode=${MODE}"
          echo "estimate-points=${ESTIMATE}"
          echo "source=${SOURCE}"
        } >> "$GITHUB_OUTPUT"

        echo "::notice::council-run parsed: score=${SCORE:-?} verdict=${VERDICT:-?} mode=${MODE} estimate=${ESTIMATE} (source=${SOURCE})"
