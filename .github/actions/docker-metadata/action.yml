name: 'Docker Build Metadata'
description: 'Setup QEMU, Buildx, ECR login, and compute metadata tags'

inputs:
  aws-role-arn:
    description: 'AWS IAM role ARN for OIDC'
    required: true
  aws-region:
    description: 'AWS region'
    required: false
    default: 'eu-west-1'
  ecr-registry:
    description: 'ECR registry URL'
    required: true
  ecr-repository:
    description: 'ECR repository name'
    required: true
  environment:
    description: 'Target environment (dev/staging/prod)'
    required: false
    default: 'dev'
  platforms:
    description: 'Docker target platforms'
    required: false
    default: 'linux/amd64,linux/arm64'

outputs:
  tags:
    description: 'Computed Docker image tags'
    value: ${{ steps.meta.outputs.tags }}
  labels:
    description: 'Computed Docker image labels'
    value: ${{ steps.meta.outputs.labels }}
  environment:
    description: 'Resolved environment'
    value: ${{ steps.env.outputs.ENVIRONMENT }}

runs:
  using: 'composite'
  steps:
    - name: Set environment
      id: env
      shell: bash
      run: echo "ENVIRONMENT=${{ inputs.environment }}" >> $GITHUB_OUTPUT

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up QEMU
      if: contains(inputs.platforms, 'arm64')
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.ecr-registry }}/${{ inputs.ecr-repository }}
        tags: |
          type=raw,value=${{ steps.env.outputs.ENVIRONMENT }}-${{ github.sha }}
          type=raw,value=${{ steps.env.outputs.ENVIRONMENT }}-latest
          type=raw,value=latest
