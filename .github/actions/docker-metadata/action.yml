name: 'Docker Build Metadata'
description: 'Setup QEMU, Buildx, ECR login, and compute metadata tags'

inputs:
  aws-role-arn:
    description: 'AWS IAM role ARN for OIDC'
    required: true
  aws-region:
    description: 'AWS region'
    required: false
    default: 'eu-west-1'
  ecr-registry:
    description: 'ECR registry URL'
    required: true
  ecr-repository:
    description: 'ECR repository name'
    required: true
  environment:
    description: 'Target environment (dev/staging/prod)'
    required: false
    default: 'dev'
  platforms:
    description: 'Docker target platforms'
    required: false
    default: 'linux/amd64'

outputs:
  tags:
    description: 'Computed Docker image tags'
    value: ${{ steps.meta.outputs.tags }}
  labels:
    description: 'Computed Docker image labels'
    value: ${{ steps.meta.outputs.labels }}
  environment:
    description: 'Resolved environment'
    value: ${{ steps.env.outputs.ENVIRONMENT }}

runs:
  using: 'composite'
  steps:
    - name: Set environment
      id: env
      shell: bash
      run: echo "ENVIRONMENT=${{ inputs.environment }}" >> $GITHUB_OUTPUT

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2

    - name: Set up QEMU
      if: contains(inputs.platforms, 'arm64')
      uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
      with:
        images: ${{ inputs.ecr-registry }}/${{ inputs.ecr-repository }}
        tags: |
          type=raw,value=${{ steps.env.outputs.ENVIRONMENT }}-${{ github.sha }}
          type=raw,value=${{ steps.env.outputs.ENVIRONMENT }}-latest
          type=raw,value=latest
