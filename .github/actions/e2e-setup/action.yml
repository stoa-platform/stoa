name: 'E2E Test Setup'
description: 'Install Playwright, browsers, and generate BDD tests'

inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '20'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        cache-dependency-path: e2e/package-lock.json

    - name: Install E2E dependencies
      shell: bash
      working-directory: e2e
      run: npm ci

    - name: Cache Playwright browsers
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

    # `--with-deps` runs apt-get under the hood and occasionally collides with
    # unattended-upgrades on GitHub-hosted runners (lock /var/lib/apt/lists/lock
    # held by another process → exit 100). Retry up to 3× with backoff.
    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      working-directory: e2e
      run: |
        for attempt in 1 2 3; do
          if npx playwright install --with-deps chromium; then
            exit 0
          fi
          echo "::warning::Playwright install attempt $attempt failed (likely apt lock contention) — retrying in 30s"
          sleep 30
        done
        echo "::error::Playwright install failed after 3 attempts"
        exit 1

    - name: Install Playwright deps (cached)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      shell: bash
      working-directory: e2e
      run: |
        for attempt in 1 2 3; do
          if npx playwright install-deps chromium; then
            exit 0
          fi
          echo "::warning::Playwright install-deps attempt $attempt failed — retrying in 30s"
          sleep 30
        done
        echo "::error::Playwright install-deps failed after 3 attempts"
        exit 1

    - name: Generate BDD tests
      shell: bash
      working-directory: e2e
      run: npm run bddgen
