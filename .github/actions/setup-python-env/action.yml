name: 'Setup Python Environment'
description: 'Checkout, install Python, install dependencies with caching'

inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'
  working-directory:
    description: 'Component directory (e.g., control-plane-api)'
    required: true
  install-command:
    description: 'Custom install command (overrides auto-detection)'
    required: false
    default: ''
  cache-dependency-path:
    description: 'Path to requirements file for pip cache key'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup Python ${{ inputs.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'
        cache-dependency-path: ${{ inputs.cache-dependency-path || format('{0}/requirements*.txt', inputs.working-directory) }}

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INSTALL_CMD: ${{ inputs.install-command }}
      run: |
        pip install --upgrade pip
        if [ -n "$INSTALL_CMD" ]; then
          eval "$INSTALL_CMD"
        elif [ -f "pyproject.toml" ]; then
          pip install -e ".[dev,k8s]" 2>/dev/null || pip install -e ".[dev]" 2>/dev/null || pip install -e "."
        elif [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
          [ -f "requirements-dev.txt" ] && pip install -r requirements-dev.txt
        fi
