name: 'Setup Rust Environment'
description: 'Install Rust toolchain with Cargo cache'

inputs:
  components:
    description: 'Rust toolchain components (comma-separated, e.g., clippy,rustfmt)'
    required: false
    default: ''
  working-directory:
    description: 'Crate root directory'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install Rust stable toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.components }}

    - name: Cache Cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ${{ inputs.working-directory }} -> target
