# Dependabot configuration for stoa-helm repository
# This file should be copied to stoa-helm/.github/dependabot.yml

version: 2
updates:
  # Helm charts
  - package-ecosystem: "docker"
    directory: "/charts/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "helm"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "github-actions"
