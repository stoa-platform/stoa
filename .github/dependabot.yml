version: 2
updates:
  # Python - Control Plane API
  - package-ecosystem: "pip"
    directory: "/control-plane-api"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"

  # NPM - Portal
  - package-ecosystem: "npm"
    directory: "/portal"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      npm-portal:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      gha-deps:
        patterns: ["*"]
    commit-message:
      prefix: "chore(ci)"

  # NPM - Control Plane UI
  - package-ecosystem: "npm"
    directory: "/control-plane-ui"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      npm-ui:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"

  # NPM - E2E Tests
  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      npm-e2e:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"

  # Cargo - STOA Gateway
  - package-ecosystem: "cargo"
    directory: "/stoa-gateway"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      cargo-deps:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"

  # Python - CLI
  - package-ecosystem: "pip"
    directory: "/cli"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      python-cli:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(docker)"
