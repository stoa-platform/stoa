name: Arena L0 — Gateway Benchmark

on:
  schedule:
    # Every 30 min — serverless, no cluster resource contention
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      runs:
        description: "Number of runs per gateway (default: 5)"
        required: false
        default: "5"

concurrency:
  group: arena-l0
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Public endpoints — tests real user path (TLS, ingress, network)
  GATEWAYS: |
    [
      {"name":"stoa-prod","health":"https://mcp.gostoa.dev/health","proxy":"https://mcp.gostoa.dev/echo/get","admin_base":"https://mcp.gostoa.dev"}
    ]
  RUNS: ${{ inputs.runs || '5' }}
  DISCARD_FIRST: "1"
  TIMEOUT: "10"
  ARENA_INSTANCE: "gha"
  PUSHGATEWAY_URL: "https://pushgateway.gostoa.dev"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: scripts/traffic/arena

      - name: Fetch secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://hcvault.gostoa.dev
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            stoa/data/k8s/stoa-gateway STOA_ADMIN_API_TOKEN | STOA_ADMIN_TOKEN ;
            stoa/data/k8s/pushgateway BASIC_AUTH | PUSHGATEWAY_AUTH

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install -y -qq k6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Pre-provision echo route
        run: |
          if [ -n "${STOA_ADMIN_TOKEN:-}" ]; then
            ROUTE='{"id":"arena-echo-route","name":"Arena Echo Backend","tenant_id":"arena-bench","path_prefix":"/echo","backend_url":"http://echo-backend.stoa-system.svc:8888","methods":[],"spec_hash":"v1","activated":true}'
            for i in $(seq 1 5); do
              curl -sf -X POST "https://mcp.gostoa.dev/admin/apis" \
                -H "Authorization: Bearer $STOA_ADMIN_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$ROUTE" --max-time 5 || true
            done
            echo "Echo route provisioned"
          else
            echo "⚠️ No STOA_ADMIN_TOKEN — echo route not provisioned (Vault step may have failed)"
          fi

      - name: Run Arena L0
        env:
          SCRIPT_PATH: scripts/traffic/arena/benchmark.js
        run: |
          set -euo pipefail
          WORK_DIR="/tmp/arena"
          SCENARIOS="health sequential burst_10 burst_50 burst_100 sustained ramp_up"
          COOLDOWN=15
          GATEWAY_COUNT=$(echo "$GATEWAYS" | jq 'length')

          rm -rf "$WORK_DIR" && mkdir -p "$WORK_DIR"

          # Pre-check
          for gw_idx in $(seq 0 $((GATEWAY_COUNT - 1))); do
            GW_NAME=$(echo "$GATEWAYS" | jq -r ".[$gw_idx].name")
            GW_HEALTH=$(echo "$GATEWAYS" | jq -r ".[$gw_idx].health")
            if curl -sf --max-time 10 "$GW_HEALTH" >/dev/null 2>&1; then
              echo "✅ $GW_NAME is ready"
            else
              echo "❌ $GW_NAME not reachable — skipping"
              echo "$gw_idx" >> "$WORK_DIR/skip.txt"
            fi
          done

          # Benchmark
          for gw_idx in $(seq 0 $((GATEWAY_COUNT - 1))); do
            grep -qx "$gw_idx" "$WORK_DIR/skip.txt" 2>/dev/null && continue

            GW_NAME=$(echo "$GATEWAYS" | jq -r ".[$gw_idx].name")
            GW_HEALTH=$(echo "$GATEWAYS" | jq -r ".[$gw_idx].health")
            GW_PROXY=$(echo "$GATEWAYS" | jq -r ".[$gw_idx].proxy")
            GW_HEADERS=$(echo "$GATEWAYS" | jq -c ".[$gw_idx].proxy_headers // {}")

            [ "$gw_idx" -gt 0 ] && sleep "$COOLDOWN"

            echo "::group::Benchmarking $GW_NAME"
            mkdir -p "$WORK_DIR/$GW_NAME"

            for run in $(seq 1 "$RUNS"); do
              mkdir -p "$WORK_DIR/$GW_NAME/run-$run"

              # Warmup
              k6 run \
                --env SCENARIO=warmup \
                --env TARGET_URL="$GW_PROXY" \
                --env HEALTH_URL="$GW_HEALTH" \
                --env HEADERS="$GW_HEADERS" \
                --env TIMEOUT="$TIMEOUT" \
                --env SUMMARY_FILE="/dev/null" \
                --quiet \
                "$SCRIPT_PATH" 2>/dev/null || true

              # Scenarios
              for scenario in $SCENARIOS; do
                SUMMARY_FILE="$WORK_DIR/$GW_NAME/run-$run/${scenario}.json"
                k6 run \
                  --env SCENARIO="$scenario" \
                  --env TARGET_URL="$GW_PROXY" \
                  --env HEALTH_URL="$GW_HEALTH" \
                  --env HEADERS="$GW_HEADERS" \
                  --env TIMEOUT="$TIMEOUT" \
                  --env SUMMARY_FILE="$SUMMARY_FILE" \
                  --quiet \
                  "$SCRIPT_PATH" 2>/dev/null || true
              done

              echo "Run $run/$RUNS complete for $GW_NAME"
            done
            echo "::endgroup::"
          done

          # Score
          echo "::group::Scoring"
          python3 scripts/traffic/arena/run-arena.py "$WORK_DIR" "$GATEWAYS" \
            > "$WORK_DIR/metrics.txt" 2> "$WORK_DIR/scores.txt"
          cat "$WORK_DIR/scores.txt"
          echo "::endgroup::"

          # Summary
          echo "## Arena L0 Results (GHA)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat "$WORK_DIR/scores.txt" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Push to Pushgateway
        if: always()
        run: |
          METRICS_FILE="/tmp/arena/metrics.txt"
          [ ! -f "$METRICS_FILE" ] && echo "No metrics to push" && exit 0

          CURL_AUTH=""
          [ -n "${PUSHGATEWAY_AUTH:-}" ] && CURL_AUTH="-u ${PUSHGATEWAY_AUTH}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            --data-binary @"$METRICS_FILE" \
            -H "Content-Type: text/plain" \
            $CURL_AUTH \
            "${PUSHGATEWAY_URL}/metrics/job/gateway_arena/instance/gha" \
            --max-time 10 2>/dev/null)
          echo "Pushed metrics to ${PUSHGATEWAY_URL} (HTTP ${HTTP_CODE:-000})"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: arena-l0-${{ github.run_number }}
          path: /tmp/arena/scores.txt
          retention-days: 30
