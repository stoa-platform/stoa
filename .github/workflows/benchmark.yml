name: DX Benchmark

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual benchmark'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout quickstart benchmark
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: stoa-platform/stoa-quickstart
          path: stoa-quickstart

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Run Benchmark
        id: benchmark
        working-directory: stoa-quickstart
        run: |
          chmod +x benchmark.sh
          ./benchmark.sh --ci | tee benchmark-output.txt

          # Extract results for summary
          {
            echo "## DX Benchmark Results"
            echo ""
            cat benchmark-output.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmark-results-${{ github.sha }}
          path: stoa-quickstart/benchmark-output.txt
          retention-days: 90

      - name: Check Benchmark Status
        if: failure()
        run: |
          echo "::error::Benchmark failed to meet OSS Killer Standard targets"
          exit 1
