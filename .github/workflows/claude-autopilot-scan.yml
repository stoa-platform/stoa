# Level 3.5: Autopilot Scan — Daily backlog scan → Council → Slack approve → implement
# Scans Linear backlog for autopilot-eligible tickets, runs Council validation,
# creates GitHub issues with Slack "Approve & Start" buttons.
# Kill-switch: set DISABLE_AUTOPILOT_SCAN=true in repo variables to disable.

name: Claude Autopilot Scan

on:
  schedule:
    - cron: '0 8 * * 1-5'   # Morning scan: 08:00 UTC, Mon-Fri
    - cron: '0 14 * * 1-5'  # Afternoon scan: 14:00 UTC, Mon-Fri
  workflow_dispatch:
    inputs:
      max_tickets:
        description: "Max tickets to process (default 3)"
        default: '3'
        type: string
      dry_run:
        description: "Dry run — scan only, no issues created"
        default: false
        type: boolean

concurrency:
  group: autopilot-scan
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  scan:
    if: vars.DISABLE_AUTOPILOT_SCAN != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Record Start Time
        run: echo "SCAN_START=$(date +%s)" >> "$GITHUB_ENV"

      # Check daily velocity cap before scanning
      - name: Check Velocity Cap
        id: velocity
        run: |
          MAX_DAILY=${{ inputs.max_tickets || vars.AUTOPILOT_DAILY_MAX || '5' }}
          TODAY=$(date -u +%Y-%m-%d)
          COUNTER="${{ vars.AUTOPILOT_TODAY_COUNT }}"
          COUNT_DATE=$(echo "$COUNTER" | cut -d: -f1 2>/dev/null || echo "")
          COUNT_VAL=$(echo "$COUNTER" | cut -d: -f2 2>/dev/null || echo "0")

          if [ "$COUNT_DATE" != "$TODAY" ]; then
            COUNT_VAL=0
          fi

          REMAINING=$((MAX_DAILY - COUNT_VAL))
          if [ "$REMAINING" -le 0 ]; then
            echo "Daily velocity cap reached (${COUNT_VAL}/${MAX_DAILY})"
            echo "capped=true" >> "$GITHUB_OUTPUT"
          else
            echo "Velocity: ${COUNT_VAL}/${MAX_DAILY} — ${REMAINING} slots available"
            echo "capped=false" >> "$GITHUB_OUTPUT"
            echo "remaining=${REMAINING}" >> "$GITHUB_OUTPUT"
          fi

      # Fetch eligible tickets from Linear API (no Claude needed for this)
      - name: Fetch Linear Backlog
        if: steps.velocity.outputs.capped == 'false'
        id: linear
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          if [ -z "$LINEAR_API_KEY" ]; then
            echo "::error::LINEAR_API_KEY secret not configured"
            exit 1
          fi

          REMAINING="${{ steps.velocity.outputs.remaining }}"

          # Fetch Todo + Backlog tickets for team CAB
          # Priority filter REMOVED from GraphQL — null priority issues were excluded (37% of backlog)
          # All filtering done client-side to handle nulls properly
          # first: 100 (was 30 — too small for 250+ issue backlog)
          RESPONSE=$(curl -s -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "{ issues(filter: { team: { key: { eq: \"CAB\" } }, state: { type: { in: [\"unstarted\", \"backlog\"] } } }, orderBy: updatedAt, first: 100) { nodes { id identifier title description priority estimate labels { nodes { name } } parent { identifier } } } }"
            }')

          # Check for GraphQL errors
          GQL_ERROR=$(echo "$RESPONSE" | jq -r '.errors[0].message // empty' 2>/dev/null)
          if [ -n "$GQL_ERROR" ]; then
            echo "::error::Linear GraphQL error: ${GQL_ERROR}"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RAW_COUNT=$(echo "$RESPONSE" | jq '.data.issues.nodes | length' 2>/dev/null || echo "0")
          echo "Raw tickets from Linear API: ${RAW_COUNT}"

          # Client-side filters:
          # 1. No "no-autopilot" or "strategy" label (strategy = human business tasks)
          # 2. Sub-tickets ALLOWED (they are the actual implementable work items)
          # 3. Estimate <= 13 OR no estimate (null) — MEGAs >13 need manual decomposition
          # 4. Priority <= 3 OR null priority (null = not yet triaged, still eligible)
          # Sort by priority (1=Urgent first, null=last) then cap at REMAINING
          echo "$RESPONSE" | jq -c "[
            .data.issues.nodes[]
            | select((.labels.nodes // []) | map(.name) | any(. == \"no-autopilot\" or . == \"strategy\") | not)
            | select(.estimate == null or .estimate <= 13)
            | select(.priority == null or .priority <= 3)
            | {
                id: .id,
                identifier: .identifier,
                title: .title,
                description: (.description // \"\" | .[0:500]),
                priority: .priority,
                estimate: .estimate,
                labels: [(.labels.nodes // [])[].name],
                parent: .parent.identifier
              }
          ] | sort_by(.priority // 99) | .[0:${REMAINING}]" > eligible-tickets.json 2>/dev/null || echo "[]" > eligible-tickets.json

          TICKET_COUNT=$(jq 'length' eligible-tickets.json)
          echo "Found ${TICKET_COUNT} eligible tickets (from ${RAW_COUNT} raw)"
          echo "count=${TICKET_COUNT}" >> "$GITHUB_OUTPUT"

          if [ "$TICKET_COUNT" -eq 0 ]; then
            echo "No eligible tickets found in backlog"
          else
            echo "=== Eligible tickets ==="
            jq -r '.[] | "\(.identifier) (\(.estimate // 0) pts, P\(.priority // "none")) — \(.title)"' eligible-tickets.json
          fi

      # Run Council validation via Claude (one invocation for all tickets)
      - name: Council Validation
        if: steps.velocity.outputs.capped == 'false' && steps.linear.outputs.count != '0'
        id: council
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "github-actions[bot]"
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log for session state.
            Focus exclusively on the task below.

            You are the STOA Council. Validate each ticket below for autonomous implementation.

            TICKETS (from Linear backlog):
            $(cat eligible-tickets.json)

            For EACH ticket, run a CONCISE 4-persona Council validation:
            - Chucky (risk): is this safe for autonomous implementation?
            - OSS Killer (value): does this deliver user value?
            - Archi 50x50 (architecture): is the scope clear and well-bounded?
            - Better Call Saul (legal): any compliance concerns?

            Score each persona /10. Compute average. Threshold: >= 8.0 = Go.

            IMPORTANT: If a ticket has NO estimate (null), you MUST provide one in the
            "estimated_points" field using Fibonacci scale (1,2,3,5,8,13). Analyze the
            scope from the title and description to estimate. Tickets > 13 pts are too
            large for autopilot — set verdict to "Too Large" and skip.

            IMPORTANT: Output ONLY a JSON array. No markdown, no explanation, no code fences.
            Each element must have these exact fields:
            [
              {
                "ticket_id": "CAB-XXXX",
                "title": "...",
                "score": 8.5,
                "verdict": "Go",
                "ship_show_ask": "Ship",
                "estimated_points": 5,
                "council_body": "# Council: CAB-XXXX — Title\n**Score: 8.5/10 — Go**\n## Personas\n**Chucky**: 8/10 — ...\n**OSS Killer**: 9/10 — ...\n**Archi**: 8/10 — ...\n**Saul**: 9/10 — ...\n## Ship/Show/Ask: Ship\n## Plan\n...\n## DoD\n- [ ] ...\n---\nComment /go to start implementation."
              }
            ]
          # Model tier: haiku (read-only Council scan, no code generation)
          claude_args: "--model claude-haiku-4-5-20251001 --max-turns 5 --allowedTools Read,Glob,Grep"
          show_full_output: true

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}, Model=haiku-4-5, MaxTurns=5, Stage=council-scan"

      # Parse Council output and create GitHub issues + Slack notifications
      - name: Create Issues and Notify
        if: steps.council.outcome == 'success' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ github.token }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          N8N_WEBHOOK: ${{ vars.N8N_APPROVE_WEBHOOK_URL }}
          HMAC_SECRET: ${{ secrets.APPROVE_HMAC_SECRET }}
        run: |
          EXEC_FILE="${{ steps.council.outputs.execution_file }}"
          EXEC_FILE="${EXEC_FILE:-/home/runner/work/_temp/claude-execution-output.json}"

          # Extract JSON array from Claude output
          CANDIDATES="[]"
          if [ -f "$EXEC_FILE" ]; then
            # Try result field first
            RAW=$(jq -r '.[] | select(.type == "result") | .result // empty' "$EXEC_FILE" 2>/dev/null || echo "")
            if [ -z "$RAW" ]; then
              RAW=$(jq -r '[.[] | select(.type == "assistant") | .message.content[] | select(.type == "text") | .text] | join("\n")' "$EXEC_FILE" 2>/dev/null || echo "")
            fi

            # Extract JSON array from response (may have surrounding text)
            CANDIDATES=$(echo "$RAW" | python3 -c 'import sys,json,re;t=sys.stdin.read();m=re.search(r"\[.*\]",t,re.DOTALL);print(json.dumps(json.loads(m.group()))if m else"[]")' 2>/dev/null || echo "[]")
          fi

          CANDIDATE_COUNT=$(echo "$CANDIDATES" | jq 'length')
          echo "Council validated ${CANDIDATE_COUNT} candidates"

          CREATED=0
          SKIPPED=0
          EXISTING_LINKS=""
          # Use process substitution (not pipe) so counters propagate to parent shell
          while IFS= read -r ticket; do
            TICKET_ID=$(echo "$ticket" | jq -r '.ticket_id')
            TITLE=$(echo "$ticket" | jq -r '.title')
            SCORE=$(echo "$ticket" | jq -r '.score')
            COUNCIL_BODY=$(echo "$ticket" | jq -r '.council_body')
            EST_POINTS=$(echo "$ticket" | jq -r '.estimated_points // empty')

            # If Council estimated points for an unpointed ticket, update Linear
            if [ -n "$EST_POINTS" ] && [ "$EST_POINTS" != "null" ]; then
              # Find the Linear issue ID from eligible-tickets.json
              LINEAR_ID=$(jq -r --arg tid "$TICKET_ID" '.[] | select(.identifier == $tid) | .id' eligible-tickets.json)
              LINEAR_EST=$(jq -r --arg tid "$TICKET_ID" '.[] | select(.identifier == $tid) | .estimate' eligible-tickets.json)
              if [ -n "$LINEAR_ID" ] && [ "$LINEAR_EST" = "null" ]; then
                echo "Updating ${TICKET_ID} estimate to ${EST_POINTS} pts (was unpointed)"
                curl -s -X POST "https://api.linear.app/graphql" \
                  -H "Authorization: ${LINEAR_API_KEY}" \
                  -H "Content-Type: application/json" \
                  -d "{\"query\": \"mutation { issueUpdate(id: \\\"${LINEAR_ID}\\\", input: { estimate: ${EST_POINTS} }) { success } }\"}" > /dev/null 2>&1 || true
              fi
            fi

            echo "Processing ${TICKET_ID} (score: ${SCORE})"

            # Dedup guard: skip if GitHub issue already exists for this ticket
            EXISTING_ISSUE=$(gh issue list --label "$TICKET_ID" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -n "$EXISTING_ISSUE" ] && [ "$EXISTING_ISSUE" != "null" ]; then
              echo "Issue #${EXISTING_ISSUE} already exists for ${TICKET_ID} — skipping"
              SKIPPED=$((SKIPPED + 1))
              EXISTING_LINKS="${EXISTING_LINKS}• <https://github.com/stoa-platform/stoa/issues/${EXISTING_ISSUE}|#${EXISTING_ISSUE}> ${TICKET_ID} — ${TITLE}\n"
              continue
            fi

            # Sync council:ticket-go label to Linear
            if [ -n "$LINEAR_API_KEY" ]; then
              LINEAR_ISSUE_ID=$(jq -r --arg tid "$TICKET_ID" '.[] | select(.identifier == $tid) | .id' eligible-tickets.json)
              if [ -n "$LINEAR_ISSUE_ID" ] && [ "$LINEAR_ISSUE_ID" != "null" ]; then
                LABEL_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
                  -H "Authorization: ${LINEAR_API_KEY}" \
                  -H "Content-Type: application/json" \
                  -d '{"query": "{ issueLabels(filter: { name: { eq: \"council:ticket-go\" } }) { nodes { id } } }"}' \
                  | jq -r '.data.issueLabels.nodes[0].id // empty' 2>/dev/null || echo "")
                if [ -n "$LABEL_ID" ]; then
                  EXISTING=$(curl -s -X POST "https://api.linear.app/graphql" \
                    -H "Authorization: ${LINEAR_API_KEY}" \
                    -H "Content-Type: application/json" \
                    -d "{\"query\": \"{ issue(id: \\\"${LINEAR_ISSUE_ID}\\\") { labels { nodes { id name } } } }\"}" \
                    | jq -r '[.data.issue.labels.nodes[] | select(.name | startswith("council:ticket-") | not) | .id]' 2>/dev/null || echo "[]")
                  LABEL_IDS=$(echo "$EXISTING" | jq -c ". + [\"${LABEL_ID}\"]" 2>/dev/null || echo "[\"${LABEL_ID}\"]")
                  curl -s -X POST "https://api.linear.app/graphql" \
                    -H "Authorization: ${LINEAR_API_KEY}" \
                    -H "Content-Type: application/json" \
                    -d "{\"query\": \"mutation { issueUpdate(id: \\\"${LINEAR_ISSUE_ID}\\\", input: { labelIds: ${LABEL_IDS} }) { success } }\"}" \
                    > /dev/null 2>&1 || true
                  echo "Applied council:ticket-go to ${TICKET_ID} on Linear"
                fi
                # Post Council comment
                GH_RUN="https://github.com/stoa-platform/stoa/actions/runs/${{ github.run_id }}"
                COMMENT="Autopilot Council: **${SCORE}/10** — council:ticket-go\n[GitHub Actions](${GH_RUN})"
                curl -s -X POST "https://api.linear.app/graphql" \
                  -H "Authorization: ${LINEAR_API_KEY}" \
                  -H "Content-Type: application/json" \
                  -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"${LINEAR_ISSUE_ID}\\\", body: \\\"${COMMENT}\\\" }) { success } }\"}" \
                  > /dev/null 2>&1 || true
              fi
            fi

            # Create labels (idempotent)
            gh label create "${TICKET_ID}" --color "0075ca" --description "Linear ticket" --force 2>/dev/null || true
            gh label create "autopilot-candidate" --color "7057ff" --description "Selected by autopilot scan" --force 2>/dev/null || true

            # Create GitHub issue
            ISSUE_URL=$(gh issue create \
              --title "Council: ${TICKET_ID} — ${TITLE}" \
              --label "council-review" \
              --label "autopilot-candidate" \
              --label "${TICKET_ID}" \
              --body "$COUNCIL_BODY")

            ISSUE_NUM=$(echo "$ISSUE_URL" | grep -oE '/issues/[0-9]+' | grep -oE '[0-9]+')
            echo "Created issue #${ISSUE_NUM}: ${ISSUE_URL}"

            # Send Slack notification with approve button
            source scripts/ai-ops/ai-factory-notify.sh
            # Extract mode and LOC from council candidate JSON
            C_MODE=$(echo "$ticket" | jq -r '.ship_show_ask // empty' 2>/dev/null || echo "")
            C_LOC=$(echo "$ticket" | jq -r '.estimated_points // empty' 2>/dev/null || echo "")
            # Use verdict from Council JSON (already filtered to Go/>=8.0 by the jq select above)
            C_VERDICT=$(echo "$ticket" | jq -r '.verdict // "Go"' 2>/dev/null || echo "Go")
            COUNCIL_TS=$(notify_council "$TICKET_ID" "$TITLE" "$SCORE" "$C_VERDICT" "$ISSUE_URL" "$ISSUE_NUM" "$C_MODE" "$C_LOC" "")
            _react_slack "mag" "$COUNCIL_TS"

            CREATED=$((CREATED + 1))
          done < <(echo "$CANDIDATES" | jq -c '.[] | select(.verdict == "Go" and .score >= 8.0)')

          echo "Created ${CREATED} autopilot candidate issues (${SKIPPED} skipped — already existed)"
          # Export to GITHUB_ENV so the summary step can read accurate counts
          echo "SCAN_CREATED=${CREATED}" >> "$GITHUB_ENV"
          echo "SCAN_SKIPPED=${SKIPPED}" >> "$GITHUB_ENV"
          # Write existing issue links to a file (multiline strings don't work in GITHUB_ENV)
          printf '%b' "$EXISTING_LINKS" > /tmp/existing-issues.txt

      # Summary Slack notification + Metrics + Job Summary
      - name: Slack Summary
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          PUSHGATEWAY_URL: ${{ vars.PUSHGATEWAY_URL }}
          PUSHGATEWAY_AUTH: ${{ secrets.PUSHGATEWAY_AUTH }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh

          CAPPED="${{ steps.velocity.outputs.capped }}"
          TOTAL="${{ steps.linear.outputs.count || '0' }}"
          CREATED="${SCAN_CREATED:-0}"
          SKIPPED="${SCAN_SKIPPED:-0}"
          DRY="${{ inputs.dry_run }}"
          COUNCIL_OK="${{ steps.council.outcome }}"
          MAX_DAILY=${{ inputs.max_tickets || vars.AUTOPILOT_DAILY_MAX || '5' }}

          DURATION=$(( $(date +%s) - ${SCAN_START:-$(date +%s)} ))
          if [ "$CAPPED" = "true" ]; then
            SCAN_TS=$(notify_scan "0" "0" "true")
          elif [ "$TOTAL" = "0" ]; then
            SCAN_TS=$(notify_scan "0" "0")
          elif [ "$COUNCIL_OK" != "success" ]; then
            SCAN_TS=$(notify_error "claude-autopilot-scan" "council" "" "" "$DURATION")
            push_metrics_error "autopilot-scan" "council"
            _react_slack "x" "$SCAN_TS"
          elif [ "$DRY" = "true" ]; then
            SCAN_TS=$(notify_scan "$TOTAL" "0")
          else
            SCAN_TS=$(notify_scan "$TOTAL" "$CREATED" "" "$SKIPPED")
          fi
          _react_slack "satellite_antenna" "$SCAN_TS"

          # Push scan metrics (velocity, candidates, dispatched)
          TODAY_COUNT="${{ vars.AUTOPILOT_TODAY_COUNT }}"
          TODAY=$(date -u +%Y-%m-%d)
          COUNT_DATE=$(echo "$TODAY_COUNT" | cut -d: -f1 2>/dev/null || echo "")
          COUNT_VAL=$(echo "$TODAY_COUNT" | cut -d: -f2 2>/dev/null || echo "0")
          [ "$COUNT_DATE" != "$TODAY" ] && COUNT_VAL=0
          push_metrics_scan "$TOTAL" "$CREATED" "$COUNT_VAL" "$MAX_DAILY" "$CAPPED"

      - name: Write Job Summary
        if: always()
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          write_job_summary "autopilot-scan" "${{ steps.council.outcome || 'skipped' }}" "" "" "autopilot-scan"
