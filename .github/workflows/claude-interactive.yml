# Level 1: Claude Code Interactive — @claude mentions in issues/PRs
# Responds to @claude in issue comments, PR comments, and PR review comments.
# Uses CLAUDE.md + .claude/rules/ as the brain.
# Kill-switch: set DISABLE_L1_INTERACTIVE=true in repo variables to disable.

name: Claude Code Interactive

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: claude-interactive-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: |
      vars.DISABLE_L1_INTERACTIVE != 'true' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log for session state.
            Focus exclusively on the user's request.
          # Model tier: sonnet (interactive, full tool access)
          claude_args: "--model claude-sonnet-4-6 --max-turns 15 --allowedTools Bash,Read,Write,Edit,Glob,Grep,WebFetch"

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}"

      - name: Write Job Summary
        if: always()
        env:
          HEGEMON_REMOTE_URL: ${{ secrets.HEGEMON_REMOTE_URL }}
          HEGEMON_REMOTE_EMAIL: ${{ secrets.HEGEMON_REMOTE_EMAIL }}
          HEGEMON_REMOTE_PASSWORD: ${{ secrets.HEGEMON_REMOTE_PASSWORD }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          write_job_summary "interactive-${{ github.event.issue.number || github.event.pull_request.number }}" "complete" "" "sonnet-4-5" "interactive"
          push_state_milestone "interactive-${{ github.event.issue.number || github.event.pull_request.number }}" "complete"
