# Level 1: Claude Code Issue-to-PR — assigns issue to Claude, creates a PR
# Triggered when an issue is labeled "claude-implement" or assigned to claude bot.
# Runs Council validation first, posts report, waits for approval.
# Kill-switch: set DISABLE_L1_IMPLEMENT=true in repo variables to disable.

name: Claude Code Issue-to-PR

on:
  issues:
    types: [labeled, assigned]
  issue_comment:
    types: [created]

concurrency:
  group: claude-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # ----- Phase 1: Council Validation (runs on label or assignment) -----
  council-validate:
    if: |
      vars.DISABLE_L1_IMPLEMENT != 'true' &&
      (
        (github.event_name == 'issues' && github.event.label.name == 'claude-implement') ||
        (github.event_name == 'issues' && github.event.action == 'assigned')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run Council Validation
        id: council
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the STOA Council Gate. Read the issue description and run a 4-persona
            Council validation (Chucky, OSS Killer, Archi, Better Call Saul).

            Issue title: ${{ github.event.issue.title }}
            Issue body: ${{ github.event.issue.body }}

            Follow the Council format from .claude/skills/council/SKILL.md.
            Score each persona /10, compute the average.

            Then post a structured comment on this issue with:
            1. The full Council report (4 personas, scores, verdicts)
            2. The global verdict (Go/Fix/Redo) and average score
            3. An implementation plan (files to modify, LOC estimate, phases)
            4. Ship/Show/Ask classification

            End the comment with:
            ---
            **Council Score: X.XX/10 — [Go|Fix|Redo]**
            Comment `/go` to approve and start autonomous implementation.

            Include a **Binary DoD** (Definition of Done) checklist in the comment:
            - [ ] All modified files listed
            - [ ] Each change is independently testable
            - [ ] Total LOC < 300
            - [ ] No new `any` types, `todo!()`, or `// TODO`
            - [ ] Component quality gate passes
            - [ ] CI green
            - [ ] State files updated

            IMPORTANT: Do NOT implement anything yet. Only validate and plan.
          # Model tier: opus (Council gate decision — quality matters more than cost)
          claude_args: "--model claude-opus-4-6 --max-turns 10 --allowedTools Read,Glob,Grep"

      # Add council-validated label so implement job can verify
      - name: Mark Council complete
        if: steps.council.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "council-validated" --color "0e8a16" --description "Council validation passed" --force 2>/dev/null || true
          gh issue edit "${{ github.event.issue.number }}" --add-label "council-validated"

      # Notify Slack with Council report
      - name: Notify Slack — Council Report
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi
          ISSUE_URL="${{ github.event.issue.html_url }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_NUM="${{ github.event.issue.number }}"
          STATUS="${{ steps.council.outcome }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI=":white_check_mark:"
          else
            EMOJI=":warning:"
          fi
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"${EMOJI} Council Validation: #${ISSUE_NUM}\",
                    \"emoji\": true
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*${ISSUE_TITLE}*\nCouncil has validated the implementation plan.\nComment \`/go\` on the GitHub issue to start autonomous implementation.\"
                  },
                  \"accessory\": {
                    \"type\": \"button\",
                    \"text\": {\"type\": \"plain_text\", \"text\": \"Review & Approve\"},
                    \"url\": \"${ISSUE_URL}\",
                    \"action_id\": \"council-review\"
                  }
                }
              ]
            }"

  # ----- Phase 2: Implementation (runs on /go approval comment) -----
  implement:
    if: |
      vars.DISABLE_L1_IMPLEMENT != 'true' &&
      github.event_name == 'issue_comment' &&
      (
        github.event.comment.body == '/approve' ||
        github.event.comment.body == '/go' ||
        startsWith(github.event.comment.body, '/go ') ||
        startsWith(github.event.comment.body, '/approve ')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Guard: verify Council validation ran before implementing
      - name: Verify Council validation
        id: verify-council
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          LABELS=$(gh issue view "$ISSUE_NUM" --json labels --jq '.labels[].name' 2>/dev/null || echo "")

          if echo "$LABELS" | grep -q "council-validated"; then
            echo "Council validation confirmed"
            echo "validated=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No council-validated label found on issue #$ISSUE_NUM"
            echo "Checking for Council comment as fallback..."
            COUNCIL_COMMENT=$(gh issue view "$ISSUE_NUM" --json comments --jq '[.comments[].body | select(contains("Council Score"))] | length')
            if [ "$COUNCIL_COMMENT" -gt 0 ]; then
              echo "Council comment found"
              echo "validated=true" >> "$GITHUB_OUTPUT"
            else
              echo "::error::No Council validation found. Label the issue 'claude-implement' first."
              echo "validated=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Abort if no Council
        if: steps.verify-council.outputs.validated != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --body "Implementation aborted: no Council validation found. Please label this issue \`claude-implement\` first, wait for the Council report, then comment \`/go\`."
          exit 1

      - name: Run Implementation
        if: steps.verify-council.outputs.validated == 'true'
        continue-on-error: true
        id: implement
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log.
            Do NOT log SESSION-START or SESSION-END.
            Do NOT run crash recovery checks.
            Focus exclusively on implementing the task below.

            Implement the feature described in issue #${{ github.event.issue.number }}.

            Issue title: ${{ github.event.issue.title }}
            Issue body:
            ${{ github.event.issue.body }}

            Read the Council validation comment (posted earlier on this issue).
            Follow the implementation plan from the Council comment.
            Follow code style rules in CLAUDE.md and .claude/rules/ (but skip workflow/session rules).

            Steps:
            1. Create a feature branch: feat/issue-${{ github.event.issue.number }}-<slug>
            2. Implement the code following the plan
            3. Run quality gates (lint, test, format)
            4. Commit with conventional messages
            5. Create a PR referencing the issue

            Use Ship/Show/Ask classification from the Council comment.
            If Ship or Show: merge after CI green.
            If Ask: leave PR open for human review.

            IMPORTANT: Rule changes (.claude/rules/) are ALWAYS Ask mode — never auto-merge.
          # Model tier: sonnet (code generation, full tool access)
          claude_args: "--model claude-sonnet-4-5-20250929 --max-turns 60 --allowedTools Bash,Read,Write,Edit,Glob,Grep,WebFetch"

      # Notify Slack on completion
      - name: Notify Slack — Implementation Done
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then exit 0; fi
          STATUS="${{ steps.implement.outcome || 'skipped' }}"
          ISSUE_NUM="${{ github.event.issue.number }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI="white_check_mark"
            MSG="Implementation complete for #${ISSUE_NUM}. PR created."
          elif [ "$STATUS" = "skipped" ]; then
            EMOJI="warning"
            MSG="Implementation skipped for #${ISSUE_NUM}. No Council validation."
          else
            EMOJI="x"
            MSG="Implementation failed for #${ISSUE_NUM}. Check GitHub Actions logs."
          fi
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\":${EMOJI}: ${MSG}\"}"
