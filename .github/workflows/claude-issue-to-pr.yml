# Level 1: Claude Code Issue-to-PR — assigns issue to Claude, creates a PR
# Triggered when an issue is labeled "claude-implement" or assigned to claude bot.
# Two-stage Council: Stage 1 (ticket pertinence) → /go → Stage 2 (plan validation) → /go-plan → implement.
# Kill-switch: set DISABLE_L1_IMPLEMENT=true in repo variables to disable.

name: Claude Code Issue-to-PR

on:
  issues:
    types: [labeled, assigned]
  issue_comment:
    types: [created]

concurrency:
  group: claude-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # ----- Stage 1: Council Ticket Validation (runs on label or assignment) -----
  council-validate:
    if: |
      vars.DISABLE_L1_IMPLEMENT != 'true' &&
      (
        (github.event_name == 'issues' && github.event.label.name == 'claude-implement') ||
        (github.event_name == 'issues' && github.event.action == 'assigned')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Guard: skip Council S1 if already validated (prevents double-run on re-label)
      - name: Check Council Already Done
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS=$(gh issue view "${{ github.event.issue.number }}" --json labels --jq '.labels[].name' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -q "council-validated"; then
            echo "Council S1 already passed (council-validated label present). Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Council Validation
        if: steps.guard.outputs.skip != 'true'
        id: council
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log for session state.
            Focus exclusively on the task below.

            You are the STOA Council Gate (Stage 1 — Ticket Pertinence).
            Read the issue description and run a 4-persona Council validation
            (Chucky, OSS Killer, Archi, Better Call Saul).

            Issue title: ${{ github.event.issue.title }}
            Issue body: ${{ github.event.issue.body }}

            Follow the Council format from .claude/skills/council/SKILL.md.
            Score each persona /10, compute the average.

            Then post a structured comment on this issue with:
            1. The full Council report (4 personas, scores, verdicts)
            2. The global verdict (Go/Fix/Redo) and average score
            3. Ship/Show/Ask classification

            End the comment with:
            ---
            **Council Score: X.XX/10 — [Go|Fix|Redo]**
            Comment `/go` to approve and start plan validation (Stage 2).

            IMPORTANT: Do NOT implement anything yet. Only validate the ticket pertinence.
          # Model tier: sonnet (Council gate — structured rubric evaluation, Sonnet sufficient)
          claude_args: "--model claude-sonnet-4-5-20250929 --max-turns 5 --allowedTools Read,Glob,Grep"

      - name: Log token usage
        if: always() && steps.guard.outputs.skip != 'true'
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}, Model=sonnet-4-5, MaxTurns=5, Stage=council-validate"

      # Add council-validated label so plan-validate job can verify
      - name: Mark Council complete
        if: steps.council.outcome == 'success' || steps.guard.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "council-validated" --color "0e8a16" --description "Council validation passed" --force 2>/dev/null || true
          gh issue edit "${{ github.event.issue.number }}" --add-label "council-validated"

      # Check if this ticket qualifies for Ship fast-path (skip Stage 2)
      - name: Check Ship Fast Path
        id: check-fast
        if: steps.council.outcome == 'success' || steps.guard.outputs.skip == 'true'
        run: |
          source scripts/ai-ops/model-router.sh

          # Extract estimate from issue body
          ISSUE_BODY="${{ github.event.issue.body }}"
          ESTIMATE=$(extract_estimate "$ISSUE_BODY")

          # Extract Ship/Show/Ask from Council output
          MODE="ask"
          EXEC_FILE="${{ steps.council.outputs.execution_file }}"
          EXEC_FILE="${EXEC_FILE:-/home/runner/work/_temp/claude-execution-output.json}"
          if [ -f "$EXEC_FILE" ]; then
            COUNCIL_TEXT=$(jq -r '[.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | join("\n")' "$EXEC_FILE" 2>/dev/null || echo "")
            MODE=$(extract_mode "$COUNCIL_TEXT")
          fi

          echo "Estimate: ${ESTIMATE}, Mode: ${MODE}"

          if [ "$MODE" = "ship" ] && [ "${ESTIMATE:-0}" -le 5 ] && [ "${ESTIMATE:-0}" -gt 0 ]; then
            echo "Ship fast-path: adding label for S2 short-circuit"
            gh label create "ship-fast-path" --color "d4c5f9" --description "Ship fast-path: skip Stage 2" --force 2>/dev/null || true
            gh issue edit "${{ github.event.issue.number }}" --add-label "ship-fast-path"
            echo "fast_path=true" >> "$GITHUB_OUTPUT"
          else
            echo "Regular path: ${MODE} mode, ${ESTIMATE} pts"
            echo "fast_path=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      # Sync Council result to Linear (apply council:ticket-* label + comment)
      - name: Sync Council to Linear
        if: steps.council.outcome == 'success'
        continue-on-error: true
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          if [ -z "$LINEAR_API_KEY" ]; then exit 0; fi

          # Extract CAB-XXXX from issue title or body
          TICKET_ID=$(echo "${{ github.event.issue.title }} ${{ github.event.issue.body }}" \
            | grep -oE 'CAB-[0-9]+' | head -1 || echo "")
          if [ -z "$TICKET_ID" ]; then
            echo "No CAB-XXXX found in issue — skipping Linear sync"
            exit 0
          fi

          # Extract score from Council output (look for "Council Score: X.XX/10" pattern)
          EXEC_FILE="${{ steps.council.outputs.execution_file }}"
          EXEC_FILE="${EXEC_FILE:-/home/runner/work/_temp/claude-execution-output.json}"
          SCORE=""
          if [ -f "$EXEC_FILE" ]; then
            SCORE=$(jq -r '[.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | join("\n")' "$EXEC_FILE" 2>/dev/null \
              | grep -oE 'Score:?\s*[0-9]+\.?[0-9]*/10' | head -1 | grep -oE '[0-9]+\.?[0-9]*' | head -1 || echo "")
          fi
          if [ -z "$SCORE" ]; then
            echo "Could not extract score — skipping Linear sync"
            exit 0
          fi

          # Map score → label name
          LABEL_NAME=""
          if echo "$SCORE >= 8.0" | bc -l | grep -q 1; then
            LABEL_NAME="council:ticket-go"
          elif echo "$SCORE >= 6.0" | bc -l | grep -q 1; then
            LABEL_NAME="council:ticket-fix"
          else
            LABEL_NAME="council:ticket-redo"
          fi

          echo "Syncing to Linear: ${TICKET_ID} — score ${SCORE} → ${LABEL_NAME}"

          # Find Linear issue ID
          ISSUE_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issueSearch(filter: { identifier: { eq: \\\"${TICKET_ID}\\\" } }) { nodes { id } } }\"}" \
            | jq -r '.data.issueSearch.nodes[0].id // empty' 2>/dev/null || echo "")

          if [ -z "$ISSUE_ID" ]; then
            echo "::warning::Could not find Linear issue for ${TICKET_ID}"
            exit 0
          fi

          # Find label ID
          LABEL_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issueLabels(filter: { name: { eq: \\\"${LABEL_NAME}\\\" } }) { nodes { id } } }\"}" \
            | jq -r '.data.issueLabels.nodes[0].id // empty' 2>/dev/null || echo "")

          if [ -n "$LABEL_ID" ]; then
            # Get existing labels and add the new one
            EXISTING=$(curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"{ issue(id: \\\"${ISSUE_ID}\\\") { labels { nodes { id name } } } }\"}" \
              | jq -r '[.data.issue.labels.nodes[] | select(.name | startswith("council:ticket-") | not) | .id]' 2>/dev/null || echo "[]")

            # Build label ID array: existing (minus old council:ticket-*) + new
            LABEL_IDS=$(echo "$EXISTING" | jq -c ". + [\"${LABEL_ID}\"]" 2>/dev/null || echo "[\"${LABEL_ID}\"]")

            curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"mutation { issueUpdate(id: \\\"${ISSUE_ID}\\\", input: { labelIds: ${LABEL_IDS} }) { success } }\"}" \
              > /dev/null 2>&1 || true
            echo "Applied label ${LABEL_NAME} to ${TICKET_ID}"
          fi

          # Post Council comment on Linear
          GH_RUN="https://github.com/stoa-platform/stoa/actions/runs/${{ github.run_id }}"
          COMMENT="Council validation (Stage 1): **${SCORE}/10** — ${LABEL_NAME}\n[GitHub Actions run](${GH_RUN})"
          curl -s -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"${ISSUE_ID}\\\", body: \\\"${COMMENT}\\\" }) { success } }\"}" \
            > /dev/null 2>&1 || true
          echo "Posted Council comment on ${TICKET_ID}"

      - name: Slack Council Report
        if: always() && steps.guard.outputs.skip != 'true'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          N8N_WEBHOOK: ${{ vars.N8N_APPROVE_WEBHOOK_URL }}
          HMAC_SECRET: ${{ secrets.APPROVE_HMAC_SECRET }}
          PUSHGATEWAY_URL: ${{ vars.PUSHGATEWAY_URL }}
          PUSHGATEWAY_AUTH: ${{ secrets.PUSHGATEWAY_AUTH }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          TICKET=$(echo "${{ github.event.issue.title }} ${{ github.event.issue.body }}" | grep -oE 'CAB-[0-9]+' | head -1 || echo "#${{ github.event.issue.number }}")

          # Extract score from Council execution output
          SCORE=""
          EXEC_FILE="${{ steps.council.outputs.execution_file }}"
          EXEC_FILE="${EXEC_FILE:-/home/runner/work/_temp/claude-execution-output.json}"
          if [ -f "$EXEC_FILE" ]; then
            SCORE=$(jq -r '[.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | join("\n")' "$EXEC_FILE" 2>/dev/null \
              | grep -oE 'Score:?\s*[0-9]+\.?[0-9]*/10' | head -1 | grep -oE '[0-9]+\.?[0-9]*' | head -1 || echo "")
          fi

          # Compute verdict from score (don't hardcode "Go")
          VERDICT="Go"
          if [ -n "$SCORE" ]; then
            if echo "$SCORE < 6.0" | bc -l 2>/dev/null | grep -q 1; then VERDICT="Redo"
            elif echo "$SCORE < 8.0" | bc -l 2>/dev/null | grep -q 1; then VERDICT="Fix"; fi
          fi

          notify_council "$TICKET" "${{ github.event.issue.title }}" "${SCORE:-?}" "$VERDICT" "${{ github.event.issue.html_url }}" "${{ github.event.issue.number }}"

          # Push metrics with actual verdict
          METRIC_VERDICT=$(echo "$VERDICT" | tr '[:upper:]' '[:lower:]')
          push_metrics_council "issue-to-pr" "$TICKET" "${SCORE:-0}" "$METRIC_VERDICT"

      - name: Write Job Summary — Council
        if: always() && steps.guard.outputs.skip != 'true'
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          TICKET=$(echo "${{ github.event.issue.title }}" | grep -oE 'CAB-[0-9]+' | head -1 || echo "issue-${{ github.event.issue.number }}")
          write_job_summary "$TICKET" "${{ steps.council.outcome }}" "" "" "council-s1"

  # ----- Stage 2: Plan Validation (runs on /go approval) -----
  plan-validate:
    if: |
      vars.DISABLE_L1_IMPLEMENT != 'true' &&
      github.event_name == 'issue_comment' &&
      (
        github.event.comment.body == '/go' ||
        github.event.comment.body == '/approve' ||
        startsWith(github.event.comment.body, '/go ') ||
        startsWith(github.event.comment.body, '/approve ')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Verify Stage 1 Council
        id: verify-stage1
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          LABELS=$(gh issue view "$ISSUE_NUM" --json labels --jq '.labels[].name' 2>/dev/null || echo "")

          # Guard: skip S2 if plan-validated already exists (prevents double-run)
          if echo "$LABELS" | grep -q "plan-validated"; then
            echo "Plan already validated (plan-validated label present). Skipping S2."
            echo "validated=false" >> "$GITHUB_OUTPUT"
            echo "already_validated=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "$LABELS" | grep -q "council-validated"; then
            echo "Stage 1 Council confirmed"
            echo "validated=true" >> "$GITHUB_OUTPUT"
          else
            echo "Checking for Council comment as fallback..."
            COUNCIL_COMMENT=$(gh issue view "$ISSUE_NUM" --json comments --jq '[.comments[].body | select(contains("Council Score"))] | length')
            if [ "$COUNCIL_COMMENT" -gt 0 ]; then
              echo "Council comment found"
              echo "validated=true" >> "$GITHUB_OUTPUT"
            else
              echo "Not an L1 issue or no Stage 1 Council — skipping"
              echo "validated=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Skip if not L1
        if: steps.verify-stage1.outputs.validated != 'true'
        run: |
          echo "Not an L1 council-validated issue — exiting cleanly"
          exit 0

      # Ship fast-path: skip Stage 2, auto-add plan-validated + comment /go-plan
      - name: Check Ship Fast Path
        id: fast-path
        if: steps.verify-stage1.outputs.validated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          LABELS=$(gh issue view "$ISSUE_NUM" --json labels --jq '.labels[].name' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -q "ship-fast-path"; then
            echo "Ship fast-path detected — skipping Stage 2"
            gh label create "plan-validated" --color "006b75" --description "Stage 2 plan validation passed" --force 2>/dev/null || true
            gh issue edit "$ISSUE_NUM" --add-label "plan-validated"
            gh issue comment "$ISSUE_NUM" --body "Ship fast-path: Stage 2 skipped (small Ship-mode change). Auto-triggering implementation.\n\n/go-plan"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "Regular path — running Stage 2"
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Plan Validation (Stage 2 Council)
        if: steps.verify-stage1.outputs.validated == 'true' && steps.fast-path.outputs.skipped != 'true'
        id: plan-council
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log for session state.
            Focus exclusively on the task below.

            You are running Stage 2 Council Plan Validation for issue #${{ github.event.issue.number }}.

            Issue title: ${{ github.event.issue.title }}
            Issue body: ${{ github.event.issue.body }}

            Stage 1 Council has already validated this ticket (pertinence check passed).
            Now run Stage 2: validate the IMPLEMENTATION PLAN.

            Steps:
            1. Read the issue description and the Stage 1 Council comment on this issue
            2. Write a detailed implementation plan (files to modify, steps, LOC estimate)
            3. Run 4-persona Council validation on THE PLAN (not the ticket):
               - Chucky: Are risks documented? Edge cases covered by tests?
               - OSS Killer: LOC justified? Delivers announced value? ROI of dev effort?
               - Archi 50x50: Right level of abstraction? Existing patterns respected? Breaking changes?
               - Better Call Saul: No secrets hardcoded in plan? GDPR/DORA impacts noted?
            4. Score each persona /10, compute average
            5. Post a structured comment on this issue with the plan + Stage 2 scores

            Format the comment:
            ## Stage 2: Plan Validation
            ### Implementation Plan
            <detailed plan with files, steps, LOC>
            ### Stage 2 Council
            | Persona | Score | Verdict |
            |---------|-------|---------|
            | Chucky | X/10 | Go/Fix/Redo |
            | OSS Killer | X/10 | Go/Fix/Redo |
            | Archi 50x50 | X/10 | Go/Fix/Redo |
            | Better Call Saul | X/10 | Go/Fix/Redo |
            ---
            **Plan Score: X.XX/10 — [Go|Fix|Redo]**
            Comment `/go-plan` to start implementation.

            IMPORTANT: Do NOT implement anything. Only write the plan and validate it.
          # Model tier: sonnet (Stage 2 Council — plan validation, Sonnet sufficient)
          claude_args: "--model claude-sonnet-4-5-20250929 --max-turns 10 --allowedTools Read,Glob,Grep"

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}, Model=sonnet-4-5, MaxTurns=10, Stage=plan-validate"

      - name: Mark Plan validated
        if: steps.plan-council.outcome == 'success' && steps.fast-path.outputs.skipped != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "plan-validated" --color "006b75" --description "Stage 2 plan validation passed" --force 2>/dev/null || true
          gh issue edit "${{ github.event.issue.number }}" --add-label "plan-validated"

      # Sync Stage 2 result to Linear (apply council:plan-* label + comment)
      - name: Sync Plan Council to Linear
        if: steps.plan-council.outcome == 'success' && steps.fast-path.outputs.skipped != 'true'
        continue-on-error: true
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          if [ -z "$LINEAR_API_KEY" ]; then exit 0; fi

          TICKET_ID=$(echo "${{ github.event.issue.title }} ${{ github.event.issue.body }}" \
            | grep -oE 'CAB-[0-9]+' | head -1 || echo "")
          if [ -z "$TICKET_ID" ]; then exit 0; fi

          # Extract plan score from execution output
          EXEC_FILE="${{ steps.plan-council.outputs.execution_file }}"
          EXEC_FILE="${EXEC_FILE:-/home/runner/work/_temp/claude-execution-output.json}"
          SCORE=""
          if [ -f "$EXEC_FILE" ]; then
            SCORE=$(jq -r '[.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | join("\n")' "$EXEC_FILE" 2>/dev/null \
              | grep -oE 'Plan Score:?\s*[0-9]+\.?[0-9]*/10' | head -1 | grep -oE '[0-9]+\.?[0-9]*' | head -1 || echo "")
          fi
          # Fallback: try generic "Score:" pattern (last match = plan score)
          if [ -z "$SCORE" ] && [ -f "$EXEC_FILE" ]; then
            SCORE=$(jq -r '[.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | join("\n")' "$EXEC_FILE" 2>/dev/null \
              | grep -oE 'Score:?\s*[0-9]+\.?[0-9]*/10' | tail -1 | grep -oE '[0-9]+\.?[0-9]*' | head -1 || echo "")
          fi
          if [ -z "$SCORE" ]; then
            echo "Could not extract plan score — skipping Linear sync"
            exit 0
          fi

          # Map score → plan label
          if echo "$SCORE >= 8.0" | bc -l | grep -q 1; then
            LABEL_NAME="council:plan-go"
          elif echo "$SCORE >= 6.0" | bc -l | grep -q 1; then
            LABEL_NAME="council:plan-fix"
          else
            LABEL_NAME="council:plan-redo"
          fi

          echo "Syncing plan to Linear: ${TICKET_ID} — score ${SCORE} → ${LABEL_NAME}"

          ISSUE_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issueSearch(filter: { identifier: { eq: \\\"${TICKET_ID}\\\" } }) { nodes { id } } }\"}" \
            | jq -r '.data.issueSearch.nodes[0].id // empty' 2>/dev/null || echo "")
          if [ -z "$ISSUE_ID" ]; then exit 0; fi

          LABEL_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issueLabels(filter: { name: { eq: \\\"${LABEL_NAME}\\\" } }) { nodes { id } } }\"}" \
            | jq -r '.data.issueLabels.nodes[0].id // empty' 2>/dev/null || echo "")

          if [ -n "$LABEL_ID" ]; then
            EXISTING=$(curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"{ issue(id: \\\"${ISSUE_ID}\\\") { labels { nodes { id name } } } }\"}" \
              | jq -r '[.data.issue.labels.nodes[] | select(.name | startswith("council:plan-") | not) | .id]' 2>/dev/null || echo "[]")
            LABEL_IDS=$(echo "$EXISTING" | jq -c ". + [\"${LABEL_ID}\"]" 2>/dev/null || echo "[\"${LABEL_ID}\"]")

            curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"mutation { issueUpdate(id: \\\"${ISSUE_ID}\\\", input: { labelIds: ${LABEL_IDS} }) { success } }\"}" \
              > /dev/null 2>&1 || true
          fi

          GH_RUN="https://github.com/stoa-platform/stoa/actions/runs/${{ github.run_id }}"
          COMMENT="Plan validation (Stage 2): **${SCORE}/10** — ${LABEL_NAME}\n[GitHub Actions run](${GH_RUN})"
          curl -s -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"${ISSUE_ID}\\\", body: \\\"${COMMENT}\\\" }) { success } }\"}" \
            > /dev/null 2>&1 || true

      - name: Slack Plan Validation
        if: always() && steps.verify-stage1.outputs.validated == 'true' && steps.fast-path.outputs.skipped != 'true'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          notify_plan "${{ github.event.issue.number }}" "${{ github.event.issue.title }}" "${{ github.event.issue.html_url }}" "${{ steps.plan-council.outcome }}"

      - name: Write Job Summary — Plan
        if: always() && steps.verify-stage1.outputs.validated == 'true' && steps.fast-path.outputs.skipped != 'true'
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          TICKET=$(echo "${{ github.event.issue.title }}" | grep -oE 'CAB-[0-9]+' | head -1 || echo "issue-${{ github.event.issue.number }}")
          write_job_summary "$TICKET" "${{ steps.plan-council.outcome }}" "" "" "council-s2"

  # ----- Stage 3: Implementation (runs on /go-plan approval) -----
  implement:
    if: |
      vars.DISABLE_L1_IMPLEMENT != 'true' &&
      github.event_name == 'issue_comment' &&
      (
        github.event.comment.body == '/go-plan' ||
        startsWith(github.event.comment.body, '/go-plan ')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Guard: verify both Stage 1 and Stage 2 passed
      - name: Verify Plan validation
        id: verify-council
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          LABELS=$(gh issue view "$ISSUE_NUM" --json labels --jq '.labels[].name' 2>/dev/null || echo "")

          if echo "$LABELS" | grep -q "plan-validated"; then
            echo "Stage 2 plan validation confirmed"
            echo "validated=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No plan-validated label found on issue #$ISSUE_NUM"
            echo "Checking for Plan Score comment as fallback..."
            PLAN_COMMENT=$(gh issue view "$ISSUE_NUM" --json comments --jq '[.comments[].body | select(contains("Plan Score"))] | length')
            if [ "$PLAN_COMMENT" -gt 0 ]; then
              echo "Plan validation comment found"
              echo "validated=true" >> "$GITHUB_OUTPUT"
            else
              echo "::error::No plan validation found."
              echo "validated=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Abort if no Plan validation
        if: steps.verify-council.outputs.validated != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --body "Implementation requires plan validation (Stage 2). Comment \`/go\` first to trigger plan validation, then \`/go-plan\` after it passes."
          exit 1

      # Route model based on ticket estimate
      - name: Route Model
        if: steps.verify-council.outputs.validated == 'true'
        id: route
        run: |
          source scripts/ai-ops/model-router.sh
          ISSUE_BODY="${{ github.event.issue.body }}"
          ESTIMATE=$(extract_estimate "$ISSUE_BODY")
          MODE=$(extract_mode "$ISSUE_BODY")
          ROUTE=$(route_model "$ESTIMATE" "$MODE")
          MODEL=$(echo "$ROUTE" | cut -d'|' -f1)
          TURNS=$(echo "$ROUTE" | cut -d'|' -f2)
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "turns=$TURNS" >> "$GITHUB_OUTPUT"
          echo "Routed: ${ESTIMATE}pt ${MODE} → ${MODEL}, ${TURNS} turns"

      - name: Record Start Time
        if: steps.verify-council.outputs.validated == 'true'
        run: echo "IMPL_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Run Implementation
        if: steps.verify-council.outputs.validated == 'true'
        continue-on-error: true
        id: implement
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log for session state.
            Focus exclusively on the task below.

            Implement the feature described in issue #${{ github.event.issue.number }}.

            Issue title: ${{ github.event.issue.title }}
            Issue body:
            ${{ github.event.issue.body }}

            Read the Stage 2 plan validation comment (posted earlier on this issue).
            Follow the implementation plan from the Stage 2 comment.
            Follow code style rules in CLAUDE.md and .claude/rules/ (but skip workflow/session rules).

            Steps:
            1. Create a feature branch: feat/issue-${{ github.event.issue.number }}-<slug>
            2. Implement the code following the plan
            3. Run quality gates (lint, test, format)
            4. Commit with conventional messages
            5. Create a PR referencing the issue

            Use Ship/Show/Ask classification from the Council comment.
            If Ship or Show: merge after CI green.
            If Ask: leave PR open for human review.

            IMPORTANT: Rule changes (.claude/rules/) are ALWAYS Ask mode — never auto-merge.
          # Model tier: routed dynamically based on ticket estimate
          claude_args: "--model ${{ steps.route.outputs.model }} --max-turns ${{ steps.route.outputs.turns }} --allowedTools Bash,Read,Write,Edit,Glob,Grep,WebFetch"

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}, Model=${{ steps.route.outputs.model || 'sonnet-4-5' }}, MaxTurns=${{ steps.route.outputs.turns || '60' }}, Stage=implement"

      - name: Detect Partial Success
        id: detect-partial
        if: always() && steps.verify-council.outputs.validated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          TICKET_ID=$(echo "${{ github.event.issue.title }} ${{ github.event.issue.body }}" \
            | grep -oE 'CAB-[0-9]+' | head -1 || echo "")

          SEARCH_TERM="${TICKET_ID:-issue-${ISSUE_NUM}}"

          # Search for PRs created by this run (open or merged)
          PR_INFO=$(gh pr list --state all --search "${SEARCH_TERM}" \
            --json number,url,state,headRefName,title --jq '.[0] // empty' 2>/dev/null || echo "")

          # Verify: PR branch or title must contain ticket ID or issue ref to prevent false positives
          if [ -n "$PR_INFO" ]; then
            VFY_BRANCH=$(echo "$PR_INFO" | jq -r '.headRefName // ""' 2>/dev/null)
            VFY_TITLE=$(echo "$PR_INFO" | jq -r '.title // ""' 2>/dev/null)
            MATCH=false
            if [ -n "$TICKET_ID" ] && echo "$VFY_BRANCH $VFY_TITLE" | grep -qi "${TICKET_ID}"; then MATCH=true; fi
            if echo "$VFY_BRANCH $VFY_TITLE" | grep -qi "issue-${ISSUE_NUM}"; then MATCH=true; fi
            if [ "$MATCH" = "false" ]; then
              echo "::warning::PR found but branch/title doesn't contain ${SEARCH_TERM} — false positive"
              echo "  Branch: $VFY_BRANCH | Title: $VFY_TITLE"
              PR_INFO=""
            fi
          fi

          PR_NUM=$(echo "$PR_INFO" | jq -r '.number // empty' 2>/dev/null || echo "")
          PR_URL=$(echo "$PR_INFO" | jq -r '.url // empty' 2>/dev/null || echo "")
          PR_STATE=$(echo "$PR_INFO" | jq -r '.state // empty' 2>/dev/null || echo "")

          if [ -n "$PR_NUM" ]; then
            echo "pr_found=true" >> "$GITHUB_OUTPUT"
            echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
            echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "pr_state=$PR_STATE" >> "$GITHUB_OUTPUT"
            echo "PR #${PR_NUM} found (${PR_STATE}) — partial success"
          else
            echo "pr_found=false" >> "$GITHUB_OUTPUT"
            echo "No PR found"
          fi

          echo "TICKET_ID=${TICKET_ID}" >> "$GITHUB_ENV"
          echo "PR_NUM=${PR_NUM}" >> "$GITHUB_ENV"
          echo "PR_URL=${PR_URL}" >> "$GITHUB_ENV"

      - name: Slack Implementation Result
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          PUSHGATEWAY_URL: ${{ vars.PUSHGATEWAY_URL }}
          PUSHGATEWAY_AUTH: ${{ secrets.PUSHGATEWAY_AUTH }}
          N8N_MERGE_WEBHOOK: ${{ vars.N8N_MERGE_WEBHOOK_URL }}
          HMAC_SECRET: ${{ secrets.APPROVE_HMAC_SECRET }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          TICKET=$(echo "${{ github.event.issue.title }}" | grep -oE 'CAB-[0-9]+' | head -1 || echo "issue-${{ github.event.issue.number }}")
          STATUS="${{ steps.implement.outcome || 'skipped' }}"
          PR_FOUND="${{ steps.detect-partial.outputs.pr_found }}"
          DURATION=$(( $(date +%s) - ${IMPL_START:-$(date +%s)} ))
          MODEL="${{ steps.route.outputs.model || 'sonnet-4-5' }}"
          MAX_TURNS="${{ steps.route.outputs.turns || '60' }}"
          if [ "$STATUS" = "success" ]; then
            notify_implement "$TICKET" "success" "" "" "${{ github.event.issue.number }}" "L1 Issue-to-PR" "$DURATION"
            linear_comment "$TICKET" "completed" "" "" "L1 Issue-to-PR" "$DURATION" || true
            push_metrics_implement "issue-to-pr" "$TICKET" "success" "$DURATION" "" "" "$MODEL" "$MAX_TURNS"
          elif [ "$STATUS" = "failure" ] && [ "${PR_FOUND}" = "true" ]; then
            notify_implement "$TICKET" "ask" "$PR_NUM" "$PR_URL" "${{ github.event.issue.number }}" "L1 Issue-to-PR (max_turns)" "$DURATION"
            push_metrics_implement "issue-to-pr" "$TICKET" "max_turns" "$DURATION" "" "" "$MODEL" "$MAX_TURNS"
          elif [ "$STATUS" = "failure" ]; then
            notify_error "claude-issue-to-pr" "implement" "$TICKET" "" "$DURATION"
            push_metrics_error "issue-to-pr" "implement" "$TICKET"
          else
            notify_implement "$TICKET" "$STATUS" "" "" "${{ github.event.issue.number }}" "L1 Issue-to-PR"
          fi

      - name: Write Job Summary — Implement
        if: always()
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          TICKET=$(echo "${{ github.event.issue.title }}" | grep -oE 'CAB-[0-9]+' | head -1 || echo "issue-${{ github.event.issue.number }}")
          write_job_summary "$TICKET" "${{ steps.implement.outcome || 'skipped' }}" "" \
            "${{ steps.route.outputs.model || 'sonnet-4-5' }}" "L1-implement" \
            "$(( $(date +%s) - ${IMPL_START:-$(date +%s)} ))"
