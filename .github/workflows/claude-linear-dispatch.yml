# Level 3: Linear → n8n → GitHub Actions → Council → Claude → PR → Close Loop
# Receives repository_dispatch from n8n when a Linear ticket moves to "In Progress".
# Runs Council validation, posts to Slack, waits for /go before implementing.
# Also handles /go comments on council-review issues (self-contained pipeline).
# Post-merge: closes GitHub issue + moves Linear ticket to Done + notifies Slack.
# Kill-switch: set DISABLE_L3_LINEAR=true in repo variables to disable.

name: Claude Code Linear Dispatch

on:
  repository_dispatch:
    types: [linear-ticket-started]
  issue_comment:
    types: [created]

concurrency:
  group: claude-linear-${{ github.event.client_payload.ticket_id || github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read
  id-token: write
  actions: write

jobs:
  # ----- Phase 1: Council Gate (triggered by n8n dispatch) -----
  council:
    if: |
      vars.DISABLE_L3_LINEAR != 'true' &&
      github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Council Validation
        id: council
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Council validation for a Linear ticket.

            Ticket: ${{ github.event.client_payload.ticket_id }}
            Title: ${{ github.event.client_payload.ticket_title }}
            Description: ${{ github.event.client_payload.ticket_description }}
            Priority: ${{ github.event.client_payload.ticket_priority }}
            Estimate: ${{ github.event.client_payload.ticket_estimate }} pts

            Run a CONCISE 4-persona Council validation (2-3 sentences per persona, score /10):
            Chucky (risk), OSS Killer (value), Archi 50x50 (architecture), Better Call Saul (legal).
            Compute average. Classify as Ship/Show/Ask.

            Format your response EXACTLY as markdown (this text will become a GitHub issue body):

            # Council: TICKET_ID — TITLE
            **Score: X.X/10 — GO/FIX/REDO**
            ## Personas
            **Chucky**: X/10 — summary
            **OSS Killer**: X/10 — summary
            **Archi 50x50**: X/10 — summary
            **Better Call Saul**: X/10 — summary
            ## Ship/Show/Ask: MODE
            ## Plan
            scope, files, LOC estimate
            ## DoD
            - [ ] criteria
            ---
            Comment /go to start implementation.

            IMPORTANT: Do NOT write any files. Do NOT create issues or labels. Just output the report text above.
          claude_args: "--model claude-sonnet-4-5-20250929 --max-turns 3 --allowedTools Read,Glob,Grep"
          show_full_output: true

      # Extract Claude's report from execution log and create GitHub issue
      - name: Create Council Issue
        if: steps.council.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TICKET="${{ github.event.client_payload.ticket_id }}"
          TITLE="${{ github.event.client_payload.ticket_title }}"
          EXEC_FILE="${{ steps.council.outputs.execution_file }}"
          EXEC_FILE="${EXEC_FILE:-/home/runner/work/_temp/claude-execution-output.json}"

          echo "Execution file: $EXEC_FILE"

          # Parse execution output — JSON array: [system, assistant, result]
          if [ -f "$EXEC_FILE" ]; then
            echo "File exists ($(wc -c < "$EXEC_FILE") bytes)"

            # Primary: extract .result field from the result object
            jq -r '.[] | select(.type == "result") | .result // empty' \
              "$EXEC_FILE" > council-body.md 2>/dev/null || true

            # Fallback: extract text from assistant message content
            if [ ! -s council-body.md ]; then
              jq -r '[.[] | select(.type == "assistant") | .message.content[] | select(.type == "text") | .text] | join("\n")' \
                "$EXEC_FILE" > council-body.md 2>/dev/null || true
            fi

            if [ -s council-body.md ]; then
              echo "Extracted $(wc -l < council-body.md | tr -d ' ') lines from execution output"
            else
              echo "Extraction failed. Element types: $(jq -c '[.[] | .type]' "$EXEC_FILE" 2>/dev/null)"
            fi
          else
            echo "::warning::Execution file not found at $EXEC_FILE"
          fi

          # Fallback
          if [ ! -s council-body.md ]; then
            echo "::warning::Could not extract Council report, using fallback"
            printf '%s\n' \
              "# Council: ${TICKET} — ${TITLE}" "" \
              "Council validation ran but the report could not be extracted from the execution log." \
              "Check the [workflow logs](https://github.com/stoa-platform/stoa/actions/runs/${{ github.run_id }}) for the full analysis." \
              "" "---" "Comment /go to start implementation." > council-body.md
          fi

          echo "=== Council body preview ==="
          head -15 council-body.md
          echo "=== ($(wc -l < council-body.md | tr -d ' ') lines total) ==="

          # Create label (idempotent)
          gh label create "${TICKET}" --color "0075ca" --description "Linear ticket" --force 2>/dev/null || true

          # Create GitHub issue
          ISSUE_URL=$(gh issue create \
            --title "Council: ${TICKET} — ${TITLE}" \
            --label "council-review" \
            --label "${TICKET}" \
            --body-file council-body.md)

          echo "Created issue: ${ISSUE_URL}"
          echo "ISSUE_URL=${ISSUE_URL}" >> "$GITHUB_ENV"

      # Post Council report to Slack with Approve button
      # If N8N_APPROVE_WEBHOOK_URL + APPROVE_HMAC_SECRET are set, button goes through
      # n8n relay (zero GitHub visits). Otherwise falls back to GitHub issue link.
      - name: Slack Council Report
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          N8N_WEBHOOK: ${{ vars.N8N_APPROVE_WEBHOOK_URL }}
          HMAC_SECRET: ${{ secrets.APPROVE_HMAC_SECRET }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then exit 0; fi
          TICKET="${{ github.event.client_payload.ticket_id }}"
          TITLE="${{ github.event.client_payload.ticket_title }}"
          ISSUE="${ISSUE_URL:-https://github.com/stoa-platform/stoa/issues?q=is%3Aissue+Council+${TICKET}+is%3Aopen}"

          # Extract issue number from URL (e.g., .../issues/42 -> 42)
          ISSUE_NUM=$(echo "$ISSUE" | grep -oE '/issues/[0-9]+' | grep -oE '[0-9]+' || echo "")

          # Build approve button URL: n8n relay if configured, else GitHub issue
          if [ -n "$N8N_WEBHOOK" ] && [ -n "$HMAC_SECRET" ] && [ -n "$ISSUE_NUM" ]; then
            HMAC=$(echo -n "$ISSUE_NUM" | openssl dgst -sha256 -hmac "$HMAC_SECRET" | awk '{print $NF}')
            APPROVE_URL="${N8N_WEBHOOK}?issue=${ISSUE_NUM}&token=${HMAC}"
            BUTTON_TEXT="Approve \\u0026 Start"
            INSTRUCTIONS=":zap: Click *Approve & Start* to trigger implementation (1 click, no GitHub visit).\n:mag: Or open the <${ISSUE}|GitHub issue> to review the full plan first."
          else
            APPROVE_URL="$ISSUE"
            BUTTON_TEXT="Review \\u0026 Approve"
            INSTRUCTIONS=":point_right: Comment \`/go\` on the GitHub issue to start autonomous implementation.\n:point_right: Comment \`/adjust <feedback>\` to request changes."
          fi

          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {\"type\": \"plain_text\", \"text\": \"Council Report: ${TICKET}\", \"emoji\": true}
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*${TITLE}*\n\nCouncil validation complete.\n\n${INSTRUCTIONS}\"
                  },
                  \"accessory\": {
                    \"type\": \"button\",
                    \"text\": {\"type\": \"plain_text\", \"text\": \"${BUTTON_TEXT}\"},
                    \"url\": \"${APPROVE_URL}\"
                  }
                },
                {
                  \"type\": \"context\",
                  \"elements\": [{\"type\": \"mrkdwn\", \"text\": \"STOA AI Factory | Linear Pipeline | $(date -u +%H:%M) UTC\"}]
                }
              ]
            }"

  # ----- Phase 2: Implementation (triggered by /go on council-review issues) -----
  implement:
    if: |
      vars.DISABLE_L3_LINEAR != 'true' &&
      github.event_name == 'issue_comment' &&
      (
        github.event.comment.body == '/go' ||
        github.event.comment.body == '/approve' ||
        startsWith(github.event.comment.body, '/go ') ||
        startsWith(github.event.comment.body, '/approve ')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Guard: only run on issues created by L3 (council-review label)
      - name: Verify L3 Council issue
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          LABELS=$(gh issue view "$ISSUE_NUM" --json labels --jq '.labels[].name' 2>/dev/null || echo "")

          if echo "$LABELS" | grep -q "council-review"; then
            echo "Council-review issue confirmed"
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not a council-review issue — skipping (L3 only handles its own issues)"
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Implementation
        if: steps.verify.outputs.valid == 'true'
        continue-on-error: true
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log.
            Do NOT log SESSION-START or SESSION-END.
            Do NOT run crash recovery checks.
            Focus exclusively on implementing the task below.

            Implement the feature described in issue #${{ github.event.issue.number }}.

            Issue title: ${{ github.event.issue.title }}
            Issue body:
            ${{ github.event.issue.body }}

            The issue body contains a Council validation report with a plan and DoD.
            Follow the implementation plan from the Council report.
            Follow code style rules in CLAUDE.md and .claude/rules/ (but skip workflow/session rules).

            Steps:
            1. Create a feature branch: feat/issue-${{ github.event.issue.number }}-<slug>
            2. Implement the code following the plan
            3. Run quality gates (lint, test, format)
            4. Commit with conventional messages
            5. Create a PR referencing the issue

            Use Ship/Show/Ask classification from the Council report.
            If Ship or Show: merge after CI green.
            If Ask: leave PR open for human review.

            IMPORTANT: Rule changes (.claude/rules/) are ALWAYS Ask mode — never auto-merge.
          claude_args: "--model claude-sonnet-4-5-20250929 --max-turns 60 --allowedTools Bash,Read,Write,Edit,Glob,Grep,WebFetch"

      # ----- Close the Loop (post-merge feedback) -----
      # After implementation: find merged PR, close GitHub issue, update Linear, notify Slack
      - name: Close the Loop
        if: steps.claude.outcome == 'success' && steps.verify.outputs.valid == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"

          # Extract ticket ID from issue labels (CAB-XXXX pattern)
          TICKET_ID=$(gh issue view "$ISSUE_NUM" --json labels --jq \
            '[.labels[].name | select(test("^CAB-[0-9]+$"))][0] // empty')

          # Find merged PR referencing this issue
          PR_INFO=$(gh pr list --state merged --search "issue-${ISSUE_NUM}" \
            --json number,title,url --jq '.[0] // empty' 2>/dev/null || echo "")

          if [ -z "$PR_INFO" ]; then
            # Fallback: search by issue mention in PR body
            PR_INFO=$(gh pr list --state merged --search "#${ISSUE_NUM}" \
              --json number,title,url --jq '.[0] // empty' 2>/dev/null || echo "")
          fi

          PR_NUM=$(echo "$PR_INFO" | jq -r '.number // empty' 2>/dev/null || echo "")
          PR_URL=$(echo "$PR_INFO" | jq -r '.url // empty' 2>/dev/null || echo "")
          PR_TITLE=$(echo "$PR_INFO" | jq -r '.title // empty' 2>/dev/null || echo "")

          SKIP_CLOSE=""
          if [ -n "$PR_NUM" ]; then
            echo "Found merged PR #${PR_NUM}: ${PR_TITLE}"
            CLOSE_BODY="Completed via PR #${PR_NUM} (${PR_URL})."
          else
            echo "No merged PR found — checking for open PRs"
            # Search open PRs by branch name pattern (feat/issue-NNN-*)
            OPEN_PR=$(gh pr list --state open --head "feat/issue-${ISSUE_NUM}" \
              --json number,url --jq '.[0] // empty' 2>/dev/null || echo "")
            # Fallback: search by issue mention
            if [ -z "$OPEN_PR" ]; then
              OPEN_PR=$(gh pr list --state open --search "#${ISSUE_NUM}" \
                --json number,url --jq '.[0] // empty' 2>/dev/null || echo "")
            fi
            OPEN_NUM=$(echo "$OPEN_PR" | jq -r '.number // empty' 2>/dev/null || echo "")
            if [ -n "$OPEN_NUM" ]; then
              OPEN_URL=$(echo "$OPEN_PR" | jq -r '.url // empty' 2>/dev/null || echo "")
              echo "Open PR #${OPEN_NUM} found — Ask mode, leaving issue open"
              SKIP_CLOSE=true
            fi
            CLOSE_BODY="Implementation completed. No merged PR detected (may be in Ask mode)."
          fi

          # Close GitHub issue only if we found a merged PR.
          # If no merged PR and no open PR, don't close — implementation may have failed.
          if [ -n "$PR_NUM" ]; then
            gh issue close "$ISSUE_NUM" --comment "$CLOSE_BODY" || true
            echo "Closed issue #${ISSUE_NUM}"
          elif [ "$SKIP_CLOSE" = "true" ]; then
            echo "Skipping close — open PR #${OPEN_NUM} in Ask mode"
          else
            echo "No PRs found — not closing issue (implementation may have failed)"
          fi

          # Update Linear ticket -> Done (only when we found a merged PR)
          if [ -n "$LINEAR_API_KEY" ] && [ -n "$TICKET_ID" ] && [ -n "$PR_NUM" ]; then
            echo "Updating Linear ticket ${TICKET_ID} -> Done"

            # Fetch the "Done" state ID for team CAB-ING
            DONE_STATE_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"query": "{ workflowStates(filter: { name: { eq: \"Done\" }, team: { key: { eq: \"CAB\" } } }) { nodes { id name } } }"}' \
              | jq -r '.data.workflowStates.nodes[0].id // empty' 2>/dev/null || echo "")

            if [ -n "$DONE_STATE_ID" ]; then
              # Fetch issue ID by identifier
              ISSUE_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
                -H "Authorization: ${LINEAR_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "{\"query\": \"{ issueSearch(filter: { identifier: { eq: \\\"${TICKET_ID}\\\" } }) { nodes { id } } }\"}" \
                | jq -r '.data.issueSearch.nodes[0].id // empty' 2>/dev/null || echo "")

              if [ -n "$ISSUE_ID" ]; then
                # Move to Done
                curl -s -X POST "https://api.linear.app/graphql" \
                  -H "Authorization: ${LINEAR_API_KEY}" \
                  -H "Content-Type: application/json" \
                  -d "{\"query\": \"mutation { issueUpdate(id: \\\"${ISSUE_ID}\\\", input: { stateId: \\\"${DONE_STATE_ID}\\\" }) { success } }\"}" \
                  > /dev/null 2>&1 || true

                # Add completion comment
                PR_REF=""
                [ -n "$PR_NUM" ] && PR_REF="PR [#${PR_NUM}](${PR_URL})"
                COMMENT_BODY="Completed autonomously via AI Factory L3 pipeline. ${PR_REF}"
                curl -s -X POST "https://api.linear.app/graphql" \
                  -H "Authorization: ${LINEAR_API_KEY}" \
                  -H "Content-Type: application/json" \
                  -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"${ISSUE_ID}\\\", body: \\\"${COMMENT_BODY}\\\" }) { success } }\"}" \
                  > /dev/null 2>&1 || true

                echo "Linear ${TICKET_ID} -> Done"
              else
                echo "::warning::Could not find Linear issue ID for ${TICKET_ID}"
              fi
            else
              echo "::warning::Could not find Done state ID for team CAB"
            fi
          fi

          # Export for Slack notification
          echo "PR_NUM=${PR_NUM}" >> "$GITHUB_ENV"
          echo "PR_URL=${PR_URL}" >> "$GITHUB_ENV"
          echo "TICKET_ID=${TICKET_ID}" >> "$GITHUB_ENV"
          echo "SKIP_CLOSE=${SKIP_CLOSE}" >> "$GITHUB_ENV"

      # Enhanced Slack notification (includes PR link + ticket status)
      - name: Notify Slack — Implementation Result
        if: always() && steps.verify.outputs.valid == 'true'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then exit 0; fi
          STATUS="${{ steps.claude.outcome || 'skipped' }}"
          ISSUE_NUM="${{ github.event.issue.number }}"

          if [ "$STATUS" = "success" ] && [ -n "${PR_NUM}" ]; then
            MSG=":tada: *${TICKET_ID:-Issue #${ISSUE_NUM}}* completed!\nPR <${PR_URL}|#${PR_NUM}> merged | Linear -> Done | Issue #${ISSUE_NUM} closed"
          elif [ "$STATUS" = "success" ] && [ "${SKIP_CLOSE}" = "true" ]; then
            MSG=":eyes: *${TICKET_ID:-Issue #${ISSUE_NUM}}* — PR created (Ask mode). Awaiting human review."
          elif [ "$STATUS" = "success" ]; then
            MSG=":white_check_mark: Implementation complete for #${ISSUE_NUM}."
          elif [ "$STATUS" = "skipped" ]; then
            MSG=":warning: Implementation skipped for #${ISSUE_NUM}."
          else
            MSG=":x: Implementation failed for #${ISSUE_NUM}. Check <https://github.com/stoa-platform/stoa/actions/runs/${{ github.run_id }}|workflow logs>."
          fi

          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {\"type\": \"mrkdwn\", \"text\": \"${MSG}\"}
                },
                {
                  \"type\": \"context\",
                  \"elements\": [{\"type\": \"mrkdwn\", \"text\": \"STOA AI Factory | L3 Pipeline | $(date -u +%H:%M) UTC\"}]
                }
              ]
            }"

      # ----- Self-Feeding Loop -----
      # After successful close, trigger next autopilot scan if under daily velocity cap
      - name: Trigger Next Scan
        if: steps.claude.outcome == 'success' && steps.verify.outputs.valid == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Only trigger if autopilot scan workflow exists and is not disabled
          if [ "${{ vars.DISABLE_AUTOPILOT_SCAN }}" = "true" ]; then
            echo "Autopilot scan disabled — skipping self-feeding trigger"
            exit 0
          fi

          # Check daily velocity cap (stored in repo variable AUTOPILOT_TODAY_COUNT)
          # Format: YYYY-MM-DD:N (e.g., 2026-02-17:2)
          MAX_DAILY=3
          TODAY=$(date -u +%Y-%m-%d)
          COUNTER="${{ vars.AUTOPILOT_TODAY_COUNT }}"
          COUNT_DATE=$(echo "$COUNTER" | cut -d: -f1 2>/dev/null || echo "")
          COUNT_VAL=$(echo "$COUNTER" | cut -d: -f2 2>/dev/null || echo "0")

          if [ "$COUNT_DATE" != "$TODAY" ]; then
            COUNT_VAL=0
          fi

          if [ "$COUNT_VAL" -ge "$MAX_DAILY" ]; then
            echo "Daily velocity cap reached (${COUNT_VAL}/${MAX_DAILY}) — skipping scan"
            exit 0
          fi

          # Increment counter
          NEW_COUNT=$((COUNT_VAL + 1))
          gh api repos/stoa-platform/stoa/actions/variables/AUTOPILOT_TODAY_COUNT \
            -X PATCH -f value="${TODAY}:${NEW_COUNT}" 2>/dev/null || \
          gh api repos/stoa-platform/stoa/actions/variables \
            -X POST -f name=AUTOPILOT_TODAY_COUNT -f value="${TODAY}:${NEW_COUNT}" 2>/dev/null || true

          echo "Velocity: ${NEW_COUNT}/${MAX_DAILY} — triggering next scan"
          gh workflow run claude-autopilot-scan.yml -f max_tickets=1 2>/dev/null || \
            echo "::warning::Could not trigger autopilot scan (workflow may not exist yet)"
