# Level 3: Linear → n8n → GitHub Actions → Council → Claude → PR → Close Loop
# Receives repository_dispatch from n8n when a Linear ticket moves to "In Progress".
# Two-stage Council: Stage 1 (ticket pertinence) → /go → Stage 2 (plan validation) → /go-plan → implement.
# Post-merge: closes GitHub issue + moves Linear ticket to Done + notifies Slack.
# Kill-switch: set DISABLE_L3_LINEAR=true in repo variables to disable.

name: Claude Code Linear Dispatch

on:
  repository_dispatch:
    types: [linear-ticket-started]
  issue_comment:
    types: [created]

concurrency:
  group: claude-linear-${{ github.event.client_payload.ticket_id || github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read
  id-token: write
  actions: write

jobs:
  # ----- Stage 1: Council Gate (triggered by n8n dispatch) -----
  council:
    if: |
      vars.DISABLE_L3_LINEAR != 'true' &&
      github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      fast_path: ${{ steps.check-fast.outputs.fast_path }}
      issue_num: ${{ steps.create-issue.outputs.issue_num || steps.dedup.outputs.issue_num }}
      issue_url: ${{ steps.create-issue.outputs.issue_url || steps.dedup.outputs.issue_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Council Validation
        id: council
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log for session state.
            Focus exclusively on the task below.

            Council validation (Stage 1 — Ticket Pertinence) for a Linear ticket.

            Ticket: ${{ github.event.client_payload.ticket_id }}
            Title: ${{ github.event.client_payload.ticket_title }}
            Description: ${{ github.event.client_payload.ticket_description }}
            Priority: ${{ github.event.client_payload.ticket_priority }}
            Estimate: ${{ github.event.client_payload.ticket_estimate }} pts

            Run a CONCISE 4-persona Council validation (2-3 sentences per persona, score /10):
            Chucky (risk), OSS Killer (value), Archi 50x50 (architecture), Better Call Saul (legal).
            Compute average. Classify as Ship/Show/Ask.

            Format your response EXACTLY as markdown (this text will become a GitHub issue body):

            # Council: TICKET_ID — TITLE
            **Score: X.X/10 — GO/FIX/REDO**
            ## Personas
            **Chucky**: X/10 — summary
            **OSS Killer**: X/10 — summary
            **Archi 50x50**: X/10 — summary
            **Better Call Saul**: X/10 — summary
            ## Ship/Show/Ask: MODE
            ---
            Comment /go to start plan validation (Stage 2).

            IMPORTANT: Do NOT write any files. Do NOT create issues or labels. Just output the report text above.
          # Model tier: sonnet (Council gate — structured rubric evaluation, Sonnet sufficient)
          claude_args: "--model claude-sonnet-4-5-20250929 --max-turns 5 --allowedTools Read,Glob,Grep"
          show_full_output: true

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}, Model=sonnet-4-5, MaxTurns=5, Stage=council"

      # Extract Claude's Council report from execution log
      - name: Extract Council Report
        id: extract-report
        if: steps.council.outcome == 'success'
        run: |
          TICKET="${{ github.event.client_payload.ticket_id }}"
          TITLE="${{ github.event.client_payload.ticket_title }}"
          EXEC_FILE="${{ steps.council.outputs.execution_file }}"
          EXEC_FILE="${EXEC_FILE:-/home/runner/work/_temp/claude-execution-output.json}"

          echo "Execution file: $EXEC_FILE"

          # Parse execution output — JSON array: [system, assistant, result]
          if [ -f "$EXEC_FILE" ]; then
            echo "File exists ($(wc -c < "$EXEC_FILE") bytes)"

            # Primary: extract .result field from the result object
            jq -r '.[] | select(.type == "result") | .result // empty' \
              "$EXEC_FILE" > council-body.md 2>/dev/null || true

            # Fallback: extract text from assistant message content
            if [ ! -s council-body.md ]; then
              jq -r '[.[] | select(.type == "assistant") | .message.content[] | select(.type == "text") | .text] | join("\n")' \
                "$EXEC_FILE" > council-body.md 2>/dev/null || true
            fi

            if [ -s council-body.md ]; then
              echo "Extracted $(wc -l < council-body.md | tr -d ' ') lines from execution output"
            else
              echo "Extraction failed. Element types: $(jq -c '[.[] | .type]' "$EXEC_FILE" 2>/dev/null)"
            fi
          else
            echo "::warning::Execution file not found at $EXEC_FILE"
          fi

          # Fallback
          if [ ! -s council-body.md ]; then
            echo "::warning::Could not extract Council report, using fallback"
            printf '%s\n' \
              "# Council: ${TICKET} — ${TITLE}" "" \
              "Council validation ran but the report could not be extracted from the execution log." \
              "Check the [workflow logs](https://github.com/stoa-platform/stoa/actions/runs/${{ github.run_id }}) for the full analysis." \
              "" "---" "Comment /go to start plan validation (Stage 2)." > council-body.md
          fi

          echo "=== Council body preview ==="
          head -15 council-body.md
          echo "=== ($(wc -l < council-body.md | tr -d ' ') lines total) ==="

      # Check if a GitHub issue already exists for this ticket (dedup guard)
      - name: Check Existing Issue
        id: dedup
        if: steps.council.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TICKET="${{ github.event.client_payload.ticket_id }}"
          # Search for open issues with the ticket label
          EXISTING=$(gh issue list --label "$TICKET" --state open --json number,title --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Issue #${EXISTING} already exists for ${TICKET} — skipping creation"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "issue_num=${EXISTING}" >> "$GITHUB_OUTPUT"
            ISSUE_URL="https://github.com/stoa-platform/stoa/issues/${EXISTING}"
            echo "issue_url=${ISSUE_URL}" >> "$GITHUB_OUTPUT"
            # Post updated Council report as comment on existing issue
            if [ -f council-body.md ] && [ -s council-body.md ]; then
              gh issue comment "$EXISTING" --body "**Updated Council Report** (re-dispatch)\n\n$(cat council-body.md)" || true
            fi
          else
            echo "No existing issue for ${TICKET}"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Create GitHub issue (only if no existing issue found)
      - name: Create Council Issue
        id: create-issue
        if: steps.council.outcome == 'success' && steps.dedup.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TICKET="${{ github.event.client_payload.ticket_id }}"
          TITLE="${{ github.event.client_payload.ticket_title }}"

          # Create label (idempotent)
          gh label create "${TICKET}" --color "0075ca" --description "Linear ticket" --force 2>/dev/null || true

          # Create GitHub issue
          ISSUE_URL=$(gh issue create \
            --title "Council: ${TICKET} — ${TITLE}" \
            --label "council-review" \
            --label "${TICKET}" \
            --body-file council-body.md)

          ISSUE_NUM=$(echo "$ISSUE_URL" | grep -oE '/issues/[0-9]+' | grep -oE '[0-9]+')
          echo "Created issue #${ISSUE_NUM}: ${ISSUE_URL}"
          echo "ISSUE_URL=${ISSUE_URL}" >> "$GITHUB_ENV"
          echo "issue_url=${ISSUE_URL}" >> "$GITHUB_OUTPUT"
          echo "issue_num=${ISSUE_NUM}" >> "$GITHUB_OUTPUT"

      # Check if this ticket qualifies for Ship fast-path (skip Stage 2)
      - name: Check Ship Fast Path
        id: check-fast
        if: steps.council.outcome == 'success'
        run: |
          source scripts/ai-ops/model-router.sh

          ESTIMATE="${{ github.event.client_payload.ticket_estimate }}"
          ESTIMATE="${ESTIMATE:-0}"

          # Extract Ship/Show/Ask from Council report
          MODE="ask"
          if [ -f council-body.md ]; then
            MODE=$(extract_mode "$(cat council-body.md)")
          fi

          echo "Estimate: ${ESTIMATE}, Mode: ${MODE}"

          # Fast path: Ship mode + estimate <= 5 pts
          if [ "$MODE" = "ship" ] && [ "${ESTIMATE:-0}" -le 5 ] && [ "${ESTIMATE:-0}" -gt 0 ]; then
            echo "Ship fast-path: skipping Stage 2 for ${ESTIMATE}pt Ship ticket"
            echo "fast_path=true" >> "$GITHUB_OUTPUT"
          else
            echo "Regular path: ${MODE} mode, ${ESTIMATE} pts"
            echo "fast_path=false" >> "$GITHUB_OUTPUT"
          fi

      # Sync Council result to Linear (apply council:ticket-* label + comment)
      - name: Sync Council to Linear
        if: steps.council.outcome == 'success'
        continue-on-error: true
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          if [ -z "$LINEAR_API_KEY" ]; then exit 0; fi

          TICKET_ID="${{ github.event.client_payload.ticket_id }}"
          if [ -z "$TICKET_ID" ]; then exit 0; fi

          # Extract score from council-body.md
          SCORE=""
          if [ -f council-body.md ]; then
            SCORE=$(grep -oE 'Score:?\s*[0-9]+\.?[0-9]*/10' council-body.md | head -1 | grep -oE '[0-9]+\.?[0-9]*' | head -1 || echo "")
          fi
          if [ -z "$SCORE" ]; then
            echo "Could not extract score — skipping Linear sync"
            exit 0
          fi

          # Map score → label name
          LABEL_NAME=""
          if echo "$SCORE >= 8.0" | bc -l | grep -q 1; then
            LABEL_NAME="council:ticket-go"
          elif echo "$SCORE >= 6.0" | bc -l | grep -q 1; then
            LABEL_NAME="council:ticket-fix"
          else
            LABEL_NAME="council:ticket-redo"
          fi

          echo "Syncing to Linear: ${TICKET_ID} — score ${SCORE} → ${LABEL_NAME}"

          # Find Linear issue ID
          ISSUE_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issueSearch(filter: { identifier: { eq: \\\"${TICKET_ID}\\\" } }) { nodes { id } } }\"}" \
            | jq -r '.data.issueSearch.nodes[0].id // empty' 2>/dev/null || echo "")

          if [ -z "$ISSUE_ID" ]; then
            echo "::warning::Could not find Linear issue for ${TICKET_ID}"
            exit 0
          fi

          # Find label ID
          LABEL_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issueLabels(filter: { name: { eq: \\\"${LABEL_NAME}\\\" } }) { nodes { id } } }\"}" \
            | jq -r '.data.issueLabels.nodes[0].id // empty' 2>/dev/null || echo "")

          if [ -n "$LABEL_ID" ]; then
            EXISTING=$(curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"{ issue(id: \\\"${ISSUE_ID}\\\") { labels { nodes { id name } } } }\"}" \
              | jq -r '[.data.issue.labels.nodes[] | select(.name | startswith("council:ticket-") | not) | .id]' 2>/dev/null || echo "[]")
            LABEL_IDS=$(echo "$EXISTING" | jq -c ". + [\"${LABEL_ID}\"]" 2>/dev/null || echo "[\"${LABEL_ID}\"]")

            curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"mutation { issueUpdate(id: \\\"${ISSUE_ID}\\\", input: { labelIds: ${LABEL_IDS} }) { success } }\"}" \
              > /dev/null 2>&1 || true
            echo "Applied label ${LABEL_NAME} to ${TICKET_ID}"
          fi

          # Post Council comment on Linear
          GH_RUN="https://github.com/stoa-platform/stoa/actions/runs/${{ github.run_id }}"
          COMMENT="Council validation (Stage 1): **${SCORE}/10** — ${LABEL_NAME}\n[GitHub Actions run](${GH_RUN})"
          curl -s -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"${ISSUE_ID}\\\", body: \\\"${COMMENT}\\\" }) { success } }\"}" \
            > /dev/null 2>&1 || true
          echo "Posted Council comment on ${TICKET_ID}"

      # Notify Slack — Council report with approve button
      - name: Slack Council Report
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          N8N_WEBHOOK: ${{ vars.N8N_APPROVE_WEBHOOK_URL }}
          HMAC_SECRET: ${{ secrets.APPROVE_HMAC_SECRET }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          TICKET="${{ github.event.client_payload.ticket_id }}"
          TITLE="${{ github.event.client_payload.ticket_title }}"
          ISSUE="${ISSUE_URL:-https://github.com/stoa-platform/stoa/issues?q=is%3Aissue+Council+${TICKET}+is%3Aopen}"
          ISSUE_NUM=$(echo "$ISSUE" | grep -oE '/issues/[0-9]+' | grep -oE '[0-9]+' || echo "")

          # Extract score, mode, LOC, files from council body
          SCORE="" MODE="" LOC="" FILES=""
          if [ -f council-body.md ]; then
            SCORE=$(grep -oE 'Score:?\s*[0-9]+\.?[0-9]*/10' council-body.md | head -1 | grep -oE '[0-9]+\.?[0-9]*' | head -1 || echo "")
            MODE=$(grep -oiE 'Ship/Show/Ask:?\s*(Ship|Show|Ask)' council-body.md | head -1 | grep -oiE '(Ship|Show|Ask)$' | head -1 || echo "")
            LOC=$(grep -oE '~?[0-9]+ LOC' council-body.md | head -1 | grep -oE '[0-9]+' | head -1 || echo "")
            FILES=$(grep -oE '[0-9]+ files?' council-body.md | head -1 | grep -oE '[0-9]+' | head -1 || echo "")
          fi

          notify_council "$TICKET" "$TITLE" "${SCORE:-?}" "Go" "$ISSUE" "$ISSUE_NUM" "$MODE" "$LOC" "$FILES"

      - name: Write Job Summary — Council
        if: always()
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          write_job_summary "${{ github.event.client_payload.ticket_id }}" \
            "${{ steps.council.outcome }}" "" "" "council"

  # ----- Ship Fast Path: Skip Stage 2, go directly to implementation -----
  # For Ship-mode tickets <= 5 pts, Council S1 is sufficient. No plan validation needed.
  implement-fast:
    needs: [council]
    if: |
      vars.DISABLE_L3_LINEAR != 'true' &&
      needs.council.outputs.fast_path == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Route Model
        id: route
        run: |
          source scripts/ai-ops/model-router.sh
          ESTIMATE="${{ github.event.client_payload.ticket_estimate }}"
          ROUTE=$(route_model "${ESTIMATE:-0}" "ship")
          MODEL=$(echo "$ROUTE" | cut -d'|' -f1)
          TURNS=$(echo "$ROUTE" | cut -d'|' -f2)
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "turns=$TURNS" >> "$GITHUB_OUTPUT"
          echo "Routed: ${ESTIMATE:-0}pt Ship → ${MODEL}, ${TURNS} turns"

      - name: Record Start Time
        run: echo "IMPL_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Run Implementation (Ship Fast Path)
        id: claude
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log for session state.
            Focus exclusively on the task below.

            Ship Fast Path — implement this ticket directly (Council S1 approved, small Ship-mode change).

            Ticket: ${{ github.event.client_payload.ticket_id }}
            Title: ${{ github.event.client_payload.ticket_title }}
            Description: ${{ github.event.client_payload.ticket_description }}
            Estimate: ${{ github.event.client_payload.ticket_estimate }} pts

            Steps:
            1. Create branch: feat/${{ github.event.client_payload.ticket_id }}-<slug>
            2. Implement the change (keep it small, Ship-mode)
            3. Run quality gates (lint, test, format)
            4. Commit with conventional messages including ticket ID
            5. Create PR referencing the ticket
            6. Merge after CI green (Ship mode — auto-merge)

            Follow code style rules in CLAUDE.md and .claude/rules/ (but skip workflow/session rules).
            IMPORTANT: Rule changes (.claude/rules/) are ALWAYS Ask mode — never auto-merge.
          claude_args: "--model ${{ steps.route.outputs.model }} --max-turns ${{ steps.route.outputs.turns }} --allowedTools Bash,Read,Write,Edit,Glob,Grep,WebFetch"

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}, Model=${{ steps.route.outputs.model }}, MaxTurns=${{ steps.route.outputs.turns }}, Stage=implement-fast"

      - name: Detect Partial Success
        id: detect-partial
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TICKET_ID="${{ github.event.client_payload.ticket_id }}"

          # Search for PRs created by this run (open or merged)
          PR_INFO=$(gh pr list --state all --search "${TICKET_ID}" \
            --json number,url,state --jq '.[0] // empty' 2>/dev/null || echo "")
          PR_NUM=$(echo "$PR_INFO" | jq -r '.number // empty' 2>/dev/null || echo "")
          PR_URL=$(echo "$PR_INFO" | jq -r '.url // empty' 2>/dev/null || echo "")
          PR_STATE=$(echo "$PR_INFO" | jq -r '.state // empty' 2>/dev/null || echo "")

          if [ -n "$PR_NUM" ]; then
            echo "pr_found=true" >> "$GITHUB_OUTPUT"
            echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
            echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "pr_state=$PR_STATE" >> "$GITHUB_OUTPUT"
            echo "PR #${PR_NUM} found (${PR_STATE}) — partial success"
          else
            echo "pr_found=false" >> "$GITHUB_OUTPUT"
            echo "No PR found"
          fi

          echo "TICKET_ID=${TICKET_ID}" >> "$GITHUB_ENV"
          echo "PR_NUM=${PR_NUM}" >> "$GITHUB_ENV"
          echo "PR_URL=${PR_URL}" >> "$GITHUB_ENV"

      # Close the loop: find PR, close issue, update Linear, notify Slack
      - name: Close the Loop
        if: steps.claude.outcome == 'success' || steps.detect-partial.outputs.pr_found == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          ISSUE_NUM="${{ needs.council.outputs.issue_num }}"
          TICKET_ID="${{ github.event.client_payload.ticket_id }}"

          # Find merged PR
          PR_INFO=$(gh pr list --state merged --search "${TICKET_ID}" \
            --json number,url --jq '.[0] // empty' 2>/dev/null || echo "")
          PR_NUM=$(echo "$PR_INFO" | jq -r '.number // empty' 2>/dev/null || echo "")
          PR_URL=$(echo "$PR_INFO" | jq -r '.url // empty' 2>/dev/null || echo "")

          if [ -z "$PR_NUM" ]; then
            PR_INFO=$(gh pr list --state open --search "${TICKET_ID}" \
              --json number,url --jq '.[0] // empty' 2>/dev/null || echo "")
            PR_NUM=$(echo "$PR_INFO" | jq -r '.number // empty' 2>/dev/null || echo "")
            PR_URL=$(echo "$PR_INFO" | jq -r '.url // empty' 2>/dev/null || echo "")
          fi

          # Close GitHub issue
          if [ -n "$ISSUE_NUM" ] && [ -n "$PR_NUM" ]; then
            gh issue close "$ISSUE_NUM" --comment "Ship fast-path: completed via PR #${PR_NUM}." || true
          fi

          # Update Linear → Done
          if [ -n "$LINEAR_API_KEY" ] && [ -n "$TICKET_ID" ] && [ -n "$PR_NUM" ]; then
            DONE_STATE_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"query": "{ workflowStates(filter: { name: { eq: \"Done\" }, team: { key: { eq: \"CAB\" } } }) { nodes { id } } }"}' \
              | jq -r '.data.workflowStates.nodes[0].id // empty' 2>/dev/null || echo "")
            ISSUE_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"{ issueSearch(filter: { identifier: { eq: \\\"${TICKET_ID}\\\" } }) { nodes { id } } }\"}" \
              | jq -r '.data.issueSearch.nodes[0].id // empty' 2>/dev/null || echo "")
            if [ -n "$DONE_STATE_ID" ] && [ -n "$ISSUE_ID" ]; then
              curl -s -X POST "https://api.linear.app/graphql" \
                -H "Authorization: ${LINEAR_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "{\"query\": \"mutation { issueUpdate(id: \\\"${ISSUE_ID}\\\", input: { stateId: \\\"${DONE_STATE_ID}\\\" }) { success } }\"}" \
                > /dev/null 2>&1 || true
              COMMENT="Ship fast-path: completed via PR [#${PR_NUM}](${PR_URL})"
              curl -s -X POST "https://api.linear.app/graphql" \
                -H "Authorization: ${LINEAR_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"${ISSUE_ID}\\\", body: \\\"${COMMENT}\\\" }) { success } }\"}" \
                > /dev/null 2>&1 || true
            fi
          fi

          echo "PR_NUM=${PR_NUM}" >> "$GITHUB_ENV"
          echo "PR_URL=${PR_URL}" >> "$GITHUB_ENV"
          echo "TICKET_ID=${TICKET_ID}" >> "$GITHUB_ENV"

      - name: Notify Slack — Ship Fast Path
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          TICKET="${{ github.event.client_payload.ticket_id }}"
          STATUS="${{ steps.claude.outcome }}"
          DURATION=$(( $(date +%s) - ${IMPL_START:-$(date +%s)} ))
          # Extract PR stats
          PR_FILES="" PR_LOC=""
          if [ -n "${PR_NUM}" ]; then
            STAT_LINE=$(gh pr diff "$PR_NUM" --stat 2>/dev/null | tail -1 || echo "")
            PR_FILES=$(echo "$STAT_LINE" | grep -oE '[0-9]+ files?' | grep -oE '[0-9]+' || echo "")
            PR_LOC=$(echo "$STAT_LINE" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo "")
          fi
          PR_FOUND="${{ steps.detect-partial.outputs.pr_found }}"
          if [ "$STATUS" = "success" ] && [ -n "${PR_NUM}" ]; then
            notify_implement "$TICKET" "success" "$PR_NUM" "$PR_URL" "" "L3 Ship Fast Path" "$DURATION" "$PR_FILES" "$PR_LOC"
            linear_comment "$TICKET" "success" "$PR_NUM" "$PR_URL" "L3 Ship Fast Path" "$DURATION" "$PR_FILES" "$PR_LOC" "Ship"
          elif [ "$STATUS" = "success" ]; then
            notify_implement "$TICKET" "success" "" "" "" "L3 Ship Fast Path" "$DURATION"
          elif [ "$STATUS" = "failure" ] && [ "${PR_FOUND}" = "true" ]; then
            notify_implement "$TICKET" "ask" "$PR_NUM" "$PR_URL" "" "L3 Ship Fast Path (max_turns)" "$DURATION" "$PR_FILES" "$PR_LOC"
          else
            notify_error "claude-linear-dispatch" "implement-fast" "$TICKET" "" "$DURATION"
          fi

      - name: Write Job Summary — Ship Fast Path
        if: always()
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          write_job_summary "${{ github.event.client_payload.ticket_id }}" \
            "${{ steps.claude.outcome }}" "${PR_NUM:-}" \
            "${{ steps.route.outputs.model }}" "implement-fast" \
            "$(( $(date +%s) - ${IMPL_START:-$(date +%s)} ))"

      # Self-feeding: trigger next scan if under daily cap
      - name: Trigger Next Scan
        if: steps.claude.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ vars.DISABLE_AUTOPILOT_SCAN }}" = "true" ]; then exit 0; fi
          MAX_DAILY=${{ vars.AUTOPILOT_DAILY_MAX || '5' }}
          TODAY=$(date -u +%Y-%m-%d)
          COUNTER="${{ vars.AUTOPILOT_TODAY_COUNT }}"
          COUNT_DATE=$(echo "$COUNTER" | cut -d: -f1 2>/dev/null || echo "")
          COUNT_VAL=$(echo "$COUNTER" | cut -d: -f2 2>/dev/null || echo "0")
          if [ "$COUNT_DATE" != "$TODAY" ]; then COUNT_VAL=0; fi
          if [ "$COUNT_VAL" -ge "$MAX_DAILY" ]; then
            echo "Daily cap reached (${COUNT_VAL}/${MAX_DAILY})"
            exit 0
          fi
          NEW_COUNT=$((COUNT_VAL + 1))
          gh api repos/stoa-platform/stoa/actions/variables/AUTOPILOT_TODAY_COUNT \
            -X PATCH -f value="${TODAY}:${NEW_COUNT}" 2>/dev/null || \
          gh api repos/stoa-platform/stoa/actions/variables \
            -X POST -f name=AUTOPILOT_TODAY_COUNT -f value="${TODAY}:${NEW_COUNT}" 2>/dev/null || true
          echo "Velocity: ${NEW_COUNT}/${MAX_DAILY} — triggering next scan"
          gh workflow run claude-autopilot-scan.yml -f max_tickets=1 2>/dev/null || true

  # ----- Stage 2: Plan Validation (triggered by /go on council-review issues) -----
  plan-validate:
    if: |
      vars.DISABLE_L3_LINEAR != 'true' &&
      github.event_name == 'issue_comment' &&
      (
        github.event.comment.body == '/go' ||
        github.event.comment.body == '/approve' ||
        startsWith(github.event.comment.body, '/go ') ||
        startsWith(github.event.comment.body, '/approve ')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # Guard: only run on L3 council-review issues
      - name: Verify L3 Council issue
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          LABELS=$(gh issue view "$ISSUE_NUM" --json labels --jq '.labels[].name' 2>/dev/null || echo "")

          if echo "$LABELS" | grep -q "council-review"; then
            echo "Council-review issue confirmed"
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not a council-review issue — skipping (L3 only handles its own issues)"
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Plan Validation (Stage 2 Council)
        if: steps.verify.outputs.valid == 'true'
        id: plan-council
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log for session state.
            Focus exclusively on the task below.

            You are running Stage 2 Council Plan Validation for issue #${{ github.event.issue.number }}.

            Issue title: ${{ github.event.issue.title }}
            Issue body (contains Stage 1 Council report):
            ${{ github.event.issue.body }}

            Stage 1 Council has already validated this ticket (pertinence check passed).
            Now run Stage 2: validate the IMPLEMENTATION PLAN.

            Steps:
            1. Read the issue body (Stage 1 report) for context
            2. Write a detailed implementation plan (files to modify, steps, LOC estimate)
            3. Run 4-persona Council validation on THE PLAN (not the ticket):
               - Chucky: Are risks documented? Edge cases covered by tests?
               - OSS Killer: LOC justified? Delivers announced value? ROI of dev effort?
               - Archi 50x50: Right level of abstraction? Existing patterns respected? Breaking changes?
               - Better Call Saul: No secrets hardcoded in plan? GDPR/DORA impacts noted?
            4. Score each persona /10, compute average
            5. Post a structured comment on this issue with the plan + Stage 2 scores

            Format the comment:
            ## Stage 2: Plan Validation
            ### Implementation Plan
            <detailed plan with files, steps, LOC>
            ### Stage 2 Council
            | Persona | Score | Verdict |
            |---------|-------|---------|
            | Chucky | X/10 | Go/Fix/Redo |
            | OSS Killer | X/10 | Go/Fix/Redo |
            | Archi 50x50 | X/10 | Go/Fix/Redo |
            | Better Call Saul | X/10 | Go/Fix/Redo |
            ---
            **Plan Score: X.XX/10 — [Go|Fix|Redo]**
            Comment `/go-plan` to start implementation.

            IMPORTANT: Do NOT implement anything. Only write the plan and validate it.
          # Model tier: sonnet (Stage 2 Council — plan validation, Sonnet sufficient)
          claude_args: "--model claude-sonnet-4-5-20250929 --max-turns 10 --allowedTools Read,Glob,Grep"

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}, Model=sonnet-4-5, MaxTurns=10, Stage=plan-validate"

      - name: Mark Plan validated
        if: steps.plan-council.outcome == 'success' && steps.verify.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "plan-validated" --color "006b75" --description "Stage 2 plan validation passed" --force 2>/dev/null || true
          gh issue edit "${{ github.event.issue.number }}" --add-label "plan-validated"

      # Sync Stage 2 result to Linear (apply council:plan-* label + comment)
      - name: Sync Plan Council to Linear
        if: steps.plan-council.outcome == 'success' && steps.verify.outputs.valid == 'true'
        continue-on-error: true
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          if [ -z "$LINEAR_API_KEY" ]; then exit 0; fi

          # Extract CAB-XXXX from issue labels
          TICKET_ID=$(gh issue view "${{ github.event.issue.number }}" --json labels --jq \
            '[.labels[].name | select(test("^CAB-[0-9]+$"))][0] // empty' 2>/dev/null || echo "")
          if [ -z "$TICKET_ID" ]; then
            TICKET_ID=$(echo "${{ github.event.issue.title }}" | grep -oE 'CAB-[0-9]+' | head -1 || echo "")
          fi
          if [ -z "$TICKET_ID" ]; then exit 0; fi

          # Extract plan score
          EXEC_FILE="${{ steps.plan-council.outputs.execution_file }}"
          EXEC_FILE="${EXEC_FILE:-/home/runner/work/_temp/claude-execution-output.json}"
          SCORE=""
          if [ -f "$EXEC_FILE" ]; then
            SCORE=$(jq -r '[.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | join("\n")' "$EXEC_FILE" 2>/dev/null \
              | grep -oE 'Plan Score:?\s*[0-9]+\.?[0-9]*/10' | head -1 | grep -oE '[0-9]+\.?[0-9]*' | head -1 || echo "")
          fi
          if [ -z "$SCORE" ] && [ -f "$EXEC_FILE" ]; then
            SCORE=$(jq -r '[.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | join("\n")' "$EXEC_FILE" 2>/dev/null \
              | grep -oE 'Score:?\s*[0-9]+\.?[0-9]*/10' | tail -1 | grep -oE '[0-9]+\.?[0-9]*' | head -1 || echo "")
          fi
          if [ -z "$SCORE" ]; then
            echo "Could not extract plan score — skipping Linear sync"
            exit 0
          fi

          # Map score → plan label
          if echo "$SCORE >= 8.0" | bc -l | grep -q 1; then
            LABEL_NAME="council:plan-go"
          elif echo "$SCORE >= 6.0" | bc -l | grep -q 1; then
            LABEL_NAME="council:plan-fix"
          else
            LABEL_NAME="council:plan-redo"
          fi

          echo "Syncing plan to Linear: ${TICKET_ID} — score ${SCORE} → ${LABEL_NAME}"

          ISSUE_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issueSearch(filter: { identifier: { eq: \\\"${TICKET_ID}\\\" } }) { nodes { id } } }\"}" \
            | jq -r '.data.issueSearch.nodes[0].id // empty' 2>/dev/null || echo "")
          if [ -z "$ISSUE_ID" ]; then exit 0; fi

          LABEL_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issueLabels(filter: { name: { eq: \\\"${LABEL_NAME}\\\" } }) { nodes { id } } }\"}" \
            | jq -r '.data.issueLabels.nodes[0].id // empty' 2>/dev/null || echo "")

          if [ -n "$LABEL_ID" ]; then
            EXISTING=$(curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"{ issue(id: \\\"${ISSUE_ID}\\\") { labels { nodes { id name } } } }\"}" \
              | jq -r '[.data.issue.labels.nodes[] | select(.name | startswith("council:plan-") | not) | .id]' 2>/dev/null || echo "[]")
            LABEL_IDS=$(echo "$EXISTING" | jq -c ". + [\"${LABEL_ID}\"]" 2>/dev/null || echo "[\"${LABEL_ID}\"]")

            curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"mutation { issueUpdate(id: \\\"${ISSUE_ID}\\\", input: { labelIds: ${LABEL_IDS} }) { success } }\"}" \
              > /dev/null 2>&1 || true
          fi

          GH_RUN="https://github.com/stoa-platform/stoa/actions/runs/${{ github.run_id }}"
          COMMENT="Plan validation (Stage 2): **${SCORE}/10** — ${LABEL_NAME}\n[GitHub Actions run](${GH_RUN})"
          curl -s -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"${ISSUE_ID}\\\", body: \\\"${COMMENT}\\\" }) { success } }\"}" \
            > /dev/null 2>&1 || true

      - name: Notify Slack — Plan Validation
        if: always() && steps.verify.outputs.valid == 'true'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          notify_plan "${{ github.event.issue.number }}" \
            "${{ github.event.issue.title }}" \
            "${{ github.event.issue.html_url }}" \
            "${{ steps.plan-council.outcome }}"

  # ----- Stage 3: Implementation (triggered by /go-plan on council-review issues) -----
  implement:
    if: |
      vars.DISABLE_L3_LINEAR != 'true' &&
      github.event_name == 'issue_comment' &&
      (
        github.event.comment.body == '/go-plan' ||
        startsWith(github.event.comment.body, '/go-plan ')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Guard: only run on L3 issues with plan-validated label
      - name: Verify L3 Plan validated
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          LABELS=$(gh issue view "$ISSUE_NUM" --json labels --jq '.labels[].name' 2>/dev/null || echo "")

          if echo "$LABELS" | grep -q "council-review"; then
            if echo "$LABELS" | grep -q "plan-validated"; then
              echo "L3 issue with plan validation confirmed"
              echo "valid=true" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::L3 issue but no plan-validated label"
              # Fallback: check for Plan Score comment
              PLAN_COMMENT=$(gh issue view "$ISSUE_NUM" --json comments --jq '[.comments[].body | select(contains("Plan Score"))] | length')
              if [ "$PLAN_COMMENT" -gt 0 ]; then
                echo "Plan validation comment found"
                echo "valid=true" >> "$GITHUB_OUTPUT"
              else
                echo "valid=false" >> "$GITHUB_OUTPUT"
                gh issue comment "$ISSUE_NUM" \
                  --body "Implementation requires plan validation (Stage 2). Comment \`/go\` first, then \`/go-plan\` after Stage 2 passes."
              fi
            fi
          else
            echo "Not a council-review issue — skipping (L3 only handles its own issues)"
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi

      # Route model based on ticket estimate (extracted from issue body)
      - name: Route Model
        if: steps.verify.outputs.valid == 'true'
        id: route
        run: |
          source scripts/ai-ops/model-router.sh
          ISSUE_BODY=$(gh issue view "${{ github.event.issue.number }}" --json body --jq '.body' 2>/dev/null || echo "")
          ESTIMATE=$(extract_estimate "$ISSUE_BODY")
          MODE=$(extract_mode "$ISSUE_BODY")
          ROUTE=$(route_model "$ESTIMATE" "$MODE")
          MODEL=$(echo "$ROUTE" | cut -d'|' -f1)
          TURNS=$(echo "$ROUTE" | cut -d'|' -f2)
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "turns=$TURNS" >> "$GITHUB_OUTPUT"
          echo "Routed: ${ESTIMATE}pt ${MODE} → ${MODEL}, ${TURNS} turns"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Record Start Time
        if: steps.verify.outputs.valid == 'true'
        run: echo "IMPL_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Run Implementation
        if: steps.verify.outputs.valid == 'true'
        continue-on-error: true
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log for session state.
            Focus exclusively on the task below.

            Implement the feature described in issue #${{ github.event.issue.number }}.

            Issue title: ${{ github.event.issue.title }}
            Issue body:
            ${{ github.event.issue.body }}

            Read the Stage 2 plan validation comment (posted earlier on this issue).
            Follow the implementation plan from the Stage 2 comment.
            Follow code style rules in CLAUDE.md and .claude/rules/ (but skip workflow/session rules).

            Steps:
            1. Create a feature branch: feat/issue-${{ github.event.issue.number }}-<slug>
            2. Implement the code following the plan
            3. Run quality gates (lint, test, format)
            4. Commit with conventional messages
            5. Create a PR referencing the issue

            Use Ship/Show/Ask classification from the Council report.
            If Ship or Show: merge after CI green.
            If Ask: leave PR open for human review.

            IMPORTANT: Rule changes (.claude/rules/) are ALWAYS Ask mode — never auto-merge.
          # Model tier: routed dynamically based on ticket estimate
          claude_args: "--model ${{ steps.route.outputs.model }} --max-turns ${{ steps.route.outputs.turns }} --allowedTools Bash,Read,Write,Edit,Glob,Grep,WebFetch"

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}, Model=${{ steps.route.outputs.model || 'sonnet-4-5' }}, MaxTurns=${{ steps.route.outputs.turns || '60' }}, Stage=implement"

      - name: Detect Partial Success
        id: detect-partial
        if: always() && steps.verify.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          TICKET_ID=$(gh issue view "$ISSUE_NUM" --json labels --jq \
            '[.labels[].name | select(test("^CAB-[0-9]+$"))][0] // empty')

          # Search for PRs created by this run (open or merged)
          PR_INFO=$(gh pr list --state all --search "${TICKET_ID:-issue-${ISSUE_NUM}}" \
            --json number,url,state --jq '.[0] // empty' 2>/dev/null || echo "")
          PR_NUM=$(echo "$PR_INFO" | jq -r '.number // empty' 2>/dev/null || echo "")
          PR_URL=$(echo "$PR_INFO" | jq -r '.url // empty' 2>/dev/null || echo "")
          PR_STATE=$(echo "$PR_INFO" | jq -r '.state // empty' 2>/dev/null || echo "")

          if [ -n "$PR_NUM" ]; then
            echo "pr_found=true" >> "$GITHUB_OUTPUT"
            echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
            echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "pr_state=$PR_STATE" >> "$GITHUB_OUTPUT"
            echo "PR #${PR_NUM} found (${PR_STATE}) — partial success"
          else
            echo "pr_found=false" >> "$GITHUB_OUTPUT"
            echo "No PR found"
          fi

          echo "TICKET_ID=${TICKET_ID}" >> "$GITHUB_ENV"
          echo "PR_NUM=${PR_NUM}" >> "$GITHUB_ENV"
          echo "PR_URL=${PR_URL}" >> "$GITHUB_ENV"

      # ----- Close the Loop (post-merge feedback) -----
      # After implementation: find merged PR, close GitHub issue, update Linear, notify Slack
      - name: Close the Loop
        if: |
          (steps.claude.outcome == 'success' || steps.detect-partial.outputs.pr_found == 'true') &&
          steps.verify.outputs.valid == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"

          # Extract ticket ID from issue labels (CAB-XXXX pattern)
          TICKET_ID=$(gh issue view "$ISSUE_NUM" --json labels --jq \
            '[.labels[].name | select(test("^CAB-[0-9]+$"))][0] // empty')

          # Find merged PR referencing this issue
          PR_INFO=$(gh pr list --state merged --search "issue-${ISSUE_NUM}" \
            --json number,title,url --jq '.[0] // empty' 2>/dev/null || echo "")

          if [ -z "$PR_INFO" ]; then
            # Fallback: search by issue mention in PR body
            PR_INFO=$(gh pr list --state merged --search "#${ISSUE_NUM}" \
              --json number,title,url --jq '.[0] // empty' 2>/dev/null || echo "")
          fi

          PR_NUM=$(echo "$PR_INFO" | jq -r '.number // empty' 2>/dev/null || echo "")
          PR_URL=$(echo "$PR_INFO" | jq -r '.url // empty' 2>/dev/null || echo "")
          PR_TITLE=$(echo "$PR_INFO" | jq -r '.title // empty' 2>/dev/null || echo "")

          SKIP_CLOSE=""
          if [ -n "$PR_NUM" ]; then
            echo "Found merged PR #${PR_NUM}: ${PR_TITLE}"
            CLOSE_BODY="Completed via PR #${PR_NUM} (${PR_URL})."
          else
            echo "No merged PR found — checking for open PRs"
            # Search open PRs by branch name pattern (feat/issue-NNN-*)
            OPEN_PR=$(gh pr list --state open --head "feat/issue-${ISSUE_NUM}" \
              --json number,url --jq '.[0] // empty' 2>/dev/null || echo "")
            # Fallback: search by issue mention
            if [ -z "$OPEN_PR" ]; then
              OPEN_PR=$(gh pr list --state open --search "#${ISSUE_NUM}" \
                --json number,url --jq '.[0] // empty' 2>/dev/null || echo "")
            fi
            OPEN_NUM=$(echo "$OPEN_PR" | jq -r '.number // empty' 2>/dev/null || echo "")
            if [ -n "$OPEN_NUM" ]; then
              OPEN_URL=$(echo "$OPEN_PR" | jq -r '.url // empty' 2>/dev/null || echo "")
              echo "Open PR #${OPEN_NUM} found — Ask mode, leaving issue open"
              SKIP_CLOSE=true
            fi
            CLOSE_BODY="Implementation completed. No merged PR detected (may be in Ask mode)."
          fi

          # Close GitHub issue only if we found a merged PR.
          # If no merged PR and no open PR, don't close — implementation may have failed.
          if [ -n "$PR_NUM" ]; then
            gh issue close "$ISSUE_NUM" --comment "$CLOSE_BODY" || true
            echo "Closed issue #${ISSUE_NUM}"
          elif [ "$SKIP_CLOSE" = "true" ]; then
            echo "Skipping close — open PR #${OPEN_NUM} in Ask mode"
          else
            echo "No PRs found — not closing issue (implementation may have failed)"
          fi

          # Update Linear ticket -> Done (only when we found a merged PR)
          if [ -n "$LINEAR_API_KEY" ] && [ -n "$TICKET_ID" ] && [ -n "$PR_NUM" ]; then
            echo "Updating Linear ticket ${TICKET_ID} -> Done"

            # Fetch the "Done" state ID for team CAB-ING
            DONE_STATE_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"query": "{ workflowStates(filter: { name: { eq: \"Done\" }, team: { key: { eq: \"CAB\" } } }) { nodes { id name } } }"}' \
              | jq -r '.data.workflowStates.nodes[0].id // empty' 2>/dev/null || echo "")

            if [ -n "$DONE_STATE_ID" ]; then
              # Fetch issue ID by identifier
              ISSUE_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
                -H "Authorization: ${LINEAR_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "{\"query\": \"{ issueSearch(filter: { identifier: { eq: \\\"${TICKET_ID}\\\" } }) { nodes { id } } }\"}" \
                | jq -r '.data.issueSearch.nodes[0].id // empty' 2>/dev/null || echo "")

              if [ -n "$ISSUE_ID" ]; then
                # Move to Done
                curl -s -X POST "https://api.linear.app/graphql" \
                  -H "Authorization: ${LINEAR_API_KEY}" \
                  -H "Content-Type: application/json" \
                  -d "{\"query\": \"mutation { issueUpdate(id: \\\"${ISSUE_ID}\\\", input: { stateId: \\\"${DONE_STATE_ID}\\\" }) { success } }\"}" \
                  > /dev/null 2>&1 || true

                # Add completion comment
                PR_REF=""
                [ -n "$PR_NUM" ] && PR_REF="PR [#${PR_NUM}](${PR_URL})"
                COMMENT_BODY="Completed autonomously via AI Factory L3 pipeline. ${PR_REF}"
                curl -s -X POST "https://api.linear.app/graphql" \
                  -H "Authorization: ${LINEAR_API_KEY}" \
                  -H "Content-Type: application/json" \
                  -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"${ISSUE_ID}\\\", body: \\\"${COMMENT_BODY}\\\" }) { success } }\"}" \
                  > /dev/null 2>&1 || true

                echo "Linear ${TICKET_ID} -> Done"
              else
                echo "::warning::Could not find Linear issue ID for ${TICKET_ID}"
              fi
            else
              echo "::warning::Could not find Done state ID for team CAB"
            fi
          fi

          # Export for Slack notification
          echo "PR_NUM=${PR_NUM}" >> "$GITHUB_ENV"
          echo "PR_URL=${PR_URL}" >> "$GITHUB_ENV"
          echo "TICKET_ID=${TICKET_ID}" >> "$GITHUB_ENV"
          echo "SKIP_CLOSE=${SKIP_CLOSE}" >> "$GITHUB_ENV"

      # Notify Slack + Linear + Job Summary
      - name: Notify Slack — Implementation Result
        if: always() && steps.verify.outputs.valid == 'true'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          STATUS="${{ steps.claude.outcome || 'skipped' }}"
          TICKET="${TICKET_ID:-}"
          [ -z "$TICKET" ] && TICKET="Issue-${{ github.event.issue.number }}"
          DURATION=$(( $(date +%s) - ${IMPL_START:-$(date +%s)} ))
          # Extract PR stats
          PR_FILES="" PR_LOC=""
          if [ -n "${PR_NUM}" ]; then
            STAT_LINE=$(gh pr diff "$PR_NUM" --stat 2>/dev/null | tail -1 || echo "")
            PR_FILES=$(echo "$STAT_LINE" | grep -oE '[0-9]+ files?' | grep -oE '[0-9]+' || echo "")
            PR_LOC=$(echo "$STAT_LINE" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo "")
          fi

          PR_FOUND="${{ steps.detect-partial.outputs.pr_found }}"
          if [ "$STATUS" = "success" ] && [ -n "${PR_NUM}" ]; then
            notify_implement "$TICKET" "success" "$PR_NUM" "$PR_URL" "${{ github.event.issue.number }}" "L3 Pipeline" "$DURATION" "$PR_FILES" "$PR_LOC"
            linear_comment "$TICKET" "success" "$PR_NUM" "$PR_URL" "L3 Pipeline" "$DURATION" "$PR_FILES" "$PR_LOC"
          elif [ "$STATUS" = "success" ] && [ "${SKIP_CLOSE}" = "true" ]; then
            notify_implement "$TICKET" "ask" "${PR_NUM:-}" "${PR_URL:-}" "${{ github.event.issue.number }}" "L3 Pipeline" "$DURATION"
          elif [ "$STATUS" = "success" ]; then
            notify_implement "$TICKET" "success" "" "" "${{ github.event.issue.number }}" "L3 Pipeline" "$DURATION"
          elif [ "$STATUS" != "success" ] && [ "${PR_FOUND}" = "true" ]; then
            notify_implement "$TICKET" "ask" "$PR_NUM" "$PR_URL" "${{ github.event.issue.number }}" "L3 Pipeline (max_turns)" "$DURATION" "$PR_FILES" "$PR_LOC"
          elif [ "$STATUS" = "skipped" ]; then
            notify_implement "$TICKET" "skipped" "" "" "${{ github.event.issue.number }}" "L3 Pipeline"
          else
            notify_error "claude-linear-dispatch" "implement" "$TICKET" "" "$DURATION"
          fi

          write_job_summary "$TICKET" "$STATUS" "${PR_NUM:-}" \
            "${{ steps.route.outputs.model || 'sonnet-4-5' }}" "implement" "$DURATION"

      # ----- Self-Feeding Loop -----
      # After successful close, trigger next autopilot scan if under daily velocity cap
      - name: Trigger Next Scan
        if: steps.claude.outcome == 'success' && steps.verify.outputs.valid == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Only trigger if autopilot scan workflow exists and is not disabled
          if [ "${{ vars.DISABLE_AUTOPILOT_SCAN }}" = "true" ]; then
            echo "Autopilot scan disabled — skipping self-feeding trigger"
            exit 0
          fi

          # Check daily velocity cap (stored in repo variable AUTOPILOT_TODAY_COUNT)
          # Format: YYYY-MM-DD:N (e.g., 2026-02-17:2)
          MAX_DAILY=${{ vars.AUTOPILOT_DAILY_MAX || '5' }}
          TODAY=$(date -u +%Y-%m-%d)
          COUNTER="${{ vars.AUTOPILOT_TODAY_COUNT }}"
          COUNT_DATE=$(echo "$COUNTER" | cut -d: -f1 2>/dev/null || echo "")
          COUNT_VAL=$(echo "$COUNTER" | cut -d: -f2 2>/dev/null || echo "0")

          if [ "$COUNT_DATE" != "$TODAY" ]; then
            COUNT_VAL=0
          fi

          if [ "$COUNT_VAL" -ge "$MAX_DAILY" ]; then
            echo "Daily velocity cap reached (${COUNT_VAL}/${MAX_DAILY}) — skipping scan"
            exit 0
          fi

          # Increment counter
          NEW_COUNT=$((COUNT_VAL + 1))
          gh api repos/stoa-platform/stoa/actions/variables/AUTOPILOT_TODAY_COUNT \
            -X PATCH -f value="${TODAY}:${NEW_COUNT}" 2>/dev/null || \
          gh api repos/stoa-platform/stoa/actions/variables \
            -X POST -f name=AUTOPILOT_TODAY_COUNT -f value="${TODAY}:${NEW_COUNT}" 2>/dev/null || true

          echo "Velocity: ${NEW_COUNT}/${MAX_DAILY} — triggering next scan"
          gh workflow run claude-autopilot-scan.yml -f max_tickets=1 2>/dev/null || \
            echo "::warning::Could not trigger autopilot scan (workflow may not exist yet)"
