# Level 3: Linear → n8n → GitHub Actions → Council → Queue → Contabo Workers
# Receives repository_dispatch from n8n when a Linear ticket moves to "In Progress".
# Council S1 (ticket pertinence) → score >= 8.0 → push to PocketBase queue → dispatch-daemon → workers.
# Workers handle implementation autonomously. Slack = info-only (no /go buttons).
# Kill-switch: set DISABLE_L3_LINEAR=true in repo variables to disable.

name: Claude Code Linear Dispatch

on:
  repository_dispatch:
    types: [linear-ticket-started]

concurrency:
  group: claude-linear-${{ github.event.client_payload.ticket_id }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  # ----- Stage 0: Context Pack Generation -----
  context-pack:
    if: |
      vars.DISABLE_L3_LINEAR != 'true' &&
      vars.DISABLE_CONTEXT_COMPILER != 'true' &&
      github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      impact_score: ${{ steps.build.outputs.impact_score }}
      impact_level: ${{ steps.build.outputs.impact_level }}
      context_pack_path: ${{ steps.build.outputs.pack_path }}
      should_block: ${{ steps.build.outputs.should_block }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract component from ticket
        id: ticket
        run: |
          COMPONENT="${{ github.event.client_payload.component }}"
          if [ -z "$COMPONENT" ]; then
            # Fallback: extract [scope] from title
            COMPONENT=$(echo "${{ github.event.client_payload.ticket_title }}" | grep -oP '\[(\w[\w-]*)\]' | tr -d '[]' | head -1 || true)
          fi
          if [ -z "$COMPONENT" ]; then
            # Fallback: extract type(scope) from title
            COMPONENT=$(echo "${{ github.event.client_payload.ticket_title }}" | grep -oP '\(\K[^)]+' | head -1 || true)
          fi
          INTENT="${{ github.event.client_payload.ticket_title }}"
          echo "component=${COMPONENT:-unknown}" >> "$GITHUB_OUTPUT"
          echo "intent=${INTENT}" >> "$GITHUB_OUTPUT"

      - name: Generate context pack
        id: build
        run: |
          # Graceful degradation if DB or scripts missing
          if [ ! -f docs/stoa-impact.db ] || [ ! -f docs/scripts/build-context.sh ]; then
            echo "::warning::Context Compiler DB or script not found — skipping"
            echo "impact_score=0" >> "$GITHUB_OUTPUT"
            echo "impact_level=LOW" >> "$GITHUB_OUTPUT"
            echo "pack_path=" >> "$GITHUB_OUTPUT"
            echo "should_block=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          chmod +x docs/scripts/build-context.sh
          TICKET_ID="${{ github.event.client_payload.ticket_id }}"
          COMPONENT="${{ steps.ticket.outputs.component }}"
          INTENT="${{ steps.ticket.outputs.intent }}"

          # Build context pack (use --ticket if available, else --component)
          PACK_OUTPUT=""
          if [ -n "$TICKET_ID" ] && [ "$COMPONENT" != "unknown" ]; then
            PACK_OUTPUT=$(docs/scripts/build-context.sh \
              --ticket "$TICKET_ID" \
              --component "$COMPONENT" \
              --intent "$INTENT" 2>&1) || true
          elif [ "$COMPONENT" != "unknown" ]; then
            PACK_OUTPUT=$(docs/scripts/build-context.sh \
              --component "$COMPONENT" \
              --intent "$INTENT" 2>&1) || true
          else
            echo "::warning::Could not determine component — skipping context pack"
            echo "impact_score=0" >> "$GITHUB_OUTPUT"
            echo "impact_level=LOW" >> "$GITHUB_OUTPUT"
            echo "pack_path=" >> "$GITHUB_OUTPUT"
            echo "should_block=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract pack path from script output
          PACK_PATH=$(echo "$PACK_OUTPUT" | grep "Context pack generated:" | sed 's/.*generated: //' || true)
          if [ -z "$PACK_PATH" ] || [ ! -f "$PACK_PATH" ]; then
            echo "::warning::Context pack generation failed"
            echo "$PACK_OUTPUT"
            echo "impact_score=0" >> "$GITHUB_OUTPUT"
            echo "impact_level=LOW" >> "$GITHUB_OUTPUT"
            echo "pack_path=" >> "$GITHUB_OUTPUT"
            echo "should_block=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract impact score and level
          SCORE=$(grep -oP 'Impact Score: \K\d+' "$PACK_PATH" || echo "0")
          LEVEL=$(grep -oP 'Impact Score: \d+ \(\K[^)]+' "$PACK_PATH" || echo "LOW")
          SHOULD_BLOCK="false"
          if [ "$SCORE" -ge 31 ]; then
            SHOULD_BLOCK="true"
          fi

          echo "impact_score=${SCORE}" >> "$GITHUB_OUTPUT"
          echo "impact_level=${LEVEL}" >> "$GITHUB_OUTPUT"
          echo "pack_path=${PACK_PATH}" >> "$GITHUB_OUTPUT"
          echo "should_block=${SHOULD_BLOCK}" >> "$GITHUB_OUTPUT"
          echo "::notice::Context pack generated — Impact Score: ${SCORE} (${LEVEL})"

      - name: Upload context pack
        if: steps.build.outputs.pack_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: context-pack
          path: ${{ steps.build.outputs.pack_path }}
          retention-days: 7

      - name: Alert on CRITICAL impact
        if: steps.build.outputs.should_block == 'true'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          TICKET_ID="${{ github.event.client_payload.ticket_id }}"
          SCORE="${{ steps.build.outputs.impact_score }}"
          echo "::warning::Impact Score CRITICAL (${SCORE}) for ${TICKET_ID}. Review context pack before proceeding."

          # Post warning comment on Linear ticket
          if [ -n "$LINEAR_API_KEY" ] && [ -n "$TICKET_ID" ]; then
            ISSUE_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"{ issueSearch(filter: { identifier: { eq: \\\"${TICKET_ID}\\\" } }) { nodes { id } } }\"}" \
              | jq -r '.data.issueSearch.nodes[0].id // empty' 2>/dev/null || echo "")
            if [ -n "$ISSUE_ID" ]; then
              curl -s -X POST "https://api.linear.app/graphql" \
                -H "Authorization: ${LINEAR_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"${ISSUE_ID}\\\", body: \\\"⚠️ **CRITICAL Impact Score: ${SCORE}** — Context pack review recommended before implementation.\\\\n[View workflow](https://github.com/stoa-platform/stoa/actions/runs/${{ github.run_id }})\\\" }) { success } }\"}" \
                > /dev/null 2>&1 || true
            fi
          fi

  # ----- Stage 1: Council Gate (triggered by n8n dispatch) -----
  council:
    needs: context-pack
    if: |
      always() &&
      vars.DISABLE_L3_LINEAR != 'true' &&
      github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      slack_thread_ts: ${{ steps.slack-council.outputs.thread_ts }}
    steps:
      - uses: actions/checkout@v4

      # Dedup gate: skip if ticket already has a council:ticket-* label.
      # Prevents re-running council when multiple webhooks fire for the same ticket
      # (label changes, sort order, comments all trigger Linear webhooks).
      - name: Check if already council-validated
        id: dedup
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          TICKET_ID: ${{ github.event.client_payload.ticket_id }}
        run: |
          if [ -z "$LINEAR_API_KEY" ] || [ -z "$TICKET_ID" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LABELS=$(curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issues(filter: { identifier: { eq: \\\"$TICKET_ID\\\" } }) { nodes { labels { nodes { name } } } } }\"}" \
            | jq -r '[.data.issues.nodes[0].labels.nodes[].name] | join(",")' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -q "council:ticket-"; then
            echo "::notice::$TICKET_ID already has council label ($LABELS) — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "$TICKET_ID labels: $LABELS — proceeding with council"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Council Validation
        id: council
        if: steps.dedup.outputs.skip != 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log for session state.
            Focus exclusively on the task below.

            Council validation (Stage 1 — Ticket Pertinence) for a Linear ticket.

            Ticket: ${{ github.event.client_payload.ticket_id }}
            Title: ${{ github.event.client_payload.ticket_title }}
            Description: ${{ github.event.client_payload.ticket_description }}
            Priority: ${{ github.event.client_payload.ticket_priority }}
            Estimate: ${{ github.event.client_payload.ticket_estimate }} pts
            Impact Score: ${{ needs.context-pack.outputs.impact_score || '0' }} (${{ needs.context-pack.outputs.impact_level || 'unknown' }})

            Run a CONCISE 4-persona Council validation (2-3 sentences per persona, score /10):
            Chucky (risk), OSS Killer (value), Archi 50x50 (architecture), Better Call Saul (legal).
            Compute average. Classify as Ship/Show/Ask.

            Format your response EXACTLY as markdown:

            # Council: TICKET_ID — TITLE
            **Score: X.X/10 — GO/FIX/REDO**
            ## Personas
            **Chucky**: X/10 — summary
            **OSS Killer**: X/10 — summary
            **Archi 50x50**: X/10 — summary
            **Better Call Saul**: X/10 — summary
            ## Ship/Show/Ask: MODE

            IMPORTANT: Do NOT write any files. Do NOT create issues or labels. Just output the report text above.
          # Model tier: sonnet (Council gate — structured rubric evaluation, Sonnet sufficient)
          claude_args: "--model claude-sonnet-4-6 --max-turns 5 --allowedTools Read,Glob,Grep"
          show_full_output: true

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}, Model=sonnet-4-6, MaxTurns=5, Stage=council"

      # Extract Claude's Council report from execution log
      - name: Extract Council Report
        id: extract-report
        if: steps.council.outcome == 'success'
        run: |
          TICKET="${{ github.event.client_payload.ticket_id }}"
          TITLE="${{ github.event.client_payload.ticket_title }}"
          EXEC_FILE="${{ steps.council.outputs.execution_file }}"
          EXEC_FILE="${EXEC_FILE:-/home/runner/work/_temp/claude-execution-output.json}"

          echo "Execution file: $EXEC_FILE"

          # Parse execution output — JSON array: [system, assistant, result]
          if [ -f "$EXEC_FILE" ]; then
            echo "File exists ($(wc -c < "$EXEC_FILE") bytes)"

            # Primary: extract .result field from the result object
            jq -r '.[] | select(.type == "result") | .result // empty' \
              "$EXEC_FILE" > council-body.md 2>/dev/null || true

            # Fallback: extract text from assistant message content
            if [ ! -s council-body.md ]; then
              jq -r '[.[] | select(.type == "assistant") | .message.content[] | select(.type == "text") | .text] | join("\n")' \
                "$EXEC_FILE" > council-body.md 2>/dev/null || true
            fi

            if [ -s council-body.md ]; then
              echo "Extracted $(wc -l < council-body.md | tr -d ' ') lines from execution output"
            else
              echo "Extraction failed. Element types: $(jq -c '[.[] | .type]' "$EXEC_FILE" 2>/dev/null)"
            fi
          else
            echo "::warning::Execution file not found at $EXEC_FILE"
          fi

          # Fallback
          if [ ! -s council-body.md ]; then
            echo "::warning::Could not extract Council report, using fallback"
            printf '%s\n' \
              "# Council: ${TICKET} — ${TITLE}" "" \
              "Council validation ran but the report could not be extracted from the execution log." \
              "Check the [workflow logs](https://github.com/stoa-platform/stoa/actions/runs/${{ github.run_id }}) for the full analysis." \
              "" "Score >= 8.0 tickets are auto-queued for Contabo worker implementation." > council-body.md
          fi

          echo "=== Council body preview ==="
          head -15 council-body.md
          echo "=== ($(wc -l < council-body.md | tr -d ' ') lines total) ==="

      # Validate that extraction produced usable content (Gap 4 fix)
      - name: Validate Council Extraction
        if: steps.council.outcome == 'success'
        run: |
          if [ ! -s council-body.md ]; then
            echo "::error::Council ran but produced no parseable report"
            echo "EXTRACTION_FAILED=true" >> "$GITHUB_ENV"
          else
            # Check if the report contains a score (minimum viable extraction)
            if ! grep -qE 'Score:?\s*[0-9]+\.?[0-9]*/10' council-body.md; then
              echo "::warning::Council report extracted but no score found — fallback verdict will be used"
            fi
          fi

      # Sync Council result to Linear (apply council:ticket-* label + comment)
      - name: Sync Council to Linear
        if: steps.council.outcome == 'success'
        continue-on-error: true
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          if [ -z "$LINEAR_API_KEY" ]; then exit 0; fi

          TICKET_ID="${{ github.event.client_payload.ticket_id }}"
          if [ -z "$TICKET_ID" ]; then exit 0; fi

          # Extract score from council-body.md
          SCORE=""
          if [ -f council-body.md ]; then
            SCORE=$(grep -oE 'Score:?\s*[0-9]+\.?[0-9]*/10' council-body.md | head -1 | grep -oE '[0-9]+\.?[0-9]*' | head -1 || echo "")
          fi
          if [ -z "$SCORE" ]; then
            echo "Could not extract score — skipping Linear sync"
            exit 0
          fi

          # Map score → label name
          LABEL_NAME=""
          if echo "$SCORE >= 8.0" | bc -l | grep -q 1; then
            LABEL_NAME="council:ticket-go"
          elif echo "$SCORE >= 6.0" | bc -l | grep -q 1; then
            LABEL_NAME="council:ticket-fix"
          else
            LABEL_NAME="council:ticket-redo"
          fi

          echo "Syncing to Linear: ${TICKET_ID} — score ${SCORE} → ${LABEL_NAME}"

          # Find Linear issue ID
          ISSUE_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issueSearch(filter: { identifier: { eq: \\\"${TICKET_ID}\\\" } }) { nodes { id } } }\"}" \
            | jq -r '.data.issueSearch.nodes[0].id // empty' 2>/dev/null || echo "")

          if [ -z "$ISSUE_ID" ]; then
            echo "::warning::Could not find Linear issue for ${TICKET_ID}"
            exit 0
          fi

          # Find label ID
          LABEL_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issueLabels(filter: { name: { eq: \\\"${LABEL_NAME}\\\" } }) { nodes { id } } }\"}" \
            | jq -r '.data.issueLabels.nodes[0].id // empty' 2>/dev/null || echo "")

          if [ -n "$LABEL_ID" ]; then
            EXISTING=$(curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"{ issue(id: \\\"${ISSUE_ID}\\\") { labels { nodes { id name } } } }\"}" \
              | jq -r '[.data.issue.labels.nodes[] | select(.name | startswith("council:ticket-") | not) | .id]' 2>/dev/null || echo "[]")
            LABEL_IDS=$(echo "$EXISTING" | jq -c ". + [\"${LABEL_ID}\"]" 2>/dev/null || echo "[\"${LABEL_ID}\"]")

            curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"mutation { issueUpdate(id: \\\"${ISSUE_ID}\\\", input: { labelIds: ${LABEL_IDS} }) { success } }\"}" \
              > /dev/null 2>&1 || true
            echo "Applied label ${LABEL_NAME} to ${TICKET_ID}"
          fi

          # Post Council comment on Linear
          GH_RUN="https://github.com/stoa-platform/stoa/actions/runs/${{ github.run_id }}"
          COMMENT="Council validation (Stage 1): **${SCORE}/10** — ${LABEL_NAME}\n[GitHub Actions run](${GH_RUN})"
          curl -s -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"${ISSUE_ID}\\\", body: \\\"${COMMENT}\\\" }) { success } }\"}" \
            > /dev/null 2>&1 || true
          echo "Posted Council comment on ${TICKET_ID}"

      # Push to PocketBase queue when Council score >= 8.0 (Go verdict)
      - name: Push to Queue
        id: push-queue
        if: steps.council.outcome == 'success'
        continue-on-error: true
        env:
          HEGEMON_REMOTE_URL: ${{ secrets.HEGEMON_REMOTE_URL }}
          HEGEMON_REMOTE_PASSWORD: ${{ secrets.HEGEMON_REMOTE_PASSWORD }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh

          TICKET="${{ github.event.client_payload.ticket_id }}"
          TITLE="${{ github.event.client_payload.ticket_title }}"
          DESCRIPTION="${{ github.event.client_payload.ticket_description }}"
          LIN_PRIORITY="${{ github.event.client_payload.ticket_priority }}"
          ESTIMATE="${{ github.event.client_payload.ticket_estimate }}"
          COMPONENT="${{ github.event.client_payload.component }}"
          LIN_PRIORITY="${LIN_PRIORITY:-3}"
          ESTIMATE="${ESTIMATE:-0}"

          # Extract score from council-body.md
          SCORE=""
          if [ -f council-body.md ]; then
            SCORE=$(grep -oE 'Score:?\s*[0-9]+\.?[0-9]*/10' council-body.md | head -1 | grep -oE '[0-9]+\.?[0-9]*' | head -1 || echo "")
          fi

          # Extract mode from council-body.md
          MODE="ask"
          if [ -f council-body.md ]; then
            MODE=$(grep -oiE 'Ship/Show/Ask:?\s*(Ship|Show|Ask)' council-body.md | head -1 | grep -oiE '(Ship|Show|Ask)$' | head -1 | tr '[:upper:]' '[:lower:]' || echo "ask")
          fi
          MODE="${MODE:-ask}"

          # Only queue if score >= 8.0 (Go verdict)
          SCORE_OK="0"
          if [ -n "$SCORE" ]; then
            SCORE_OK=$(echo "$SCORE >= 8.0" | bc -l 2>/dev/null || echo "0")
          fi

          if [ "$SCORE_OK" != "1" ]; then
            echo "::notice::Council score ${SCORE:-?} < 8.0 — not queuing ${TICKET}"
            echo "queued=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Compute priority and role
          PRIORITY=$(compute_queue_priority "$LIN_PRIORITY" "$SCORE" "$ESTIMATE")
          ROLE=$(compute_queue_role "$COMPONENT")

          echo "Queuing ${TICKET}: P${PRIORITY}, role=${ROLE:-any}, score=${SCORE}, mode=${MODE}, est=${ESTIMATE}"

          # Push to PocketBase queue
          push_queue_job "$TICKET" "$PRIORITY" "$ROLE" "$TITLE" "$ESTIMATE" "$SCORE" "$MODE" "l3" "$DESCRIPTION"

          echo "queued=true" >> "$GITHUB_OUTPUT"
          echo "QUEUE_PRIORITY=${PRIORITY}" >> "$GITHUB_ENV"
          echo "QUEUE_ROLE=${ROLE}" >> "$GITHUB_ENV"
          echo "QUEUE_MODE=${MODE}" >> "$GITHUB_ENV"
          echo "QUEUE_SCORE=${SCORE}" >> "$GITHUB_ENV"

      # Notify Slack + Metrics — Council report (info-only) + queue notification
      - name: Slack Council Report
        id: slack-council
        if: always() && steps.dedup.outputs.skip != 'true'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_THREAD_TS: ${{ github.event.client_payload.slack_thread_ts }}
          PUSHGATEWAY_URL: ${{ vars.PUSHGATEWAY_URL }}
          PUSHGATEWAY_AUTH: ${{ secrets.PUSHGATEWAY_AUTH }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          TICKET="${{ github.event.client_payload.ticket_id }}"
          TITLE="${{ github.event.client_payload.ticket_title }}"
          ESTIMATE="${{ github.event.client_payload.ticket_estimate }}"
          LINEAR_LINK=$(_linear_url "$TICKET")

          # Extract score, mode, LOC, files from council body
          SCORE="" MODE="" LOC="" FILES=""
          if [ -f council-body.md ]; then
            SCORE=$(grep -oE 'Score:?\s*[0-9]+\.?[0-9]*/10' council-body.md | head -1 | grep -oE '[0-9]+\.?[0-9]*' | head -1 || echo "")
            MODE=$(grep -oiE 'Ship/Show/Ask:?\s*(Ship|Show|Ask)' council-body.md | head -1 | grep -oiE '(Ship|Show|Ask)$' | head -1 || echo "")
            LOC=$(grep -oE '~?[0-9]+ LOC' council-body.md | head -1 | grep -oE '[0-9]+' | head -1 || echo "")
            FILES=$(grep -oE '[0-9]+ files?' council-body.md | head -1 | grep -oE '[0-9]+' | head -1 || echo "")
          fi

          # Compute verdict from score
          VERDICT="Go"
          if [ -n "$SCORE" ]; then
            if echo "$SCORE < 6.0" | bc -l 2>/dev/null | grep -q 1; then VERDICT="Redo"
            elif echo "$SCORE < 8.0" | bc -l 2>/dev/null | grep -q 1; then VERDICT="Fix"; fi
          fi

          # Post Council report (info-only, no approve button)
          COUNCIL_TS=$(notify_council "$TICKET" "$TITLE" "${SCORE:-?}" "$VERDICT" "$LINEAR_LINK" "" "$MODE" "$LOC" "$FILES")
          _react_slack "mag" "$COUNCIL_TS"
          echo "thread_ts=${COUNCIL_TS}" >> "$GITHUB_OUTPUT"

          # If queued, send queue notification threaded under council report
          if [ "${{ steps.push-queue.outputs.queued }}" = "true" ]; then
            QUEUE_PRIORITY="${QUEUE_PRIORITY:-2}"
            QUEUE_ROLE="${QUEUE_ROLE:-}"
            QUEUE_MODE="${QUEUE_MODE:-ask}"
            notify_queued "$TICKET" "${SCORE:-}" "$QUEUE_PRIORITY" "$QUEUE_ROLE" "$QUEUE_MODE" "${ESTIMATE:-}"
            _react_slack "inbox_tray" "$COUNCIL_TS"
          fi

          # Push council metrics
          VERDICT_LC="go"
          if [ -n "$SCORE" ]; then
            if echo "$SCORE < 8.0" | bc -l 2>/dev/null | grep -q 1; then VERDICT_LC="fix"; fi
            if echo "$SCORE < 6.0" | bc -l 2>/dev/null | grep -q 1; then VERDICT_LC="redo"; fi
          fi
          push_metrics_council "linear-dispatch" "$TICKET" "${SCORE:-0}" "$VERDICT_LC"

      - name: Write Job Summary — Council
        if: always() && steps.dedup.outputs.skip != 'true'
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          write_job_summary "${{ github.event.client_payload.ticket_id }}" \
            "${{ steps.council.outcome }}" "" "" "council"

