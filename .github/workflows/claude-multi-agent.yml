# Level 5: Multi-Agent Dispatch — parallel Claude instances on independent scopes
# Triggered via workflow_dispatch with comma-separated ticket IDs.
# Each ticket gets its own Claude agent running in parallel.
# Council validates the batch plan before execution starts.
# Kill-switch: set DISABLE_L5_MULTI_AGENT=true in repo variables to disable.

name: Claude Code Multi-Agent

on:
  workflow_dispatch:
    inputs:
      tickets:
        description: "Comma-separated ticket IDs (e.g., CAB-1200,CAB-1201,CAB-1202)"
        required: true
        type: string
      skip_council:
        description: "Skip Council validation (for Ship-mode changes only)"
        required: false
        type: boolean
        default: false

concurrency:
  group: claude-multi-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # ----- Phase 0: Council Batch Validation -----
  council-batch:
    if: ${{ vars.DISABLE_L5_MULTI_AGENT != 'true' && !inputs.skip_council }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      approved: ${{ steps.council.outputs.approved }}
    steps:
      - uses: actions/checkout@v4

      - name: Council Batch Validation
        id: council
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log for session state.
            Focus exclusively on the task below.

            Multi-Agent Council Validation.

            Tickets to implement in parallel: ${{ inputs.tickets }}

            For each ticket:
            1. Search GitHub issues for the ticket ID
            2. Read the issue description
            3. Run a QUICK Council validation (2-sentence per persona, score only)
            4. Classify as Ship/Show/Ask
            5. Identify the component scope (api, ui, portal, gateway, docs, operator)

            Then validate the BATCH:
            - Are there any dependency conflicts between tickets?
            - Can they safely run in parallel? (different component scopes = safe)
            - Any shared files that would cause merge conflicts?

            Output as a GitHub issue titled "Multi-Agent Batch — YYYY-MM-DD":
            | Ticket | Score | Verdict | Scope | Ship/Show/Ask |
            |--------|-------|---------|-------|--------------|
            | CAB-XXXX | X.X | Go | api | Ship |
            | CAB-YYYY | X.X | Go | ui | Show |

            **Parallel Safety**: Safe / Conflict Risk
            **Estimated Total LOC**: XXX

            Comment "/go-batch" to start parallel execution.
          # Model tier: sonnet (Council gate — structured rubric, Sonnet sufficient. Bash removed for security)
          claude_args: "--model claude-sonnet-4-5-20250929 --max-turns 5 --allowedTools Read,Glob,Grep"

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}, Model=sonnet-4-5, MaxTurns=5, Stage=council-batch"

      # Sync Council results to Linear (apply council:ticket-go to batch tickets)
      - name: Sync Batch Council to Linear
        if: steps.council.outcome == 'success'
        continue-on-error: true
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          if [ -z "$LINEAR_API_KEY" ]; then exit 0; fi

          # Parse comma-separated tickets
          TICKETS="${{ inputs.tickets }}"
          GH_RUN="https://github.com/stoa-platform/stoa/actions/runs/${{ github.run_id }}"

          # Find council:ticket-go label ID (batch only processes Go tickets)
          LABEL_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"query": "{ issueLabels(filter: { name: { eq: \"council:ticket-go\" } }) { nodes { id } } }"}' \
            | jq -r '.data.issueLabels.nodes[0].id // empty' 2>/dev/null || echo "")

          if [ -z "$LABEL_ID" ]; then
            echo "::warning::council:ticket-go label not found on Linear"
            exit 0
          fi

          echo "$TICKETS" | tr ',' '\n' | while IFS= read -r TICKET_ID; do
            TICKET_ID=$(echo "$TICKET_ID" | tr -d ' ')
            [ -z "$TICKET_ID" ] && continue

            ISSUE_ID=$(curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"{ issueSearch(filter: { identifier: { eq: \\\"${TICKET_ID}\\\" } }) { nodes { id } } }\"}" \
              | jq -r '.data.issueSearch.nodes[0].id // empty' 2>/dev/null || echo "")

            if [ -z "$ISSUE_ID" ]; then
              echo "::warning::${TICKET_ID} not found on Linear"
              continue
            fi

            # Get existing labels (minus old council:ticket-*) + add new
            EXISTING=$(curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"{ issue(id: \\\"${ISSUE_ID}\\\") { labels { nodes { id name } } } }\"}" \
              | jq -r '[.data.issue.labels.nodes[] | select(.name | startswith("council:ticket-") | not) | .id]' 2>/dev/null || echo "[]")
            LABEL_IDS=$(echo "$EXISTING" | jq -c ". + [\"${LABEL_ID}\"]" 2>/dev/null || echo "[\"${LABEL_ID}\"]")

            curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"mutation { issueUpdate(id: \\\"${ISSUE_ID}\\\", input: { labelIds: ${LABEL_IDS} }) { success } }\"}" \
              > /dev/null 2>&1 || true

            COMMENT="Multi-Agent Council batch — council:ticket-go\n[GitHub Actions](${GH_RUN})"
            curl -s -X POST "https://api.linear.app/graphql" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"${ISSUE_ID}\\\", body: \\\"${COMMENT}\\\" }) { success } }\"}" \
              > /dev/null 2>&1 || true

            echo "Synced ${TICKET_ID} → council:ticket-go"
          done

      - name: Notify Slack — Batch Council
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then exit 0; fi
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"blocks\": [
                {\"type\":\"header\",\"text\":{\"type\":\"plain_text\",\"text\":\"Multi-Agent Council: ${{ inputs.tickets }}\",\"emoji\":true}},
                {\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"Batch validation complete. Review on GitHub and approve to start parallel execution.\"}}
              ]
            }"

  # ----- Phase 1: Parallel Implementation -----
  # Uses a matrix strategy to run each ticket as a separate job.
  # GitHub Actions matrix can be dynamic via fromJSON.
  parse-tickets:
    needs: [council-batch]
    if: |
      vars.DISABLE_L5_MULTI_AGENT != 'true' &&
      (needs.council-batch.result == 'success' || needs.council-batch.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - name: Parse ticket list into matrix
        id: parse
        run: |
          TICKETS="${{ inputs.tickets }}"
          # Convert "CAB-1200,CAB-1201,CAB-1202" to JSON array
          JSON=$(echo "$TICKETS" | tr ',' '\n' | jq -R -s 'split("\n") | map(select(length > 0))' | jq -c '{ticket: .}')
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"

  implement:
    needs: [parse-tickets]
    if: needs.parse-tickets.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix: ${{ fromJSON(needs.parse-tickets.outputs.matrix) }}
      max-parallel: 3  # Max 3 parallel agents (cost control)
      fail-fast: false  # Don't cancel other agents if one fails
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log for session state.
            Focus exclusively on the task below.

            Implement ticket: ${{ matrix.ticket }}

            Find the GitHub issue matching this ticket ID.
            Read the issue description for requirements.
            Follow code style rules in CLAUDE.md and .claude/rules/ (but skip workflow/session rules).

            Steps:
            1. Create branch: feat/${{ matrix.ticket }}-<slug>
            2. Implement the feature/fix
            3. Run quality gates
            4. Commit with conventional messages including ticket ID
            5. Create PR referencing the issue
            6. If Ship mode: merge after CI green
            7. If Show/Ask: leave PR open

            IMPORTANT: This is running in parallel with other agents.
            Only modify files in your component scope.
            Do NOT modify shared files (memory.md, plan.md, CLAUDE.md).
            Rule changes (.claude/rules/) are ALWAYS Ask mode — never auto-merge.
          # Model tier: sonnet (code generation, full tool access)
          claude_args: "--model claude-sonnet-4-5-20250929 --max-turns 60 --allowedTools Bash,Read,Write,Edit,Glob,Grep,WebFetch"

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}, Model=sonnet-4-5, MaxTurns=60, Stage=implement"

      - name: Notify Slack — Agent Complete
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then exit 0; fi
          STATUS="${{ job.status }}"
          TICKET="${{ matrix.ticket }}"
          if [ "$STATUS" = "success" ]; then
            MSG=":white_check_mark: *${TICKET}* — Agent complete, PR created"
          else
            MSG=":x: *${TICKET}* — Agent failed, check logs"
          fi
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"${MSG}\"}"
