# Level 1: Claude Code Auto-Review — reviews every PR automatically
# Runs /review skill on PR open/sync. Posts review as PR comment.
# Kill-switch: set DISABLE_L1_REVIEW=true in repo variables to disable.

name: Claude Code Auto-Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    # Skip Dependabot PRs, self-authored PRs, and when kill-switch is active
    if: |
      vars.DISABLE_L1_REVIEW != 'true' &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'claude[bot]' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pre-check: get diff stats to avoid context overflow on large PRs
      - name: Get PR diff stats
        id: diff-stats
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          DIFF_STAT=$(gh pr diff "$PR_NUM" --stat 2>/dev/null || echo "stat unavailable")
          DIFF_LINES=$(gh pr diff "$PR_NUM" 2>/dev/null | wc -l | tr -d ' ')
          echo "diff_lines=$DIFF_LINES" >> "$GITHUB_OUTPUT"
          echo "PR #$PR_NUM: $DIFF_LINES lines changed"

          # Truncate diff to 500 lines for Claude context
          if [ "$DIFF_LINES" -gt 500 ]; then
            gh pr diff "$PR_NUM" | head -500 > /tmp/pr-diff-truncated.txt
            echo "--- TRUNCATED: showing first 500 of $DIFF_LINES lines ---" >> /tmp/pr-diff-truncated.txt
            echo "truncated=true" >> "$GITHUB_OUTPUT"
          else
            gh pr diff "$PR_NUM" > /tmp/pr-diff-truncated.txt 2>/dev/null || echo "diff unavailable" > /tmp/pr-diff-truncated.txt
            echo "truncated=false" >> "$GITHUB_OUTPUT"
          fi

          # Also capture the stat view
          echo "$DIFF_STAT" > /tmp/pr-diff-stat.txt

      - name: Run Claude Review
        id: claude-review
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log for session state.
            Focus exclusively on the task below.

            Review PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}

            Stat: $(cat /tmp/pr-diff-stat.txt)

            Diff (${{ steps.diff-stats.outputs.truncated == 'true' && 'TRUNCATED to 500 lines' || 'full' }}):
            ```diff
            $(cat /tmp/pr-diff-truncated.txt)
            ```

            Check: code quality, security (OWASP), tests, CI compatibility.

            Output:
            ## Auto-Review
            **Classification**: Ship | Show | Ask
            **Risk**: Low | Medium | High
            ### Findings
            - ...
            ### Verdict
            Go | Fix | Redo — 1 sentence summary
          # Model tier: haiku (read-only PR review, no code generation)
          claude_args: "--model claude-haiku-4-5-20251001 --max-turns 5 --allowedTools Read,Glob,Grep"

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}"

      - name: Write Job Summary
        if: always()
        env:
          HEGEMON_REMOTE_URL: ${{ secrets.HEGEMON_REMOTE_URL }}
          HEGEMON_REMOTE_EMAIL: ${{ secrets.HEGEMON_REMOTE_EMAIL }}
          HEGEMON_REMOTE_PASSWORD: ${{ secrets.HEGEMON_REMOTE_PASSWORD }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          write_job_summary "PR-${{ github.event.pull_request.number }}" "${{ steps.claude-review.outcome }}" "${{ github.event.pull_request.number }}" "haiku-4-5" "auto-review"
          push_state_milestone "PR-${{ github.event.pull_request.number }}" "review-${{ steps.claude-review.outcome }}"

      # Fallback comment if Claude fails
      - name: Post fallback on failure
        if: steps.claude-review.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          gh pr comment "$PR_NUM" --body "$(cat <<'EOF'
          ## Auto-Review

          Claude Code review could not complete for this PR. This is non-blocking.

          **Possible causes**: PR diff too large, API rate limit, or transient error.
          **Action**: Manual review recommended.

          _AI Factory L1 | $(date -u +%Y-%m-%dT%H:%M) UTC_
          EOF
          )" || true
