# Level 2: Claude Code Scheduled Tasks — autonomous daily/weekly maintenance
# Runs Claude on a schedule for triage, sync, audit, and health checks.
# Each task posts results to Slack.
# Kill-switch: set DISABLE_L2_SCHEDULED=true in repo variables to disable ALL scheduled tasks.

name: Claude Code Scheduled Tasks

on:
  schedule:
    # Daily 07:00 UTC — Issue triage + plan sync
    - cron: "0 7 * * *"
    # Daily 21:00 UTC — CI health check + auto-fix
    - cron: "0 21 * * *"
    # Daily 07:30 UTC — PR Hygiene (zero-token, labels + Slack)
    - cron: "30 7 * * *"
    # Weekly Monday 08:00 UTC — Dependency audit + rule improvement
    - cron: "0 8 * * 1"
    # Weekly Monday 09:30 UTC — Capacity check
    - cron: "30 9 * * 1"
    # Weekly Monday 10:00 UTC — Backlog stock check
    - cron: "0 10 * * 1"
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        type: choice
        options:
          - daily-triage
          - daily-ci-health
          - weekly-audit
          - weekly-digest
          - weekly-capacity-check
          - weekly-backlog-stock
          - daily-pr-hygiene

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # ----- Daily: Issue Triage + Plan Sync -----
  daily-triage:
    if: |
      vars.DISABLE_L2_SCHEDULED != 'true' &&
      (
        (github.event.schedule == '0 7 * * *') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'daily-triage')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "github-actions[bot]"
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log for session state.
            Focus exclusively on the task below.

            Daily triage: analyze repo state and post a digest issue.
            1. List open issues — label unlabeled ones (bug, feature, docs, chore)
            2. Check open PRs — flag stale ones (>3 days without activity)
            3. Read plan.md — identify drift from Linear cycle
            4. Create issue "Daily Digest — YYYY-MM-DD" with label "daily-digest"
               Content: open/stale counts, plan drift, top 3 priorities
          # Model tier: haiku (read-only triage, no code generation)
          claude_args: "--model claude-haiku-4-5-20251001 --max-turns 10 --allowedTools Bash,Read,Glob,Grep"

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}"

      - name: Slack Daily Triage
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          PUSHGATEWAY_URL: ${{ vars.PUSHGATEWAY_URL }}
          PUSHGATEWAY_AUTH: ${{ secrets.PUSHGATEWAY_AUTH }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          notify_scheduled "Daily Triage" "${{ job.status }}"
          push_metrics_scheduled "scheduled" "daily-triage" "${{ job.status }}"

      - name: Write Job Summary
        if: always()
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          write_job_summary "triage-$(date -u +%Y-%m-%d)" "${{ job.status }}" "" "haiku-4-5" "daily-triage"

  # ----- Daily: CI Health Check + Auto-Fix -----
  daily-ci-health:
    if: |
      vars.DISABLE_L2_SCHEDULED != 'true' &&
      (
        (github.event.schedule == '0 21 * * *') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'daily-ci-health')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "github-actions[bot]"
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log for session state.
            Focus exclusively on the task below.

            CI Health Check: analyze recent CI runs on main.
            1. Run: gh run list --branch main --limit 10 --json status,conclusion,name
            2. Identify failed workflows in the last 24h
            3. For each failure:
               a. Read logs: gh run view <id> --log-failed
               b. If auto-fixable (lint, format, type error): create a fix PR
               c. If not: create issue labeled "ci-failure" with diagnosis
            4. Check for flaky checks

            Report: total/passed/failed runs, auto-fixed (PR#), needs human, flaky checks.
          # Model tier: sonnet (CI health, may create fix PRs)
          claude_args: "--model claude-sonnet-4-6 --max-turns 15 --allowedTools Bash,Read,Write,Edit,Glob,Grep"

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}"

      - name: Slack CI Health
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          PUSHGATEWAY_URL: ${{ vars.PUSHGATEWAY_URL }}
          PUSHGATEWAY_AUTH: ${{ secrets.PUSHGATEWAY_AUTH }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          notify_scheduled "CI Health Check" "${{ job.status }}"
          push_metrics_scheduled "scheduled" "ci-health" "${{ job.status }}"

      - name: Write Job Summary
        if: always()
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          write_job_summary "ci-health-$(date -u +%Y-%m-%d)" "${{ job.status }}" "" "sonnet-4-5" "ci-health"

  # ----- Weekly: Dependency Audit + Security -----
  weekly-audit:
    if: |
      vars.DISABLE_L2_SCHEDULED != 'true' &&
      (
        (github.event.schedule == '0 8 * * 1') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'weekly-audit')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "github-actions[bot]"
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log for session state.
            Focus exclusively on the task below.

            Weekly audit: dependency scan + coverage check + stale branch cleanup.
            1. Dependency audit:
               - pip-audit in control-plane-api/ (install first: pip install pip-audit)
               - npm audit in control-plane-ui/ and portal/
               - cargo audit in stoa-gateway/ (install: cargo install cargo-audit)
            2. If safe upgrades exist (patch/minor): create PR "chore(deps): weekly dependency update YYYY-MM-DD"
            3. Coverage check: read thresholds from .claude/rules/ci-quality-gates.md, check latest CI. If dropped: issue with "coverage-drop" label
            4. Stale branches >14 days: report which can be deleted

            Create issue "Weekly Audit — YYYY-MM-DD" with label "weekly-audit".
          # Model tier: sonnet (audit, may create upgrade PRs)
          claude_args: "--model claude-sonnet-4-6 --max-turns 20 --allowedTools Bash,Read,Write,Edit,Glob,Grep"

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}"

      - name: Slack Weekly Audit
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          PUSHGATEWAY_URL: ${{ vars.PUSHGATEWAY_URL }}
          PUSHGATEWAY_AUTH: ${{ secrets.PUSHGATEWAY_AUTH }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          notify_scheduled "Weekly Audit" "${{ job.status }}"
          push_metrics_scheduled "scheduled" "weekly-audit" "${{ job.status }}"

      - name: Write Job Summary
        if: always()
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          write_job_summary "audit-$(date -u +%Y-%m-%d)" "${{ job.status }}" "" "sonnet-4-5" "weekly-audit"

  # ----- Weekly Digest (Batch API — 50% cost reduction) -----
  weekly-digest:
    if: |
      vars.DISABLE_L2_SCHEDULED != 'true' &&
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'weekly-digest')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Collect context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr list --state merged --base main --limit 20 --json number,title,mergedAt > /tmp/prs.json
          gh issue list --state closed --limit 20 --json number,title,closedAt > /tmp/issues.json
          cat plan.md > /tmp/context.txt
          echo "---" >> /tmp/context.txt
          echo "PRs merged this week:" >> /tmp/context.txt
          cat /tmp/prs.json >> /tmp/context.txt
          echo "" >> /tmp/context.txt
          echo "Issues closed this week:" >> /tmp/context.txt
          cat /tmp/issues.json >> /tmp/context.txt

      - name: Write prompt
        run: |
          cat > /tmp/prompt.txt << 'PROMPT'
          Weekly digest: summarize AI Factory activity.
          1. Count PRs merged this week from the provided JSON
          2. Count issues closed from the provided JSON
          3. Calculate cycle progress (% done) from plan.md
          Format as markdown suitable for a GitHub issue body.
          Include: PR count, issue count, cycle progress %, top 3 merged PRs.
          PROMPT

      # Model tier: haiku-batch (read-only digest, 50% batch discount)
      - name: Run batch processor
        continue-on-error: true
        id: batch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/ai-ops/batch-processor.py \
            --prompt-file /tmp/prompt.txt \
            --context-file /tmp/context.txt \
            --model claude-haiku-4-5-20251001 \
            --max-tokens 2048 \
            --max-wait 1200 \
            --output /tmp/result.json

      - name: Post results
        if: steps.batch.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(python3 -c "import json; print(json.load(open('/tmp/result.json'))['text'])" 2>/dev/null || echo "Batch completed but no text output.")
          gh issue create \
            --title "Weekly Digest — $(date -u +%Y-%m-%d)" \
            --label "daily-digest" \
            --body "$BODY" || true

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}, Mode=batch"

      - name: Write Job Summary
        if: always()
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          write_job_summary "digest-$(date -u +%Y-%m-%d)" "${{ steps.batch.outcome }}" "" "haiku-4-5-batch" "weekly-digest"

  # ----- Weekly: Capacity Check (Batch API — 50% cost reduction) -----
  weekly-capacity-check:
    if: |
      vars.DISABLE_L2_SCHEDULED != 'true' &&
      (
        (github.event.schedule == '30 9 * * 1') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'weekly-capacity-check')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Collect context
        run: |
          cat plan.md > /tmp/context.txt

      - name: Write prompt
        run: |
          cat > /tmp/prompt.txt << 'PROMPT'
          Weekly capacity check — analyze cycle health from plan.md.
          1. Find current cycle (marked "CURRENT"), extract scope/done pts
          2. Velocity baseline: Cycle 7 = 505 pts / 7 days = 72.1 pts/day
          3. Compute: capacity, target (80%), gap, utilization %
          4. List top 5 backlog items that could fill the gap
          Format as markdown for a GitHub issue body.
          PROMPT

      # Model tier: haiku-batch (read-only capacity, 50% batch discount)
      - name: Run batch processor
        continue-on-error: true
        id: batch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/ai-ops/batch-processor.py \
            --prompt-file /tmp/prompt.txt \
            --context-file /tmp/context.txt \
            --model claude-haiku-4-5-20251001 \
            --max-tokens 2048 \
            --max-wait 1200 \
            --output /tmp/result.json

      - name: Post results
        if: steps.batch.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(python3 -c "import json; print(json.load(open('/tmp/result.json'))['text'])" 2>/dev/null || echo "Batch completed but no text output.")
          gh issue create \
            --title "Weekly Capacity Check — $(date -u +%Y-%m-%d)" \
            --label "daily-digest" \
            --body "$BODY" || true

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}, Mode=batch"

      - name: Slack Capacity Check
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          PUSHGATEWAY_URL: ${{ vars.PUSHGATEWAY_URL }}
          PUSHGATEWAY_AUTH: ${{ secrets.PUSHGATEWAY_AUTH }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          notify_scheduled "Weekly Capacity Check" "${{ job.status }}"
          push_metrics_scheduled "scheduled" "capacity-check" "${{ job.status }}"

      - name: Write Job Summary
        if: always()
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          write_job_summary "capacity-$(date -u +%Y-%m-%d)" "${{ job.status }}" "" "haiku-4-5-batch" "capacity-check"

  # ----- Weekly: Backlog Stock Check (Batch API — 50% cost reduction) -----
  weekly-backlog-stock:
    if: |
      vars.DISABLE_L2_SCHEDULED != 'true' &&
      (
        (github.event.schedule == '0 10 * * 1') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'weekly-backlog-stock')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Collect context
        run: |
          cat plan.md > /tmp/context.txt
          echo "---" >> /tmp/context.txt
          echo "TODO/FIXME counts by component:" >> /tmp/context.txt
          for dir in control-plane-api control-plane-ui portal stoa-gateway; do
            COUNT=$(grep -rn 'TODO\|FIXME' "$dir/src/" 2>/dev/null | wc -l || echo 0)
            echo "  $dir: $COUNT" >> /tmp/context.txt
          done
          echo "---" >> /tmp/context.txt
          echo "Lint suppressions:" >> /tmp/context.txt
          grep -rn 'noqa\|eslint-disable\|allow(' control-plane-api/src/ control-plane-ui/src/ portal/src/ stoa-gateway/src/ 2>/dev/null | wc -l >> /tmp/context.txt || echo "0" >> /tmp/context.txt

      - name: Write prompt
        run: |
          cat > /tmp/prompt.txt << 'PROMPT'
          Weekly backlog stock check — analyze improvement opportunities.
          1. Count backlog items from plan.md (non-[x] items, estimate total pts)
          2. Review TODO/FIXME counts and lint suppressions from context
          3. Group findings by component (api, ui, portal, gateway)
          4. Suggest MEGA-sized improvements (20-40 pts), NOT micro-tickets
          5. If backlog < 400 pts: recommend running generate-backlog. Else: "Backlog healthy"
          Format as markdown for a GitHub issue body.
          PROMPT

      # Model tier: haiku-batch (read-only backlog scan, 50% batch discount)
      - name: Run batch processor
        continue-on-error: true
        id: batch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/ai-ops/batch-processor.py \
            --prompt-file /tmp/prompt.txt \
            --context-file /tmp/context.txt \
            --model claude-haiku-4-5-20251001 \
            --max-tokens 2048 \
            --max-wait 1200 \
            --output /tmp/result.json

      - name: Post results
        if: steps.batch.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(python3 -c "import json; print(json.load(open('/tmp/result.json'))['text'])" 2>/dev/null || echo "Batch completed but no text output.")
          gh issue create \
            --title "Backlog Stock Check — $(date -u +%Y-%m-%d)" \
            --label "daily-digest" \
            --body "$BODY" || true

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}, Mode=batch"

      - name: Slack Backlog Stock
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          PUSHGATEWAY_URL: ${{ vars.PUSHGATEWAY_URL }}
          PUSHGATEWAY_AUTH: ${{ secrets.PUSHGATEWAY_AUTH }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          notify_scheduled "Backlog Stock Check" "${{ job.status }}"
          push_metrics_scheduled "scheduled" "backlog-stock" "${{ job.status }}"

      - name: Write Job Summary
        if: always()
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          write_job_summary "backlog-$(date -u +%Y-%m-%d)" "${{ job.status }}" "" "haiku-4-5-batch" "backlog-stock"

  # ----- Daily: PR Hygiene (zero-token — pure bash + gh CLI) -----
  daily-pr-hygiene:
    if: |
      vars.DISABLE_L2_SCHEDULED != 'true' &&
      (
        (github.event.schedule == '30 7 * * *') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'daily-pr-hygiene')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run PR Hygiene scan
        id: hygiene
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESULT=$(bash scripts/ai-ops/pr-hygiene.sh)
          echo "json=$RESULT" >> "$GITHUB_OUTPUT"
          TOTAL=$(echo "$RESULT" | jq -r '.total')
          STALE=$(echo "$RESULT" | jq -r '.stale')
          ABANDONED=$(echo "$RESULT" | jq -r '.abandoned')
          DRAFT=$(echo "$RESULT" | jq -r '.draft')
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "stale=$STALE" >> "$GITHUB_OUTPUT"
          echo "abandoned=$ABANDONED" >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"

      - name: Notify Slack + Push Metrics
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          PUSHGATEWAY_URL: ${{ vars.PUSHGATEWAY_URL }}
          PUSHGATEWAY_AUTH: ${{ secrets.PUSHGATEWAY_AUTH }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          notify_pr_hygiene \
            "${{ steps.hygiene.outputs.total }}" \
            "${{ steps.hygiene.outputs.stale }}" \
            "${{ steps.hygiene.outputs.abandoned }}" \
            "${{ steps.hygiene.outputs.draft }}"
          push_metrics_pr_hygiene \
            "${{ steps.hygiene.outputs.total }}" \
            "${{ steps.hygiene.outputs.stale }}" \
            "${{ steps.hygiene.outputs.abandoned }}" \
            "${{ steps.hygiene.outputs.draft }}"

      - name: Write Job Summary
        if: always()
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          write_job_summary "pr-hygiene-$(date -u +%Y-%m-%d)" "${{ job.status }}" "" "" "pr-hygiene"
