# Level 4: Self-Improving AI Factory — learns from failures and improves rules
# Analyzes CI failures, metrics, and gotchas to propose rule improvements.
# Runs weekly or on-demand. Every improvement goes through Council validation.
# Kill-switch: set DISABLE_L4_SELF_IMPROVE=true in repo variables to disable.

name: Claude Code Self-Improve

on:
  schedule:
    # Weekly Friday 18:00 UTC — retrospective + improvement proposals
    - cron: "0 18 * * 5"
  workflow_dispatch:
    inputs:
      focus:
        description: "What to improve"
        required: false
        type: choice
        options:
          - all
          - ci-patterns
          - rules-pruning
          - coverage-ratchet
          - gotchas-to-rules

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  self-improve:
    if: vars.DISABLE_L4_SELF_IMPROVE != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100  # Need history for analysis

      # Phase 1: Analyze patterns
      - name: Run Self-Improvement Analysis
        id: analysis
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log for session state.
            Focus exclusively on the task below.

            Self-Improvement Agent: find recurring problems, propose rule improvements.

            1. CI Failure Patterns: gh run list --branch main --limit 30 --json conclusion,name,headSha
               Find top 3 failure patterns. Check if .claude/rules/ covers them. Propose updates if not.
            2. Gotchas Analysis: read gotchas from MEMORY.md. Promote recurring ones (2+) to rules.
            3. Rules Pruning: scan .claude/rules/*.md for contradictions, redundancy, outdated refs.
            4. Coverage Ratchet: check thresholds in ci-quality-gates.md vs latest CI. Propose ratchet up.

            Create issue "AI Factory Self-Improvement — YYYY-MM-DD" label "self-improve".
            Format: tables for CI patterns, gotchas, rules health, coverage ratchet.

            Rules:
            - Do NOT make changes. Only analyze and propose.
            - Max 3 rule changes per report (highest impact).
            - Label "self-improve" only. Human labels "claude-implement" to trigger PR.
          # Model tier: sonnet (self-improvement analysis, read-only but needs quality reasoning)
          claude_args: "--model claude-sonnet-4-5-20250929 --max-turns 15 --allowedTools Bash,Read,Glob,Grep"

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}"

      # Fallback comment if Claude fails
      - name: Post fallback on failure
        if: steps.analysis.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "AI Factory Self-Improvement — $(date -u +%Y-%m-%d) (failed)" \
            --label "self-improve" \
            --body "Self-improvement analysis could not complete. Check [workflow logs](https://github.com/stoa-platform/stoa/actions/runs/${{ github.run_id }})." \
            || true

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then exit 0; fi
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {\"type\": \"plain_text\", \"text\": \"AI Factory Self-Improvement Report\", \"emoji\": true}
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"Weekly retrospective complete. Review proposed improvements on GitHub.\nLabel the issue \`claude-implement\` to auto-create the improvement PR.\"
                  },
                  \"accessory\": {
                    \"type\": \"button\",
                    \"text\": {\"type\": \"plain_text\", \"text\": \"Review Improvements\"},
                    \"url\": \"https://github.com/stoa-platform/stoa/issues?q=is%3Aissue+label%3Aself-improve+is%3Aopen\"
                  }
                }
              ]
            }"
