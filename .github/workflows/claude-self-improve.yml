# Level 4: Self-Improving AI Factory — learns from failures and improves rules
# Analyzes CI failures, metrics, and gotchas to propose rule improvements.
# Runs weekly or on-demand. Every improvement goes through Council validation.
# Kill-switch: set DISABLE_L4_SELF_IMPROVE=true in repo variables to disable.

name: Claude Code Self-Improve

on:
  schedule:
    # Weekly Friday 18:00 UTC — retrospective + improvement proposals
    - cron: "0 18 * * 5"
  workflow_dispatch:
    inputs:
      focus:
        description: "What to improve"
        required: false
        type: choice
        options:
          - all
          - ci-patterns
          - rules-pruning
          - coverage-ratchet
          - gotchas-to-rules

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  self-improve:
    if: vars.DISABLE_L4_SELF_IMPROVE != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100  # Need history for analysis

      # Phase 1: Collect analysis context
      - name: Collect context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== CI Failure Patterns (last 30 runs) ===" > /tmp/context.txt
          gh run list --branch main --limit 30 --json conclusion,name,headSha >> /tmp/context.txt 2>&1
          echo "" >> /tmp/context.txt
          echo "=== Rules Files ===" >> /tmp/context.txt
          for f in .claude/rules/*.md; do
            echo "--- $f ---" >> /tmp/context.txt
            head -20 "$f" >> /tmp/context.txt
            echo "" >> /tmp/context.txt
          done
          echo "=== CI Quality Gates Thresholds ===" >> /tmp/context.txt
          cat .claude/rules/ci-quality-gates.md >> /tmp/context.txt

      - name: Write prompt
        run: |
          cat > /tmp/prompt.txt << 'PROMPT'
          Self-Improvement Agent: find recurring problems, propose rule improvements.

          1. CI Failure Patterns: analyze the provided CI run data.
             Find top 3 failure patterns. Check if rules cover them. Propose updates if not.
          2. Rules Pruning: scan the rules summaries for contradictions, redundancy, outdated refs.
          3. Coverage Ratchet: check thresholds in ci-quality-gates.md. Propose ratchet up if safe.

          Format as markdown for a GitHub issue body. Include tables for:
          - CI failure patterns (name, count, covered by rule?)
          - Rules health (file, status, proposed action)
          - Coverage ratchet (component, current threshold, proposed)

          Rules:
          - Only analyze and propose. Do NOT make changes.
          - Max 3 rule changes per report (highest impact).
          PROMPT

      # Model tier: sonnet-batch (self-improvement needs quality reasoning, 50% batch discount)
      - name: Run batch processor
        continue-on-error: true
        id: batch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/ai-ops/batch-processor.py \
            --prompt-file /tmp/prompt.txt \
            --context-file /tmp/context.txt \
            --model claude-sonnet-4-6 \
            --max-tokens 4096 \
            --max-wait 1200 \
            --output /tmp/result.json

      - name: Post results
        if: steps.batch.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(python3 -c "import json; print(json.load(open('/tmp/result.json'))['text'])" 2>/dev/null || echo "Batch completed but no text output.")
          gh issue create \
            --title "AI Factory Self-Improvement — $(date -u +%Y-%m-%d)" \
            --label "self-improve" \
            --body "$BODY" || true

      - name: Log token usage
        if: always()
        run: |
          echo "::notice title=AI Factory::Job=${{ github.job }}, Workflow=${{ github.workflow }}, Mode=batch"

      # Fallback comment if batch fails
      - name: Post fallback on failure
        if: steps.batch.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "AI Factory Self-Improvement — $(date -u +%Y-%m-%d) (failed)" \
            --label "self-improve" \
            --body "Self-improvement analysis could not complete. Check [workflow logs](https://github.com/stoa-platform/stoa/actions/runs/${{ github.run_id }})." \
            || true

      - name: Slack Self-Improvement Report
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          notify_scheduled "Self-Improvement Report" "${{ steps.batch.outcome }}" \
            "Weekly retrospective complete. Label the issue \`claude-implement\` to auto-create the improvement PR."

      - name: Write Job Summary
        if: always()
        env:
          HEGEMON_REMOTE_URL: ${{ secrets.HEGEMON_REMOTE_URL }}
          HEGEMON_REMOTE_EMAIL: ${{ secrets.HEGEMON_REMOTE_EMAIL }}
          HEGEMON_REMOTE_PASSWORD: ${{ secrets.HEGEMON_REMOTE_PASSWORD }}
        run: |
          source scripts/ai-ops/ai-factory-notify.sh
          write_job_summary "self-improve-$(date -u +%Y-%m-%d)" "${{ steps.batch.outcome }}" "" "sonnet-4-5-batch" "self-improve"
          push_state_milestone "self-improve" "${{ steps.batch.outcome }}"

  # ----- Weekly Impact Review (Context Compiler) -----
  weekly-impact-review:
    if: vars.DISABLE_L4_SELF_IMPROVE != 'true' && vars.DISABLE_CONTEXT_COMPILER != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100 # For co-change analysis

      - name: Check prerequisites
        id: prereq
        run: |
          MISSING=""
          [ ! -f docs/stoa-impact.db ] && MISSING="${MISSING} stoa-impact.db"
          [ ! -f docs/scripts/discover-cochanges.sh ] && MISSING="${MISSING} discover-cochanges.sh"
          [ ! -f docs/scripts/dashboard.sh ] && MISSING="${MISSING} dashboard.sh"
          if [ -n "$MISSING" ]; then
            echo "::warning::Missing prerequisites:${MISSING} — skipping impact review"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run co-change discovery
        if: steps.prereq.outputs.skip != 'true'
        continue-on-error: true
        run: |
          chmod +x docs/scripts/discover-cochanges.sh
          docs/scripts/discover-cochanges.sh --commits 50

      - name: Regenerate docs from DB
        if: steps.prereq.outputs.skip != 'true'
        continue-on-error: true
        run: |
          if [ -f docs/scripts/regenerate-docs.py ]; then
            python3 docs/scripts/regenerate-docs.py
          else
            echo "::notice::regenerate-docs.py not found — skipping doc regeneration"
          fi

      - name: Dashboard snapshot
        if: steps.prereq.outputs.skip != 'true'
        continue-on-error: true
        run: |
          chmod +x docs/scripts/dashboard.sh
          mkdir -p docs/learning
          docs/scripts/dashboard.sh > "docs/learning/weekly-dashboard-$(date -u +%Y%m%d).txt" 2>&1 || true

      - name: Commit updates
        if: steps.prereq.outputs.skip != 'true'
        run: |
          git config user.name "STOA AI Factory"
          git config user.email "factory@gostoa.dev"
          git add docs/stoa-impact.db docs/learning/ docs/DEPENDENCIES.md docs/SCENARIOS.md || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly impact analysis update [skip ci]"
            git push || echo "::warning::Push failed — changes will be picked up next run"
          fi
