# =============================================================================
# GitHub Actions: CodeQL Analysis
# =============================================================================
# Deep SAST analysis for Python and JavaScript/TypeScript.
# Complements bandit (Python) and ESLint security plugin (JS).
# Rust is not supported by CodeQL — covered by cargo clippy.
# =============================================================================

name: CodeQL Analysis

on:
  workflow_dispatch: # Disabled: GHAS not enabled on this repo (paid feature for private repos)
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]
  # schedule:
  #   - cron: '0 4 * * 1'  # Weekly Monday 4 AM UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@2d3fe93d4896727350828f23e48f5391e6d3f022 # v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          config: |
            paths:
              - control-plane-api/src
              - mcp-gateway/src
              - control-plane-ui/src
              - portal/src
            paths-ignore:
              - '**/node_modules'
              - '**/test*'
              - '**/dist'

      - name: Autobuild
        uses: github/codeql-action/autobuild@2d3fe93d4896727350828f23e48f5391e6d3f022 # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@2d3fe93d4896727350828f23e48f5391e6d3f022 # v3
        with:
          category: '/language:${{ matrix.language }}'
