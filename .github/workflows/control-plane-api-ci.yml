# =============================================================================
# GitHub Actions: Control Plane API CI/CD
# =============================================================================
# Thin orchestrator — delegates to reusable workflows (ADR-031)
# Deployment via GitOps: CI pushes image → dispatches to stoa-infra → ArgoCD syncs
# =============================================================================

name: Control Plane API CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'control-plane-api/**'
      - '.github/workflows/control-plane-api-ci.yml'
      - '.github/workflows/reusable-python-ci.yml'
      - '.github/workflows/reusable-docker-ghcr.yml'
      - '.github/workflows/reusable-gitops-deploy.yml'
      - '.github/actions/**'

  pull_request:
    branches:
      - main
    paths:
      - 'control-plane-api/**'
      - '.github/workflows/control-plane-api-ci.yml'
      - '.github/workflows/reusable-python-ci.yml'
      - '.github/actions/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  id-token: write
  checks: write
  attestations: write

jobs:
  # === CI: lint + mypy + pytest + coverage ===
  ci:
    uses: ./.github/workflows/reusable-python-ci.yml
    with:
      component: control-plane-api
      python-version: '3.11'
      coverage-threshold: 65
      test-markers: not integration
      runner: self-hosted
    permissions:
      contents: read
      checks: write

  # === Integration Tests: real PostgreSQL ===
  integration:
    name: Integration Tests
    needs: ci
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stoa_test
          POSTGRES_PASSWORD: stoa_test
          POSTGRES_DB: stoa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'
          working-directory: control-plane-api
      - name: Run integration tests
        working-directory: control-plane-api
        env:
          DATABASE_URL: postgresql+asyncpg://stoa_test:stoa_test@localhost:5432/stoa_test
          ENABLE_DEPLOYMENT_WORKER: 'false'
          ENABLE_SNAPSHOT_CONSUMER: 'false'
        run: |
          pytest tests/ -v -m integration --ignore=tests/test_opensearch.py --tb=short --junit-xml=junit-integration.xml
      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: control-plane-api/junit-integration.xml

  # === Docker: build + push GHCR ===
  docker:
    needs: ci
    if: |
      needs.ci.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/reusable-docker-ghcr.yml
    with:
      component: control-plane-api
      image-name: control-plane-api
      environment: ${{ github.event.inputs.environment || 'dev' }}
      platforms: linux/amd64
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    secrets: inherit

  # === GitOps Deploy: dispatch to stoa-infra → ArgoCD syncs ===
  deploy:
    needs: docker
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-gitops-deploy.yml
    with:
      component: control-plane-api
      image-tag: ${{ needs.docker.outputs.image-tag }}
      environment: ${{ github.event.inputs.environment || 'dev' }}
      environment-url: https://api.gostoa.dev
      verify-endpoint: https://api.gostoa.dev/health
    secrets: inherit

  # === Smoke Test: health checks after deploy (Tier 1) ===
  # Full E2E with personas runs nightly (e2e-nightly.yml)
  smoke-test:
    needs: deploy
    if: needs.deploy.result == 'success'
    uses: ./.github/workflows/reusable-health-smoke.yml
    with:
      component: control-plane-api
      environment: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      contents: read

  # === Notify: Slack ===
  notify:
    needs: [ci, docker, deploy, smoke-test]
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/reusable-notify.yml
    with:
      component: Control Plane API
      environment: ${{ github.event.inputs.environment || 'dev' }}
      ci-result: ${{ needs.ci.outputs.test-result }}
      deploy-result: ${{ needs.deploy.result }}
      smoke-result: ${{ needs.smoke-test.result }}
    secrets: inherit
