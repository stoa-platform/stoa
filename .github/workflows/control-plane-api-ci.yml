# =============================================================================
# GitHub Actions: Control Plane API CI/CD
# =============================================================================
# Thin orchestrator — delegates to reusable workflows (ADR-031)
# Deployment via GitOps: CI pushes image → dispatches to stoa-infra → ArgoCD syncs
# =============================================================================

name: Control Plane API CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'control-plane-api/**'
      - '.github/workflows/control-plane-api-ci.yml'
      - '.github/workflows/reusable-python-ci.yml'
      - '.github/workflows/reusable-docker-ghcr.yml'
      - '.github/workflows/reusable-gitops-deploy.yml'
      - '.github/actions/**'

  pull_request:
    branches:
      - main
    paths:
      - 'control-plane-api/**'
      - '.github/workflows/control-plane-api-ci.yml'
      - '.github/workflows/reusable-python-ci.yml'
      - '.github/actions/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  id-token: write
  checks: write
  attestations: write

jobs:
  # === CI: lint + mypy + pytest + coverage ===
  ci:
    uses: ./.github/workflows/reusable-python-ci.yml
    with:
      component: control-plane-api
      python-version: '3.11'
      coverage-threshold: 65
      test-markers: not integration
      runner: ubuntu-latest
    permissions:
      contents: read
      checks: write

  # === Integration Tests: real PostgreSQL ===
  # CAB-2114: avoid self-hosted runner port collisions by starting postgres
  # in a step with a dynamic host port + run-scoped container name, instead of
  # a workflow-level `services:` block that hardcodes 5432:5432.
  integration:
    name: Integration Tests
    needs: ci
    runs-on: self-hosted
    env:
      PG_CONTAINER: stoa-int-pg-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'
          working-directory: control-plane-api

      - name: Prune leaked integration-test containers (>1h old)
        run: |
          set -u
          for cid in $(docker ps -q --filter "label=stoa-int-test=1"); do
            started=$(docker inspect --format '{{.State.StartedAt}}' "$cid" 2>/dev/null || true)
            [ -z "$started" ] && continue
            started_epoch=$(date -d "$started" +%s 2>/dev/null || echo 0)
            age=$(( $(date +%s) - started_epoch ))
            if [ "$age" -gt 3600 ]; then
              echo "Pruning leaked container $cid (age ${age}s)"
              docker rm -f "$cid" || true
            fi
          done

      - name: Start postgres with dynamic host port
        run: |
          set -euo pipefail
          docker run -d --rm \
            --name "$PG_CONTAINER" \
            --label stoa-int-test=1 \
            -e POSTGRES_USER=stoa_test \
            -e POSTGRES_PASSWORD=stoa_test \
            -e POSTGRES_DB=stoa_test \
            -p 5432 \
            --health-cmd pg_isready \
            --health-interval 10s \
            --health-timeout 5s \
            --health-retries 5 \
            postgres:16
          PG_PORT=$(docker port "$PG_CONTAINER" 5432/tcp | head -1 | awk -F: '{print $NF}')
          echo "Postgres bound on host port $PG_PORT"
          echo "PG_PORT=$PG_PORT" >> "$GITHUB_ENV"

      - name: Wait for postgres to be ready
        run: |
          for i in $(seq 1 30); do
            if docker exec "$PG_CONTAINER" pg_isready -U stoa_test -d stoa_test >/dev/null 2>&1; then
              echo "Postgres ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Postgres failed to become ready"
          docker logs "$PG_CONTAINER" || true
          exit 1

      - name: Run adapter boundary tests (CAB-1951)
        working-directory: control-plane-api
        env:
          STOA_ENABLE_KAFKA_CONSUMERS: 'false'  # CAB-2085
          ENABLE_DEPLOYMENT_WORKER: 'false'
          ENABLE_SNAPSHOT_CONSUMER: 'false'
        run: |
          pytest tests/test_int_webmethods_adapter.py -v --tb=short

      - name: Run DB integration tests
        working-directory: control-plane-api
        env:
          DATABASE_URL: postgresql+asyncpg://stoa_test:stoa_test@localhost:${{ env.PG_PORT }}/stoa_test
          STOA_ENABLE_KAFKA_CONSUMERS: 'false'  # CAB-2085
          ENABLE_DEPLOYMENT_WORKER: 'false'
          ENABLE_SNAPSHOT_CONSUMER: 'false'
        run: |
          pytest tests/ -v -m integration --ignore=tests/test_opensearch.py --tb=short --junit-xml=junit-integration.xml

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: control-plane-api/junit-integration.xml

      - name: Stop postgres
        if: always()
        run: docker rm -f "$PG_CONTAINER" || true

  # === Docker: build + push GHCR ===
  docker:
    needs: ci
    if: |
      needs.ci.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/reusable-docker-ghcr.yml
    with:
      component: control-plane-api
      image-name: control-plane-api
      environment: ${{ github.event.inputs.environment || 'dev' }}
      platforms: linux/amd64
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    secrets: inherit

  # === GitOps Deploy to Dev: dispatch to stoa-infra → ArgoCD syncs ===
  deploy:
    needs: docker
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-gitops-deploy.yml
    with:
      component: control-plane-api
      image-tag: ${{ needs.docker.outputs.image-tag }}
      environment: dev
      environment-url: https://dev-api.gostoa.dev
      verify-endpoint: https://dev-api.gostoa.dev/health
    secrets: inherit

  # === Smoke Test: health checks after deploy (Tier 1) ===
  smoke-test:
    needs: deploy
    if: needs.deploy.result == 'success'
    uses: ./.github/workflows/reusable-health-smoke.yml
    with:
      component: control-plane-api
      environment: dev
    permissions:
      contents: read

  # === Notify: Slack ===
  notify:
    needs: [ci, docker, deploy, smoke-test]
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/reusable-notify.yml
    with:
      component: Control Plane API
      environment: dev
      ci-result: ${{ needs.ci.outputs.test-result }}
      deploy-result: ${{ needs.deploy.result }}
      smoke-result: ${{ needs.smoke-test.result }}
    secrets: inherit
