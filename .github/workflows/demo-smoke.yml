name: Demo Smoke Observation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      blocking:
        description: "Fail the job when the demo smoke fails"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  demo-smoke:
    name: Demo Smoke (observation)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DEMO_SMOKE_BLOCKING: ${{ inputs.blocking || vars.DEMO_SMOKE_BLOCKING || 'false' }}
      POSTGRES_PASSWORD: stoa
      KEYCLOAK_ADMIN_PASSWORD: admin
      OPENSEARCH_ADMIN_PASSWORD: admin
      OPENSEARCH_DASHBOARDS_PASSWORD: admin
      OPENSEARCH_LOGWRITER_PASSWORD: admin
      OPENSEARCH_OIDC_CLIENT_SECRET: x
      STOA_DISABLE_AUTH: "true"
      GATEWAY_URL: http://localhost:8081

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Boot demo smoke stack
        shell: bash
        run: |
          set -euo pipefail

          docker compose -f deploy/docker-compose/docker-compose.yml --profile demo up --build -d \
            postgres keycloak control-plane-api stoa-gateway mock-backend

          for url in \
            "http://localhost:8000/health" \
            "http://localhost:8081/health" \
            "http://localhost:9090/ping"
          do
            ok=0
            for attempt in {1..90}; do
              code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 5 "$url" 2>/dev/null || echo 000)"
              if [[ "$code" == "200" ]]; then
                ok=1
                break
              fi
              echo "waiting for $url (attempt $attempt/90, code=$code)"
              sleep 5
            done
            if [[ "$ok" != "1" ]]; then
              echo "::warning::Demo stack readiness probe did not reach 200 for $url"
            fi
          done

          docker compose -f deploy/docker-compose/docker-compose.yml --profile demo ps

      - name: Run demo smoke in observation mode
        id: smoke
        shell: bash
        run: |
          set -uo pipefail

          mkdir -p artifacts/demo-smoke
          SYNTAX_LOG="artifacts/demo-smoke/bash-n.log"
          SMOKE_LOG="artifacts/demo-smoke/demo-smoke.log"
          TAIL_LOG="artifacts/demo-smoke/demo-smoke-tail.log"

          echo "## Demo Smoke Observation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Blocking mode | \`${DEMO_SMOKE_BLOCKING}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Command | \`./scripts/demo-smoke-test.sh --no-observability-ui\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GATEWAY_URL | \`${GATEWAY_URL}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          bash -n scripts/demo-smoke-test.sh >"$SYNTAX_LOG" 2>&1
          SYNTAX_EXIT=$?

          set +e
          ./scripts/demo-smoke-test.sh --no-observability-ui >"$SMOKE_LOG" 2>&1
          SMOKE_EXIT=$?
          set -e

          tail -n 80 "$SMOKE_LOG" > "$TAIL_LOG"
          VERDICT="$(grep -E 'Verdict:' "$SMOKE_LOG" | tail -1 | sed 's/^[[:space:]]*//' || true)"
          BLOCKER="$(grep -E '\[FAIL\]' "$SMOKE_LOG" | tail -1 | sed 's/^[[:space:]]*//' || true)"
          VERDICT="${VERDICT:-Verdict: UNKNOWN}"
          BLOCKER="${BLOCKER:-No [FAIL] line found in log tail}"

          echo "syntax_exit=$SYNTAX_EXIT" >> "$GITHUB_OUTPUT"
          echo "smoke_exit=$SMOKE_EXIT" >> "$GITHUB_OUTPUT"
          {
            echo "verdict<<EOF"
            echo "$VERDICT"
            echo "EOF"
            echo "blocker<<EOF"
            echo "$BLOCKER"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "| bash -n exit | \`${SYNTAX_EXIT}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| smoke exit | \`${SMOKE_EXIT}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| verdict | \`${VERDICT}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| blocker | \`${BLOCKER}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Last 80 Log Lines" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat "$TAIL_LOG" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$DEMO_SMOKE_BLOCKING" == "true" ]]; then
            if [[ "$SYNTAX_EXIT" -ne 0 || "$SMOKE_EXIT" -ne 0 ]]; then
              echo "::error::Demo smoke blocking mode failed (bash-n=${SYNTAX_EXIT}, smoke=${SMOKE_EXIT})"
              exit 1
            fi
          fi

          if [[ "$SMOKE_EXIT" -ne 0 ]]; then
            echo "::notice::Demo smoke is observation-only for now: ${VERDICT}; blocker=${BLOCKER}; exit=${SMOKE_EXIT}"
          fi

      - name: Upload demo smoke logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: demo-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/demo-smoke/
          retention-days: 7

      - name: Dump demo stack logs
        if: always()
        shell: bash
        run: |
          docker compose -f deploy/docker-compose/docker-compose.yml --profile demo logs --tail=120 \
            control-plane-api stoa-gateway mock-backend || true

      - name: Stop demo smoke stack
        if: always()
        shell: bash
        run: |
          docker compose -f deploy/docker-compose/docker-compose.yml --profile demo down -v --remove-orphans
