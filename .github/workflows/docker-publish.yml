# =============================================================================
# GitHub Actions: Publish Docker Images to GHCR
# =============================================================================
# STOA Platform - CAB-915 / CAB-1826
# Build multi-arch images and publish to GitHub Container Registry
# Used by the Quick Start docker-compose setup
#
# Trigger modes:
#   1. Release Please (workflow_call): builds only released components
#   2. Tag push (v* or component-v*): builds matching component(s)
#   3. Manual dispatch: builds selected services or all
# =============================================================================

name: Publish Docker Images

on:
  push:
    tags:
      - 'v*'                    # Legacy: monorepo-wide tag (builds all)
      - 'control-plane-api-v*'  # Per-component tags from Release Please
      - 'control-plane-ui-v*'
      - 'portal-v*'
      - 'stoa-gateway-v*'
  workflow_call:
    inputs:
      services:
        description: 'Comma-separated list of services to build'
        required: false
        type: string
        default: 'all'
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build (comma-separated, or "all")'
        required: false
        default: 'all'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ==========================================================================
  # Determine which services to build
  # ==========================================================================
  setup:
    name: Setup Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set build matrix
        id: set-matrix
        run: |
          ALL_SERVICES='["control-plane-api","control-plane-ui","keycloak","portal","stoa-gateway"]'

          # Priority 1: workflow_call services input (from Release Please)
          SERVICES_INPUT="${{ inputs.services }}"

          # Priority 2: tag-based detection
          TAG="${{ github.ref_name }}"

          if [ -n "$SERVICES_INPUT" ] && [ "$SERVICES_INPUT" != "all" ]; then
            # Build only the specified services
            MATRIX=$(echo "$SERVICES_INPUT" | tr ',' '\n' | jq -R . | jq -s -c '{service: .}')
            echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          elif echo "$TAG" | grep -qE '^(control-plane-api|control-plane-ui|portal|stoa-gateway)-v'; then
            # Component-scoped tag: extract service name
            SERVICE=$(echo "$TAG" | sed 's/-v[0-9].*//')
            echo "matrix={\"service\":[\"$SERVICE\"]}" >> $GITHUB_OUTPUT
          else
            # All services (legacy v* tag, manual dispatch "all", or empty)
            echo "matrix={\"service\":$ALL_SERVICES}" >> $GITHUB_OUTPUT
          fi

  # ==========================================================================
  # Build and Push Multi-Arch Images
  # ==========================================================================
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=match,pattern=${{ matrix.service }}-v(.*),group=1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push ${{ matrix.service }}
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          # Use repo root context for UI apps that depend on shared/
          context: ${{ (matrix.service == 'portal' || matrix.service == 'control-plane-ui') && '.' || format('./{0}', matrix.service) }}
          file: ./${{ matrix.service }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Sign image with Cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      - name: Generate SLSA provenance (attestation)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json
          upload-artifact: false

      - name: Attach SBOM to image
        run: |
          cosign attach sbom --sbom sbom-${{ matrix.service }}.spdx.json \
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}

      - name: Sign SBOM attestation
        run: |
          cosign attest --yes --predicate sbom-${{ matrix.service }}.spdx.json \
            --type spdxjson \
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}

      - name: Output image info
        run: |
          echo "### ${{ matrix.service }} Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # Summary
  # ==========================================================================
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Docker Images Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build matrix | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`ghcr.io\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick Start Usage" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "cd deploy/docker-compose" >> $GITHUB_STEP_SUMMARY
          echo "docker compose up -d" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
