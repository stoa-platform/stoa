# =============================================================================
# GitHub Actions: E2E Audit Report
# =============================================================================
# STOA Platform - CAB-1074
# Weekly E2E test audit with correction plan template
# =============================================================================

name: E2E Audit Report

on:
  # Weekly on Monday 6 AM UTC
  schedule:
    - cron: '0 6 * * 1'

  # Manual trigger
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  audit:
    name: E2E Audit
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Generate BDD tests
        working-directory: e2e
        run: npm run bddgen

      - name: Run full E2E suite
        working-directory: e2e
        continue-on-error: true
        env:
          STOA_PORTAL_URL: ${{ secrets.E2E_PORTAL_URL || 'https://portal.gostoa.dev' }}
          STOA_CONSOLE_URL: ${{ secrets.E2E_CONSOLE_URL || 'https://console.gostoa.dev' }}
          STOA_GATEWAY_URL: ${{ secrets.E2E_GATEWAY_URL || 'https://api.gostoa.dev' }}
          KEYCLOAK_URL: ${{ secrets.E2E_KEYCLOAK_URL || 'https://auth.gostoa.dev' }}
          KEYCLOAK_REALM: stoa
          PARZIVAL_USER: ${{ secrets.PARZIVAL_USER }}
          PARZIVAL_PASSWORD: ${{ secrets.PARZIVAL_PASSWORD }}
          ART3MIS_USER: ${{ secrets.ART3MIS_USER }}
          ART3MIS_PASSWORD: ${{ secrets.ART3MIS_PASSWORD }}
          AECH_USER: ${{ secrets.AECH_USER }}
          AECH_PASSWORD: ${{ secrets.AECH_PASSWORD }}
          SORRENTO_USER: ${{ secrets.SORRENTO_USER }}
          SORRENTO_PASSWORD: ${{ secrets.SORRENTO_PASSWORD }}
          I_R0K_USER: ${{ secrets.I_R0K_USER }}
          I_R0K_PASSWORD: ${{ secrets.I_R0K_PASSWORD }}
          ANORAK_USER: ${{ secrets.ANORAK_USER }}
          ANORAK_PASSWORD: ${{ secrets.ANORAK_PASSWORD }}
          ALEX_USER: ${{ secrets.ALEX_USER }}
          ALEX_PASSWORD: ${{ secrets.ALEX_PASSWORD }}
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
        run: |
          # Run auth-setup first
          npx playwright test --project=auth-setup || echo "Auth setup had failures"

          # Run all tests with JSON + HTML reporters
          npx playwright test --reporter=json,html || echo "Some tests failed"

      - name: Generate audit report
        working-directory: e2e
        run: node scripts/generate-audit.js

      - name: Post audit summary
        if: always()
        run: |
          if [ -f e2e/reports/audit-report.md ]; then
            cat e2e/reports/audit-report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## E2E Audit Report" >> $GITHUB_STEP_SUMMARY
            echo "Audit report generation failed." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-audit-report-${{ github.run_id }}
          path: |
            e2e/reports/audit-report.md
            e2e/reports/results.json
            e2e/reports/html/
          retention-days: 30

      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-audit-traces-${{ github.run_id }}
          path: e2e/test-results/
          retention-days: 14
