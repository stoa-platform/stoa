# =============================================================================
# E2E Smoke Tests (Mocked Backend)
# =============================================================================
# Builds Console UI and runs 10 page-load tests with mocked API responses.
# No live backend required — catches UI rendering regressions in PRs.
# =============================================================================

name: E2E Smoke (Mocked)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'control-plane-ui/**'
      - 'shared/**'
      - 'e2e/smoke-mock/**'
      - '.github/workflows/e2e-smoke-mock.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke-mock:
    name: Mocked Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install shared dependencies
        run: cd shared && npm ci --ignore-scripts --legacy-peer-deps

      - name: Install Console dependencies
        working-directory: control-plane-ui
        run: npm ci

      - name: Build Console
        working-directory: control-plane-ui
        env:
          VITE_API_URL: http://localhost:4173/api
          VITE_KEYCLOAK_URL: http://localhost:4173/auth
          VITE_BASE_DOMAIN: localhost
        run: npm run build

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run mocked smoke tests
        working-directory: e2e/smoke-mock
        run: npx playwright test --config=playwright.config.ts

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-mock-results
          path: e2e/test-results/smoke-mock/
          retention-days: 7
