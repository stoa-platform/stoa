# =============================================================================
# E2E Visual Regression (Docker-based pixel comparison)
# =============================================================================
# Compares Console + Portal screenshots against golden baselines.
# Runs in Playwright Docker container for pixel-consistent rendering.
# No live backend required (mocked API responses).
#
# DISABLED on pull_request — see CAB-2178 (2026-04-26).
#
# Why:
#   The mock auth path in `e2e/smoke-mock/mock-routes.ts` does not actually
#   authenticate cp-ui / portal at boot. Every route renders the React error
#   boundary ("Something went wrong"), so all goldens captured via this config
#   are screenshots of that same error screen. CI therefore reports either
#   ~83% pixel diff (placeholder goldens, since CAB-1994 / 2026-04-05) or a
#   fake-green pass against an error-boundary baseline.
#
# Re-enable when:
#   1. Mock OIDC client init is fixed so cp-ui + portal render real pages
#   2. Goldens are regenerated under that path (mcr.microsoft.com/playwright:
#      v1.58.2-jammy with --update-snapshots)
#   3. MD5s of regenerated goldens are distinct per page (sanity check)
#
# To run manually in the meantime: `gh workflow run e2e-visual-regression.yml`
# =============================================================================

name: E2E Visual Regression

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    container:
      # IMPORTANT: tag must match the chromium bundled with `e2e/package.json`
      # `@playwright/test`. Goldens in `e2e/golden/` were captured under
      # chromium-1217 (Playwright 1.58.x). Bumping the npm dep without
      # regenerating goldens triggers ~83% pixel diff. Process:
      #   1. Bump @playwright/test in e2e/package.json
      #   2. Bump this image to the matching v<major>.<minor>.<patch>-jammy
      #   3. Regenerate goldens via docker (see e2e CLAUDE.md)
      #   4. Commit goldens + lockfile + workflow in the same PR
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install shared dependencies
        run: cd shared && npm ci --ignore-scripts --legacy-peer-deps

      - name: Install & build Console
        working-directory: control-plane-ui
        env:
          VITE_API_URL: http://localhost:4173/api
          VITE_KEYCLOAK_URL: http://localhost:4173/auth
          VITE_BASE_DOMAIN: localhost
        run: npm ci && npm run build

      - name: Install & build Portal
        working-directory: portal
        env:
          VITE_API_URL: http://localhost:4174/api
          VITE_KEYCLOAK_URL: http://localhost:4174/auth
          VITE_BASE_DOMAIN: localhost
        run: npm ci && npx vite build

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Run Console visual tests
        working-directory: e2e
        run: npx playwright test --config=visual/playwright.config.ts --project=console-visual

      - name: Run Portal visual tests
        working-directory: e2e
        run: npx playwright test --config=visual/playwright.config.ts --project=portal-visual

      - name: Upload diff artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-diffs-${{ github.run_id }}
          path: e2e/test-results/visual/
          retention-days: 14
