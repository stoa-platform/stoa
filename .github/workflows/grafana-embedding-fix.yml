# One-shot: Enable Grafana iframe embedding for Console Operations page
# Delete this workflow after successful execution.
name: Fix Grafana Embedding

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  patch:
    name: Enable Grafana embedding
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Find Grafana deployment
        id: find
        run: |
          # Find the Grafana deployment (kube-prometheus-stack names it with a prefix)
          GRAFANA_DEPLOY=$(kubectl get deployments -n stoa-monitoring -o name 2>/dev/null | grep grafana || true)
          if [ -z "$GRAFANA_DEPLOY" ]; then
            echo "Trying stoa-system namespace..."
            GRAFANA_DEPLOY=$(kubectl get deployments -n stoa-system -o name 2>/dev/null | grep grafana || true)
            echo "namespace=stoa-system" >> "$GITHUB_OUTPUT"
          else
            echo "namespace=stoa-monitoring" >> "$GITHUB_OUTPUT"
          fi
          echo "deployment=$GRAFANA_DEPLOY" >> "$GITHUB_OUTPUT"
          echo "Found: $GRAFANA_DEPLOY"

      - name: Patch Grafana env vars
        run: |
          NS="${{ steps.find.outputs.namespace }}"
          DEPLOY="${{ steps.find.outputs.deployment }}"

          if [ -z "$DEPLOY" ]; then
            echo "::error::No Grafana deployment found in stoa-monitoring or stoa-system"
            exit 1
          fi

          echo "Patching $DEPLOY in namespace $NS..."

          kubectl set env "$DEPLOY" -n "$NS" \
            GF_SECURITY_ALLOW_EMBEDDING=true \
            GF_AUTH_ANONYMOUS_ENABLED=true \
            GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer

          echo "Waiting for rollout..."
          kubectl rollout status "$DEPLOY" -n "$NS" --timeout=120s

          echo "Verifying env vars..."
          kubectl get "$DEPLOY" -n "$NS" -o jsonpath='{.spec.template.spec.containers[0].env[*].name}' | tr ' ' '\n' | grep -E "GF_SECURITY|GF_AUTH_ANONYMOUS"

      - name: Verify Grafana headers
        run: |
          echo "Waiting 30s for pod to be ready..."
          sleep 30

          # Check from within the cluster
          NS="${{ steps.find.outputs.namespace }}"
          SVC=$(kubectl get svc -n "$NS" -o name | grep grafana | head -1)
          if [ -n "$SVC" ]; then
            SVC_NAME=$(echo "$SVC" | sed 's|service/||')
            echo "Checking headers via port-forward..."
            kubectl run curl-test --rm -i --restart=Never --image=curlimages/curl -n "$NS" -- \
              curl -sI "http://${SVC_NAME}.${NS}.svc.cluster.local:80/grafana/" 2>/dev/null | grep -i "x-frame" || echo "No X-Frame-Options header (good!)"
          fi
