# =============================================================================
# GitHub Actions: Helm Lint
# =============================================================================
# STOA Platform - CAB-1074
# Validate Helm charts on changes
# =============================================================================

name: Helm Lint

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - '.github/workflows/helm-lint.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'charts/**'
      - '.github/workflows/helm-lint.yml'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint Helm Charts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Helm
        uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3
        with:
          version: v3.14.0

      - name: Lint stoa-platform chart
        run: helm lint charts/stoa-platform

      - name: Template stoa-platform chart (dry-run)
        run: helm template stoa-platform charts/stoa-platform > /dev/null

      - name: Lint stoa-observability chart
        run: helm lint charts/stoa-observability

      - name: Template stoa-observability chart (dry-run)
        run: helm template stoa-observability charts/stoa-observability > /dev/null

  # Notify stoa-infra when Helm charts change on main
  notify-infra:
    name: Notify stoa-infra
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Dispatch to stoa-infra
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          token: ${{ secrets.STOA_INFRA_DISPATCH_TOKEN }}
          repository: PotoMitan/stoa-infra
          event-type: helm-chart-updated
          client-payload: '{"source": "stoa", "ref": "${{ github.sha }}"}'
