# =============================================================================
# GitHub Actions: Keycloak Theme Build
# =============================================================================
# Build and push STOA-themed Keycloak image to GHCR
# =============================================================================

name: Keycloak Theme Build

on:
  push:
    branches:
      - main
    paths:
      - 'keycloak/**'
      - '.github/workflows/keycloak-theme.yml'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/stoa-platform/keycloak

jobs:
  build:
    name: Build Keycloak Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: keycloak
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:25.0-stoa
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Disable cache to ensure theme changes are always picked up
          no-cache: true
