# =============================================================================
# GitHub Actions: Keycloak Theme Build
# =============================================================================
# Build and push STOA-themed Keycloak image to GHCR
# =============================================================================

name: Keycloak Theme Build

on:
  push:
    branches:
      - main
    paths:
      - 'keycloak/**'
      - '.github/workflows/keycloak-theme.yml'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/stoa-platform/keycloak

jobs:
  build:
    name: Build Keycloak Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: keycloak
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:25.0-stoa
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Disable cache to ensure theme changes are always picked up
          no-cache: true
