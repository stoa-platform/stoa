# Detect tickets stuck in "In Review" on Linear without a linked GitHub PR.
# Runs daily at 07:00 UTC (before standup). Posts a warning comment on offending tickets.
# Kill-switch: set DISABLE_REVIEW_DRIFT_DETECTOR=true in repo variables.
#
# CAB-2053 Phase 2 bug class #5 — 14% of "In Review" tickets had no PR evidence.

name: Linear Review Drift Detector

on:
  schedule:
    - cron: '0 7 * * 1-5'  # weekdays 07:00 UTC
  workflow_dispatch:  # manual trigger for testing

permissions:
  contents: read

jobs:
  detect-drift:
    if: vars.DISABLE_REVIEW_DRIFT_DETECTOR != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (for gh CLI context)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github

      - name: Find zombie In Review tickets
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          TEAM_ID: 624a9948-a160-4e47-aba5-7f9404d23506
        run: |
          if [ -z "$LINEAR_API_KEY" ]; then
            echo "LINEAR_API_KEY not set — skipping"
            exit 0
          fi

          # Query Linear for all "In Review" tickets in team CAB-ING
          QUERY='{ issues(filter: { team: { id: { eq: "'"$TEAM_ID"'" } }, state: { name: { eq: "In Review" } } }, first: 100) { nodes { id identifier title createdAt updatedAt } } }'
          ISSUES=$(curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"$QUERY\"}")

          COUNT=$(echo "$ISSUES" | jq '.data.issues.nodes | length')
          echo "Found $COUNT tickets in 'In Review' state"

          if [ "$COUNT" -eq 0 ]; then
            echo "No tickets in Review — all clean"
            exit 0
          fi

          # For each ticket, check if a PR exists on GitHub
          ZOMBIES=""
          ZOMBIE_COUNT=0

          echo "$ISSUES" | jq -r '.data.issues.nodes[] | "\(.identifier)|\(.title)"' | while IFS='|' read -r TICKET_ID TITLE; do
            # Search GitHub for PRs referencing this ticket (open or merged)
            PR_COUNT=$(gh pr list --state all --limit 5 --search "$TICKET_ID in:title" --json number 2>/dev/null | jq 'length' 2>/dev/null || echo "0")

            if [ "$PR_COUNT" -eq 0 ]; then
              echo "🚨 ZOMBIE: $TICKET_ID — $TITLE (no PR found)"
              ZOMBIE_COUNT=$((ZOMBIE_COUNT + 1))

              # Post warning comment on the Linear ticket
              COMMENT_BODY="🚨 **Review drift detected** — this ticket is in 'In Review' but no GitHub PR references \`${TICKET_ID}\` in its title.\n\nPer \`feedback_linear_in_review.md\`: 'In Review' requires an open PR. Either:\n1. Create a PR and reference \`${TICKET_ID}\` in the title\n2. Move back to 'Todo' if work hasn't started\n3. Move to 'Done' if the work was completed via another ticket's PR\n\n*Auto-detected by review-drift-detector workflow*"

              ISSUE_UUID=$(echo "$ISSUES" | jq -r --arg id "$TICKET_ID" '.data.issues.nodes[] | select(.identifier == $id) | .id')

              if [ -n "$ISSUE_UUID" ]; then
                COMMENT_MUTATION='mutation { commentCreate(input: { issueId: "'"$ISSUE_UUID"'", body: "'"$COMMENT_BODY"'" }) { success } }'
                curl -s -X POST https://api.linear.app/graphql \
                  -H "Authorization: $LINEAR_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d "{\"query\": \"$COMMENT_MUTATION\"}" > /dev/null
                echo "  → Warning comment posted on $TICKET_ID"
              fi
            else
              echo "✅ $TICKET_ID — $PR_COUNT PR(s) found"
            fi
          done

          echo ""
          echo "=== Summary ==="
          echo "Total In Review: $COUNT"
          echo "Check complete."
