name: Regression Guard

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  check-regression-test:
    name: Regression Test Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Check for regression test coverage
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # Detect if this PR is a bug fix
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body -q '.body' 2>/dev/null || echo "")

          IS_FIX="false"

          # Check title for fix() or hotfix() prefix
          if echo "$PR_TITLE" | grep -qiE '^(fix|hotfix)\('; then
            IS_FIX="true"
            echo "Detected fix PR via title: $PR_TITLE"
          fi

          # Check body for bug/fix keywords (per Council adjustment)
          if echo "$PR_BODY" | grep -qiE '(regression|bug.?fix|fixes #|fixes CAB-|root cause)'; then
            IS_FIX="true"
            echo "Detected fix PR via body keywords"
          fi

          if [ "$IS_FIX" = "false" ]; then
            echo "Not a fix PR — skipping regression test check"
            echo "is_fix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "is_fix=true" >> "$GITHUB_OUTPUT"

          # Get changed files in this PR
          CHANGED_FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" 2>/dev/null || git diff --name-only HEAD~1)

          # Check if any regression test was added/modified
          HAS_REGRESSION="false"

          # Python regression tests
          if echo "$CHANGED_FILES" | grep -qE 'test_regression_'; then
            HAS_REGRESSION="true"
            echo "Found Python regression test"
          fi

          # TypeScript regression tests
          if echo "$CHANGED_FILES" | grep -qE 'regression/.*\.test\.(ts|tsx)'; then
            HAS_REGRESSION="true"
            echo "Found TypeScript regression test"
          fi

          # Rust regression tests (inline, detected via diff content)
          if echo "$CHANGED_FILES" | grep -qE '\.rs$'; then
            # Check if any Rust file has a new regression_ test function
            if git diff "origin/${{ github.base_ref }}...HEAD" -- '*.rs' 2>/dev/null | grep -qE '^\+.*fn regression_'; then
              HAS_REGRESSION="true"
              echo "Found Rust regression test"
            fi
          fi

          # E2E regression-tagged scenarios
          if echo "$CHANGED_FILES" | grep -qE '\.feature$'; then
            if git diff "origin/${{ github.base_ref }}...HEAD" -- '*.feature' 2>/dev/null | grep -qE '^\+.*@regression'; then
              HAS_REGRESSION="true"
              echo "Found E2E regression scenario"
            fi
          fi

          echo "has_regression=$HAS_REGRESSION" >> "$GITHUB_OUTPUT"

      - name: Post warning annotation
        if: steps.check.outputs.is_fix == 'true' && steps.check.outputs.has_regression == 'false'
        run: |
          echo "::warning::This PR appears to be a bug fix but has no regression test. Consider adding a test prefixed with \`test_regression_\` (Python), \`regression/\` directory (TS), or \`fn regression_\` (Rust) to prevent this bug from recurring."

      - name: Post success annotation
        if: steps.check.outputs.is_fix == 'true' && steps.check.outputs.has_regression == 'true'
        run: |
          echo "::notice::Regression test detected — good practice!"
