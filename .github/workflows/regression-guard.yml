name: Regression Guard

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-regression-test:
    name: Regression Test Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Check for regression test coverage
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # --- Label bypass: skip-regression ---
          LABELS=$(gh pr view "$PR_NUMBER" --json labels -q '.labels[].name' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -qx 'skip-regression'; then
            echo "skip-regression label found — bypassing regression test check"
            echo "is_fix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Detect if this PR is a bug fix
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body -q '.body' 2>/dev/null || echo "")

          IS_FIX="false"

          # Check title for fix() or hotfix() prefix
          if echo "$PR_TITLE" | grep -qiE '^(fix|hotfix)\('; then
            IS_FIX="true"
            echo "Detected fix PR via title: $PR_TITLE"
          fi

          # Check body for bug/fix keywords — only if title is NOT feat/chore/refactor/docs
          # (avoids false positives when feat PRs mention "regression" in context)
          if ! echo "$PR_TITLE" | grep -qiE '^(feat|chore|refactor|docs|style|perf|test|ci|build)\(' \
             && echo "$PR_BODY" | grep -qiE '(fixes regression|regression fix|bug.?fix|fixes #|fixes CAB-|root cause)'; then
            IS_FIX="true"
            echo "Detected fix PR via body keywords"
          fi

          if [ "$IS_FIX" = "false" ]; then
            echo "Not a fix PR — skipping regression test check"
            echo "is_fix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "is_fix=true" >> "$GITHUB_OUTPUT"

          # --- Docs-only bypass: fix() PRs that only touch docs/config ---
          CODE_CHANGES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" 2>/dev/null \
            | grep -vE '\.(md|yml|yaml|json|toml)$' \
            | grep -vE '^\.claude/' \
            | grep -vE '^\.github/' \
            | head -1 || true)
          if [ -z "$CODE_CHANGES" ]; then
            echo "Fix PR only touches docs/config — regression test not required"
            echo "is_fix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get changed files in this PR
          CHANGED_FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" 2>/dev/null || git diff --name-only HEAD~1)

          # Check if any regression test was added/modified
          HAS_REGRESSION="false"

          # Python regression tests
          if echo "$CHANGED_FILES" | grep -qE 'test_regression_'; then
            HAS_REGRESSION="true"
            echo "Found Python regression test"
          fi

          # TypeScript regression tests
          if echo "$CHANGED_FILES" | grep -qE 'regression/.*\.test\.(ts|tsx)'; then
            HAS_REGRESSION="true"
            echo "Found TypeScript regression test"
          fi

          # Rust regression tests (inline, detected via diff content)
          if echo "$CHANGED_FILES" | grep -qE '\.rs$'; then
            # Check if any Rust file has a new regression_ test function
            if git diff "origin/${{ github.base_ref }}...HEAD" -- '*.rs' 2>/dev/null | grep -qE '^\+.*fn regression_'; then
              HAS_REGRESSION="true"
              echo "Found Rust regression test"
            fi
          fi

          # Go regression tests (inline, detected via diff content). Accept
          # either a new test func explicitly named TestRegression*, or a
          # comment of the form `// regression for CAB-XXXX` next to a test.
          if echo "$CHANGED_FILES" | grep -qE '_test\.go$'; then
            if git diff "origin/${{ github.base_ref }}...HEAD" -- '*_test.go' 2>/dev/null \
                | grep -qE '^\+.*(func TestRegression|// [Rr]egression for CAB-|// [Rr]egression test for CAB-)'; then
              HAS_REGRESSION="true"
              echo "Found Go regression test"
            fi
          fi

          # E2E regression-tagged scenarios
          if echo "$CHANGED_FILES" | grep -qE '\.feature$'; then
            if git diff "origin/${{ github.base_ref }}...HEAD" -- '*.feature' 2>/dev/null | grep -qE '^\+.*@regression'; then
              HAS_REGRESSION="true"
              echo "Found E2E regression scenario"
            fi
          fi

          echo "has_regression=$HAS_REGRESSION" >> "$GITHUB_OUTPUT"

      - name: Fail — no regression test
        if: steps.check.outputs.is_fix == 'true' && steps.check.outputs.has_regression == 'false'
        run: |
          echo "::error::This fix PR has no regression test. Add a test to prevent this bug from recurring:"
          echo "  - Python: test_regression_cab_XXXX_description() in tests/test_regression_*.py"
          echo "  - TypeScript: describe('regression/CAB-XXXX', ...) in src/__tests__/regression/"
          echo "  - Rust: fn regression_description() in #[cfg(test)] mod tests"
          echo "  - Go: func TestRegressionCABxxxx() or a '// regression for CAB-xxxx' comment in *_test.go"
          echo "  - E2E: @regression tag on Gherkin scenario"
          echo ""
          echo "If this fix truly cannot have a regression test, add the 'skip-regression' label."
          exit 1

      - name: Pass — regression test found
        if: steps.check.outputs.is_fix == 'true' && steps.check.outputs.has_regression == 'true'
        run: |
          echo "::notice::Regression test detected — good practice!"
