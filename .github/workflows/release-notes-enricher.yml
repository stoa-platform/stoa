# Release Notes Enricher — AI-powered release bullet generation
# On each merge to main, extracts PR metadata, calls Sonnet to rewrite as
# user-facing bullet, and posts on the open release-please PR.
# Kill-switch: set DISABLE_RELEASE_ENRICHER=true in repo variables.

name: Release Notes Enricher

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: read

concurrency:
  group: release-enricher-${{ github.sha }}
  cancel-in-progress: false

jobs:
  enrich:
    if: vars.DISABLE_RELEASE_ENRICHER != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract PR metadata
        id: extract
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "commit_msg<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMIT_MSG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Extract PR number from squash merge commit (GitHub adds "(#NNN)" suffix)
          PR_NUM=$(echo "$COMMIT_MSG" | head -1 | grep -oP '\(#\K[0-9]+(?=\))' || echo "")
          echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"

          # Extract conventional commit type and scope
          COMMIT_TYPE=$(echo "$COMMIT_MSG" | head -1 | grep -oP '^[a-z]+(?=[\(!:])' || echo "other")
          COMMIT_SCOPE=$(echo "$COMMIT_MSG" | head -1 | grep -oP '(?<=\()[a-z-]+(?=\))' || echo "")
          echo "commit_type=$COMMIT_TYPE" >> "$GITHUB_OUTPUT"
          echo "commit_scope=$COMMIT_SCOPE" >> "$GITHUB_OUTPUT"

          # Detect breaking change
          IS_BREAKING="false"
          if echo "$COMMIT_MSG" | head -1 | grep -qP '^[a-z]+!'; then
            IS_BREAKING="true"
          fi
          if echo "$COMMIT_MSG" | grep -qi 'BREAKING CHANGE:'; then
            IS_BREAKING="true"
          fi
          echo "is_breaking=$IS_BREAKING" >> "$GITHUB_OUTPUT"

          # Map scope to component display name
          case "$COMMIT_SCOPE" in
            api)      COMPONENT="Control Plane API" ;;
            gateway)  COMPONENT="STOA Gateway" ;;
            ui)       COMPONENT="Console" ;;
            portal)   COMPONENT="Developer Portal" ;;
            helm)     COMPONENT="Helm Chart" ;;
            mcp)      COMPONENT="MCP Gateway" ;;
            ci)       COMPONENT="CI/CD" ;;
            deps)     COMPONENT="Dependencies" ;;
            security) COMPONENT="Security" ;;
            docs)     COMPONENT="Documentation" ;;
            e2e)      COMPONENT="E2E Tests" ;;
            *)        COMPONENT="Platform" ;;
          esac
          echo "component=$COMPONENT" >> "$GITHUB_OUTPUT"

          # Extract PR body if we have a PR number
          PR_BODY=""
          if [ -n "$PR_NUM" ]; then
            PR_BODY=$(gh pr view "$PR_NUM" --json body -q .body 2>/dev/null || echo "")
          fi
          echo "pr_body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$PR_BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Extract ticket ID (CAB-XXXX) from commit or PR body
          TICKET_ID=$(echo "$COMMIT_MSG" "$PR_BODY" | grep -oP 'CAB-\d+' | head -1 || echo "")
          echo "ticket_id=$TICKET_ID" >> "$GITHUB_OUTPUT"

          # Get files changed
          FILES_CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | head -20 | tr '\n' ', ' || echo "")
          echo "files_changed=$FILES_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Skip non-releasable commits
        id: filter
        run: |
          TYPE="${{ steps.extract.outputs.commit_type }}"
          # Skip chore, ci, test, style, docs-only changes (unless breaking)
          SKIP="false"
          if [ "${{ steps.extract.outputs.is_breaking }}" = "true" ]; then
            SKIP="false"
          elif echo "$TYPE" | grep -qP '^(chore|ci|test|style|build)$'; then
            SKIP="true"
          fi
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"

      - name: Find open release-please PR
        if: steps.filter.outputs.skip != 'true'
        id: find-rp-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Release Please creates PRs with title "chore(main): release X.Y.Z"
          RP_PR=$(gh pr list --state open --json number,title --jq '.[] | select(.title | test("^chore\\(main\\): release")) | .number' | head -1)
          echo "rp_pr=$RP_PR" >> "$GITHUB_OUTPUT"
          if [ -z "$RP_PR" ]; then
            echo "No open release-please PR found. Skipping enrichment."
          else
            echo "Found release-please PR #$RP_PR"
          fi

      - name: Enrich with AI
        if: |
          steps.filter.outputs.skip != 'true' &&
          steps.find-rp-pr.outputs.rp_pr != '' &&
          secrets.ANTHROPIC_API_KEY != ''
        id: enrich
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in CI. Skip session-startup protocol entirely.
            Do NOT read memory.md, plan.md, or operations.log.
            Focus exclusively on the task below.

            Rewrite this commit into a concise, user-facing release note bullet.

            COMMIT: ${{ steps.extract.outputs.commit_msg }}
            TYPE: ${{ steps.extract.outputs.commit_type }}
            COMPONENT: ${{ steps.extract.outputs.component }}
            BREAKING: ${{ steps.extract.outputs.is_breaking }}
            TICKET: ${{ steps.extract.outputs.ticket_id }}
            PR: #${{ steps.extract.outputs.pr_num }}
            FILES: ${{ steps.extract.outputs.files_changed }}

            PR BODY (context):
            ${{ steps.extract.outputs.pr_body }}

            RULES:
            1. Write ONE bullet point (1-2 sentences max)
            2. Start with a verb: "Add", "Fix", "Improve", "Remove", "Update"
            3. Focus on WHAT changed for the USER, not implementation details
            4. Include the PR reference at the end: (#NNN)
            5. If BREAKING=true, start with "**BREAKING**: "
            6. If there's a ticket ID, include it: (CAB-XXXX, #NNN)
            7. Do NOT mention file paths, function names, or internal details
            8. Do NOT use markdown headers, just the bullet text

            EXAMPLES:
            - Add multi-provider LLM routing with automatic failover between OpenAI, Anthropic, and Azure endpoints (#1234)
            - Fix portal search returning incorrect results when query contains special characters (CAB-1044, #1156)
            - **BREAKING**: Remove deprecated `/v1/legacy-sync` endpoint — use `/v1/sync` instead (CAB-1200, #1189)

            Output ONLY the bullet text. Nothing else. No markdown fences, no explanations.
          claude_args: "--model claude-sonnet-4-6 --max-turns 3 --allowedTools Read,Glob,Grep"
        continue-on-error: true

      - name: Build and post comment
        if: |
          steps.filter.outputs.skip != 'true' &&
          steps.find-rp-pr.outputs.rp_pr != ''
        env:
          EXEC_FILE: ${{ steps.enrich.outputs.execution_file }}
          COMPONENT: ${{ steps.extract.outputs.component }}
          IS_BREAKING: ${{ steps.extract.outputs.is_breaking }}
          PR_NUM: ${{ steps.extract.outputs.pr_num }}
          COMMIT_MSG: ${{ steps.extract.outputs.commit_msg }}
          RP_PR: ${{ steps.find-rp-pr.outputs.rp_pr }}
          GH_TOKEN: ${{ github.token }}
        run: |
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)

          # Try to extract AI-enriched bullet from Claude output
          ENRICHED=""
          if [ -n "$EXEC_FILE" ] && [ -f "$EXEC_FILE" ]; then
            ENRICHED=$(jq -r '
              [.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | last // empty
            ' "$EXEC_FILE" 2>/dev/null || echo "")
            # Clean up: remove markdown fences if present
            ENRICHED=$(echo "$ENRICHED" | sed 's/^```[a-z]*//;s/^```//;/^$/d' | head -5)
            # Remove leading "- " if present (we add our own formatting)
            ENRICHED=$(echo "$ENRICHED" | sed 's/^- //')
          fi

          # Fallback to raw commit message if enrichment failed
          if [ -z "$ENRICHED" ]; then
            ENRICHED="$FIRST_LINE"
            LABEL="raw"
          else
            LABEL="ai-enriched"
          fi

          # Build the comment body to a temp file (avoids shell quoting issues)
          {
            if [ "$IS_BREAKING" = "true" ]; then
              echo "> [!CAUTION]"
              echo "> **BREAKING CHANGE** — Review the upgrade guide before releasing."
              echo ""
            fi
            echo "### ${COMPONENT}"
            echo "- ${ENRICHED}"
            echo ""
            echo "<sub>${LABEL} | PR #${PR_NUM} | $(date -u +%Y-%m-%d)</sub>"
          } > /tmp/rn-comment.md

          # Post on release-please PR
          gh pr comment "$RP_PR" --body-file /tmp/rn-comment.md
          echo "Posted enriched release note on PR #$RP_PR"
          cat /tmp/rn-comment.md

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Release Notes Enricher"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Commit | \`$(git log -1 --pretty=%h)\` |"
            echo "| Type | ${{ steps.extract.outputs.commit_type }} |"
            echo "| Component | ${{ steps.extract.outputs.component }} |"
            echo "| Breaking | ${{ steps.extract.outputs.is_breaking }} |"
            echo "| Ticket | ${{ steps.extract.outputs.ticket_id }} |"
            echo "| PR | #${{ steps.extract.outputs.pr_num }} |"
            echo "| Skipped | ${{ steps.filter.outputs.skip }} |"
            echo "| RP PR | ${{ steps.find-rp-pr.outputs.rp_pr || 'none' }} |"
          } >> "$GITHUB_STEP_SUMMARY"
