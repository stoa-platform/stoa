# =============================================================================
# GitHub Actions: Required Checks — Branch Protection Gates
# =============================================================================
# Lightweight workflow containing the 3 branch-protection required checks.
# Extracted from security-scan.yml to avoid trigger delays caused by the
# heavy 15-job security workflow (SAST, container scans, dependency audits).
#
# NO concurrency group — each PR run completes independently, no cancellation.
# =============================================================================

name: Required Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ==========================================================================
  # 1. Verify Signed Commits (warning only — Gate 6A policy)
  # ==========================================================================
  # Policy: bots exempt; human commits before baseline grandfathered; human
  # commits at/after baseline must be GPG-signed (warning only at Gate 6A).
  # Baseline and exemption rules live in .github/scripts/check-signed-commits.py.
  # Gate 6B will flip continue-on-error off after a stabilization window.
  verify-signatures:
    name: Verify Signed Commits
    runs-on: ubuntu-latest
    continue-on-error: true # Warning only (Gate 6A)
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Self-test signed-commits checker
        run: python3 .github/scripts/check-signed-commits.py --self-test

      - name: Verify commit signatures
        shell: bash
        run: |
          set -u
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            if git cat-file -e "$BASE_SHA" 2>/dev/null && git cat-file -e "$HEAD_SHA" 2>/dev/null; then
              mapfile -t COMMITS < <(git log --format='%H' "${BASE_SHA}..${HEAD_SHA}")
            else
              echo "::warning::Could not resolve PR commit range, falling back to last 10 commits"
              mapfile -t COMMITS < <(git log --format='%H' -10)
            fi
          else
            mapfile -t COMMITS < <(git log --format='%H' -10)
          fi

          if [ "${#COMMITS[@]}" -eq 0 ]; then
            {
              echo "## Commit Signature Verification"
              echo ""
              echo "_No commits in range._"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          python3 .github/scripts/check-signed-commits.py \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            "${COMMITS[@]}"

  # ==========================================================================
  # 2. License Compliance (Trivy SPDX)
  # ==========================================================================
  license-compliance:
    name: License Compliance
    runs-on: ubuntu-latest
    continue-on-error: true # Warning only for copyleft
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Trivy DB
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-trivy-

      - name: Scan licenses
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'spdx-json'
          output: 'licenses.spdx.json'
          scanners: 'license'

      - name: Self-test copyleft checker
        run: python3 .github/scripts/check-copyleft.py --self-test

      - name: Check for copyleft licenses
        run: |
          echo "## License Compliance" >> $GITHUB_STEP_SUMMARY
          if [ -f licenses.spdx.json ]; then
            COPYLEFT=$(python3 .github/scripts/check-copyleft.py licenses.spdx.json 2>/dev/null || echo "")
            if [ -n "$COPYLEFT" ]; then
              echo "::warning::Copyleft licenses detected:"
              echo "$COPYLEFT"
              echo "$COPYLEFT" >> $GITHUB_STEP_SUMMARY
            else
              echo "No copyleft licenses detected :white_check_mark:" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Upload license report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: license-report
          path: licenses.spdx.json
          retention-days: 30

  # ==========================================================================
  # 3. SBOM Generation (Trivy CycloneDX + SPDX)
  # ==========================================================================
  sbom-generation:
    name: SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Trivy DB
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-trivy-

      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'sbom-cyclonedx.json'

      - name: Generate SPDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'spdx-json'
          output: 'sbom-spdx.json'

      - name: Upload SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: |
            sbom-cyclonedx.json
            sbom-spdx.json
          retention-days: 90

      - name: SBOM summary
        run: |
          echo "## SBOM Generation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Format | File |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| CycloneDX | sbom-cyclonedx.json |" >> $GITHUB_STEP_SUMMARY
          echo "| SPDX | sbom-spdx.json |" >> $GITHUB_STEP_SUMMARY
