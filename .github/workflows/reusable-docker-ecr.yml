name: Reusable Docker Build (ECR)

on:
  workflow_call:
    inputs:
      component:
        description: 'Component directory (Docker context)'
        required: true
        type: string
      ecr-repository:
        description: 'ECR repository name (e.g., apim/control-plane-api)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: false
        type: string
        default: 'dev'
      platforms:
        description: 'Docker target platforms'
        required: false
        type: string
        default: 'linux/amd64'
      build-args:
        description: 'Docker build-args (newline-separated KEY=VALUE)'
        required: false
        type: string
        default: ''
      use-monorepo-context:
        description: 'Use repo root as build context (for shared/ dependencies)'
        required: false
        type: boolean
        default: false
    outputs:
      image-tag:
        description: 'Full image tag (registry/repo:env-sha)'
        value: ${{ jobs.docker.outputs.image_tag }}
      image-digest:
        description: 'Image digest'
        value: ${{ jobs.docker.outputs.image_digest }}

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: 848853684735.dkr.ecr.eu-west-1.amazonaws.com

jobs:
  docker:
    name: Build Docker Image (${{ inputs.component }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      image_tag: ${{ env.ECR_REGISTRY }}/${{ inputs.ecr-repository }}:${{ inputs.environment }}-${{ github.sha }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Docker metadata
        uses: ./.github/actions/docker-metadata
        with:
          aws-role-arn: arn:aws:iam::848853684735:role/github-actions-stoa-infra
          aws-region: ${{ env.AWS_REGION }}
          ecr-registry: ${{ env.ECR_REGISTRY }}
          ecr-repository: ${{ inputs.ecr-repository }}
          environment: ${{ inputs.environment }}
          platforms: ${{ inputs.platforms }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ${{ inputs.use-monorepo-context && '.' || inputs.component }}
          file: ${{ inputs.use-monorepo-context && format('{0}/Dockerfile', inputs.component) || format('{0}/Dockerfile', inputs.component) }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ inputs.ecr-repository }}:${{ inputs.environment }}-${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ inputs.ecr-repository }}:${{ inputs.environment }}-latest
            ${{ env.ECR_REGISTRY }}/${{ inputs.ecr-repository }}:latest
          cache-from: type=gha,scope=${{ inputs.component }}
          cache-to: type=gha,mode=max,scope=${{ inputs.component }}
          build-args: ${{ inputs.build-args }}

      - name: Generate SLSA provenance (attestation)
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-name: ${{ env.ECR_REGISTRY }}/${{ inputs.ecr-repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Job Summary
        run: |
          echo "### ${{ inputs.component }} Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.ECR_REGISTRY }}/${{ inputs.ecr-repository }}:${{ inputs.environment }}-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** ${{ inputs.platforms }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**SLSA Provenance:** :white_check_mark: Attested" >> $GITHUB_STEP_SUMMARY
