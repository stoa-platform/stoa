name: Reusable Docker Build (GHCR)

on:
  workflow_call:
    inputs:
      component:
        description: 'Component directory (Docker context)'
        required: true
        type: string
      image-name:
        description: 'GHCR image name (e.g., control-plane-api)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: false
        type: string
        default: 'dev'
      platforms:
        description: 'Docker target platforms'
        required: false
        type: string
        default: 'linux/amd64'
      build-args:
        description: 'Docker build-args (newline-separated KEY=VALUE)'
        required: false
        type: string
        default: ''
      use-monorepo-context:
        description: 'Use repo root as build context (for shared/ dependencies)'
        required: false
        type: boolean
        default: false
    outputs:
      image-tag:
        description: 'Full image tag (registry/repo:env-sha)'
        value: ${{ jobs.docker.outputs.image_tag }}
      image-digest:
        description: 'Image digest'
        value: ${{ jobs.docker.outputs.image_digest }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/stoa-platform/${{ inputs.image-name }}

jobs:
  docker:
    name: Build Docker Image (${{ inputs.component }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image_tag: ${{ env.IMAGE_NAME }}:${{ inputs.environment }}-${{ github.sha }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        if: contains(inputs.platforms, 'arm64')
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.environment }}-${{ github.sha }}
            type=raw,value=${{ inputs.environment }}-latest
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ inputs.use-monorepo-context && '.' || inputs.component }}
          file: ${{ format('{0}/Dockerfile', inputs.component) }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.component }}
          cache-to: type=gha,mode=max,scope=${{ inputs.component }}
          build-args: ${{ inputs.build-args }}

      - name: Generate SLSA provenance (attestation)
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Job Summary
        run: |
          echo "### ${{ inputs.component }} Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}:${{ inputs.environment }}-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** ${{ inputs.platforms }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**SLSA Provenance:** :white_check_mark: Attested" >> $GITHUB_STEP_SUMMARY
