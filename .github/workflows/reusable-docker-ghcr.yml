name: Reusable Docker Build (GHCR)

on:
  workflow_call:
    inputs:
      component:
        description: 'Component directory (Docker context)'
        required: true
        type: string
      image-name:
        description: 'GHCR image name (e.g., control-plane-api)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: false
        type: string
        default: 'dev'
      platforms:
        description: 'Docker target platforms'
        required: false
        type: string
        default: 'linux/amd64'
      build-args:
        description: 'Docker build-args (newline-separated KEY=VALUE)'
        required: false
        type: string
        default: ''
      use-monorepo-context:
        description: 'Use repo root as build context (for shared/ dependencies)'
        required: false
        type: boolean
        default: false
    outputs:
      image-tag:
        description: 'Full image tag (registry/repo:env-sha)'
        value: ${{ jobs.docker.outputs.image_tag }}
      image-digest:
        description: 'Image digest'
        value: ${{ jobs.docker.outputs.image_digest }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/stoa-platform/${{ inputs.image-name }}

jobs:
  docker:
    name: Build Docker Image (${{ inputs.component }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image_tag: ${{ env.IMAGE_NAME }}:${{ inputs.environment }}-${{ github.sha }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        if: contains(inputs.platforms, 'arm64')
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.environment }}-${{ github.sha }}
            type=raw,value=${{ inputs.environment }}-latest
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ inputs.use-monorepo-context && '.' || inputs.component }}
          file: ${{ format('{0}/Dockerfile', inputs.component) }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.component }}
          cache-to: type=gha,mode=max,scope=${{ inputs.component }}
          build-args: |
            ${{ inputs.build-args }}
            CACHEBUST=${{ github.sha }}

      - name: Generate SLSA provenance (attestation)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Job Summary
        run: |
          echo "### ${{ inputs.component }} Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}:${{ inputs.environment }}-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** ${{ inputs.platforms }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**SLSA Provenance:** :white_check_mark: Attested" >> $GITHUB_STEP_SUMMARY
