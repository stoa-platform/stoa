# =============================================================================
# Reusable Health Smoke Test — Tier 1 post-deploy verification
# =============================================================================
# curl-based health checks against 5 production endpoints.
# Zero auth required, runs in ~30s, catches real deploy failures:
#   pod crash, ingress misconfiguration, Keycloak down, image pull error.
#
# For full E2E with Playwright + personas, see e2e-nightly.yml (Tier 2).
# =============================================================================

name: Reusable Health Smoke Test

on:
  workflow_call:
    inputs:
      component:
        description: 'Component that was just deployed (for logging)'
        required: true
        type: string
      environment:
        description: 'Target environment (dev, prod)'
        required: false
        type: string
        default: 'dev'

permissions: {}

jobs:
  health-check:
    name: Health Smoke (${{ inputs.component }})
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Wait for rollout to converge
        run: |
          set -uo pipefail
          # Poll the just-deployed component's own endpoint until it serves,
          # instead of a fixed sleep — a 2-pod ArgoCD rollout routinely takes
          # longer than 30s and the smoke raced it red on every gateway
          # deploy (CAB-2227).
          case "${{ inputs.component }}" in
            stoa-gateway)      url="https://mcp.gostoa.dev/health/ready" ;;
            control-plane-api) url="https://api.gostoa.dev/health" ;;
            portal)            url="https://portal.gostoa.dev" ;;
            control-plane-ui)  url="https://console.gostoa.dev" ;;
            *)                 url="" ;;
          esac
          if [ -z "$url" ]; then
            echo "No rollout-wait URL for ${{ inputs.component }}; sleeping 30s"
            sleep 30
            exit 0
          fi
          echo "Waiting for $url to converge (up to 5 min)..."
          for i in $(seq 1 60); do
            s=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null || echo 000)
            if [ "$s" = "200" ]; then
              echo "Ready after ~$((i * 5))s (HTTP $s)"
              exit 0
            fi
            echo "  attempt $i: HTTP $s"
            sleep 5
          done
          # Timed out — let the checks below run and fail with real detail
          # (a component unready after 5 min IS a genuine smoke failure).
          echo "::warning::$url not ready after 5 min — running checks anyway"

      - name: Health checks
        run: |
          set -euo pipefail
          PASS=0; FAIL=0

          check() {
            local name="$1" url="$2" expected="${3:-200}"
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 --retry 2 --retry-delay 5 "$url") || status="000"
            if [ "$status" = "$expected" ]; then
              echo "  $name: $status"
              PASS=$((PASS+1))
            else
              echo "  $name: $status (expected $expected)"
              FAIL=$((FAIL+1))
            fi
          }

          echo "Health checks for gostoa.dev (after ${{ inputs.component }} deploy)"
          echo "---"

          check "API Health"      "https://api.gostoa.dev/health"
          check "Gateway Health"  "https://mcp.gostoa.dev/health/ready"
          check "Portal"          "https://portal.gostoa.dev"
          check "Console"         "https://console.gostoa.dev"
          check "Keycloak OIDC"   "https://auth.gostoa.dev/realms/stoa/.well-known/openid-configuration"

          echo "---"
          echo "Results: $PASS passed, $FAIL failed (component: ${{ inputs.component }})"
          [ "$FAIL" -eq 0 ] || exit 1
