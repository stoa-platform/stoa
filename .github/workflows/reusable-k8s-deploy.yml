name: Reusable Kubernetes Deploy

on:
  workflow_call:
    inputs:
      component:
        description: 'Component/deployment name in k8s'
        required: true
        type: string
      image-tag:
        description: 'Full Docker image tag to deploy'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: false
        type: string
        default: 'dev'
      namespace:
        description: 'Kubernetes namespace'
        required: false
        type: string
        default: 'stoa-system'
      environment-url:
        description: 'Environment URL (for GitHub environment)'
        required: false
        type: string
        default: ''
      verify-endpoint:
        description: 'URL for post-deploy verification'
        required: false
        type: string
        default: ''
      expected-status:
        description: 'Expected HTTP status from verify-endpoint'
        required: false
        type: string
        default: '200'
    outputs:
      previous-image:
        description: 'Previous deployment image (for rollback)'
        value: ${{ jobs.deploy.outputs.previous_image }}

jobs:
  deploy:
    name: Deploy ${{ inputs.component }} to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.environment-url }}
    outputs:
      previous_image: ${{ steps.save-state.outputs.previous_image }}

    steps:
      - name: Configure kubeconfig
        id: kubeconfig
        run: |
          if [ -n "${{ secrets.KUBECONFIG_B64 }}" ]; then
            mkdir -p ~/.kube
            echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
            chmod 600 ~/.kube/config
            echo "CLUSTER_READY=true" >> $GITHUB_OUTPUT
          else
            echo "CLUSTER_READY=false" >> $GITHUB_OUTPUT
            echo "::warning::KUBECONFIG_B64 secret not set. Skipping deployment."
          fi
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}

      - name: Save current deployment state for rollback
        id: save-state
        if: steps.kubeconfig.outputs.CLUSTER_READY == 'true'
        run: |
          PREV_IMAGE=$(kubectl get deployment/${{ inputs.component }} -n ${{ inputs.namespace }} \
            -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "none")  # intentional: deployment may not exist yet
          echo "previous_image=$PREV_IMAGE" >> $GITHUB_OUTPUT
          echo "Previous image: $PREV_IMAGE"

      - name: Deploy
        if: steps.kubeconfig.outputs.CLUSTER_READY == 'true'
        run: |
          echo "Deploying ${{ inputs.component }} with image: ${{ inputs.image-tag }}"
          kubectl set image deployment/${{ inputs.component }} \
            ${{ inputs.component }}=${{ inputs.image-tag }} \
            -n ${{ inputs.namespace }}
          kubectl rollout restart deployment/${{ inputs.component }} -n ${{ inputs.namespace }}
          if ! kubectl rollout status deployment/${{ inputs.component }} \
            -n ${{ inputs.namespace }} --timeout=300s; then
            echo "::error::Rollout failed, triggering rollback"
            kubectl rollout undo deployment/${{ inputs.component }} -n ${{ inputs.namespace }}
            exit 1
          fi

      - name: Diagnose failure
        if: failure() && steps.kubeconfig.outputs.CLUSTER_READY == 'true'
        run: |
          # Diagnostic commands - || true is intentional to collect all available debug info
          echo "=== Deployment Description ==="
          kubectl describe deployment/${{ inputs.component }} -n ${{ inputs.namespace }} || true
          echo ""
          echo "=== ReplicaSets ==="
          kubectl get rs -n ${{ inputs.namespace }} -l app=${{ inputs.component }} -o wide || \
            kubectl get rs -n ${{ inputs.namespace }} -l app.kubernetes.io/name=${{ inputs.component }} -o wide || true
          echo ""
          echo "=== Pods ==="
          kubectl get pods -n ${{ inputs.namespace }} -l app=${{ inputs.component }} -o wide || \
            kubectl get pods -n ${{ inputs.namespace }} -l app.kubernetes.io/name=${{ inputs.component }} -o wide || true
          echo ""
          echo "=== Container Logs (last 50 lines) ==="
          POD=$(kubectl get pods -n ${{ inputs.namespace }} -l app=${{ inputs.component }} \
            --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}' 2>/dev/null) || true
          if [ -n "$POD" ]; then
            kubectl logs "$POD" -n ${{ inputs.namespace }} --tail=50 2>&1 || true
            echo ""
            echo "=== Previous Container Logs ==="
            kubectl logs "$POD" -n ${{ inputs.namespace }} --previous --tail=30 2>&1 || true
          fi
          echo ""
          echo "=== Recent Events (last 10 min) ==="
          kubectl get events -n ${{ inputs.namespace }} --sort-by='.lastTimestamp' | tail -30 || true
          echo ""
          echo "=== Node Resources ==="
          kubectl top nodes 2>/dev/null || kubectl get nodes -o wide || true

      - name: Verify deployment
        if: steps.kubeconfig.outputs.CLUSTER_READY == 'true'
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployment ${{ inputs.component }} -n ${{ inputs.namespace }}
          echo ""
          echo "=== Pods ==="
          kubectl get pods -n ${{ inputs.namespace }} -l app=${{ inputs.component }} -o wide || \
            kubectl get pods -n ${{ inputs.namespace }} -l app.kubernetes.io/name=${{ inputs.component }} -o wide || true

      - name: Post-deploy endpoint check
        if: steps.kubeconfig.outputs.CLUSTER_READY == 'true' && inputs.verify-endpoint != ''
        run: |
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ inputs.verify-endpoint }}" || echo "000")  # intentional: network failure returns safe default
          echo "Endpoint check: HTTP $HTTP_CODE (expected ${{ inputs.expected-status }})"
          if [ "$HTTP_CODE" = "${{ inputs.expected-status }}" ]; then
            echo "Endpoint verification PASSED"
          else
            echo "::warning::Endpoint returned $HTTP_CODE (expected ${{ inputs.expected-status }})"
          fi

      - name: Deploy Summary
        if: always()
        run: |
          echo "### ${{ inputs.component }} Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ inputs.image-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Previous | \`${{ steps.save-state.outputs.previous_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
