# =============================================================================
# Reusable Promote — Deploy an existing dev image to prod via GitOps
# =============================================================================
# Promotes a dev-tagged GHCR image to prod by dispatching to stoa-infra.
# ArgoCD auto-syncs the change to the production cluster.
#
# Pattern: verify image exists → dispatch to stoa-infra → health check
# =============================================================================

name: Reusable Promote to Prod

on:
  workflow_call:
    inputs:
      component:
        description: 'Component name matching stoa-infra chart (e.g., control-plane-api)'
        required: true
        type: string
      image-name:
        description: 'GHCR image name (e.g., control-plane-api, portal)'
        required: true
        type: string
      sha:
        description: 'Git SHA of the image to promote'
        required: true
        type: string
      source-env:
        description: 'Source environment tag prefix'
        required: false
        type: string
        default: 'dev'
      environment:
        description: 'Target environment (for secrets access)'
        required: false
        type: string
        default: 'prod'

env:
  IMAGE_TAG: ghcr.io/stoa-platform/${{ inputs.image-name }}:${{ inputs.source-env }}-${{ inputs.sha }}

jobs:
  promote:
    name: Promote ${{ inputs.component }} to prod
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Verify image exists in GHCR
        run: |
          echo "Checking image: ${{ env.IMAGE_TAG }}"
          if ! docker manifest inspect "${{ env.IMAGE_TAG }}" > /dev/null 2>&1; then
            echo "::error::Image ${{ env.IMAGE_TAG }} not found in GHCR"
            exit 1
          fi
          echo "Image verified"

      - name: Dispatch image update to stoa-infra (prod)
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          token: ${{ secrets.STOA_INFRA_DISPATCH_TOKEN }}
          repository: PotoMitan/stoa-infra
          event-type: image-updated
          client-payload: >-
            {
              "component": "${{ inputs.component }}",
              "image_tag": "${{ env.IMAGE_TAG }}",
              "environment": "prod",
              "sha": "${{ inputs.sha }}",
              "source_repo": "${{ github.repository }}",
              "source_workflow": "promote-to-prod",
              "source_run_id": "${{ github.run_id }}"
            }

      - name: Wait for ArgoCD sync + health check
        run: |
          echo "Waiting for ArgoCD to sync ${{ inputs.component }} in prod..."
          sleep 30

          TIMEOUT=180
          INTERVAL=15
          ELAPSED=0
          PASS=0; FAIL=0

          check() {
            local name="$1" url="$2"
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 --retry 3 --retry-delay 5 "$url") || status="000"
            if [ "$status" = "200" ]; then
              echo "  $name: $status"
              PASS=$((PASS+1))
            else
              echo "  $name: $status (expected 200)"
              FAIL=$((FAIL+1))
            fi
          }

          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            PASS=0; FAIL=0
            echo "Post-deploy prod health checks (${ELAPSED}s elapsed)"
            echo "---"
            check "API Health"      "https://api.gostoa.dev/health"
            check "Gateway Health"  "https://mcp.gostoa.dev/health/ready"
            check "Portal"          "https://portal.gostoa.dev"
            check "Console"         "https://console.gostoa.dev"
            check "Keycloak OIDC"   "https://auth.gostoa.dev/realms/stoa/.well-known/openid-configuration"
            echo "---"
            echo "Results: $PASS passed, $FAIL failed"

            if [ "$FAIL" -eq 0 ]; then
              echo "All prod endpoints healthy"
              exit 0
            fi

            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "::warning::Some prod endpoints unhealthy after ${TIMEOUT}s — check ArgoCD sync status manually"

      - name: Promote Summary
        if: always()
        run: |
          echo "### ${{ inputs.component }} Promotion to Prod (GitOps)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Component | ${{ inputs.component }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ inputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Method | GitOps (stoa-infra → ArgoCD) |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
