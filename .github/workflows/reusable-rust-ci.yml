name: Reusable Rust CI

on:
  workflow_call:
    inputs:
      component:
        description: 'Crate directory'
        required: true
        type: string
      cargo-features:
        description: 'Cargo feature flags for clippy/test (default: --all-features)'
        required: false
        type: string
        default: '--all-features'
      runner:
        description: 'Runner label (e.g., ubuntu-latest or self-hosted)'
        required: false
        type: string
        default: 'ubuntu-latest'
      coverage-threshold:
        description: 'Minimum line coverage percentage'
        required: false
        type: number
        default: 60
    outputs:
      test-result:
        description: 'Test result (success/failure)'
        value: ${{ jobs.ci.outputs.result }}
      coverage-pct:
        description: 'Line coverage percentage'
        value: ${{ jobs.ci.outputs.coverage_pct }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  ci:
    name: Rust CI
    runs-on: ${{ inputs.runner }}
    outputs:
      result: ${{ steps.set-result.outputs.result }}
      coverage_pct: ${{ steps.extract-cov.outputs.coverage_pct }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.component }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies for rdkafka
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev cmake

      - uses: ./.github/actions/setup-rust-env
        with:
          components: clippy,rustfmt
          working-directory: ${{ inputs.component }}

      - name: Setup sccache
        id: sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true
        env:
          SCCACHE_GHA_ENABLED: 'true'

      - name: Enable sccache wrapper (if available)
        if: steps.sccache.outcome == 'success'
        run: |
          if sccache --start-server 2>/dev/null && sccache --show-stats 2>/dev/null; then
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
            echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
            echo "sccache available — compilation cache enabled"
          else
            echo "sccache not functional — proceeding without it"
          fi

      # --- Step 1: Format check (no compilation, instant) ---
      - name: Check formatting
        run: cargo fmt --all -- --check

      # --- Step 2: Clippy (first compilation — cached by sccache across runs) ---
      - name: Clippy lint
        run: cargo clippy --all-targets ${{ inputs.cargo-features }} -- -D warnings

      # --- Step 3: Tests (reuses clippy compilation artifacts) ---
      - name: Run tests
        run: cargo test ${{ inputs.cargo-features }}

      # --- Step 4: Coverage (reuses test artifacts via llvm-cov) ---
      - name: Cache cargo-llvm-cov binary
        id: cache-llvm-cov
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cargo/bin/cargo-llvm-cov
          key: cargo-llvm-cov-${{ runner.os }}-v0.6

      - name: Install cargo-llvm-cov
        if: steps.cache-llvm-cov.outputs.cache-hit != 'true'
        env:
          RUSTC_WRAPPER: ''
        run: cargo install cargo-llvm-cov --locked

      - name: Install llvm-tools-preview
        run: rustup component add llvm-tools-preview

      - name: Run coverage
        env:
          RUSTC_WRAPPER: ''
        run: cargo llvm-cov ${{ inputs.cargo-features }} --summary-only 2>&1 | tee /tmp/cov-summary.txt

      - name: Extract coverage percentage
        id: extract-cov
        run: |
          COV_PCT=$(grep -oP 'TOTAL\s+\d+\s+\d+\s+\K[\d.]+' /tmp/cov-summary.txt || echo "0")
          echo "coverage_pct=$COV_PCT" >> $GITHUB_OUTPUT
          echo "Coverage: $COV_PCT%"

      - name: Enforce coverage threshold
        run: |
          COV_PCT="${{ steps.extract-cov.outputs.coverage_pct }}"
          THRESHOLD=${{ inputs.coverage-threshold }}
          echo "Coverage: ${COV_PCT}% (threshold: ${THRESHOLD}%)"
          if [ "$(echo "$COV_PCT < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COV_PCT}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      # --- Step 5: sccache stats ---
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      # --- Summary ---
      - name: Job Summary
        if: always()
        run: |
          COV_PCT="${{ steps.extract-cov.outputs.coverage_pct }}"
          THRESHOLD=${{ inputs.coverage-threshold }}
          if [ "$(echo "$COV_PCT < $THRESHOLD" | bc -l 2>/dev/null || echo 0)" -eq 1 ]; then
            COV_STATUS=":warning: BELOW THRESHOLD"
          else
            COV_STATUS=":white_check_mark:"
          fi
          echo "## ${{ inputs.component }} Rust CI" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| cargo fmt | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| cargo clippy | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| cargo test | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| coverage (${COV_PCT}%) | ${COV_STATUS} |" >> $GITHUB_STEP_SUMMARY

      - name: Set result output
        id: set-result
        if: always()
        run: echo "result=${{ job.status }}" >> $GITHUB_OUTPUT

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: /tmp/cov-summary.txt
          retention-days: 30
