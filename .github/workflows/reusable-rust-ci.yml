name: Reusable Rust CI

on:
  workflow_call:
    inputs:
      component:
        description: 'Crate directory'
        required: true
        type: string
      run-audit:
        description: 'Run cargo audit'
        required: false
        type: boolean
        default: true
      cargo-features:
        description: 'Cargo feature flags for clippy/test (default: --all-features)'
        required: false
        type: string
        default: '--all-features'
      runner:
        description: 'Runner label (e.g., ubuntu-latest or self-hosted)'
        required: false
        type: string
        default: 'ubuntu-latest'
    outputs:
      test-result:
        description: 'Test result (success/failure)'
        value: ${{ jobs.test.outputs.result }}
      coverage-pct:
        description: 'Line coverage percentage'
        value: ${{ jobs.coverage.outputs.coverage_pct }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Check Formatting
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.component }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust-env
        with:
          components: rustfmt
          working-directory: ${{ inputs.component }}
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lint
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.component }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install system dependencies for rdkafka
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev cmake
      - uses: ./.github/actions/setup-rust-env
        with:
          components: clippy
          working-directory: ${{ inputs.component }}
      - run: cargo clippy --all-targets ${{ inputs.cargo-features }} -- -D warnings

  test:
    name: Run Tests
    runs-on: ${{ inputs.runner }}
    needs: clippy
    outputs:
      result: ${{ steps.set-result.outputs.result }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.component }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install system dependencies for rdkafka
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev cmake
      - uses: ./.github/actions/setup-rust-env
        with:
          working-directory: ${{ inputs.component }}
      - run: cargo test ${{ inputs.cargo-features }}
      - name: Job Summary
        if: always()
        run: |
          echo "## ${{ inputs.component }} Rust CI" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| cargo fmt | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| cargo clippy | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| cargo test | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY

      - name: Set result output
        id: set-result
        if: always()
        run: echo "result=${{ job.status }}" >> $GITHUB_OUTPUT

  coverage:
    name: Code Coverage
    runs-on: ${{ inputs.runner }}
    needs: clippy
    outputs:
      coverage_pct: ${{ steps.extract.outputs.coverage_pct }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.component }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install system dependencies for rdkafka
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev cmake
      - uses: ./.github/actions/setup-rust-env
        with:
          working-directory: ${{ inputs.component }}
      - name: Cache cargo-llvm-cov binary
        id: cache-llvm-cov
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cargo/bin/cargo-llvm-cov
          key: cargo-llvm-cov-${{ runner.os }}-v0.6
      - name: Install cargo-llvm-cov
        if: steps.cache-llvm-cov.outputs.cache-hit != 'true'
        run: cargo install cargo-llvm-cov --locked
      - name: Install llvm-tools-preview
        run: rustup component add llvm-tools-preview
      - name: Run coverage
        run: cargo llvm-cov ${{ inputs.cargo-features }} --summary-only 2>&1 | tee /tmp/cov-summary.txt
      - name: Extract coverage percentage
        id: extract
        run: |
          COV_PCT=$(grep -oP 'TOTAL\s+\d+\s+\d+\s+\K[\d.]+' /tmp/cov-summary.txt || echo "0")
          echo "coverage_pct=$COV_PCT" >> $GITHUB_OUTPUT
          echo "Coverage: $COV_PCT%"
      - name: Enforce coverage threshold
        run: |
          COV_PCT="${{ steps.extract.outputs.coverage_pct }}"
          THRESHOLD=60
          echo "Coverage: ${COV_PCT}% (threshold: ${THRESHOLD}%)"
          if [ "$(echo "$COV_PCT < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COV_PCT}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
      - name: Coverage summary
        if: always()
        run: |
          COV_PCT="${{ steps.extract.outputs.coverage_pct }}"
          THRESHOLD=60
          if [ "$(echo "$COV_PCT < $THRESHOLD" | bc -l 2>/dev/null || echo 0)" -eq 1 ]; then
            STATUS="⚠️ BELOW THRESHOLD"
          else
            STATUS="✅ PASS"
          fi
          echo "## Code Coverage" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Line coverage | ${COV_PCT}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Threshold | ${THRESHOLD}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-report
          path: /tmp/cov-summary.txt
          retention-days: 30

  bench-compile:
    name: Compile Benchmarks
    runs-on: ${{ inputs.runner }}
    needs: clippy
    continue-on-error: true
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.component }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install system dependencies for rdkafka
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev cmake
      - uses: ./.github/actions/setup-rust-env
        with:
          working-directory: ${{ inputs.component }}
      - name: Compile benchmarks (no-run)
        run: cargo bench --no-run ${{ inputs.cargo-features }}

  audit:
    name: Security Audit
    if: inputs.run-audit
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.component }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Cache cargo-audit binary
        id: cache-audit
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-v0.22
      - name: Install cargo-audit
        if: steps.cache-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked
      - run: cargo audit
