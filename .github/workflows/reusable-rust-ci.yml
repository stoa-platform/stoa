name: Reusable Rust CI

on:
  workflow_call:
    inputs:
      component:
        description: 'Crate directory'
        required: true
        type: string
      run-audit:
        description: 'Run cargo audit'
        required: false
        type: boolean
        default: true
    outputs:
      test-result:
        description: 'Test result (success/failure)'
        value: ${{ jobs.test.outputs.result }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Check Formatting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.component }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-rust-env
        with:
          components: rustfmt
          working-directory: ${{ inputs.component }}
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.component }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install system dependencies for rdkafka
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev cmake
      - uses: ./.github/actions/setup-rust-env
        with:
          components: clippy
          working-directory: ${{ inputs.component }}
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: clippy
    outputs:
      result: ${{ steps.set-result.outputs.result }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.component }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install system dependencies for rdkafka
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev cmake
      - uses: ./.github/actions/setup-rust-env
        with:
          working-directory: ${{ inputs.component }}
      - run: cargo test --all-features
      - name: Job Summary
        if: always()
        run: |
          echo "## ${{ inputs.component }} Rust CI" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| cargo fmt | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| cargo clippy | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| cargo test | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY

      - name: Set result output
        id: set-result
        if: always()
        run: echo "result=success" >> $GITHUB_OUTPUT

  audit:
    name: Security Audit
    if: inputs.run-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.component }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Cache cargo-audit binary
        id: cache-audit
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-v0.22
      - name: Install cargo-audit
        if: steps.cache-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked
      - run: cargo audit
