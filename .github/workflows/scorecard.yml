# =============================================================================
# GitHub Actions: OpenSSF Scorecard
# =============================================================================
# Monitors the security posture of the repository.
# Results are uploaded to GitHub Security tab.
# =============================================================================

name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * 1'  # Weekly Monday 5 AM UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    continue-on-error: true  # Private repos lack GraphQL access for Scorecard
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@2d3fe93d4896727350828f23e48f5391e6d3f022 # v3
        with:
          sarif_file: results.sarif
