# =============================================================================
# GitHub Actions: Security Scanning — CAB-979 CI Security Showcase
# =============================================================================
# STOA Platform — "Trust the compiler and the CI, not me."
# SAST, dependency audit, secrets, container scan.
# NOTE: The 3 branch-protection required checks (Verify Signed Commits,
# License Compliance, SBOM Generation) have been moved to required-checks.yml
# for faster, more reliable triggering on PRs.
# SLSA & Cosign deferred to CAB-400
# =============================================================================

name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *' # Daily 6:00 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ==========================================================================
  # 1. SAST — Rust (Clippy strict)
  # ==========================================================================
  sast-rust:
    name: SAST Rust (Clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stoa-gateway
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies for rdkafka
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev cmake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            stoa-gateway/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('stoa-gateway/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run Clippy
        run: |
          cargo clippy --all-targets --all-features -- \
            -W warnings \
            -D clippy::todo \
            -D clippy::unimplemented \
            -D clippy::dbg_macro \
            -W clippy::unwrap_used \
            -W clippy::expect_used \
            -W clippy::panic

  # ==========================================================================
  # 3. SAST — Python (Bandit)
  # ==========================================================================
  sast-python:
    name: SAST Python (Bandit)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [control-plane-api]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: |
          bandit -r ${{ matrix.project }}/ \
            -ll \
            -f json \
            -o bandit-${{ matrix.project }}.json \
            --exit-zero

          # Fail on MEDIUM+ severity and confidence
          bandit -r ${{ matrix.project }}/ --severity-level medium --confidence-level medium

      - name: Upload Bandit results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: bandit-${{ matrix.project }}
          path: bandit-${{ matrix.project }}.json
          retention-days: 30

  # ==========================================================================
  # 4. SAST — JavaScript (ESLint Security)
  # ==========================================================================
  sast-javascript:
    name: SAST JavaScript (ESLint)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [control-plane-ui, portal]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check project has ESLint configured
        id: check
        run: |
          if [ -f "${{ matrix.project }}/package.json" ] && grep -q '"eslint"' "${{ matrix.project }}/package.json"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::No ESLint config in ${{ matrix.project }}/, skipping"
          fi

      - name: Set up Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.project }}
        run: npm ci

      - name: Install ESLint security plugin
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.project }}
        run: npm install --no-save eslint-plugin-security

      - name: Run ESLint security report (non-blocking)
        if: steps.check.outputs.exists == 'true'
        continue-on-error: true  # Non-blocking: report is collected, blocking gate runs in next step
        working-directory: ${{ matrix.project }}
        run: |
          npx eslint 'src/**/*.{ts,tsx}' \
            --plugin security \
            --rule '{"security/detect-object-injection": "error", "security/detect-non-literal-regexp": "error", "security/detect-unsafe-regex": "error", "security/detect-buffer-noassert": "error", "security/detect-eval-with-expression": "error", "security/detect-no-csrf-before-method-override": "error", "security/detect-possible-timing-attacks": "error"}' \
            --max-warnings 0 \
            --format json --output-file eslint-security.json

      - name: Run ESLint security gate (blocking)
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.project }}
        run: |
          npx eslint 'src/**/*.{ts,tsx}' \
            --no-eslintrc \
            --parser @typescript-eslint/parser \
            --plugin security \
            --rule '{"security/detect-eval-with-expression": "error", "security/detect-unsafe-regex": "error"}' 2>&1 || {
            # Fallback: if --no-eslintrc fails (parser issues), run with project config
            echo "::warning::Falling back to project ESLint config"
            npx eslint 'src/**/*.{ts,tsx}' \
              --plugin security \
              --rule '{"security/detect-eval-with-expression": "error", "security/detect-unsafe-regex": "error"}' \
              --quiet
          }

  # ==========================================================================
  # 5. Dependency Scan (cargo/pip/npm audit)
  # ==========================================================================
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # --- Rust ---
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Cargo audit
        working-directory: stoa-gateway
        continue-on-error: true  # thiserror v1 transitive dep from prometheus — tracked
        run: cargo audit

      # --- Python ---
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Pip audit — control-plane-api
        continue-on-error: true  # tracked vulns (CVE-2024-23342), not blocking
        run: |
          if [ -f "control-plane-api/requirements.txt" ]; then
            # CVE-2024-23342: ecdsa Minerva timing attack — transitive dep of python-jose.
            # python-jose[cryptography] uses the 'cryptography' backend for all signing ops;
            # ecdsa is never exercised. Upstream (python-ecdsa) won't fix: side-channel
            # attacks are out of scope for that project. No replacement version available.
            pip-audit -r control-plane-api/requirements.txt --desc \
              --ignore-vuln CVE-2024-23342
          fi

      # --- JavaScript ---
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: NPM audit — control-plane-ui
        continue-on-error: true  # GHSA-3ppc-4f35-3m26 in dev chain, not blocking
        run: |
          if [ -f "control-plane-ui/package-lock.json" ]; then
            # --omit=dev: audit only production dependencies.
            # GHSA-3ppc-4f35-3m26 (minimatch ReDoS) is in @typescript-eslint/eslint-plugin
            # dev-dep chain. Not present in production runtime. Fix requires eslint v10
            # breaking upgrade; deferring until typescript-eslint v8 migration is planned.
            cd control-plane-ui && npm audit --audit-level=high --omit=dev
          fi

      - name: NPM audit — portal
        continue-on-error: true  # audit-level=high, non-blocking
        run: |
          if [ -f "portal/package-lock.json" ]; then
            cd portal && npm audit --audit-level=high --omit=dev
          fi

  # ==========================================================================
  # 6. Secret Scan (Gitleaks)
  # ==========================================================================
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR: scan only the diff (new commits in this PR)
            gitleaks detect --source . --config .gitleaks.toml --verbose --redact \
              --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            # Push/schedule: scan current working tree only (--no-git).
            # Full-history scan finds 500+ false positives from commits pre-OpSec
            # purge (CAB-2057). The allowlist covers current files; old commits
            # with deleted files (ansible/, docs/ibm/) are in the commit blocklist.
            gitleaks detect --source . --config .gitleaks.toml --verbose --redact --no-git
          fi

  # ==========================================================================
  # 6b. OpSec Scan (infrastructure IPs, financial data, client refs)
  # ==========================================================================
  opsec-scan:
    name: OpSec Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run OpSec scanner
        run: |
          chmod +x scripts/opsec-scan.sh
          scripts/opsec-scan.sh --diff origin/main...HEAD

  # ==========================================================================
  # 7. Container Scan (Trivy image)
  # ==========================================================================
  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Rust build (~10 min) + Trivy scan
    continue-on-error: true  # Base image vulns — tracked, not blocking
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: control-plane-api
            path: control-plane-api
          - name: portal
            path: portal
          - name: stoa-gateway
            path: stoa-gateway
          - name: control-plane-ui
            path: control-plane-ui
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "${{ matrix.image.path }}/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::No Dockerfile for ${{ matrix.image.name }}, skipping"
          fi

      - name: Cache Trivy DB
        if: steps.check.outputs.exists == 'true'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-trivy-

      - name: Build image for scanning
        if: steps.check.outputs.exists == 'true'
        run: |
          # portal and control-plane-ui need repo root context for shared/ deps
          if [ "${{ matrix.image.name }}" = "portal" ] || [ "${{ matrix.image.name }}" = "control-plane-ui" ]; then
            docker build -t stoa/${{ matrix.image.name }}:scan -f ${{ matrix.image.path }}/Dockerfile .
          else
            docker build -t stoa/${{ matrix.image.name }}:scan ${{ matrix.image.path }}/
          fi

      - name: Run Trivy (SARIF)
        if: steps.check.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # master
        with:
          image-ref: 'stoa/${{ matrix.image.name }}:scan'
          format: 'sarif'
          output: 'trivy-${{ matrix.image.name }}.sarif'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'os,library'
          ignore-unfixed: true

      - name: Upload to GitHub Security
        if: steps.check.outputs.exists == 'true'
        continue-on-error: true  # Requires GitHub Advanced Security (private repos)
        uses: github/codeql-action/upload-sarif@2d3fe93d4896727350828f23e48f5391e6d3f022 # v3
        with:
          sarif_file: 'trivy-${{ matrix.image.name }}.sarif'
          category: 'trivy-${{ matrix.image.name }}'

      - name: Run Trivy (fail on HIGH+)
        if: steps.check.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # master
        with:
          image-ref: 'stoa/${{ matrix.image.name }}:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'os,library'
          ignore-unfixed: true
          exit-code: '1'
