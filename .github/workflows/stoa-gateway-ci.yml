# =============================================================================
# GitHub Actions: STOA Gateway (Rust) CI/CD
# =============================================================================
# Thin orchestrator — delegates to reusable workflows (ADR-031)
# Deployment managed by ArgoCD (CAB-1109) — CI only builds + triggers restart
# =============================================================================

name: STOA Gateway CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'stoa-gateway/**'
      - '.github/workflows/stoa-gateway-ci.yml'
      - '.github/workflows/reusable-rust-ci.yml'
      - '.github/workflows/reusable-docker-ghcr.yml'
      - '.github/actions/**'

  pull_request:
    branches:
      - main
    paths:
      - 'stoa-gateway/**'
      - '.github/workflows/stoa-gateway-ci.yml'
      - '.github/workflows/reusable-rust-ci.yml'
      - '.github/actions/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  id-token: write
  checks: write
  attestations: write

jobs:
  # === CI: fmt + clippy + test + audit ===
  ci:
    uses: ./.github/workflows/reusable-rust-ci.yml
    with:
      component: stoa-gateway
      run-audit: true
      cargo-features: '--features kafka'
    permissions:
      contents: read

  # === Docker: build + push GHCR (AMD64 only) ===
  docker:
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-docker-ghcr.yml
    with:
      component: stoa-gateway
      image-name: stoa-gateway
      environment: ${{ github.event.inputs.environment || 'dev' }}
      platforms: linux/amd64
      build-args: |
        CACHEBUST=${{ github.sha }}
        FEATURES=kafka
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    secrets: inherit

  # === Apply manifest: push k8s/deployment.yaml to cluster (env vars, labels, etc.) ===
  apply-manifest:
    needs: docker
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - name: Configure kubeconfig
        run: |
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "::warning::KUBECONFIG_B64 secret not set. Skipping manifest apply."
            exit 0
          fi
          mkdir -p ~/.kube
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
      - name: Apply k8s manifest
        run: |
          kubectl apply -f stoa-gateway/k8s/deployment.yaml 2>&1 || {
            echo "Apply failed (likely immutable selector). Deleting and recreating..."
            kubectl delete deployment stoa-gateway -n stoa-system --ignore-not-found
            kubectl apply -f stoa-gateway/k8s/deployment.yaml
          }

  # === Deploy: trigger pod restart to pull new GHCR image ===
  deploy:
    needs: [docker, apply-manifest]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
      url: https://${{ (github.event.inputs.environment == 'staging' && 'staging-mcp') || 'mcp' }}.gostoa.dev
    steps:
      - name: Configure kubeconfig
        run: |
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "::warning::KUBECONFIG_B64 secret not set. Skipping deployment."
            exit 0
          fi
          mkdir -p ~/.kube
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
      - name: Restart deployment (pull new image from GHCR)
        run: |
          kubectl rollout restart deployment/stoa-gateway -n stoa-system
          kubectl rollout status deployment/stoa-gateway -n stoa-system --timeout=300s

  # === Smoke Test: health checks after deploy (Tier 1) ===
  # Full E2E with personas runs nightly (e2e-nightly.yml)
  smoke-test:
    needs: deploy
    if: needs.deploy.result == 'success'
    uses: ./.github/workflows/reusable-health-smoke.yml
    with:
      component: stoa-gateway
      environment: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      contents: read

  # === Notify: Slack ===
  notify:
    needs: [ci, docker, deploy, smoke-test]
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/reusable-notify.yml
    with:
      component: STOA Gateway
      environment: ${{ github.event.inputs.environment || 'dev' }}
      ci-result: ${{ needs.ci.outputs.test-result }}
      deploy-result: ${{ needs.deploy.result }}
      smoke-result: ${{ needs.smoke-test.result }}
    secrets: inherit
