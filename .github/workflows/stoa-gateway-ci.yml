# =============================================================================
# GitHub Actions: STOA Gateway (Rust) CI/CD
# =============================================================================
# Thin orchestrator — delegates to reusable workflows (ADR-031)
# =============================================================================

name: STOA Gateway CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'stoa-gateway/**'
      - '.github/workflows/stoa-gateway-ci.yml'
      - '.github/workflows/reusable-rust-ci.yml'
      - '.github/workflows/reusable-docker-ecr.yml'
      - '.github/workflows/reusable-k8s-deploy.yml'
      - '.github/actions/**'

  pull_request:
    branches:
      - main
    paths:
      - 'stoa-gateway/**'
      - '.github/workflows/stoa-gateway-ci.yml'
      - '.github/workflows/reusable-rust-ci.yml'
      - '.github/actions/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  id-token: write
  checks: write
  attestations: write

jobs:
  # === CI: fmt + clippy + test + audit ===
  ci:
    uses: ./.github/workflows/reusable-rust-ci.yml
    with:
      component: stoa-gateway
      run-audit: true
    permissions:
      contents: read

  # === Docker: build + push ECR (AMD64 only — EKS target) ===
  docker:
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-docker-ecr.yml
    with:
      component: stoa-gateway
      ecr-repository: apim/stoa-gateway
      environment: ${{ github.event.inputs.environment || 'dev' }}
      platforms: linux/amd64
      build-args: |
        CACHEBUST=${{ github.sha }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    secrets: inherit

  # === Apply: update k8s manifest before rollout ===
  apply-manifest:
    needs: docker
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: arn:aws:iam::848853684735:role/github-actions-stoa-infra
          aws-region: eu-west-1
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name apim-dev-cluster --region eu-west-1
      - name: Apply k8s manifest
        run: |
          kubectl apply -f stoa-gateway/k8s/deployment.yaml 2>&1 || {
            echo "Apply failed (likely immutable selector). Deleting and recreating..."
            kubectl delete deployment stoa-gateway -n stoa-system --ignore-not-found
            kubectl apply -f stoa-gateway/k8s/deployment.yaml
          }

  # === Deploy: EKS rollout with auto-rollback ===
  deploy:
    needs: [docker, apply-manifest]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-k8s-deploy.yml
    with:
      component: stoa-gateway
      image-tag: ${{ needs.docker.outputs.image-tag }}
      environment: ${{ github.event.inputs.environment || 'dev' }}
      environment-url: https://mcp.gostoa.dev
      verify-endpoint: https://mcp.gostoa.dev/health
      expected-status: '200'
    permissions:
      contents: read
      id-token: write
    secrets: inherit

  # === Notify: Slack ===
  notify:
    needs: [ci, docker, deploy]
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/reusable-notify.yml
    with:
      component: STOA Gateway
      environment: ${{ github.event.inputs.environment || 'dev' }}
      ci-result: ${{ needs.ci.outputs.test-result }}
      deploy-result: ${{ needs.deploy.result }}
    secrets: inherit
