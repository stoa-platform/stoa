# =============================================================================
# GitHub Actions: STOA Gateway (Rust) CI/CD
# =============================================================================
# Thin orchestrator — delegates to reusable workflows (ADR-031)
# Deployment via GitOps: CI pushes image → dispatches to stoa-infra → ArgoCD syncs
# =============================================================================

name: STOA Gateway CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'stoa-gateway/**'
      - '.github/workflows/stoa-gateway-ci.yml'
      - '.github/workflows/reusable-rust-ci.yml'
      - '.github/workflows/reusable-docker-ghcr.yml'
      - '.github/workflows/reusable-gitops-deploy.yml'
      - '.github/actions/**'

  pull_request:
    branches:
      - main
    paths:
      - 'stoa-gateway/**'
      - '.github/workflows/stoa-gateway-ci.yml'
      - '.github/workflows/reusable-rust-ci.yml'
      - '.github/actions/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  id-token: write
  checks: write
  attestations: write

jobs:
  # === CI: fmt + clippy + test + audit ===
  ci:
    uses: ./.github/workflows/reusable-rust-ci.yml
    with:
      component: stoa-gateway
      run-audit: false
      cargo-features: '--features kafka'
      runner: self-hosted
    permissions:
      contents: read

  # === Docker: build + push GHCR (AMD64 only) ===
  docker:
    needs: ci
    if: |
      needs.ci.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/reusable-docker-ghcr.yml
    with:
      component: stoa-gateway
      image-name: stoa-gateway
      environment: ${{ github.event.inputs.environment || 'dev' }}
      platforms: linux/amd64
      build-args: |
        CACHEBUST=${{ github.sha }}
        FEATURES=kafka
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    secrets: inherit

  # === GitOps Deploy: dispatch to stoa-infra → ArgoCD syncs ===
  deploy:
    needs: docker
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-gitops-deploy.yml
    with:
      component: stoa-gateway
      image-tag: ${{ needs.docker.outputs.image-tag }}
      environment: ${{ github.event.inputs.environment || 'dev' }}
      environment-url: https://${{ (github.event.inputs.environment == 'staging' && 'staging-mcp') || 'mcp' }}.gostoa.dev
      verify-endpoint: https://${{ (github.event.inputs.environment == 'staging' && 'staging-mcp') || 'mcp' }}.gostoa.dev/health/ready
      verify-timeout: 300
    secrets: inherit

  # === Smoke Test: health checks after deploy (Tier 1) ===
  # Full E2E with personas runs nightly (e2e-nightly.yml)
  smoke-test:
    needs: deploy
    if: needs.deploy.result == 'success'
    uses: ./.github/workflows/reusable-health-smoke.yml
    with:
      component: stoa-gateway
      environment: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      contents: read

  # === Staging: GitOps deploy to staging cluster ===
  deploy-staging:
    needs: [docker, smoke-test]
    if: github.event_name == 'push' && needs.smoke-test.result == 'success'
    uses: ./.github/workflows/reusable-gitops-deploy.yml
    with:
      component: stoa-gateway
      image-tag: ${{ needs.docker.outputs.image-tag }}
      environment: staging
      environment-url: https://staging-mcp.gostoa.dev
      verify-endpoint: https://staging-mcp.gostoa.dev/health/ready
      verify-timeout: 300
    secrets: inherit

  smoke-test-staging:
    needs: deploy-staging
    if: needs.deploy-staging.result == 'success'
    uses: ./.github/workflows/reusable-health-smoke.yml
    with:
      component: stoa-gateway
      environment: staging
    permissions:
      contents: read

  # === Notify: Slack ===
  notify:
    needs: [ci, docker, deploy, smoke-test, deploy-staging, smoke-test-staging]
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/reusable-notify.yml
    with:
      component: STOA Gateway
      environment: ${{ github.event.inputs.environment || 'dev' }}
      ci-result: ${{ needs.ci.outputs.test-result }}
      deploy-result: ${{ needs.deploy.result }}
      smoke-result: ${{ needs.smoke-test.result }}
    secrets: inherit
