# =============================================================================
# GitHub Actions: STOA Gateway (Rust) CI/CD
# =============================================================================
# Thin orchestrator — delegates to reusable workflows (ADR-031)
# Deployment managed by ArgoCD (CAB-1109) — CI only builds + triggers restart
# =============================================================================

name: STOA Gateway CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'stoa-gateway/**'
      - '.github/workflows/stoa-gateway-ci.yml'
      - '.github/workflows/reusable-rust-ci.yml'
      - '.github/workflows/reusable-docker-ghcr.yml'
      - '.github/actions/**'

  pull_request:
    branches:
      - main
    paths:
      - 'stoa-gateway/**'
      - '.github/workflows/stoa-gateway-ci.yml'
      - '.github/workflows/reusable-rust-ci.yml'
      - '.github/actions/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  id-token: write
  checks: write
  attestations: write

jobs:
  # === CI: fmt + clippy + test + audit ===
  ci:
    uses: ./.github/workflows/reusable-rust-ci.yml
    with:
      component: stoa-gateway
      run-audit: true
    permissions:
      contents: read

  # === Docker: build + push GHCR (AMD64 only) ===
  docker:
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-docker-ghcr.yml
    with:
      component: stoa-gateway
      image-name: stoa-gateway
      environment: ${{ github.event.inputs.environment || 'dev' }}
      platforms: linux/amd64
      build-args: |
        CACHEBUST=${{ github.sha }}
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    secrets: inherit

  # === Deploy: trigger pod restart so ArgoCD-managed pods pull new image ===
  # ArgoCD manages the deployment manifest (stoa-infra/charts/stoa-gateway).
  # Image tag is dev-latest with pullPolicy: Always — a rollout restart
  # forces pods to pull the freshly-pushed image from ECR.
  deploy:
    needs: docker
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
      url: https://mcp.gostoa.dev
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: arn:aws:iam::848853684735:role/github-actions-stoa-infra
          aws-region: eu-west-1
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name apim-dev-cluster --region eu-west-1
      - name: Restart deployment (pull new dev-latest image)
        run: |
          kubectl rollout restart deployment/stoa-gateway -n stoa-system
          kubectl rollout status deployment/stoa-gateway -n stoa-system --timeout=300s

  # === Smoke Test: E2E @smoke after deploy ===
  smoke-test:
    needs: deploy
    if: needs.deploy.result == 'success'
    uses: ./.github/workflows/reusable-smoke-test.yml
    with:
      component: stoa-gateway
    permissions:
      contents: read
      id-token: write
    secrets: inherit

  # === Notify: Slack ===
  notify:
    needs: [ci, docker, deploy, smoke-test]
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/reusable-notify.yml
    with:
      component: STOA Gateway
      environment: ${{ github.event.inputs.environment || 'dev' }}
      ci-result: ${{ needs.ci.outputs.test-result }}
      deploy-result: ${{ needs.deploy.result }}
      smoke-result: ${{ needs.smoke-test.result }}
    secrets: inherit
