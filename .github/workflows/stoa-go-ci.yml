name: stoa-go CI

on:
  push:
    branches: [main]
    paths:
      - "stoa-go/**"
      - ".github/workflows/stoa-go-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "stoa-go/**"
      - ".github/workflows/stoa-go-ci.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: stoa-go

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: stoa-go/go.mod
          cache-dependency-path: stoa-go/go.sum

      - name: Tidy dependencies
        run: go mod tidy

      - name: Check no dirty go.sum
        run: git diff --exit-code go.sum

      - name: Build stoactl
        run: go build -v ./cmd/stoactl

      - name: Build stoa-connect
        run: go build -v ./cmd/stoa-connect

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v6
        with:
          files: stoa-go/coverage.out
          flags: stoa-go
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: stoa-go/go.mod
          cache-dependency-path: stoa-go/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: stoa-go

  goreleaser-check:
    name: GoReleaser Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: stoa-go/go.mod
          cache-dependency-path: stoa-go/go.sum

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: check
          workdir: stoa-go
