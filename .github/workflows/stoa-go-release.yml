name: stoa-go Release

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
        description: "Release tag (e.g., stoa-go-v0.3.1)"
      version:
        required: true
        type: string
        description: "Semantic version (e.g., 0.3.1)"
  workflow_dispatch:
    inputs:
      tag:
        required: true
        type: string
        description: "Release tag (e.g., stoa-go-v0.3.1)"
      version:
        required: true
        type: string
        description: "Semantic version (e.g., 0.3.1)"

permissions:
  contents: write
  packages: write

defaults:
  run:
    working-directory: stoa-go

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: stoa-go/go.mod
          cache-dependency-path: stoa-go/go.sum

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: stoa-go
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ inputs.tag }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
