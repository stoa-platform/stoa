# =============================================================================
# GitHub Actions: STOA Developer Portal CI/CD
# =============================================================================
# Thin orchestrator — delegates to reusable workflows (ADR-031)
# =============================================================================

name: STOA Portal CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'portal/**'
      - 'shared/**'
      - '.github/workflows/stoa-portal-ci.yml'
      - '.github/workflows/reusable-node-ci.yml'
      - '.github/workflows/reusable-docker-ghcr.yml'
      - '.github/workflows/reusable-k8s-deploy.yml'
      - '.github/actions/**'

  pull_request:
    branches:
      - main
    paths:
      - 'portal/**'
      - 'shared/**'
      - '.github/workflows/stoa-portal-ci.yml'
      - '.github/workflows/reusable-node-ci.yml'
      - '.github/actions/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  id-token: write
  checks: write
  attestations: write

jobs:
  # === CI: lint + test + build ===
  ci:
    uses: ./.github/workflows/reusable-node-ci.yml
    with:
      component: portal
      node-version: '20'
      run-coverage: true
      run-build: true
      upload-artifact: true
    permissions:
      contents: read
      checks: write

  # === Docker: build + push GHCR (with Vite env vars) ===
  docker:
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-docker-ghcr.yml
    with:
      component: portal
      image-name: portal
      environment: ${{ github.event.inputs.environment || 'dev' }}
      platforms: linux/amd64
      use-monorepo-context: true
      build-args: |
        VITE_BASE_DOMAIN=gostoa.dev
        VITE_ENVIRONMENT=${{ github.event.inputs.environment || 'production' }}
        VITE_KEYCLOAK_URL=https://${{ (github.event.inputs.environment == 'staging' && 'staging-auth') || 'auth' }}.gostoa.dev
        VITE_KEYCLOAK_REALM=stoa
        VITE_KEYCLOAK_CLIENT_ID=stoa-portal
        VITE_MCP_URL=https://${{ (github.event.inputs.environment == 'staging' && 'staging-mcp') || 'mcp' }}.gostoa.dev
        VITE_API_URL=https://${{ (github.event.inputs.environment == 'staging' && 'staging-api') || 'api' }}.gostoa.dev
        VITE_CONSOLE_URL=https://${{ (github.event.inputs.environment == 'staging' && 'staging-console') || 'console' }}.gostoa.dev
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    secrets: inherit

  # === Apply: update k8s manifest before rollout ===
  apply-manifest:
    needs: docker
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
      - name: Apply k8s manifest
        run: |
          kubectl apply -f portal/k8s/deployment.yaml 2>&1 || {
            echo "Apply failed (likely immutable selector). Deleting and recreating..."
            kubectl delete deployment stoa-portal -n stoa-system --ignore-not-found
            kubectl apply -f portal/k8s/deployment.yaml
          }

  # === Deploy: K3s rollout with auto-rollback ===
  deploy:
    needs: [docker, apply-manifest]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-k8s-deploy.yml
    with:
      component: stoa-portal
      image-tag: ${{ needs.docker.outputs.image-tag }}
      environment: ${{ github.event.inputs.environment || 'dev' }}
      environment-url: https://${{ (github.event.inputs.environment == 'staging' && 'staging-portal') || 'portal' }}.gostoa.dev
    permissions:
      contents: read
    secrets: inherit

  # === Smoke Test: E2E @smoke after deploy ===
  smoke-test:
    needs: deploy
    if: needs.deploy.result == 'success'
    uses: ./.github/workflows/reusable-smoke-test.yml
    with:
      component: stoa-portal
    permissions:
      contents: read
      id-token: write
    secrets: inherit

  # === Notify: Slack ===
  notify:
    needs: [ci, docker, deploy, smoke-test]
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/reusable-notify.yml
    with:
      component: STOA Portal
      environment: ${{ github.event.inputs.environment || 'dev' }}
      ci-result: ${{ needs.ci.outputs.test-result }}
      deploy-result: ${{ needs.deploy.result }}
      smoke-result: ${{ needs.smoke-test.result }}
    secrets: inherit
