# =============================================================================
# GitHub Actions: STOA Developer Portal CI/CD
# =============================================================================
# Thin orchestrator — delegates to reusable workflows (ADR-031)
# Deployment via GitOps: CI pushes image → dispatches to stoa-infra → ArgoCD syncs
# =============================================================================

name: STOA Portal CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'portal/**'
      - 'shared/**'
      - '.github/workflows/stoa-portal-ci.yml'
      - '.github/workflows/reusable-node-ci.yml'
      - '.github/workflows/reusable-docker-ghcr.yml'
      - '.github/workflows/reusable-gitops-deploy.yml'
      - '.github/actions/**'

  pull_request:
    branches:
      - main
    paths:
      - 'portal/**'
      - 'shared/**'
      - '.github/workflows/stoa-portal-ci.yml'
      - '.github/workflows/reusable-node-ci.yml'
      - '.github/actions/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  id-token: write
  checks: write
  attestations: write

jobs:
  # === CI: lint + test + build ===
  ci:
    uses: ./.github/workflows/reusable-node-ci.yml
    with:
      component: portal
      node-version: '20'
      run-coverage: true
      run-build: true
      upload-artifact: true
      runner: self-hosted
    permissions:
      contents: read
      checks: write

  # === Docker: build + push GHCR (with Vite env vars) ===
  docker:
    needs: ci
    if: |
      needs.ci.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/reusable-docker-ghcr.yml
    with:
      component: portal
      image-name: portal
      environment: ${{ github.event.inputs.environment || 'dev' }}
      platforms: linux/amd64
      use-monorepo-context: true
      build-args: |
        VITE_BASE_DOMAIN=gostoa.dev
        VITE_ENVIRONMENT=${{ github.event.inputs.environment || 'production' }}
        VITE_KEYCLOAK_URL=https://${{ (github.event.inputs.environment == 'staging' && 'staging-auth') || 'auth' }}.gostoa.dev
        VITE_KEYCLOAK_REALM=stoa
        VITE_KEYCLOAK_CLIENT_ID=stoa-portal
        VITE_MCP_URL=https://${{ (github.event.inputs.environment == 'staging' && 'staging-mcp') || 'mcp' }}.gostoa.dev
        VITE_API_URL=https://${{ (github.event.inputs.environment == 'staging' && 'staging-api') || 'api' }}.gostoa.dev
        VITE_CONSOLE_URL=https://${{ (github.event.inputs.environment == 'staging' && 'staging-console') || 'console' }}.gostoa.dev
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    secrets: inherit

  # === GitOps Deploy: dispatch to stoa-infra → ArgoCD syncs ===
  deploy:
    needs: docker
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-gitops-deploy.yml
    with:
      component: portal
      image-tag: ${{ needs.docker.outputs.image-tag }}
      environment: ${{ github.event.inputs.environment || 'dev' }}
      environment-url: https://${{ (github.event.inputs.environment == 'staging' && 'staging-portal') || 'portal' }}.gostoa.dev
      verify-endpoint: https://${{ (github.event.inputs.environment == 'staging' && 'staging-portal') || 'portal' }}.gostoa.dev
    secrets: inherit

  # === Smoke Test: health checks after deploy (Tier 1) ===
  # Full E2E with personas runs nightly (e2e-nightly.yml)
  smoke-test:
    needs: deploy
    if: needs.deploy.result == 'success'
    uses: ./.github/workflows/reusable-health-smoke.yml
    with:
      component: stoa-portal
      environment: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      contents: read

  # === Staging: separate Docker build (VITE_* baked at build time) + GitOps deploy ===
  docker-staging:
    needs: smoke-test
    if: github.event_name == 'push' && needs.smoke-test.result == 'success'
    uses: ./.github/workflows/reusable-docker-ghcr.yml
    with:
      component: portal
      image-name: portal
      environment: staging
      platforms: linux/amd64
      use-monorepo-context: true
      build-args: |
        VITE_BASE_DOMAIN=gostoa.dev
        VITE_ENVIRONMENT=staging
        VITE_KEYCLOAK_URL=https://staging-auth.gostoa.dev
        VITE_KEYCLOAK_REALM=stoa
        VITE_KEYCLOAK_CLIENT_ID=stoa-portal
        VITE_MCP_URL=https://staging-mcp.gostoa.dev
        VITE_API_URL=https://staging-api.gostoa.dev
        VITE_CONSOLE_URL=https://staging-console.gostoa.dev
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    secrets: inherit

  deploy-staging:
    needs: docker-staging
    if: needs.docker-staging.result == 'success'
    uses: ./.github/workflows/reusable-gitops-deploy.yml
    with:
      component: portal
      image-tag: ${{ needs.docker-staging.outputs.image-tag }}
      environment: staging
      environment-url: https://staging-portal.gostoa.dev
      verify-endpoint: https://staging-portal.gostoa.dev
    secrets: inherit

  smoke-test-staging:
    needs: deploy-staging
    if: needs.deploy-staging.result == 'success'
    uses: ./.github/workflows/reusable-health-smoke.yml
    with:
      component: stoa-portal
      environment: staging
    permissions:
      contents: read

  # === Notify: Slack ===
  notify:
    needs: [ci, docker, deploy, smoke-test, deploy-staging, smoke-test-staging]
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/reusable-notify.yml
    with:
      component: STOA Portal
      environment: ${{ github.event.inputs.environment || 'dev' }}
      ci-result: ${{ needs.ci.outputs.test-result }}
      deploy-result: ${{ needs.deploy.result }}
      smoke-result: ${{ needs.smoke-test.result }}
    secrets: inherit
