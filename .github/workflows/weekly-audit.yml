# =============================================================================
# GitHub Actions: Weekly Security & Quality Audit
# =============================================================================
# STOA Platform -- CAB-1103 Phase 6D
# Runs every Monday at 08:00 UTC. Also triggerable manually.
# Jobs: pip-audit, npm audit, cargo-audit, gitleaks, helm lint, summary
# =============================================================================

name: Weekly Audit

on:
  schedule:
    - cron: '0 8 * * 1'  # Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # 1. Python Dependency Audit (pip-audit)
  # ==========================================================================
  python-audit:
    name: Python Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        project:
          - name: control-plane-api
            requirements: control-plane-api/requirements.txt
          - name: mcp-gateway
            requirements: mcp-gateway/requirements.txt
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        id: audit
        run: |
          echo "## ${{ matrix.project.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "${{ matrix.project.requirements }}" ]; then
            pip-audit -r ${{ matrix.project.requirements }} --desc 2>&1 | tee audit-output.txt || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat audit-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No requirements.txt found for ${{ matrix.project.name }}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: pip-audit-${{ matrix.project.name }}
          path: audit-output.txt
          retention-days: 30

  # ==========================================================================
  # 2. Node.js Dependency Audit (npm audit)
  # ==========================================================================
  node-audit:
    name: Node Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        project: [control-plane-ui, portal, e2e]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '20'

      - name: Check package-lock exists
        id: check
        run: |
          if [ -f "${{ matrix.project }}/package-lock.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::No package-lock.json in ${{ matrix.project }}/"
          fi

      - name: Run npm audit
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.project }}
        run: |
          echo "## ${{ matrix.project }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high 2>&1 | tee audit-output.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat audit-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload audit results
        if: always() && steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: npm-audit-${{ matrix.project }}
          path: ${{ matrix.project }}/audit-output.txt
          retention-days: 30

  # ==========================================================================
  # 3. Rust Dependency Audit (cargo-audit)
  # ==========================================================================
  rust-audit:
    name: Rust Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: stoa-gateway
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: |
          echo "## stoa-gateway (Rust)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cargo audit 2>&1 | tee audit-output.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat audit-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: cargo-audit
          path: stoa-gateway/audit-output.txt
          retention-days: 30

  # ==========================================================================
  # 4. Secret Scan (Gitleaks)
  # ==========================================================================
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: |
          echo "## Gitleaks Secret Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if gitleaks detect --source . --config .gitleaks.toml --verbose --redact 2>&1 | tee gitleaks-output.txt; then
            echo ":white_check_mark: No secrets detected" >> $GITHUB_STEP_SUMMARY
          else
            echo ":warning: Potential secrets detected -- review output" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 gitleaks-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload gitleaks results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: gitleaks-report
          path: gitleaks-output.txt
          retention-days: 30

  # ==========================================================================
  # 5. Helm Lint
  # ==========================================================================
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3
        with:
          version: v3.14.0

      - name: Lint Helm charts
        run: |
          echo "## Helm Lint" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          PASS=0
          FAIL=0

          for chart in charts/*/; do
            CHART_NAME=$(basename "$chart")
            if helm lint "$chart" 2>&1 | tee -a helm-lint-output.txt; then
              echo "| $CHART_NAME | :white_check_mark: Pass |" >> $GITHUB_STEP_SUMMARY
              PASS=$((PASS + 1))
            else
              echo "| $CHART_NAME | :x: Fail |" >> $GITHUB_STEP_SUMMARY
              FAIL=$((FAIL + 1))
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**$PASS passed, $FAIL failed**" >> $GITHUB_STEP_SUMMARY

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: helm-lint-report
          path: helm-lint-output.txt
          retention-days: 30

  # ==========================================================================
  # 6. Summary Report
  # ==========================================================================
  report:
    name: Audit Summary
    needs: [python-audit, node-audit, rust-audit, gitleaks, helm-lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          echo "# Weekly Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python Audit | ${{ needs.python-audit.result == 'success' && ':white_check_mark: Pass' || ':warning: Check' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node Audit | ${{ needs.node-audit.result == 'success' && ':white_check_mark: Pass' || ':warning: Check' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust Audit | ${{ needs.rust-audit.result == 'success' && ':white_check_mark: Pass' || ':warning: Check' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks | ${{ needs.gitleaks.result == 'success' && ':white_check_mark: Pass' || ':warning: Check' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Helm Lint | ${{ needs.helm-lint.result == 'success' && ':white_check_mark: Pass' || ':warning: Check' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
