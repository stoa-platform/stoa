# Rules to modify or disable
[[rules]]
id = "generic-api-key"
description = "Generic API Key - customized for STOA"
regex = '''(?i)["']?api[_-]?key["']?\s*[:=]\s*["']([a-zA-Z0-9_\-]{32,})["']'''
allowlist = { regexes = [
  '''stoa_[a-z]+_[a-zA-Z0-9]{32}''',  # Allow STOA format keys in examples
  '''new_api_key.*example''',
  '''api_key.*example''',
]}

# K8s Secret manifests: catch hardcoded passwords in stringData blocks
# Captures the value after the colon — blocks real credentials, allows placeholders
[[rules]]
id = "k8s-secret-password"
description = "Hardcoded password in Kubernetes Secret stringData"
regex = '''(?i)(?:POSTGRES_PASSWORD|DB_PASSWORD|ADMIN_PASSWORD|KEYCLOAK_PASSWORD|OPENSEARCH_PASSWORD)\s*:\s*["']?([a-zA-Z0-9!@#$%^&*_\-]{8,})["']?'''
allowlist = { regexes = [
  '''REPLACE_''',
  '''CHANGE_ME''',
  '''REPLACE_ME''',
  '''\$\{''',
  '''<YOUR_''',
  '''xxxxxxxx''',
  '''REDACTED''',
  '''placeholder''',
  '''your[_-]''',
  '''example''',
], paths = [
  '''.github/workflows/.*''',
  '''tests/.*''',
  '''.claude/hooks/.*''',
  '''deploy/secrets/.*\.template''',
  '''deploy/docker-compose/.*''',
  '''deploy/demo-federation/.*''',
  '''deploy/demo-tenants/.*''',
  '''deploy/observability/.*\.sh''',
  '''scripts/setup-.*''',
  '''scripts/validate-.*''',
]}

# Plaintext password in YAML comments (leaks real passwords as documentation)
[[rules]]
id = "password-in-comment"
description = "Plaintext password exposed in YAML/config comment"
regex = '''#\s*[Pp]assword\s*:\s*([A-Za-z0-9!@#$%^&*_\-]{6,})'''
allowlist = { regexes = [
  '''stored in Infisical''',
  '''REPLACE_''',
  '''CHANGE_ME''',
  '''<your''',
  '''example''',
  '''Set via''',
], paths = [
  '''.claude/hooks/.*''',
  '''tests/.*''',
]}

# bcrypt hashes (often leaked in OpenSearch, htpasswd configs)
[[rules]]
id = "bcrypt-hash"
description = "Bcrypt hash committed to repository"
regex = '''\$2[aby]?\$[0-9]+\$[./A-Za-z0-9]{53}'''
allowlist = { paths = [
  '''tests/.*''',
  '''stoa-gateway/src/.*\.rs''',  # test fixtures in #[cfg(test)]
]}

# ============================================
# OpSec rules — infrastructure & business intelligence (CAB-2057)
# ============================================

# STOA VPS infrastructure IPs (OVH, Contabo, Hetzner ranges)
[[rules]]
id = "stoa-infra-ip"
description = "Hardcoded STOA infrastructure IP address"
regex = '''(?:51\.83\.45\.\d+|51\.195\.43\.\d+|51\.255\.201\.\d+|51\.255\.193\.\d+|51\.254\.139\.\d+|54\.36\.209\.\d+|94\.23\.107\.\d+|135\.125\.204\.\d+|164\.68\.121\.\d+|144\.91\.73\.\d+|213\.199\.45\.\d+|91\.134\.108\.\d+)'''
allowlist = { paths = [
  '''\.claude/rules/.*\.md''',
  '''control-plane-api/alembic/versions/.*''',
  # VPS deployment documentation (IPs are in deploy README files, not secrets)
  '''deploy/vps/.*README\.md''',
]}

# Password defaults in shell scripts (:-Default pattern)
[[rules]]
id = "shell-password-default"
description = "Shell variable with hardcoded password default"
regex = '''(?i)(?:PASSWORD|SECRET|TOKEN).*:-[A-Za-z0-9!@#$%^&*_\-]{6,}'''
allowlist = { paths = [
  '''tests/.*''',
  '''\.claude/rules/.*\.md''',
  # Local dev scripts — default values for local Keycloak/gateway (not real secrets)
  '''scripts/traffic/.*''',
  '''scripts/demo/.*''',
  '''deploy/local/.*''',
]}

# Hardcoded client secrets in scripts
[[rules]]
id = "hardcoded-client-secret"
description = "Hardcoded OIDC client secret"
regex = '''(?i)client_secret[=:]["']?[a-z][\w-]{8,}["']?'''
allowlist = { paths = [
  '''tests/.*''',
  '''\.claude/rules/.*\.md''',
  '''deploy/demo-federation/keycloak/.*\.json''',
  # Local dev scripts — dev-only client secrets for local Keycloak
  '''scripts/traffic/.*''',
  '''scripts/demo/.*''',
  # API source — client_secret field references in routers/services (not hardcoded values)
  '''control-plane-api/src/routers/.*''',
  '''control-plane-api/src/services/.*''',
]}

# Financial data (EUR amounts, rates)
[[rules]]
id = "financial-data"
description = "Financial data (EUR amounts, pricing)"
regex = '''(?:\d+\s*€/[hj]|\d{1,3}[\s.]?\d{3}\s*€|€\s*\d{1,3}[\s.]?\d{3}|tarif.*\d+€|facturation|chiffre\s*d.affaires)'''
allowlist = { paths = [
  '''\.claude/rules/.*\.md''',
  # Council review script has inline cost comments (~€0.036 per round-trip)
  '''scripts/council-review\.sh''',
]}

# Client type disclosure (bank, insurance, etc.)
[[rules]]
id = "client-disclosure"
description = "Client type or name disclosure"
regex = '''(?i)(?:banque\s+centrale|client\s*\(.*banque|mission\s+client|prestation.*banque|mission.*banque)'''
allowlist = { paths = [
  '''\.claude/rules/.*\.md''',
]}

