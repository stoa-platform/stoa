apiVersion: v2
name: stoa-observability
description: STOA Platform Observability Stack (LGTM - Loki, Grafana, Tempo, Mimir)
type: application
version: 0.1.0
appVersion: "1.0.0"
maintainers:
  - name: CAB Ingenierie
    email: support@gostoa.dev
dependencies:
  # Grafana Alloy - Unified OTel collector (replaces Prometheus scrape + Promtail)
  - name: alloy
    version: "1.5.3"
    repository: https://grafana.github.io/helm-charts
    condition: alloy.enabled

  # Grafana Tempo - Distributed tracing backend (single binary for dev/staging)
  - name: tempo
    version: "1.24.4"
    repository: https://grafana.github.io/helm-charts
    condition: tempo.enabled

  # Prometheus Blackbox Exporter - Synthetic uptime probes
  - name: prometheus-blackbox-exporter
    version: "9.1.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: blackboxExporter.enabled
