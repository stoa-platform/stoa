apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gatewayinstances.gostoa.dev
  labels:
    app.kubernetes.io/part-of: stoa-platform
spec:
  group: gostoa.dev
  names:
    kind: GatewayInstance
    listKind: GatewayInstanceList
    plural: gatewayinstances
    singular: gatewayinstance
    shortNames:
      - gwi
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.gatewayType
        - name: Environment
          type: string
          jsonPath: .spec.environment
        - name: URL
          type: string
          jsonPath: .spec.baseUrl
          priority: 1
        - name: Status
          type: string
          jsonPath: .status.phase
        - name: Topology
          type: string
          jsonPath: .spec.topology
          priority: 1
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - displayName
                - gatewayType
                - environment
                - baseUrl
              properties:
                displayName:
                  type: string
                  description: Human-readable display name
                gatewayType:
                  type: string
                  description: Gateway product type
                  enum:
                    - webmethods
                    - kong
                    - apigee
                    - aws_apigateway
                    - gravitee
                    - stoa
                    - stoa_edge_mcp
                    - stoa_sidecar
                    - stoa_proxy
                    - stoa_shadow
                environment:
                  type: string
                  description: 'Target environment (dev, staging, prod)'
                tenantId:
                  type: string
                  description: Owning tenant (empty for platform-wide instances)
                baseUrl:
                  type: string
                  description: Gateway admin API base URL
                endpoints:
                  type: object
                  description: Logical endpoint map for one GatewayInstance
                  properties:
                    publicUrl:
                      type: string
                      description: User or tenant reachable runtime URL
                    internalUrl:
                      type: string
                      description: Cluster/service URL for in-cluster calls
                    adminUrl:
                      type: string
                      description: Control/admin endpoint
                    healthUrl:
                      type: string
                      description: Health/readiness endpoint
                  additionalProperties:
                    type: string
                deploymentMode:
                  type: string
                  description: 'Canonical topology: edge, connect, or sidecar'
                  enum:
                    - edge
                    - connect
                    - sidecar
                targetGatewayType:
                  type: string
                  description: Gateway technology STOA fronts or controls
                  enum:
                    - stoa
                    - kong
                    - webmethods
                    - gravitee
                    - agentgateway
                    - apigee
                    - aws_apigateway
                    - azure_apim
                topology:
                  type: string
                  description: 'Execution topology: native-edge, remote-agent, same-pod'
                  enum:
                    - native-edge
                    - remote-agent
                    - same-pod
                topologyProof:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: Evidence required when deploymentMode=sidecar
                authConfig:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: Authentication configuration for the gateway admin API
                capabilities:
                  type: array
                  description: 'Supported capabilities (rest, graphql, websocket, oidc, rate_limiting, mcp)'
                  items:
                    type: string
                  default: []
                mode:
                  type: string
                  description: 'STOA gateway runtime mode (ADR-024): edge-mcp, sidecar, proxy, shadow, connect'
                  enum:
                    - edge-mcp
                    - sidecar
                    - proxy
                    - shadow
                    - connect
                version:
                  type: string
                  description: Gateway software version
                tags:
                  type: array
                  description: Arbitrary tags for filtering
                  items:
                    type: string
                  default: []
            status:
              type: object
              properties:
                phase:
                  type: string
                  description: 'Gateway health: online, offline, degraded, maintenance'
                  enum:
                    - online
                    - offline
                    - degraded
                    - maintenance
                lastHealthCheck:
                  type: string
                  format: date-time
                  description: Last successful health check timestamp
                healthDetails:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: Last health check result payload
                error:
                  type: string
                  description: Error message if health check failed
      subresources:
        status: {}
