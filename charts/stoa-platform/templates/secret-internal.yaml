{{/*
  Auto-generated internal shared keys (CAB-1863).
  Uses Helm `lookup` to preserve existing values on upgrade.
  Keys are only generated on first install — never rotated automatically.
*/}}
{{- $secretName := "stoa-internal-keys" }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) }}
{{- $gatewayKey := "" }}
{{- $chatInternalKey := "" }}
{{- $jwtSigningKey := "" }}
{{- if $existing }}
  {{- $gatewayKey = index $existing.data "gateway-consumer-key" }}
  {{- $chatInternalKey = index $existing.data "chat-internal-key" }}
  {{- $jwtSigningKey = index $existing.data "jwt-signing-key" }}
{{- end }}
{{- if not $gatewayKey }}
  {{- $gatewayKey = randAlphaNum 32 | b64enc }}
{{- end }}
{{- if not $chatInternalKey }}
  {{- $chatInternalKey = randAlphaNum 32 | b64enc }}
{{- end }}
{{- if not $jwtSigningKey }}
  {{- $jwtSigningKey = randAlphaNum 32 | b64enc }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: shared-secrets
    {{- include "stoa-platform.labels" . | nindent 4 }}
type: Opaque
data:
  gateway-consumer-key: {{ $gatewayKey }}
  chat-internal-key: {{ $chatInternalKey }}
  jwt-signing-key: {{ $jwtSigningKey }}
  {{- if .Values.stoa.anthropicApiKey }}
  anthropic-api-key: {{ .Values.stoa.anthropicApiKey | b64enc }}
  {{- end }}
