{{- if .Values.stoaGateway.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stoa-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: stoa-gateway
    app.kubernetes.io/component: gateway
    {{- include "stoa-platform.labels" . | nindent 4 }}
spec:
  {{- if not (and .Values.autoscaling .Values.autoscaling.enabled) }}
  replicas: {{ .Values.stoaGateway.replicas | default 2 }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: stoa-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stoa-gateway
        app.kubernetes.io/component: gateway
        {{- include "stoa-platform.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      {{- if and .Values.stoaGateway.k8s .Values.stoaGateway.k8s.enabled }}
      serviceAccountName: stoa-gateway
      {{- else }}
      serviceAccountName: {{ .Values.stoaGateway.serviceAccount | default "default" }}
      {{- end }}
      {{- if .Values.infisical.enabled }}
      initContainers:
        {{- include "stoa-platform.infisicalInitContainer" . | nindent 8 }}
      {{- end }}
      containers:
        - name: stoa-gateway
          image: "{{ .Values.stoaGateway.image.repository }}:{{ .Values.stoaGateway.image.tag }}"
          imagePullPolicy: {{ .Values.stoaGateway.image.pullPolicy | default "Always" }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: STOA_PORT
              value: "8080"
            - name: STOA_HOST
              value: "0.0.0.0"
            - name: STOA_CONTROL_PLANE_URL
              value: {{ .Values.stoaGateway.controlPlaneUrl | default "http://control-plane-api.stoa-system.svc.cluster.local:8000" | quote }}
            - name: STOA_KEYCLOAK_URL
              value: {{ .Values.stoaGateway.keycloakUrl | default "" | quote }}
            - name: STOA_KEYCLOAK_REALM
              value: {{ .Values.stoaGateway.keycloakRealm | default "stoa" | quote }}
            - name: STOA_KEYCLOAK_CLIENT_ID
              value: {{ .Values.stoaGateway.keycloakClientId | default "stoa-mcp-gateway" | quote }}
            - name: STOA_LOG_LEVEL
              value: {{ .Values.stoaGateway.logLevel | default "info" | quote }}
            - name: STOA_LOG_FORMAT
              value: {{ .Values.stoaGateway.logFormat | default "json" | quote }}
            - name: STOA_GATEWAY_MODE
              value: {{ .Values.stoaGateway.mode | default "edge-mcp" | quote }}
            {{- if and .Values.stoaGateway.policies .Values.stoaGateway.policies.enabled }}
            - name: STOA_POLICY_ENABLED
              value: "true"
            - name: STOA_POLICY_PATH
              value: {{ .Values.stoaGateway.policies.path | default "/etc/stoa/policies/default.rego" | quote }}
            {{- end }}
            {{- if and .Values.stoaGateway.k8s .Values.stoaGateway.k8s.enabled }}
            - name: STOA_K8S_ENABLED
              value: "true"
            {{- end }}
            - name: STOA_AUTO_REGISTER
              value: {{ .Values.stoaGateway.autoRegister | default true | quote }}
            - name: STOA_ENVIRONMENT
              value: {{ .Values.stoaGateway.environment | default "dev" | quote }}
            {{- if and .Values.stoaGateway.kafka .Values.stoaGateway.kafka.enabled }}
            - name: STOA_KAFKA_ENABLED
              value: "true"
            - name: STOA_KAFKA_BROKERS
              value: {{ .Values.stoaGateway.kafka.brokers | quote }}
            {{- if .Values.stoaGateway.kafka.meteringTopic }}
            - name: STOA_KAFKA_METERING_TOPIC
              value: {{ .Values.stoaGateway.kafka.meteringTopic | quote }}
            {{- end }}
            {{- if .Values.stoaGateway.kafka.errorsTopic }}
            - name: STOA_KAFKA_ERRORS_TOPIC
              value: {{ .Values.stoaGateway.kafka.errorsTopic | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.stoaGateway.otelEndpoint }}
            - name: STOA_OTEL_ENDPOINT
              value: {{ .Values.stoaGateway.otelEndpoint | quote }}
            {{- end }}
            {{- if .Values.stoaGateway.secretName }}
            - name: STOA_CONTROL_PLANE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.stoaGateway.secretName }}
                  key: control-plane-api-key
                  optional: true
            - name: STOA_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.stoaGateway.secretName }}
                  key: jwt-secret
                  optional: true
            - name: STOA_KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.stoaGateway.secretName }}
                  key: keycloak-client-secret
                  optional: true
            - name: STOA_ADMIN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.stoaGateway.secretName }}
                  key: admin-api-token
                  optional: true
            {{- end }}
            {{- with .Values.stoaGateway.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            {{- toYaml .Values.stoaGateway.resources | nindent 12 }}
          securityContext:
            privileged: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if and .Values.stoaGateway.policies .Values.stoaGateway.policies.enabled }}
            - name: policies
              mountPath: /etc/stoa/policies
              readOnly: true
            {{- end }}
            {{- include "stoa-platform.infisicalVolumeMount" . | nindent 12 }}
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if and .Values.stoaGateway.policies .Values.stoaGateway.policies.enabled }}
        - name: policies
          configMap:
            name: stoa-gateway-policies
        {{- end }}
        {{- include "stoa-platform.infisicalVolume" . | nindent 8 }}
      {{- with .Values.stoaGateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.stoaGateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
