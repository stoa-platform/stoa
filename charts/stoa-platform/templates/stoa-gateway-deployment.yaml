{{- if .Values.stoaGateway.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stoa-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: stoa-gateway
    app.kubernetes.io/component: gateway
    {{- include "stoa-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.stoaGateway.replicas | default 2 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: stoa-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stoa-gateway
        app.kubernetes.io/component: gateway
        {{- include "stoa-platform.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ .Values.stoaGateway.serviceAccount | default "default" }}
      containers:
        - name: stoa-gateway
          image: "{{ .Values.stoaGateway.image.repository }}:{{ .Values.stoaGateway.image.tag }}"
          imagePullPolicy: {{ .Values.stoaGateway.image.pullPolicy | default "Always" }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: STOA_PORT
              value: "8080"
            - name: STOA_HOST
              value: "0.0.0.0"
            - name: STOA_CONTROL_PLANE_URL
              value: {{ .Values.stoaGateway.controlPlaneUrl | default "http://control-plane-api.stoa-system.svc.cluster.local:8000" | quote }}
            - name: STOA_KEYCLOAK_URL
              value: {{ .Values.stoaGateway.keycloakUrl | default "" | quote }}
            - name: STOA_KEYCLOAK_REALM
              value: {{ .Values.stoaGateway.keycloakRealm | default "stoa" | quote }}
            - name: STOA_KEYCLOAK_CLIENT_ID
              value: {{ .Values.stoaGateway.keycloakClientId | default "stoa-mcp-gateway" | quote }}
            - name: STOA_LOG_LEVEL
              value: {{ .Values.stoaGateway.logLevel | default "info" | quote }}
            - name: STOA_LOG_FORMAT
              value: {{ .Values.stoaGateway.logFormat | default "json" | quote }}
            {{- if .Values.stoaGateway.otelEndpoint }}
            - name: STOA_OTEL_ENDPOINT
              value: {{ .Values.stoaGateway.otelEndpoint | quote }}
            {{- end }}
            {{- if .Values.stoaGateway.secretName }}
            - name: STOA_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.stoaGateway.secretName }}
                  key: jwt-secret
                  optional: true
            - name: STOA_KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.stoaGateway.secretName }}
                  key: keycloak-client-secret
                  optional: true
            - name: STOA_ADMIN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.stoaGateway.secretName }}
                  key: admin-api-token
                  optional: true
            {{- end }}
            {{- with .Values.stoaGateway.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            {{- toYaml .Values.stoaGateway.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.stoaGateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.stoaGateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
