{{- if and .Values.stoaGateway.enabled .Values.stoaGateway.externalSecret.enabled }}
---
# ExternalSecret syncs secrets from Vault into a K8s Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stoa-gateway-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: stoa-gateway
    app.kubernetes.io/component: gateway
    {{- include "stoa-platform.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.stoaGateway.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.stoaGateway.externalSecret.secretStoreRef | default "vault-backend" }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.stoaGateway.secretName | default "stoa-gateway-secrets" }}
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: {{ .Values.stoaGateway.externalSecret.vaultPath | default "stoa/data/gateway" }}
        property: jwt_secret
    - secretKey: keycloak-client-secret
      remoteRef:
        key: {{ .Values.stoaGateway.externalSecret.vaultPath | default "stoa/data/gateway" }}
        property: keycloak_client_secret
    - secretKey: admin-api-token
      remoteRef:
        key: {{ .Values.stoaGateway.externalSecret.vaultPath | default "stoa/data/gateway" }}
        property: admin_api_token
{{- end }}
