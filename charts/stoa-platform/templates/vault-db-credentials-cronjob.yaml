{{- if (default false .Values.vault.credentialsCheck.enabled) }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-db-credentials-check
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vault-db-credentials-check
    app.kubernetes.io/component: monitoring
    {{- include "stoa-platform.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.vault.credentialsCheck.schedule | default "0 */6 * * *" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 120
      template:
        metadata:
          labels:
            app.kubernetes.io/name: vault-db-credentials-check
        spec:
          restartPolicy: Never
          serviceAccountName: {{ .Values.vault.credentialsCheck.serviceAccount | default "default" }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            fsGroup: 65534
          containers:
          - name: check
            image: {{ .Values.vault.credentialsCheck.image | default "postgres:16-alpine" }}
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "==> Vault DB Credentials Check ($(date -u +%Y-%m-%dT%H:%M:%SZ))"

              # Verify env vars are set (without logging values)
              if [ -z "$PGHOST" ] || [ -z "$PGUSER" ] || [ -z "$PGPASSWORD" ] || [ -z "$PGDATABASE" ]; then
                echo "[ERROR] Missing database credentials from secret"
                echo "[INFO] Ensure the postgresql-credentials secret is synced from Vault"
                exit 1
              fi

              echo "[INFO] Connecting to PostgreSQL at $PGHOST:${PGPORT:-5432}/$PGDATABASE as $PGUSER"

              # Test connection with a simple query
              if psql -c "SELECT 1 AS connection_ok;" -q --no-password 2>&1; then
                echo "[OK] PostgreSQL credentials are valid"
                echo "[OK] Connection successful"
              else
                echo "[ERROR] PostgreSQL connection FAILED"
                echo "[ERROR] Vault credentials may be out of sync with the database"
                echo "[INFO] Remediation: check Vault path apim/dev/database and compare with actual DB password"
                echo "[INFO] See runbook: docs/runbooks/critical/vault-emergency-unseal.md"
                exit 1
              fi
            env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.credentialsCheck.secretName | default "postgresql-credentials" }}
                  key: host
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.credentialsCheck.secretName | default "postgresql-credentials" }}
                  key: port
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.credentialsCheck.secretName | default "postgresql-credentials" }}
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.credentialsCheck.secretName | default "postgresql-credentials" }}
                  key: password
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.credentialsCheck.secretName | default "postgresql-credentials" }}
                  key: database
            securityContext:
              privileged: false
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 50m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 64Mi
{{- end }}
