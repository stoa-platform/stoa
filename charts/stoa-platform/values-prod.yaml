# Production environment overrides
global:
  environment: prod
  domain: gostoa.dev

replicaCount: 3

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

postgresql:
  primary:
    persistence:
      size: 20Gi
  readReplicas:
    replicaCount: 1

keycloak:
  replicas: 3

observability:
  prometheus:
    retention: 30d
  loki:
    retention: 90d

ingress:
  tls:
    enabled: true
    issuer: letsencrypt-prod

podDisruptionBudget:
  enabled: true
  minAvailable: 2

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# STOA Gateway (Rust) — Production overrides
stoaGateway:
  enabled: true
  replicas: 3
  mode: edge-mcp
  environment: prod
  keycloakUrl: "https://auth.gostoa.dev"
  logLevel: info
  otelEndpoint: "http://stoa-alloy-otlp.stoa-monitoring:4317"
  policies:
    enabled: true
  k8s:
    enabled: true
  kafka:
    enabled: true
    brokers: "redpanda.stoa-system.svc.cluster.local:9092"
  ingress:
    enabled: true
    host: mcp.gostoa.dev
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls:
      - secretName: stoa-gateway-tls
        hosts:
          - mcp.gostoa.dev
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
