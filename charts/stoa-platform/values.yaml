  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    scaleDownStabilizationSeconds: 300
  # PDB — target: stoa-control-plane-api Deployment
  podDisruptionBudget:
    enabled: false
    minAvailable: 1

