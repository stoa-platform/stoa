# Deployed as a standalone k8s manifest — Service: stoa-control-plane-api
controlPlaneApi:
  serviceMonitor:
    enabled: true
    interval: 15s
    scrapeTimeout: 10s
  # Cluster name for multi-cluster observability labels (CAB-1426)
  clusterName: default
  environment: dev
