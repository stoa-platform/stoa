# STOA Platform Helm Values
# =========================

# Gateway Configuration (CAB-958: Unified Gateway Architecture)
# See ADR-024: https://docs.gostoa.dev/architecture/adr/adr-024-gateway-unified-modes
# Currently runs Python mcp-gateway. Will migrate to Rust stoa-gateway Q4 2026.
gateway:
  # Current production image (Python mcp-gateway)
  image:
    repository: ghcr.io/hlfh/mcp-gateway
    tag: latest
    pullPolicy: IfNotPresent

  # Future: mode selection (not active yet, prepared for Rust gateway)
  # mode: edge-mcp  # edge-mcp | sidecar | proxy | shadow

  # Mode-specific configuration (prepared for future use)
  edgeMcp:
    enabled: true
    port: 3001
    mcpTimeout: 30s
    maxToolsPerRequest: 100

  sidecar:
    enabled: false
    primaryGateway: ""  # kong | envoy | apigee | webmethods
    metricsEnabled: true
    meteringEnabled: true

  proxy:
    enabled: false
    upstream: ""
    opaEndpoint: ""
    rateLimitEnabled: true

  shadow:
    enabled: false  # DEFERRED - requires security review (ADR-024)
    # targetBackend: ""
    # piiMaskingEnabled: true
    # retentionDays: 30

# STOA Gateway (Rust) Configuration
# Replaces Python mcp-gateway — now the primary gateway
stoaGateway:
  enabled: true
  image:
    repository: ghcr.io/stoa-platform/stoa-gateway
    tag: latest
    pullPolicy: Always
  replicas: 2
  serviceAccount: default

  # Control Plane (Python FastAPI backend)
  controlPlaneUrl: "http://control-plane-api.stoa-system.svc.cluster.local:8000"

  # Keycloak OIDC
  keycloakUrl: ""
  keycloakRealm: stoa
  keycloakClientId: stoa-mcp-gateway

  # Secret containing CONTROL_PLANE_API_KEY, JWT_SECRET, KEYCLOAK_CLIENT_SECRET, ADMIN_API_TOKEN
  # CONTROL_PLANE_API_KEY is REQUIRED for auto-registration (ADR-028).
  # Without it, the gateway skips registration and runs in standalone mode.
  secretName: stoa-gateway-secrets

  # ExternalSecret (Vault-backed)
  externalSecret:
    enabled: false
    refreshInterval: 1h
    secretStoreRef: vault-backend
    vaultPath: stoa/data/gateway

  # ServiceMonitor for Prometheus autodiscovery
  serviceMonitor:
    enabled: true
    interval: 15s
    scrapeTimeout: 10s

  # Observability
  logLevel: info
  logFormat: json
  # OpenTelemetry Collector endpoint (Grafana Alloy in stoa-monitoring namespace)
  # Set to enable distributed tracing export via OTLP gRPC
  otelEndpoint: ""  # e.g. "http://stoa-alloy-otlp.stoa-monitoring:4317"

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # Gateway mode (ADR-024): edge-mcp | sidecar | proxy | shadow
  mode: edge-mcp
  # Auto-register with Control Plane (ADR-028)
  autoRegister: true
  # Environment identifier
  environment: dev
  # Cluster name for multi-cluster observability labels (CAB-1426)
  clusterName: default

  # OPA Policy Engine (Phase 1: CAB-1109)
  policies:
    enabled: true
    path: "/etc/stoa/policies/default.rego"

  # K8s CRD watcher for dynamic tool registration (Phase 7: CAB-1105)
  k8s:
    enabled: false

  # Kafka metering (Phase 3: CAB-1105)
  kafka:
    enabled: false
    brokers: "redpanda.stoa-system.svc.cluster.local:9092"
    meteringTopic: "stoa.metering"
    errorsTopic: "stoa.errors"

  # Shadow mode settings
  shadow:
    captureSource: inline
    minSamples: 10

  # Ingress (Phase 2: CAB-1109)
  ingress:
    enabled: false
    className: nginx
    host: mcp.gostoa.dev
    annotations: {}
    tls: []

  nodeSelector: {}
  tolerations: []
  extraEnv: []

# Autoscaling (HPA) — stoa-gateway (Rust). Other components: see controlPlaneApi/controlPlaneUi/portal/mcpGateway sections below.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  scaleDownStabilizationSeconds: 300

# Pod Disruption Budget — stoa-gateway (Rust). Other components: see controlPlaneApi/controlPlaneUi/portal/mcpGateway sections below.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# ==============================================================================
# STOA Sidecar Configuration (ADR-028: Tier 2 - Third-Party Gateway Integration)
# ==============================================================================
# Deploy STOA Gateway in sidecar mode alongside third-party gateways
# (WebMethods, Kong, Envoy, Apigee). Provides:
# - ext_authz endpoint for policy enforcement
# - Rate limiting
# - Usage metering via Kafka
# - OIDC token validation
#
# Example usage for WebMethods:
#   stoaSidecar:
#     enabled: true
#     targetGateway: webmethods
#     mainGateway:
#       enabled: true
#       image:
#         repository: softwareag/webmethods-api-gateway
#         tag: "10.15"
#       port: 9072
#       env:
#         - name: EXT_AUTHZ_URL
#           value: "http://localhost:8081/authz"
# ==============================================================================
stoaSidecar:
  enabled: false
  # Target gateway type (for labeling/identification)
  targetGateway: webmethods  # webmethods | kong | envoy | apigee | generic

  # STOA Sidecar image (Rust gateway in sidecar mode)
  image:
    repository: ghcr.io/stoa-platform/stoa-gateway
    tag: latest
    pullPolicy: Always

  replicas: 2
  serviceAccount: default
  environment: dev  # dev | staging | prod

  # Control Plane connection (for auto-registration)
  controlPlaneUrl: "http://control-plane-api.stoa-system.svc.cluster.local:8000"

  # Keycloak OIDC (for token validation)
  keycloakUrl: ""
  keycloakRealm: stoa
  keycloakClientId: stoa-sidecar

  # Secret containing credentials
  secretName: stoa-sidecar-secrets

  # Policy enforcement
  policyEnabled: true

  # Logging
  logLevel: info
  logFormat: json

  # Service configuration
  service:
    type: ClusterIP
    port: 80

  # Main gateway container (third-party gateway running alongside)
  mainGateway:
    enabled: true
    image:
      repository: softwareag/webmethods-api-gateway
      tag: "10.15"
      pullPolicy: IfNotPresent
    port: 9072
    env:
      # WebMethods-specific environment variables
      - name: JAVA_OPTS
        value: "-Xms512m -Xmx1g"
      # Configure ext_authz to point to STOA sidecar
      - name: EXT_AUTHZ_ENABLED
        value: "true"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi

  # STOA sidecar resources (minimal footprint)
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

  nodeSelector: {}
  tolerations: []
  extraEnv: []

# Gateway OpenAPI Sync Configuration
# Automatically syncs OpenAPI spec from Control-Plane-API to webMethods Gateway
gatewaySync:
  # Enable/disable automatic sync
  enabled: true

  # CronJob schedule (default: every 6 hours)
  schedule: "0 */6 * * *"

  # Image for the sync job
  image: curlimages/curl:8.5.0

  # Backend API URL (Control-Plane-API)
  backendUrl: "http://control-plane-api.stoa-system.svc.cluster.local:8000"

  # Gateway admin URL
  gatewayUrl: "http://apigateway.stoa-system.svc.cluster.local:5555"

  # API configuration
  apiName: "Control-Plane-API"
  apiVersion: "2.0"

  # Secret containing Gateway credentials (keys: username, password)
  credentialsSecret: "apigateway-credentials"

  # Service account for the job
  serviceAccount: "default"

# Vault Monitoring & Credentials Integrity (CAB-1042)
# NOTE: Vault itself is deployed via stoa-infra (hashicorp/vault Helm chart).
# These resources add monitoring and credentials verification to the stoa-platform chart.
vault:
  # Vault namespace (where hashicorp/vault is deployed)
  namespace: vault

  monitoring:
    # ServiceMonitor for Vault metrics scraping
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
      # Optional: bearer token for authenticated /v1/sys/metrics
      # bearerTokenSecret:
      #   name: vault-metrics-token
      #   key: token

    # PrometheusRule with alerts for sealed state, auto-unseal failures, etc.
    prometheusRule:
      enabled: false

  # CronJob that verifies PostgreSQL credentials from Vault-synced K8s secret
  credentialsCheck:
    enabled: false
    schedule: "0 */6 * * *"
    image: postgres:16-alpine
    serviceAccount: default
    # K8s secret synced from Vault by External Secrets Operator
    secretName: postgresql-credentials

# ==============================================================================
# Monitoring OIDC Configuration (CAB-1103 Phase 6B)
# ==============================================================================
# Configures OIDC authentication for Grafana, oauth2-proxy for Prometheus,
# and AlertManager routing. All secrets are referenced via K8s Secrets.

grafana:
  oidc:
    enabled: false
    name: "STOA SSO"
    clientId: "stoa-observability"
    existingSecret: "stoa-observability-oidc"
    scopes: "openid profile email"
    authUrl: "https://auth.gostoa.dev/realms/stoa/protocol/openid-connect/auth"
    tokenUrl: "https://auth.gostoa.dev/realms/stoa/protocol/openid-connect/token"
    apiUrl: "https://auth.gostoa.dev/realms/stoa/protocol/openid-connect/userinfo"
    roleAttributePath: "contains(roles[*], 'stoa:admin') && 'Admin' || 'Viewer'"
    allowAssignGrafanaAdmin: true
    rootUrl: "https://grafana.gostoa.dev"
    serveFromSubPath: true
    allowEmbedding: true

prometheus:
  oauth2Proxy:
    enabled: false
    image:
      repository: quay.io/oauth2-proxy/oauth2-proxy
      tag: v7.6.0
      pullPolicy: IfNotPresent
    provider: "keycloak-oidc"
    clientId: "stoa-observability"
    existingSecret: "stoa-observability-oidc"
    issuerUrl: "https://auth.gostoa.dev/realms/stoa"
    redirectUrl: "https://prometheus.gostoa.dev/oauth2/callback"
    upstream: "http://prometheus:9090"
    scope: "openid profile email"
    cookieName: "_stoa_prometheus_oauth2"
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

# ==============================================================================
# Control Plane API Monitoring (Gap #5 — 2026-02-22)
# ==============================================================================
# The control-plane-api exposes /metrics via prometheus_client (OpenMetrics).
