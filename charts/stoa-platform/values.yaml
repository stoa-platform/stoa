# STOA Platform Helm Values
# =========================

# Gateway Configuration (CAB-958: Unified Gateway Architecture)
# See ADR-024: https://docs.gostoa.dev/architecture/adr/adr-024-gateway-unified-modes
# Currently runs Python mcp-gateway. Will migrate to Rust stoa-gateway Q4 2026.
gateway:
  # Current production image (Python mcp-gateway)
  image:
    repository: ghcr.io/hlfh/mcp-gateway
    tag: latest
    pullPolicy: IfNotPresent

  # Future: mode selection (not active yet, prepared for Rust gateway)
  # mode: edge-mcp  # edge-mcp | sidecar | proxy | shadow

  # Mode-specific configuration (prepared for future use)
  edgeMcp:
    enabled: true
    port: 3001
    mcpTimeout: 30s
    maxToolsPerRequest: 100

  sidecar:
    enabled: false
    primaryGateway: ""  # kong | envoy | apigee | webmethods
    metricsEnabled: true
    meteringEnabled: true

  proxy:
    enabled: false
    upstream: ""
    opaEndpoint: ""
    rateLimitEnabled: true

  shadow:
    enabled: false  # DEFERRED - requires security review (ADR-024)
    # targetBackend: ""
    # piiMaskingEnabled: true
    # retentionDays: 30

# STOA Gateway (Rust) Configuration
# Emerging Rust implementation - will replace Python mcp-gateway Q4 2026
stoaGateway:
  enabled: false  # Enable when ready for production
  image:
    repository: 848853684735.dkr.ecr.eu-west-1.amazonaws.com/apim/stoa-gateway
    tag: latest
    pullPolicy: Always
  replicas: 2
  serviceAccount: default

  # Control Plane (Python FastAPI backend)
  controlPlaneUrl: "http://control-plane-api.stoa-system.svc.cluster.local:8000"

  # Keycloak OIDC
  keycloakUrl: ""
  keycloakRealm: stoa
  keycloakClientId: stoa-mcp-gateway

  # Secret containing JWT_SECRET, KEYCLOAK_CLIENT_SECRET, ADMIN_API_TOKEN
  secretName: stoa-gateway-secrets

  # ExternalSecret (Vault-backed)
  externalSecret:
    enabled: false
    refreshInterval: 1h
    secretStoreRef: vault-backend
    vaultPath: stoa/data/gateway

  # ServiceMonitor for Prometheus autodiscovery
  serviceMonitor:
    enabled: true
    interval: 15s
    scrapeTimeout: 10s

  # Observability
  logLevel: info
  logFormat: json
  # OpenTelemetry Collector endpoint (Grafana Alloy in stoa-monitoring namespace)
  # Set to enable distributed tracing export via OTLP gRPC
  otelEndpoint: ""  # e.g. "http://stoa-alloy-otlp.stoa-monitoring:4317"

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

  nodeSelector: {}
  tolerations: []
  extraEnv: []

# ==============================================================================
# STOA Sidecar Configuration (ADR-028: Tier 2 - Third-Party Gateway Integration)
# ==============================================================================
# Deploy STOA Gateway in sidecar mode alongside third-party gateways
# (WebMethods, Kong, Envoy, Apigee). Provides:
# - ext_authz endpoint for policy enforcement
# - Rate limiting
# - Usage metering via Kafka
# - OIDC token validation
#
# Example usage for WebMethods:
#   stoaSidecar:
#     enabled: true
#     targetGateway: webmethods
#     mainGateway:
#       enabled: true
#       image:
#         repository: softwareag/webmethods-api-gateway
#         tag: "10.15"
#       port: 9072
#       env:
#         - name: EXT_AUTHZ_URL
#           value: "http://localhost:8081/authz"
# ==============================================================================
stoaSidecar:
  enabled: false
  # Target gateway type (for labeling/identification)
  targetGateway: webmethods  # webmethods | kong | envoy | apigee | generic

  # STOA Sidecar image (Rust gateway in sidecar mode)
  image:
    repository: 848853684735.dkr.ecr.eu-west-1.amazonaws.com/apim/stoa-gateway
    tag: latest
    pullPolicy: Always

  replicas: 2
  serviceAccount: default
  environment: dev  # dev | staging | prod

  # Control Plane connection (for auto-registration)
  controlPlaneUrl: "http://control-plane-api.stoa-system.svc.cluster.local:8000"

  # Keycloak OIDC (for token validation)
  keycloakUrl: ""
  keycloakRealm: stoa
  keycloakClientId: stoa-sidecar

  # Secret containing credentials
  secretName: stoa-sidecar-secrets

  # Policy enforcement
  policyEnabled: true

  # Logging
  logLevel: info
  logFormat: json

  # Service configuration
  service:
    type: ClusterIP
    port: 80

  # Main gateway container (third-party gateway running alongside)
  mainGateway:
    enabled: true
    image:
      repository: softwareag/webmethods-api-gateway
      tag: "10.15"
      pullPolicy: IfNotPresent
    port: 9072
    env:
      # WebMethods-specific environment variables
      - name: JAVA_OPTS
        value: "-Xms512m -Xmx1g"
      # Configure ext_authz to point to STOA sidecar
      - name: EXT_AUTHZ_ENABLED
        value: "true"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi

  # STOA sidecar resources (minimal footprint)
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

  nodeSelector: {}
  tolerations: []
  extraEnv: []

# Gateway OpenAPI Sync Configuration
# Automatically syncs OpenAPI spec from Control-Plane-API to webMethods Gateway
gatewaySync:
  # Enable/disable automatic sync
  enabled: true

  # CronJob schedule (default: every 6 hours)
  schedule: "0 */6 * * *"

  # Image for the sync job
  image: curlimages/curl:8.5.0

  # Backend API URL (Control-Plane-API)
  backendUrl: "http://control-plane-api.stoa-system.svc.cluster.local:8000"

  # Gateway admin URL
  gatewayUrl: "http://apigateway.stoa-system.svc.cluster.local:5555"

  # API configuration
  apiName: "Control-Plane-API"
  apiVersion: "2.0"

  # Secret containing Gateway credentials (keys: username, password)
  credentialsSecret: "apigateway-credentials"

  # Service account for the job
  serviceAccount: "default"
