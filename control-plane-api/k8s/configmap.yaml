---
# ConfigMap for stoa-control-plane-api
# Contains non-sensitive configuration variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: stoa-control-plane-api-config
  namespace: stoa-system
  labels:
    app: stoa-control-plane-api
    app.kubernetes.io/name: stoa-control-plane-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: stoa-platform
data:
  # Base domain for URL construction
  BASE_DOMAIN: "gostoa.dev"

  # API Configuration
  VERSION: "2.0.0"
  DEBUG: "false"
  ENVIRONMENT: "production"

  # Keycloak Authentication (internal URL avoids hairpin NAT through LB)
  KEYCLOAK_URL: "http://keycloak.stoa-system.svc.cluster.local"
  KEYCLOAK_REALM: "stoa"
  KEYCLOAK_CLIENT_ID: "control-plane-api"
  KEYCLOAK_VERIFY_SSL: "false"

  # Git Provider Selection (gitlab or github)
  GIT_PROVIDER: "github"

  # GitLab Integration
  GITLAB_URL: "https://gitlab.com"
  GITLAB_DEFAULT_BRANCH: "main"

  # Legacy GitLab project IDs — unused since GIT_PROVIDER=github (2026-03)
  # GITLAB_PROJECT_ID: "47495759"
  # GITLAB_CATALOG_PROJECT_ID: "47495759"
  # GITLAB_CATALOG_PROJECT_PATH: "cab6961310/stoa-catalog"

  # GITLAB_GITOPS — see above
  # GITLAB_GITOPS_PROJECT_ID: "77260481"
  # GITLAB_GITOPS_PROJECT_PATH: "cab6961310/stoa-gitops"

  # GitHub Integration (used when GIT_PROVIDER=github)
  GITHUB_TOKEN: ""
  GITHUB_ORG: "stoa-platform"
  GITHUB_CATALOG_REPO: "stoa-catalog"
  GITHUB_GITOPS_REPO: "stoa-gitops"
  GITHUB_WEBHOOK_SECRET: ""

  # Kafka/Redpanda Event Streaming
  KAFKA_ENABLED: "true"
  KAFKA_BOOTSTRAP_SERVERS: "redpanda.stoa-system.svc.cluster.local:9092"
  KAFKA_SECURITY_PROTOCOL: "PLAINTEXT"

  # API Gateway
  GATEWAY_URL: "https://vps-wm.gostoa.dev"
  GATEWAY_ADMIN_PROXY_URL: "https://apis.gostoa.dev/gateway/Gateway-Admin-API/1.0"
  GATEWAY_USE_OIDC_PROXY: "true"

  # MCP Gateway (internal K8s service for reliable proxy)
  MCP_GATEWAY_URL: "http://stoa-gateway.stoa-system.svc.cluster.local:80"

  # ArgoCD (internal URL avoids hairpin NAT through LB)
  ARGOCD_URL: "http://argocd-server.argocd.svc.cluster.local"
  ARGOCD_EXTERNAL_URL: "https://argocd.gostoa.dev"
  ARGOCD_VERIFY_SSL: "false"
  ARGOCD_PLATFORM_APPS: "stoa-gateway"

  # CORS
  CORS_ORIGINS: "https://console.gostoa.dev,https://portal.gostoa.dev,http://localhost:3000,http://localhost:5173"

  # Logging
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  LOG_HTTP_MIDDLEWARE_ENABLED: "true"
  LOG_MASKING_ENABLED: "true"

  # Database
  DATABASE_POOL_SIZE: "10"
  DATABASE_MAX_OVERFLOW: "10"

  # OpenSearch (CAB-307: Audit Trail)
  OPENSEARCH_HOST: "http://opensearch.opensearch.svc.cluster.local:9200"
  OPENSEARCH_USER: "admin"
  OPENSEARCH_VERIFY_CERTS: "false"
  AUDIT_ENABLED: "true"
  AUDIT_BUFFER_SIZE: "100"
  AUDIT_FLUSH_INTERVAL: "5.0"
