apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane-ui
  namespace: stoa-system
  labels:
    app: control-plane-ui
    app.kubernetes.io/name: control-plane-ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: stoa-platform
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: control-plane-ui
  template:
    metadata:
      labels:
        app: control-plane-ui
        app.kubernetes.io/name: control-plane-ui
    spec:
      automountServiceAccountToken: false
      containers:
        - name: control-plane-ui
          image: ghcr.io/stoa-platform/control-plane-ui:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          env:
            - name: API_BACKEND_URL
              value: "http://stoa-control-plane-api.stoa-system.svc:80"
            - name: VITE_BASE_DOMAIN
              value: "gostoa.dev"
            - name: VITE_KEYCLOAK_URL
              value: "https://auth.gostoa.dev"
            - name: VITE_KEYCLOAK_REALM
              value: "stoa"
            - name: VITE_KEYCLOAK_CLIENT_ID
              value: "control-plane-ui"
            - name: VITE_API_URL
              value: "https://apis.gostoa.dev/gateway/Control-Plane-API/2.0"
            - name: LOGS_BACKEND_URL
              value: "http://opensearch-dashboards.stoa-system.svc:5601"
            - name: GRAFANA_BACKEND_URL
              value: "http://grafana.stoa-system.svc:3000"
          securityContext:
            privileged: false
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      securityContext:
        runAsNonRoot: true
        fsGroup: 101
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-conf
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane-ui
  namespace: stoa-system
  labels:
    app: control-plane-ui
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: control-plane-ui
