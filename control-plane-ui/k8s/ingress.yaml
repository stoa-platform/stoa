apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: control-plane-ui
  namespace: stoa-system
  labels:
    app: control-plane-ui
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # CAB-1108: Allow iframe embedding of Grafana, Keycloak, OpenSearch Dashboards
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_hide_header X-Frame-Options;
      add_header Content-Security-Policy "frame-ancestors 'self' https://console.gostoa.dev" always;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - console.gostoa.dev
      secretName: control-plane-ui-tls
  rules:
    - host: console.gostoa.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: control-plane-ui
                port:
                  number: 80
