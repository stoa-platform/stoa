# CAB-1089 Phase 4: Alertmanager Secrets Template
#
# Template for creating the Kubernetes secret that holds notification
# credentials. DO NOT commit actual values — use SealedSecrets,
# Vault, or manual `kubectl create secret`.
#
# Usage (manual):
#   kubectl create secret generic stoa-alertmanager-secrets \
#     -n stoa-monitoring \
#     --from-literal=slack-webhook-incidents='https://hooks.slack.com/services/T.../B.../...' \
#     --from-literal=slack-webhook-critical='https://hooks.slack.com/services/T.../B.../...' \
#     --from-literal=slack-webhook-alerts='https://hooks.slack.com/services/T.../B.../...' \
#     --from-literal=slack-webhook-slo='https://hooks.slack.com/services/T.../B.../...' \
#     --from-literal=pagerduty-routing-key='<pagerduty-events-v2-routing-key>' \
#     --from-literal=smtp-username='alertmanager@gostoa.dev' \
#     --from-literal=smtp-password='<smtp-password>'
#
# Usage (Vault + External Secrets Operator):
#   See ExternalSecret resource below.
#
# Slack channels:
#   #stoa-incidents       → Enterprise + Business critical alerts
#   #stoa-alerts-critical → Demo/Platform critical alerts
#   #stoa-alerts          → All warning-level alerts
#   #stoa-slo             → SLO burn-rate + error budget alerts
#
# PagerDuty:
#   Events API v2 routing key from PagerDuty service integration.
#   Only pages for enterprise-tier critical + SLO fast-burn alerts.

---
# Option A: Plain Secret template (fill in values, DO NOT commit)
apiVersion: v1
kind: Secret
metadata:
  name: stoa-alertmanager-secrets
  namespace: stoa-monitoring
  labels:
    app.kubernetes.io/part-of: stoa-platform
  annotations:
    gostoa.dev/created-by: cab-1089
    gostoa.dev/warning: "TEMPLATE ONLY — replace placeholders before applying"
type: Opaque
stringData:
  # Slack incoming webhook URLs
  slack-webhook-incidents: "REPLACE_WITH_SLACK_WEBHOOK_URL_INCIDENTS"
  slack-webhook-critical: "REPLACE_WITH_SLACK_WEBHOOK_URL_CRITICAL"
  slack-webhook-alerts: "REPLACE_WITH_SLACK_WEBHOOK_URL_ALERTS"
  slack-webhook-slo: "REPLACE_WITH_SLACK_WEBHOOK_URL_SLO"

  # PagerDuty Events API v2 routing key
  pagerduty-routing-key: "REPLACE_WITH_PAGERDUTY_ROUTING_KEY"

  # SMTP credentials for email digest
  smtp-username: "REPLACE_WITH_SMTP_USERNAME"
  smtp-password: "REPLACE_WITH_SMTP_PASSWORD"

