# ArgoCD OIDC Configuration for Keycloak SSO (Native OIDC, no Dex)
# Applied via: kubectl apply -f deploy/argocd/oidc-config.yaml
# Reference: https://argo-cd.readthedocs.io/en/stable/operator-manual/user-management/
#
# IMPORTANT: This uses ArgoCD native OIDC (not Dex). Dex was removed because
# we have a single IdP (Keycloak) and Dex adds unnecessary complexity.
#
# Prerequisites:
# 1. Keycloak client "argocd" with redirect URI: https://argocd.gostoa.dev/auth/callback
# 2. Keycloak realm-roles mapper on argocd client: realm roles → "groups" claim
# 3. CoreDNS rewrite in coredns-custom (kube-system):
#      rewrite name auth.gostoa.dev ingress-nginx-controller.ingress-nginx.svc.cluster.local
#    This is needed because auth.gostoa.dev resolves to the nginx-gateway LB external IP,
#    which is unreachable from inside OVH MKS (no hairpin NAT).
# 4. NetworkPolicy allow-argocd-to-keycloak (k8s/network-policies/20-argocd.yaml)
#
# Two authentication flows:
# 1. Direct SSO login via ArgoCD UI (standard OIDC flow)
# 2. API access via Control-Plane-API forwarding user's Keycloak token
#
# For flow #2 to work, we must NOT use enableUserInfoGroups because ArgoCD
# won't have the token in its session cache. Instead, we use JWT claims directly.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # ArgoCD URL - MUST match ingress hostname
  url: https://argocd.gostoa.dev

  # Native OIDC Configuration for Keycloak (no Dex)
  # NOTE: Do NOT use enableUserInfoGroups - it breaks API token forwarding
  oidc.config: |
    name: Keycloak
    issuer: https://auth.gostoa.dev/realms/stoa
    clientID: argocd
    clientSecret: $oidc.keycloak.clientSecret
    requestedScopes:
      - openid
      - profile
      - email
      - roles
    # Accept tokens from multiple Keycloak clients (Console UI, Portal, etc.)
    allowedAudiences:
      - argocd
      - stoa-console
      - control-plane-api
      - control-plane-ui
      - stoa-portal
      - account
    # Skip audience check for tokens without explicit audience
    skipAudienceCheckWhenTokenHasNoAudience: true
    # Use PKCE for enhanced security
    codeChallenge: S256
    logoutURL: https://auth.gostoa.dev/realms/stoa/protocol/openid-connect/logout?client_id=argocd&post_logout_redirect_uri=https://argocd.gostoa.dev
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  # Default policy - all authenticated users get readonly access
  policy.default: role:readonly

  # Use glob matching for flexible patterns
  policy.matchMode: glob

  # Scopes to use for RBAC
  # Uses "groups" claim from Keycloak (contains realm roles via protocol mapper)
  scopes: "[groups]"

  # RBAC Policy
  policy.csv: |
    # ArgoCD RBAC Policy for Keycloak SSO
    # ===================================
    #
    # Role memberships come from the "groups" claim in JWT tokens.
    # Keycloak realm roles (cpi-admin, devops, viewer) are mapped to
    # the "groups" claim via a realm-roles protocol mapper on the argocd client.

    # Admin role - full access to all resources
    p, role:cpi-admin, applications, *, */*, allow
    p, role:cpi-admin, clusters, *, *, allow
    p, role:cpi-admin, repositories, *, *, allow
    p, role:cpi-admin, accounts, *, *, allow
    p, role:cpi-admin, certificates, *, *, allow
    p, role:cpi-admin, gpgkeys, *, *, allow
    p, role:cpi-admin, logs, *, *, allow
    p, role:cpi-admin, exec, create, */*, allow
    p, role:cpi-admin, projects, *, *, allow

    # Readonly role - view-only access
    p, role:readonly, applications, get, */*, allow
    p, role:readonly, clusters, get, *, allow
    p, role:readonly, repositories, get, *, allow
    p, role:readonly, projects, get, *, allow
    p, role:readonly, logs, get, */*, allow

    # DevOps role - deploy and sync applications
    p, role:devops, applications, get, */*, allow
    p, role:devops, applications, sync, */*, allow
    p, role:devops, applications, action/*, */*, allow
    p, role:devops, logs, get, */*, allow
    p, role:devops, repositories, get, *, allow
    p, role:devops, projects, get, *, allow

    # Keycloak realm role → ArgoCD role mappings (via "groups" claim)
    g, cpi-admin, role:cpi-admin
    g, devops, role:devops
    g, viewer, role:readonly
    g, stoa-api, role:readonly
