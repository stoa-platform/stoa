  # Note: Semantic caching (TTL 60s) configured at gateway level

  enabled: true
---
# =============================================================================
# ConfigMap: OASIS AI Configuration
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: oasis-ai-config
  namespace: tenant-oasis
  labels:
    gostoa.dev/tenant: oasis
data:
  ai-models.yaml: |
    models:
      huggingface:
        sentiment: distilbert-base-uncased-finetuned-sst-2-english
        classification: facebook/bart-large-mnli
        summarization: facebook/bart-large-cnn
        qa: deepset/roberta-base-squad2
      together:
        chat: meta-llama/Llama-2-70b-chat-hf
        embeddings: togethercomputer/m2-bert-80M-8k-retrieval
      stability:
        image: stable-diffusion-xl-1024-v1-0

  token-budgets.yaml: |
    budgets:
      daily:
        huggingface: 100000
        together: 50000
        stability: 1000
      per_request:
        sentiment: 500
        classification: 1000
        summarization: 2000
        chat: 4000

  external-mcp-servers.yaml: |
    servers:
      - name: github-mcp
        url: stdio://github-mcp-server
        enabled: true
        capabilities:
          - create_issue
          - create_pr
          - search_code
      - name: filesystem-mcp
        url: stdio://filesystem-mcp-server
        enabled: true
        sandboxed: true
        allowed_paths:
          - /workspace
          - /tmp
      - name: memory-mcp
        url: stdio://memory-mcp-server
        enabled: true
        capabilities:
          - store
          - retrieve
          - search
