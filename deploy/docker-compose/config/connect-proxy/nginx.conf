server {
    listen 8080;
    server_name _;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 'OK';
    }

    # Simulate a third-party gateway that forwards to echo backend
    # stoa-gateway-connect sits in front, adding observability
    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://echo-backend:8888;
    }

    # Gateway direct access (metrics, health)
    location /gateway/ {
        rewrite ^/gateway/(.*) /$1 break;
        proxy_pass http://stoa-gateway-connect:8083;
    }
}
