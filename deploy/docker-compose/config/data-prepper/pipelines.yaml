# Data Prepper pipeline: OTLP traces → OpenSearch + service map (CAB-1976)
#
# Receives OTLP gRPC spans from stoa-gateway, writes to:
#   1. OpenSearch otel-v1-apm-span-* indices (primary, queryable by Call Flow)
#   2. Service map indices for OpenSearch Trace Analytics
#
# Credentials injected via environment variables.

otel-traces-pipeline:
  source:
    otel_trace_source:
      ssl: false
  processor:
    - otel_traces:
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: "${OPENSEARCH_USER}"
        password: "${OPENSEARCH_PASSWORD}"
        insecure: true
        index_type: trace-analytics-raw

otel-traces-service-map:
  source:
    pipeline:
      name: "otel-traces-pipeline"
  processor:
    - service_map:
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: "${OPENSEARCH_USER}"
        password: "${OPENSEARCH_PASSWORD}"
        insecure: true
        index_type: trace-analytics-service-map
