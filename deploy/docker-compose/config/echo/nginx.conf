server {
    listen 8888;
    server_name _;

    # Echo all requests with 200 + JSON body containing request details
    location / {
        default_type application/json;
        return 200 '{"status":"ok","path":"$request_uri","method":"$request_method","host":"$host","timestamp":"$time_iso8601","server":"echo-backend"}';
        add_header X-Echo-Backend "stoa-local" always;
        add_header X-Request-Method "$request_method" always;
    }

    # Health check
    location /health {
        default_type application/json;
        return 200 '{"status":"healthy"}';
    }
}
