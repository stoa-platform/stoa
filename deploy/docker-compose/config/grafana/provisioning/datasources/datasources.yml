# =============================================================================
# STOA Platform - Grafana Datasources
# =============================================================================

apiVersion: 1

datasources:
  # ---------------------------------------------------------------------------
  # Prometheus - Metrics
  # ---------------------------------------------------------------------------
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  # ---------------------------------------------------------------------------
  # Loki - Logs
  # ---------------------------------------------------------------------------
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      timeout: 60

  # ---------------------------------------------------------------------------
  # OpenSearch - Error Snapshots & Audit Logs
  # ---------------------------------------------------------------------------
  - name: OpenSearch
    type: grafana-opensearch-datasource
    uid: opensearch
    access: proxy
    url: https://opensearch:9200
    editable: false
    jsonData:
      database: "stoa-errors-*"
      flavor: opensearch
      version: "2.11.0"
      pplEnabled: true
      timeField: "@timestamp"
      tlsSkipVerify: true
      logMessageField: error_message
      logLevelField: severity
    secureJsonData:
      basicAuthPassword: "${OPENSEARCH_PASSWORD:-admin}"
    basicAuth: true
    basicAuthUser: "${OPENSEARCH_USER:-admin}"
