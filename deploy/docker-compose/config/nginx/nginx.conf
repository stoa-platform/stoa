# =============================================================================
# STOA Platform - Unified Reverse Proxy
# =============================================================================
# CAB-1108 Phase 3 + CAB-1114 Phase 1
# Single entry point for Console, Grafana, STOA Logs, Keycloak, API
#
# Routes:
#   /           → Control Plane UI (port 3000)
#   /grafana/*  → Grafana (port 3000 internal)
#   /logs/*     → OpenSearch Dashboards (port 5601 internal)
#   /auth/*     → Keycloak (port 8080 internal)
#   /api/*      → Control Plane API (port 8000)
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript;

    # Upstream definitions
    upstream console_ui {
        server control-plane-ui:8080;
    }

    upstream grafana {
        server grafana:3000;
    }

    upstream keycloak {
        server keycloak:8080;
    }

    upstream opensearch_dashboards {
        server opensearch-dashboards:5601;
    }

    upstream api {
        server control-plane-api:8000;
    }

    # Map for WebSocket upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name localhost console.gostoa.dev;

        # Security headers (applied globally, can be overridden per location)
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # =====================================================================
        # Grafana - /grafana/*
        # Note: Grafana is configured with SERVE_FROM_SUB_PATH=true
        # so it expects the full /grafana path prefix
        # =====================================================================
        location /grafana/ {
            proxy_pass http://grafana;

            # Strip X-Frame-Options to allow iframe embedding
            proxy_hide_header X-Frame-Options;

            # Add permissive frame-ancestors for Console embedding
            add_header Content-Security-Policy "frame-ancestors 'self' http://localhost:* https://console.gostoa.dev" always;

            # Proxy headers
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Grafana WebSocket for Live features
        location /grafana/api/live/ {
            proxy_pass http://grafana;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket timeouts
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # =====================================================================
        # OpenSearch Dashboards (STOA Logs) - /logs/*
        # Note: Dashboards is configured with server.basePath="/logs"
        # and server.rewriteBasePath=true
        # =====================================================================
        location /logs/ {
            proxy_pass http://opensearch_dashboards;

            # Strip X-Frame-Options to allow iframe embedding
            proxy_hide_header X-Frame-Options;

            # Add permissive frame-ancestors for Console embedding
            add_header Content-Security-Policy "frame-ancestors 'self' http://localhost:* https://console.gostoa.dev" always;

            # Proxy headers
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Buffer settings (Dashboards can have large responses)
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # =====================================================================
        # Keycloak - /auth/*
        # =====================================================================
        location /auth/ {
            proxy_pass http://keycloak/;

            # Strip X-Frame-Options to allow iframe embedding
            proxy_hide_header X-Frame-Options;

            # Add permissive frame-ancestors for Console embedding
            add_header Content-Security-Policy "frame-ancestors 'self' http://localhost:* https://console.gostoa.dev" always;

            # Proxy headers
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Buffer settings for Keycloak
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # =====================================================================
        # Control Plane API - /api/*
        # =====================================================================
        location /api/ {
            proxy_pass http://api/;

            # Proxy headers
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # API timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # =====================================================================
        # Control Plane UI - / (default)
        # =====================================================================
        location / {
            proxy_pass http://console_ui;

            # Proxy headers
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for HMR (dev mode)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
