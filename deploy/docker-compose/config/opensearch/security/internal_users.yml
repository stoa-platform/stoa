# =============================================================================
# STOA Platform - OpenSearch Internal Users
# =============================================================================
# CAB-1114 Phase 3: Service accounts for admin and Dashboards
# =============================================================================

_meta:
  type: "internalusers"
  config_version: 2

# Admin user — used by init scripts and securityadmin CLI
# Credential managed via Infisical /opensearch/ADMIN_PASSWORD — regenerate hash with:
#   plugins/opensearch-security/tools/hash.sh -p "<value from Infisical>"
admin:
  hash: "REPLACE_WITH_BCRYPT_HASH_FROM_INFISICAL"
  reserved: true
  backend_roles:
    - "admin"
  description: "OpenSearch admin user"

# Dashboards service account — used by OpenSearch Dashboards to communicate with OpenSearch
# Credential managed via Infisical /opensearch/DASHBOARDS_PASSWORD
kibanaserver:
  hash: "REPLACE_WITH_BCRYPT_HASH_FROM_INFISICAL"
  reserved: true
  description: "OpenSearch Dashboards internal service account"
