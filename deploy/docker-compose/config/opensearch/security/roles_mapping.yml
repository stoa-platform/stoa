# =============================================================================
# STOA Platform - OpenSearch Roles Mapping
# =============================================================================
# CAB-1114 Phase 3: Map Keycloak users/roles to OpenSearch roles
# =============================================================================
# Mapping uses 'users' (preferred_username from JWT subject_key) for
# tenant-specific roles, since backend_roles (realm roles like tenant-admin)
# are shared across tenants.
# =============================================================================

_meta:
  type: "rolesmapping"
  config_version: 2

# Admin access for internal admin user
all_access:
  reserved: false
  backend_roles:
    - "admin"

# Dashboards internal service account
kibana_server:
  reserved: true
  users:
    - "kibanaserver"

# All OIDC users get basic Dashboards access
kibana_user:
  reserved: false
  backend_roles:
    - "cpi-admin"
    - "tenant-admin"
    - "devops"
    - "viewer"

# Platform admins see all tenant logs
stoa_logs_admin:
  reserved: false
  backend_roles:
    - "cpi-admin"

# Oasis Gunters tenant members
stoa_logs_tenant_oasis_gunters:
  reserved: false
  users:
    - "parzival"
    - "art3mis"
    - "aech"

# IOI Sixers tenant members
stoa_logs_tenant_ioi_sixers:
  reserved: false
  users:
    - "sorrento"
    - "sixer42"

# =============================================================================
# Gateway Telemetry Logs — CAB-1684
# =============================================================================

# Platform admins see all gateway telemetry
stoa_gw_admin:
  reserved: false
  backend_roles:
    - "cpi-admin"

# Internal writer (control-plane-api service account)
stoa_gw_writer:
  reserved: false
  users:
    - "stoa-api"

# Oasis Gunters — tenant-admin/devops see own tenant logs (DLS)
stoa_gw_tenant_oasis_gunters:
  reserved: false
  users:
    - "parzival"
    - "art3mis"
    - "aech"

# IOI Sixers — tenant-admin/devops see own tenant logs (DLS)
stoa_gw_tenant_ioi_sixers:
  reserved: false
  users:
    - "sorrento"
    - "sixer42"

# Oasis Gunters — viewer (DLS + FLS, no PII)
stoa_gw_viewer_oasis_gunters:
  reserved: false
  users: []

# IOI Sixers — viewer (DLS + FLS, no PII)
stoa_gw_viewer_ioi_sixers:
  reserved: false
  users: []
