# =============================================================================
# STOA Platform - Prometheus Configuration
# =============================================================================
# Scrapes metrics from the Control Plane API
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'quickstart'
    platform: 'stoa'

# Scrape configurations
scrape_configs:
  # -------------------------------------------------------------------------
  # STOA Control Plane API
  # -------------------------------------------------------------------------
  - job_name: 'stoa-control-plane-api'
    static_configs:
      - targets: ['control-plane-api:8000']
        labels:
          service: 'control-plane-api'
    metrics_path: /metrics
    scrape_interval: 10s

  # -------------------------------------------------------------------------
  # STOA Gateway (Rust)
  # -------------------------------------------------------------------------
  - job_name: 'stoa-gateway'
    static_configs:
      - targets: ['stoa-gateway:8080']
        labels:
          service: 'stoa-gateway'
    metrics_path: /metrics
    scrape_interval: 10s

  # -------------------------------------------------------------------------
  # STOA Gateway — Link/Sidecar Mode
  # -------------------------------------------------------------------------
  - job_name: 'stoa-link'
    static_configs:
      - targets: ['stoa-gateway-link:8081']
        labels:
          service: 'stoa-gateway'
          mode: 'sidecar'
    metrics_path: /metrics
    scrape_interval: 10s

  # -------------------------------------------------------------------------
  # STOA Gateway — Connect Mode
  # -------------------------------------------------------------------------
  - job_name: 'stoa-connect'
    static_configs:
      - targets: ['stoa-gateway-connect:8083']
        labels:
          service: 'stoa-gateway'
          mode: 'connect'
    metrics_path: /metrics
    scrape_interval: 10s

  # -------------------------------------------------------------------------
  # STOA Gateway — K3s Staging (Hetzner)
  # -------------------------------------------------------------------------
  - job_name: 'stoa-gateway-k3s'
    scheme: https
    static_configs:
      - targets: ['staging-mcp.gostoa.dev:443']
        labels:
          service: 'stoa-gateway'
          environment: 'staging'
          cluster: 'k3s-hetzner'
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # -------------------------------------------------------------------------
  # Redpanda (Kafka-compatible event streaming)
  # -------------------------------------------------------------------------
  - job_name: 'redpanda'
    static_configs:
      - targets: ['redpanda:9644']
        labels:
          service: 'redpanda'
          component: 'event-backbone'
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # -------------------------------------------------------------------------
  # Keycloak (Authentication)
  # -------------------------------------------------------------------------
  - job_name: 'keycloak'
    static_configs:
      - targets: ['keycloak:8080']
        labels:
          service: 'keycloak'
          component: 'authentication'
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # -------------------------------------------------------------------------
  # Prometheus self-monitoring
  # -------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
