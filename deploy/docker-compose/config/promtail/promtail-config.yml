# =============================================================================
# STOA Platform - Promtail Configuration (Quick Start)
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s

scrape_configs:
  # ==========================================================================
  # Docker Container Logs
  # ==========================================================================
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Keep only STOA platform containers
      - source_labels: ['__meta_docker_container_name']
        regex: '.*stoa.*|.*control-plane.*|.*mcp-gateway.*|.*keycloak.*|.*postgres.*'
        action: keep
      # Extract container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/?(.*)'
        target_label: container
      # Extract service name from compose
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      # Set app label from service name (for dashboard compatibility)
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: app
      # Extract compose project
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: project
      # Set namespace from project (for dashboard compatibility with K8s queries)
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: namespace
      # Extract container ID
      - source_labels: ['__meta_docker_container_id']
        target_label: container_id
    pipeline_stages:
      # Parse JSON to extract labels + timestamp (keep full JSON as log line)
      - json:
          expressions:
            level: level
            timestamp: timestamp
            component: component
            environment: environment
            # Nested fields (Rust tracing-subscriber format: fields.X)
            fields_message: 'fields.message'
            fields_trace_id: 'fields.trace_id'
            fields_tenant_id: 'fields.tenant_id'
            # Flat fields (Python structlog format)
            event: event
            msg: msg
            logger: logger
            tenant_id: tenant_id
      # Extract log level and tenant as labels
      - labels:
          level:
          component:
          environment:
      # Tenant label: prefer flat tenant_id, fallback to fields.tenant_id
      - template:
          source: tenant_label
          template: '{{ if .tenant_id }}{{ .tenant_id }}{{ else }}{{ .fields_tenant_id }}{{ end }}'
      - labels:
          tenant_id: tenant_label
      # Set timestamp from log
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - '2006-01-02T15:04:05.000Z'
      # Keep the full JSON log line (no output stage = raw line preserved)
