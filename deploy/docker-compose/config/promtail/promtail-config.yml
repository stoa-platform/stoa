# =============================================================================
# STOA Platform - Promtail Configuration (Quick Start)
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s

scrape_configs:
  # ==========================================================================
  # Docker Container Logs
  # ==========================================================================
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Keep only STOA platform containers
      - source_labels: ['__meta_docker_container_name']
        regex: '.*stoa.*|.*control-plane.*|.*mcp-gateway.*|.*keycloak.*|.*postgres.*'
        action: keep
      # Extract container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/?(.*)'
        target_label: container
      # Extract service name from compose
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      # Set app label from service name (for dashboard compatibility)
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: app
      # Extract compose project
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: project
      # Set namespace from project (for dashboard compatibility with K8s queries)
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: namespace
      # Extract container ID
      - source_labels: ['__meta_docker_container_id']
        target_label: container_id
    pipeline_stages:
      # Parse JSON logs (structlog format)
      - json:
          expressions:
            level: level
            message: event
            msg: msg
            timestamp: timestamp
            logger: logger
            request_id: request_id
            trace_id: trace_id
            tenant_id: tenant_id
            user_id: user_id
            endpoint: endpoint
            path: path
            method: method
            status_code: status_code
            duration_ms: duration_ms
            component: component
            environment: environment
            error: error
            error_type: error_type
      # Normalize message field
      - template:
          source: message
          template: '{{ if .message }}{{ .message }}{{ else if .event }}{{ .event }}{{ else }}{{ .msg }}{{ end }}'
      # Extract log level as label
      - labels:
          level:
          logger:
          tenant_id:
          component:
          environment:
      # Set timestamp from log
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - '2006-01-02T15:04:05.000Z'
      # Output structured fields
      - output:
          source: message
