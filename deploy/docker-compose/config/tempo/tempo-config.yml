# Tempo configuration for STOA Platform (CAB-1974)
# Enables metrics_generator for service graph metrics consumed by Call Flow Console.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

# Metrics generator: produces traces_service_graph_* metrics for Prometheus
# These feed the Call Flow Console dashboard.
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  processor:
    service_graphs:
      dimensions:
        - stoa.deployment_mode
      enable_client_server_prefix: true
    span_metrics:
      dimensions:
        - stoa.deployment_mode

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
