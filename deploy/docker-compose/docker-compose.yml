# =============================================================================
# STOA Platform - Quick Start Docker Compose
# =============================================================================
# Launch the full platform in < 5 minutes on 8GB RAM
#
# Usage:
#   cp .env.example .env
#   docker compose up -d
#
# Services:
#   - postgres:    Database (port 5432)
#   - keycloak:    Authentication (port 8080)
#   - api:         Control Plane API (port 8000)
#   - console:     Console UI (port 3000)
#   - prometheus:  Metrics (port 9090)
#   - grafana:     Dashboards (port 3001)
#   - opensearch:  Search engine (port 9200)
#   - dashboards:  STOA Logs UI (port 5601, via /logs)
#
# Total RAM: ~2.5GB (works on 8GB machines)
# =============================================================================

services:
  # ==========================================================================
  # Database
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: stoa-postgres
    ports:
      - "${PORT_DB:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stoa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stoa-quickstart-2045}
      POSTGRES_DB: ${POSTGRES_DB:-stoa_platform}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init/01-init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
    networks:
      - stoa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stoa} -d ${POSTGRES_DB:-stoa_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ==========================================================================
  # Authentication (Keycloak)
  # ==========================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: stoa-keycloak
    command: start-dev --import-realm
    ports:
      - "${PORT_KEYCLOAK:-8080}:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /
      # Phase 3: Reverse proxy configuration (CAB-1108)
      KC_HOSTNAME_URL: "http://localhost/auth"
      KC_HOSTNAME_ADMIN_URL: "http://localhost/auth"
      KC_PROXY_HEADERS: "xforwarded"
      # Phase 2: Allow iframe embedding in Console (CAB-1108)
      KC_SPI_X_FRAME_OPTIONS: ""
      KC_SPI_CONTENT_SECURITY_POLICY: "frame-ancestors 'self' http://localhost:* https://console.gostoa.dev"
    volumes:
      - ./init/keycloak-realm.json:/opt/keycloak/data/import/stoa-realm.json:ro
      - ../../keycloak/themes/stoa:/opt/keycloak/themes/stoa:ro
      - keycloak-data:/opt/keycloak/data
    networks:
      - stoa-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && timeout 1 cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  # ==========================================================================
  # Database Migrations (one-shot)
  # ==========================================================================
  db-migrate:
    image: ghcr.io/stoa-platform/control-plane-api:1.0.0
    container_name: stoa-db-migrate
    entrypoint: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-stoa}:${POSTGRES_PASSWORD:-stoa-quickstart-2045}@postgres:5432/${POSTGRES_DB:-stoa_platform}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stoa-network
    restart: "no"

  # ==========================================================================
  # Control Plane API
  # ==========================================================================
  control-plane-api:
    image: ghcr.io/stoa-platform/control-plane-api:1.0.0
    container_name: stoa-api
    ports:
      - "${PORT_API:-8000}:8000"
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-stoa}:${POSTGRES_PASSWORD:-stoa-quickstart-2045}@postgres:5432/${POSTGRES_DB:-stoa_platform}
      # Keycloak
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: stoa
      KEYCLOAK_CLIENT_ID: control-plane-api
      KEYCLOAK_VERIFY_SSL: "false"
      # CORS
      CORS_ORIGINS: http://localhost:3000,http://localhost:${PORT_CONSOLE:-3000}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: text
      ENVIRONMENT: development
      # Disable optional integrations for quick start
      KAFKA_BOOTSTRAP_SERVERS: ""
      OPENSEARCH_HOST: ""
      GITLAB_URL: ""
      AWX_URL: ""
      ENABLE_DEPLOYMENT_WORKER: "false"
      ENABLE_SNAPSHOT_CONSUMER: "false"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - stoa-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ==========================================================================
  # Console UI
  # ==========================================================================
  control-plane-ui:
    image: ghcr.io/stoa-platform/control-plane-ui:1.0.0
    container_name: stoa-console
    ports:
      - "${PORT_CONSOLE:-3000}:8080"
    environment:
      # These are baked at build time, but we expose them for documentation
      VITE_API_URL: http://localhost:${PORT_API:-8000}
      VITE_KEYCLOAK_URL: http://localhost:${PORT_KEYCLOAK:-8080}
    depends_on:
      control-plane-api:
        condition: service_healthy
    networks:
      - stoa-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ==========================================================================
  # Reverse Proxy (nginx) - CAB-1108 Phase 3 + CAB-1114
  # ==========================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: stoa-proxy
    ports:
      - "${PORT_PROXY:-80}:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - control-plane-ui
      - control-plane-api
      - grafana
      - keycloak
      - opensearch-dashboards
    networks:
      - stoa-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ==========================================================================
  # OpenSearch (Search Engine) - CAB-1114 Phase 1+3
  # Phase 3: Security plugin enabled with TLS + OIDC via Keycloak
  # ==========================================================================
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: stoa-opensearch
    ports:
      - "${PORT_OPENSEARCH:-9200}:9200"
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=StOa_Admin_2026!
      - DISABLE_INSTALL_DEMO_CONFIG=true
    extra_hosts:
      - "localhost:host-gateway"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
      - ./config/opensearch/opensearch.yml:/usr/share/opensearch/config/opensearch.yml:ro
      - ./config/opensearch/security/config.yml:/usr/share/opensearch/config/opensearch-security/config.yml:ro
      - ./config/opensearch/security/internal_users.yml:/usr/share/opensearch/config/opensearch-security/internal_users.yml:ro
      - ./config/opensearch/security/roles.yml:/usr/share/opensearch/config/opensearch-security/roles.yml:ro
      - ./config/opensearch/security/roles_mapping.yml:/usr/share/opensearch/config/opensearch-security/roles_mapping.yml:ro
      - ./config/opensearch/security/action_groups.yml:/usr/share/opensearch/config/opensearch-security/action_groups.yml:ro
      - ./config/opensearch/security/tenants.yml:/usr/share/opensearch/config/opensearch-security/tenants.yml:ro
      - ./config/opensearch/certs/esnode.pem:/usr/share/opensearch/config/esnode.pem:ro
      - ./config/opensearch/certs/esnode-key.pem:/usr/share/opensearch/config/esnode-key.pem:ro
      - ./config/opensearch/certs/root-ca.pem:/usr/share/opensearch/config/root-ca.pem:ro
      - ./config/opensearch/certs/kirk.pem:/usr/share/opensearch/config/kirk.pem:ro
      - ./config/opensearch/certs/kirk-key.pem:/usr/share/opensearch/config/kirk-key.pem:ro
    networks:
      - stoa-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sfk https://localhost:9200/_cluster/health -u admin:StOa_Admin_2026! || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 45s
    restart: unless-stopped

  # ==========================================================================
  # OpenSearch Dashboards (STOA Logs UI) - CAB-1114 Phase 1+3
  # Phase 3: OIDC via Keycloak + multi-tenancy
  # ==========================================================================
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: stoa-opensearch-dashboards
    ports:
      - "${PORT_OPENSEARCH_DASHBOARDS:-5601}:5601"
    environment:
      - OPENSEARCH_HOSTS=["https://opensearch:9200"]
    extra_hosts:
      - "localhost:host-gateway"
    volumes:
      - ./config/opensearch-dashboards/opensearch_dashboards.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml:ro
      - ./config/opensearch-dashboards/img/stoa-logo-mark.svg:/usr/share/opensearch-dashboards/assets/stoa-logo-mark.svg:ro
      - ./config/opensearch-dashboards/img/stoa-favicon.svg:/usr/share/opensearch-dashboards/assets/stoa-favicon.svg:ro
    depends_on:
      opensearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - stoa-network
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://localhost:5601/logs/api/status | grep -qE '200|401' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  # ==========================================================================
  # OpenSearch Init (one-shot) - CAB-1114 Phase 1+3
  # Phase 3: Uses opensearch image for securityadmin.sh + authenticated curl
  # ==========================================================================
  opensearch-init:
    image: opensearchproject/opensearch:2.11.0
    container_name: stoa-opensearch-init
    entrypoint: ["sh", "/init/init-opensearch.sh"]
    environment:
      - OPENSEARCH_ADMIN_USER=admin
      - OPENSEARCH_ADMIN_PASSWORD=StOa_Admin_2026!
    volumes:
      - ./init/init-opensearch.sh:/init/init-opensearch.sh:ro
      - ../opensearch/pipelines/stoa-rgpd-redaction.json:/init/stoa-rgpd-redaction.json:ro
      - ./config/opensearch/security:/init/security:ro
      - ./config/opensearch/certs/root-ca.pem:/init/certs/root-ca.pem:ro
      - ./config/opensearch/certs/kirk.pem:/init/certs/kirk.pem:ro
      - ./config/opensearch/certs/kirk-key.pem:/init/certs/kirk-key.pem:ro
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - stoa-network
    restart: "no"

  # ==========================================================================
  # Prometheus (Metrics)
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: stoa-prometheus
    ports:
      - "${PORT_PROMETHEUS:-9090}:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time=7d"
    networks:
      - stoa-network
    restart: unless-stopped

  # ==========================================================================
  # Grafana (Dashboards)
  # ==========================================================================
  grafana:
    image: grafana/grafana:10.2.2
    container_name: stoa-grafana
    ports:
      - "${PORT_GRAFANA:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/stoa-overview.json
      # STOA Branding (CAB-1108)
      GF_APP_TITLE: "STOA Observability"
      GF_USERS_HIDE_VERSION: "true"
      # Phase 2: Allow iframe embedding in Console
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # Phase 3: Sub-path serving for reverse proxy
      GF_SERVER_ROOT_URL: "http://localhost/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./config/grafana/img/stoa-logo-navbar.svg:/usr/share/grafana/public/img/grafana_icon.svg:ro
      - ./config/grafana/img/fav32.png:/usr/share/grafana/public/img/fav32.png:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - stoa-network
    restart: unless-stopped

  # ==========================================================================
  # Loki (Log Aggregation)
  # ==========================================================================
  loki:
    image: grafana/loki:2.9.3
    container_name: stoa-loki
    ports:
      - "${PORT_LOKI:-3100}:3100"
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - stoa-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================================
  # Promtail (Log Shipping)
  # ==========================================================================
  promtail:
    image: grafana/promtail:2.9.3
    container_name: stoa-promtail
    volumes:
      - ./config/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - stoa-network
    restart: unless-stopped

# =============================================================================
# Networks
# =============================================================================
networks:
  stoa-network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
  keycloak-data:
  prometheus-data:
  grafana-data:
  loki-data:
  opensearch-data:
