# ExternalSecret for Anthropic API key
# Syncs from Vault KV v2 to K8s Secret (used by control-plane-api for chat agent)
# Vault path: k8s/anthropic
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: anthropic-api-key
  namespace: stoa-system
  labels:
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: stoa-platform
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: anthropic-api-key
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: k8s/anthropic
        property: ANTHROPIC_API_KEY
