# ExternalSecret for PostgreSQL credentials
# Syncs all DEV_PG_* keys from Vault to K8s Secret
# Vault path: dev/env
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgresql-credentials
  namespace: stoa-system
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: stoa-platform
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: postgresql-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: dev/env
