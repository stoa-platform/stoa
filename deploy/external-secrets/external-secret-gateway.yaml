# ExternalSecret for stoa-gateway secrets
# Syncs from Vault KV v2 to K8s Secret (used by stoa-gateway deployment)
# Vault path: k8s/gateway
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stoa-gateway-secrets
  namespace: stoa-system
  labels:
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: stoa-platform
spec:
  refreshInterval: "5m"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: stoa-gateway-secrets
    creationPolicy: Owner
  data:
    - secretKey: STOA_CONTROL_PLANE_API_KEY
      remoteRef:
        key: k8s/gateway
        property: STOA_CONTROL_PLANE_API_KEY
    - secretKey: STOA_KEYCLOAK_CLIENT_SECRET
      remoteRef:
        key: k8s/gateway
        property: STOA_KEYCLOAK_CLIENT_SECRET
