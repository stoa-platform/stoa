# ExternalSecret for GitLab credentials (CAB-1803)
# Syncs GITLAB_TOKEN from Vault to K8s Secret used by control-plane-api
# Vault path: apim/dev/gitlab (property: token)
# Prerequisites:
#   vault kv put stoa/apim/dev/gitlab token="glpat-..."
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: control-plane-api-gitlab
  namespace: stoa-system
  labels:
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: stoa-platform
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: stoa-control-plane-api-secrets
    creationPolicy: Merge
    template:
      type: Opaque
      data:
        GITLAB_TOKEN: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: apim/dev/gitlab
        property: token
