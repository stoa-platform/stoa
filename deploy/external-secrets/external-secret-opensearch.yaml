# ExternalSecret for OpenSearch credentials
# Syncs from Vault KV v2 to K8s Secret (used by control-plane-api)
# Vault path: k8s/opensearch
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stoa-opensearch-secret
  namespace: stoa-system
  labels:
    app.kubernetes.io/component: opensearch
    app.kubernetes.io/part-of: stoa-platform
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: stoa-opensearch-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/opensearch
