# ExternalSecret for traffic seeder credentials
# Syncs from Vault KV v2 to K8s Secret (used by traffic-seeder CronJob)
# Vault path: traffic-seeder/*
# Human-only: populate Vault keys before applying this manifest
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: traffic-seeder-credentials
  namespace: stoa-system
  labels:
    app.kubernetes.io/component: traffic-seeder
    app.kubernetes.io/part-of: stoa-platform
spec:
  refreshInterval: "5m"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: traffic-seeder-credentials
    creationPolicy: Owner
  data:
    - secretKey: OPENWEATHERMAP_API_KEY
      remoteRef:
        key: traffic-seeder
        property: OPENWEATHERMAP_API_KEY
    - secretKey: NEWSAPI_KEY
      remoteRef:
        key: traffic-seeder
        property: NEWSAPI_KEY
    - secretKey: ALPHAVANTAGE_KEY
      remoteRef:
        key: traffic-seeder
        property: ALPHAVANTAGE_KEY
    - secretKey: KC_CLIENT_ID
      remoteRef:
        key: traffic-seeder
        property: KC_CLIENT_ID
    - secretKey: KC_CLIENT_SECRET
      remoteRef:
        key: traffic-seeder
        property: KC_CLIENT_SECRET
