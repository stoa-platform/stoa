# SecretStore for HashiCorp Vault (hcvault.gostoa.dev)
# Uses Kubernetes authentication to access Vault
# Phase 2 (CAB-1798): ESO → external Vault
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: stoa-system
spec:
  provider:
    vault:
      server: "https://hcvault.gostoa.dev"
      path: "stoa"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: "external-secrets-sa"
---
# Service account for External Secrets to authenticate with Vault
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: stoa-system
---
# ClusterSecretStore for cross-namespace access (optional)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-cluster-store
spec:
  provider:
    vault:
      server: "https://hcvault.gostoa.dev"
      path: "stoa"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: "external-secrets-sa"
            namespace: "stoa-system"
