# k3d cluster config for local STOA gateway development.
# Usage: k3d cluster create --config deploy/k3d/k3d-config.yaml
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: stoa-dev
servers: 1
agents: 0
ports:
  - port: 9080:30080
    nodeFilters: [server:0]
  - port: 9081:30081
    nodeFilters: [server:0]
  - port: 9082:30082
    nodeFilters: [server:0]
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters: [server:0]
