# Kong DB-less + standalone STOA authz endpoint for k3d.
# This legacy demo is not a Kubernetes sidecar: Kong proxies to echo-backend,
# while STOA exposes /authz separately on node port 30082 for link traffic seeds.
# Real same-pod third-party gateway sidecars are rendered by the Helm
# stoaSidecar template.
apiVersion: v1
kind: Namespace
metadata:
  name: stoa-dev
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: echo-backend-config
  namespace: stoa-dev
data:
  nginx.conf: |
    server {
        listen 8080;
        default_type application/json;
        location = /health { default_type text/plain; return 200 'OK'; }
        location /api/v1/accounts {
            if ($request_method = POST) { return 201 '{"id":"acc-new","_category":"finance"}'; }
            return 200 '{"accounts":[{"id":"acc-001"}],"_category":"finance"}';
        }
        location /api/v1/contacts {
            if ($request_method = DELETE) { return 200 '{"deleted":true,"_category":"crm"}'; }
            if ($request_method = PUT) { return 200 '{"updated":true,"_category":"crm"}'; }
            return 200 '{"contacts":[{"id":"c-001"}],"_category":"crm"}';
        }
        location /api/v1/forecasts { return 200 '{"forecasts":[{"city":"Paris","temp_c":18}],"_category":"weather"}'; }
        location /internal/metrics { return 200 '{"uptime_s":86400,"_category":"internal"}'; }
        location /admin/tenants {
            if ($request_method = DELETE) { return 200 '{"deleted":true,"_category":"admin"}'; }
            if ($request_method = POST) { return 201 '{"id":"t-new","_category":"admin"}'; }
            return 200 '{"tenants":[{"id":"acme-corp"},{"id":"globex-inc"},{"id":"initech"}],"_category":"admin"}';
        }
        location / { return 200 '{"echo":true}'; }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-backend
  namespace: stoa-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-backend
  template:
    metadata:
      labels:
        app: echo-backend
    spec:
      containers:
        - name: echo
          image: nginx:1.27-alpine
          ports: [{containerPort: 8080}]
          volumeMounts:
            - {name: config, mountPath: /etc/nginx/conf.d/default.conf, subPath: nginx.conf}
          resources:
            requests: {cpu: 50m, memory: 32Mi}
            limits: {cpu: 100m, memory: 64Mi}
          securityContext: {privileged: false, allowPrivilegeEscalation: false}
      volumes:
        - name: config
          configMap: {name: echo-backend-config}
---
apiVersion: v1
kind: Service
metadata:
  name: echo-backend
  namespace: stoa-dev
spec:
  selector: {app: echo-backend}
  ports: [{port: 8080, targetPort: 8080}]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: stoa-dev
data:
  kong.yml: |
    _format_version: "3.0"
    services:
      - name: echo-service
        url: http://echo-backend.stoa-dev.svc:8080
        routes:
          - name: finance-route
            paths: [/api/v1/accounts]
            strip_path: false
          - name: crm-route
            paths: [/api/v1/contacts]
            strip_path: false
          - name: weather-route
            paths: [/api/v1/forecasts]
            strip_path: false
          - name: internal-route
            paths: [/internal/metrics]
            strip_path: false
          - name: admin-route
            paths: [/admin/tenants]
            strip_path: false
    # Kong proxies traffic to echo-backend. STOA authz is available separately
    # on port 30082 for direct /authz testing and local link seed traffic.
    # This file intentionally does not claim a same-pod sidecar topology.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: stoa-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      containers:
        - name: kong
          image: kong:3.9.1-ubuntu
          env:
            - {name: KONG_DATABASE, value: "off"}
            - {name: KONG_DECLARATIVE_CONFIG, value: /config/kong.yml}
            - {name: KONG_PROXY_LISTEN, value: "0.0.0.0:8000"}
            - {name: KONG_ADMIN_LISTEN, value: "0.0.0.0:8001"}
            - {name: KONG_LOG_LEVEL, value: info}
          ports:
            - {containerPort: 8000, name: proxy}
            - {containerPort: 8001, name: admin}
          volumeMounts:
            - {name: config, mountPath: /config/kong.yml, subPath: kong.yml}
          resources:
            requests: {cpu: 100m, memory: 512Mi}
            limits: {cpu: 1000m, memory: 1Gi}
          securityContext: {privileged: false, allowPrivilegeEscalation: false}
          readinessProbe:
            httpGet: {path: /status, port: 8001}
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          configMap: {name: kong-config}
---
apiVersion: v1
kind: Service
metadata:
  name: kong
  namespace: stoa-dev
spec:
  type: NodePort
  selector: {app: kong}
  ports:
    - {name: proxy, port: 8000, targetPort: 8000, nodePort: 30080}
    - {name: admin, port: 8001, targetPort: 8001, nodePort: 30081}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stoa-authz
  namespace: stoa-dev
  labels:
    stoa.io/deployment-kind: standalone-authz
    stoa.io/runtime-mode: sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stoa-authz
  template:
    metadata:
      labels:
        app: stoa-authz
        stoa.io/deployment-kind: standalone-authz
        stoa.io/runtime-mode: sidecar
      annotations:
        stoa.io/topology: "standalone-authz"
        stoa.io/note: "Not a Kubernetes sidecar; Helm stoaSidecar renders same-pod sidecars."
    spec:
      containers:
        - name: gateway
          image: stoa-gateway:local
          imagePullPolicy: Never
          env:
            - {name: STOA_GATEWAY_MODE, value: sidecar}
            - {name: STOA_PORT, value: "8081"}
            - {name: STOA_HOST, value: "0.0.0.0"}
            - {name: STOA_LOG_LEVEL, value: debug}
            - {name: STOA_AUTO_REGISTER, value: "false"}
            - {name: STOA_K8S_ENABLED, value: "false"}
            - {name: STOA_KAFKA_ENABLED, value: "false"}
            - {name: STOA_POLICY_ENABLED, value: "false"}
            - {name: STOA_ZOMBIE_DETECTION_ENABLED, value: "false"}
          ports: [{containerPort: 8081, name: http}]
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 250m, memory: 256Mi}
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
          readinessProbe:
            httpGet: {path: /health, port: 8081}
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: stoa-authz
  namespace: stoa-dev
spec:
  type: NodePort
  selector: {app: stoa-authz}
  ports:
    - {name: http, port: 8081, targetPort: 8081, nodePort: 30082}
