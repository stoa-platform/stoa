# ArgoCD Applications for K3s Gateway Cluster
# Apply on the OVH prod cluster (where ArgoCD runs):
#   KUBECONFIG=~/.kube/config-stoa-ovh kubectl apply -f deploy/k3s-gateways/argocd.yaml
#
# Prerequisites:
#   1. K3s cluster registered as ArgoCD cluster secret (see setup.sh Phase 12)
#   2. Cluster secret created:
#      kubectl create secret generic k3s-gateways-cluster -n argocd \
#        --from-literal=name=k3s-gateways \
#        --from-literal=server=https://144.91.73.37:6443 \
#        --from-literal=config='<JSON with tlsClientConfig>' \
#        --dry-run=client -o yaml | \
#        kubectl label --local -f - argocd.argoproj.io/secret-type=cluster -o yaml | \
#        kubectl apply -f -
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateways-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/stoa-platform/stoa.git
    targetRevision: main
    path: k8s/gateways/overlays/dev
  destination:
    server: https://144.91.73.37:6443
    namespace: gateway-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateways-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/stoa-platform/stoa.git
    targetRevision: main
    path: k8s/gateways/overlays/staging
  destination:
    server: https://144.91.73.37:6443
    namespace: gateway-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
