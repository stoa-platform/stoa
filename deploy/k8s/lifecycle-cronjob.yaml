# CAB-409: Tenant Lifecycle CronJob
# Runs daily at 2:00 AM UTC
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tenant-lifecycle-manager
  namespace: stoa-system
  labels:
    app.kubernetes.io/name: tenant-lifecycle-manager
    app.kubernetes.io/component: lifecycle
    app.kubernetes.io/part-of: stoa-platform
    stoa.dev/cab-ticket: CAB-409
    job: tenant-lifecycle  # COUNCIL Gh0st: Loki label
  annotations:
    description: "Manages demo tenant lifecycle: warnings, expirations, cleanups"
spec:
  schedule: "0 2 * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: tenant-lifecycle-manager
        app.kubernetes.io/component: lifecycle
        job: tenant-lifecycle
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: tenant-lifecycle-manager
            job: tenant-lifecycle
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "9090"
            prometheus.io/path: "/metrics"
        spec:
          serviceAccountName: stoa-lifecycle-manager
          restartPolicy: OnFailure
          containers:
            - name: lifecycle-manager
              image: ghcr.io/stoa-platform/stoa-control-plane:latest
              command:
                - python
                - -m
                - src.lifecycle.cli
                - run-lifecycle-check
              envFrom:
                - configMapRef:
                    name: stoa-config
                - secretRef:
                    name: stoa-secrets
              env:
                - name: STOA_ENV
                  value: "demo"
                - name: LOG_LEVEL
                  value: "INFO"
                - name: LOG_FORMAT
                  value: "json"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              securityContext:
                runAsNonRoot: true
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 10Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: stoa-lifecycle-manager
  namespace: stoa-system
  labels:
    app.kubernetes.io/name: tenant-lifecycle-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: stoa-lifecycle-manager
  labels:
    app.kubernetes.io/name: tenant-lifecycle-manager
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: stoa-lifecycle-manager
  labels:
    app.kubernetes.io/name: tenant-lifecycle-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: stoa-lifecycle-manager
subjects:
  - kind: ServiceAccount
    name: stoa-lifecycle-manager
    namespace: stoa-system
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: tenant-lifecycle-alerts
  namespace: stoa-system
  labels:
    app.kubernetes.io/name: tenant-lifecycle-manager
    prometheus: stoa
spec:
  groups:
    - name: tenant-lifecycle
      interval: 5m
      rules:
        - alert: TenantLifecycleCronMissed
          expr: |
            time() - stoa_demo_lifecycle_last_cron_run_timestamp > 93600
          for: 5m
          labels:
            severity: warning
            component: lifecycle
          annotations:
            summary: "Tenant lifecycle cron hasn't run in 26+ hours"
            runbook_url: "https://docs.gostoa.dev/runbooks/lifecycle-cron"

        - alert: TenantCleanupErrors
          expr: |
            increase(stoa_demo_cleanup_errors_total[24h]) > 3
          for: 5m
          labels:
            severity: critical
            component: lifecycle
          annotations:
            summary: "Multiple tenant cleanup failures in 24h"

        - alert: LowConversionRate
          expr: |
            increase(stoa_demo_conversions_total[30d])
            / increase(stoa_demo_lifecycle_cron_runs_total[30d])
            < 0.05
          for: 1h
          labels:
            severity: info
            component: lifecycle
          annotations:
            summary: "Demo-to-paid conversion rate below 5%"
