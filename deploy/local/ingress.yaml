apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stoa-local-ingress
  namespace: stoa-local
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: mcp.stoa.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stoa-gateway
                port:
                  number: 8080
    - host: wm.stoa.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stoa-link-wm
                port:
                  number: 8080
    - host: console.stoa.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: console-docker
                port:
                  number: 3000
    - host: api.stoa.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-docker
                port:
                  number: 8000
    - host: auth.stoa.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-docker
                port:
                  number: 8080
    - host: portal.stoa.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portal-docker
                port:
                  number: 3002
---
# Vault ingress — routes vault.stoa.local to Vault in vault namespace
# Requires Vault deployed via: ./deploy/local/vault/setup-vault-local.sh
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-ingress
  namespace: vault
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: vault.stoa.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault
                port:
                  number: 8200
