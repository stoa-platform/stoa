# =============================================================================
# K8s Job: Vault Init — Bootstrap all engines and secrets
# =============================================================================
# ⚠️  LOCAL DEV ONLY — NEVER APPLY TO PROD/STAGING CLUSTERS  ⚠️
#
# This manifest embeds dev-only credentials ("stoa-dev-root-token", default
# POSTGRES / KEYCLOAK passwords). It is intended for K3d quickstart clusters
# that run on a developer laptop, NOT for any cluster reachable from the
# internet.
#
# The embedded values match the defaults of `deploy/docker-compose/docker-compose.yml`
# when no `.env` is provided — they exist so `make quickstart` works out of
# the box. Prod clusters MUST use ExternalSecrets pointing at the real Vault
# (hcvault.gostoa.dev) — see `deploy/external-secrets/`.
#
# Runs after Vault is ready. Idempotent — safe to re-run.
# Depends on: vault pod ready, policies ConfigMap (optional).
#
# Usage:
#   kubectl delete job vault-init -n vault --ignore-not-found
#   kubectl apply -f vault-init-job.yaml
#   kubectl wait --for=condition=complete job/vault-init -n vault --timeout=180s
#   kubectl logs job/vault-init -n vault
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
  labels:
    app.kubernetes.io/name: vault-init
    app.kubernetes.io/part-of: stoa-platform
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-init
    spec:
      restartPolicy: OnFailure
      serviceAccountName: vault-init
      containers:
        - name: vault-init
          image: hashicorp/vault:1.21.2
          command: ["/bin/sh", "/vault/init/init-vault-local.sh"]
          # Credentials come from a K8s Secret populated BEFORE applying this Job.
          # Create it locally with:
          #   kubectl create secret generic vault-init-bootstrap -n vault \
          #     --from-literal=VAULT_TOKEN=stoa-dev-root-token \
          #     --from-literal=POSTGRES_PASSWORD=<local-pg-password> \
          #     --from-literal=KEYCLOAK_ADMIN_PASSWORD=<local-kc-password>
          envFrom:
            - secretRef:
                name: vault-init-bootstrap
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
            - name: POSTGRES_USER
              value: "stoa"
            - name: POSTGRES_DB
              value: "stoa_platform"
            - name: KEYCLOAK_ADMIN
              value: "admin"
            # PostgreSQL host — Docker Desktop resolves host.docker.internal
            # to IPv6 from K3s pods, but PostgreSQL may only listen on IPv4.
            # Use 192.168.65.254 (Docker Desktop host gateway) if IPv6 fails.
            - name: POSTGRES_HOST
              value: "192.168.65.254"
          volumeMounts:
            - name: init-script
              mountPath: /vault/init
              readOnly: true
            - name: policies
              mountPath: /vault/policies
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          securityContext:
            runAsNonRoot: false  # vault CLI needs root in init container
            allowPrivilegeEscalation: false
      volumes:
        - name: init-script
          configMap:
            name: vault-init-script
            defaultMode: 0755
        - name: policies
          configMap:
            name: vault-policies
            optional: true  # Phase 2 — not required for Phase 1
            defaultMode: 0644
        - name: tmp
          emptyDir: {}
---
# =============================================================================
# ServiceAccount + RBAC for vault-init Job
# =============================================================================
# Needed to create K8s Secrets and ConfigMaps in stoa-local namespace (Phase 3 PKI)
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-init
  namespace: vault
  labels:
    app.kubernetes.io/name: vault-init
    app.kubernetes.io/part-of: stoa-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-init-secrets-manager
  labels:
    app.kubernetes.io/name: vault-init
    app.kubernetes.io/part-of: stoa-platform
rules:
  # Create/update TLS Secrets and ConfigMaps for PKI certs (Phase 3)
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "namespaces"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-init-secrets-manager
  labels:
    app.kubernetes.io/name: vault-init
    app.kubernetes.io/part-of: stoa-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-init-secrets-manager
subjects:
  - kind: ServiceAccount
    name: vault-init
    namespace: vault
