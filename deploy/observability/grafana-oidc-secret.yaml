# Grafana OIDC Secret
# Referenced by values-grafana-oidc.yaml via envFromSecret: grafana-oidc-secret
#
# Usage:
# 1. Run setup-keycloak-client.sh to get the CLIENT_SECRET
# 2. Replace REPLACE_VIA_SCRIPT with the actual value
# 3. kubectl apply -f grafana-oidc-secret.yaml
#
# Or create directly:
#   kubectl create secret generic grafana-oidc-secret -n stoa-monitoring \
#     --from-literal=GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=<your-client-secret> \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: grafana-oidc-secret
  namespace: stoa-monitoring
  labels:
    app.kubernetes.io/part-of: stoa-platform
    app.kubernetes.io/component: observability
type: Opaque
stringData:
  GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "REPLACE_VIA_SCRIPT"
