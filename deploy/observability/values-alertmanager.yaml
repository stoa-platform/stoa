# AlertManager Configuration for kube-prometheus-stack
# Apply with: helm upgrade kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#   -n stoa-monitoring -f values-alertmanager.yaml
#
# Routes alerts from deploy/prometheus/alerting-rules.yaml to Slack channels.
# Prerequisites:
# 1. Create Slack incoming webhooks for #stoa-alerts and #stoa-alerts-critical
# 2. Store webhook URLs as K8s secrets or replace placeholders below

alertmanager:
  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: slack-default
      group_by: ['alertname', 'component']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

      routes:
        # Critical alerts → #stoa-alerts-critical
        - receiver: slack-critical
          match:
            severity: critical
          group_wait: 10s
          repeat_interval: 1h

        # Warning alerts → #stoa-alerts
        - receiver: slack-default
          match:
            severity: warning

    receivers:
      - name: slack-default
        slack_configs:
          - api_url: 'REPLACE_WITH_SLACK_WEBHOOK_URL'
            channel: '#stoa-alerts'
            send_resolved: true
            title: '{{ if eq .Status "firing" }}[FIRING] {{ else }}[RESOLVED] {{ end }}{{ .CommonLabels.alertname }}'
            text: >-
              *Component:* {{ .CommonLabels.component }}
              *Severity:* {{ .CommonLabels.severity }}
              *Description:* {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
            color: '{{ if eq .Status "firing" }}{{ if eq .CommonLabels.severity "critical" }}danger{{ else }}warning{{ end }}{{ else }}good{{ end }}'

      - name: slack-critical
        slack_configs:
          - api_url: 'REPLACE_WITH_SLACK_WEBHOOK_URL_CRITICAL'
            channel: '#stoa-alerts-critical'
            send_resolved: true
            title: '[CRITICAL] {{ .CommonLabels.alertname }}'
            text: >-
              *Component:* {{ .CommonLabels.component }}
              *Description:* {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
              *Runbook:* {{ range .Alerts }}{{ .Annotations.runbook_url }}{{ end }}
            color: 'danger'

    inhibit_rules:
      # Don't send warning if critical is already firing for the same component
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ['component']
