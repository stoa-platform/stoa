# AlertManager Configuration for kube-prometheus-stack (CAB-1089)
#
# Apply with:
#   helm upgrade kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     -n stoa-monitoring -f values-alertmanager.yaml
#
# NOTE: Per-tier routing is handled by the AlertmanagerConfig CRD in
# deploy/alertmanager/alertmanager-config.yaml (merged automatically by
# prometheus-operator). This file provides the global config baseline.
#
# Prerequisites:
# 1. Create secret stoa-alertmanager-secrets (see deploy/alertmanager/secrets-template.yaml)
# 2. Apply AlertmanagerConfig CRD: kubectl apply -f deploy/alertmanager/

alertmanager:
  # Allow AlertmanagerConfig CRDs from stoa-monitoring namespace
  alertmanagerConfigSelector:
    matchLabels:
      alertmanagerconfig: stoa
  alertmanagerConfigNamespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: stoa-monitoring

  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: slack-default
      group_by: ['alertname', 'component', 'tier']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

      routes:
        # Critical alerts → #stoa-alerts-critical
        - receiver: slack-critical
          match:
            severity: critical
          group_wait: 10s
          repeat_interval: 1h

        # Warning alerts → #stoa-alerts
        - receiver: slack-default
          match:
            severity: warning

    receivers:
      - name: slack-default
        slack_configs:
          - api_url: 'REPLACE_WITH_SLACK_WEBHOOK_URL'
            channel: '#stoa-alerts'
            send_resolved: true
            title: '{{ if eq .Status "firing" }}[FIRING] {{ else }}[RESOLVED] {{ end }}{{ .CommonLabels.alertname }}'
            text: >-
              *Component:* {{ .CommonLabels.component }}
              *Tier:* {{ .CommonLabels.tier }}
              *Severity:* {{ .CommonLabels.severity }}
              *Description:* {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
            color: '{{ if eq .Status "firing" }}{{ if eq .CommonLabels.severity "critical" }}danger{{ else }}warning{{ end }}{{ else }}good{{ end }}'

      - name: slack-critical
        slack_configs:
          - api_url: 'REPLACE_WITH_SLACK_WEBHOOK_URL_CRITICAL'
            channel: '#stoa-alerts-critical'
            send_resolved: true
            title: '[CRITICAL] {{ .CommonLabels.alertname }}'
            text: >-
              *Component:* {{ .CommonLabels.component }}
              *Tier:* {{ .CommonLabels.tier }}
              *Description:* {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
              *Runbook:* {{ range .Alerts }}{{ .Annotations.runbook_url }}{{ end }}
            color: 'danger'

    inhibit_rules:
      # Rule 1: Critical suppresses Warning for same component+tier
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: ['component', 'tier']

      # Rule 2: Critical suppresses Info for same component+tier
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = info
        equal: ['component', 'tier']

      # Rule 3: Fast burn suppresses Medium burn for same tier
      - source_matchers:
          - burn_window = fast
        target_matchers:
          - burn_window = medium
        equal: ['tier']

      # Rule 4: Fast burn suppresses Slow burn for same tier
      - source_matchers:
          - burn_window = fast
        target_matchers:
          - burn_window = slow
        equal: ['tier']

      # Rule 5: Medium burn suppresses Slow burn for same tier
      - source_matchers:
          - burn_window = medium
        target_matchers:
          - burn_window = slow
        equal: ['tier']

      # Rule 6: *Down alerts suppress warnings for same component
      - source_matchers:
          - alertname =~ ".*Down$"
        target_matchers:
          - severity =~ "warning|info"
        equal: ['component']

      # Rule 7: ErrorBudgetExhausted suppresses ErrorBudgetLow
      - source_matchers:
          - alertname = ErrorBudgetExhausted
        target_matchers:
          - alertname = ErrorBudgetLow
        equal: ['tier']
