# Grafana OIDC + JWT Configuration for kube-prometheus-stack
# Apply with: helm upgrade kube-prometheus-stack prometheus-community/kube-prometheus-stack -n monitoring -f values-grafana-oidc.yaml
#
# Two auth modes:
# 1. OIDC (browser): Keycloak auto_login for direct Grafana access
# 2. JWT (iframe): Console passes Keycloak JWT as ?auth_token= URL param
#
# Prerequisites:
# 1. Keycloak client 'stoa-observability' in realm 'stoa' (already exists)
# 2. Secret 'grafana-oidc-secret' with GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET

grafana:
  # Admin credentials (keeping existing)
  adminPassword: ""  # Keep existing password

  # Grafana configuration
  grafana.ini:
    server:
      root_url: https://console.gostoa.dev/grafana
      serve_from_sub_path: true

    # Security — allow iframe embedding for Console Operations page (CAB-1773)
    security:
      allow_embedding: true
      cookie_samesite: lax

    # Auth configuration
    auth:
      disable_login_form: false
      oauth_auto_login: true

    # JWT authentication — for Console iframe embedding (CAB-1773)
    # Console passes Keycloak access_token as ?auth_token= URL parameter.
    # Grafana validates the JWT against Keycloak JWKS endpoint.
    # enable_login_token=true: Grafana issues a session cookie after first JWT
    # validation, so subsequent iframe loads don't need the token.
    auth.jwt:
      enabled: true
      url_login: true
      enable_login_token: true
      jwk_set_url: http://keycloak.stoa-system.svc/realms/stoa/protocol/openid-connect/certs
      username_claim: preferred_username
      email_claim: email
      auto_sign_up: true
      expected_claims: '{"iss": "https://auth.gostoa.dev/realms/stoa"}'
      role_attribute_path: contains(realm_access.roles[*], 'cpi-admin') && 'Admin' || contains(realm_access.roles[*], 'admin') && 'Admin' || 'Viewer'
      cache_ttl: 60m

    # Keycloak OIDC — for direct Grafana access (browser, not iframe)
    auth.generic_oauth:
      enabled: true
      name: Keycloak
      allow_sign_up: true
      auto_login: true
      client_id: stoa-observability
      client_secret: ${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid profile email roles
      auth_url: https://auth.gostoa.dev/realms/stoa/protocol/openid-connect/auth
      token_url: http://keycloak.stoa-system.svc/realms/stoa/protocol/openid-connect/token
      api_url: http://keycloak.stoa-system.svc/realms/stoa/protocol/openid-connect/userinfo
      role_attribute_path: contains(realm_access.roles[*], 'cpi-admin') && 'Admin' || contains(realm_access.roles[*], 'admin') && 'Admin' || 'Viewer'
      tls_skip_verify_insecure: false
      use_pkce: true

    # Users configuration
    users:
      allow_sign_up: true
      auto_assign_org_role: Viewer

  # Environment variables for secrets
  envFromSecret: grafana-oidc-secret

  # Persistence (recommended for production)
  persistence:
    enabled: true
    size: 10Gi

# Prometheus configuration (unchanged)
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
