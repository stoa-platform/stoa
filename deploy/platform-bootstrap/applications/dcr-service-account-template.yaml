# DCR Service Account Template
# CAB-438 Phase 3 + CAB-1463 Phase 1
#
# Template for OAuth2 clients registered via Dynamic Client Registration.
# Applied as defaults when a new client is registered via POST /clients-registrations/openid-connect.
#
# This template ensures all DCR-created clients follow STOA security standards:
#   - PKCE required for public clients
#   - Short-lived tokens
#   - Limited scope
#   - Metadata validation
apiVersion: stoa.io/v1
kind: Application
metadata:
  name: dcr-service-account-template
  description: "Template for DCR-registered service accounts"
  tags:
    - identity
    - dcr
    - template
    - service-account

spec:
  displayName: DCR Service Account Template
  type: template
  public: false

  # --- Default OAuth2 Settings for DCR Clients ---
  oauth2:
    # Default grant type — can be overridden per registration
    grantTypes:
      - client_credentials
    # PKCE is mandatory for authorization_code grants
    pkce: true
    pkceCodeChallengeMethod: S256

  # --- Token Lifespans ---
  tokenLifespans:
    accessToken: 300           # 5 minutes (short-lived for security)
    refreshToken: 86400        # 24 hours
    idToken: 3600              # 1 hour

  # --- Default Scopes ---
  # DCR clients start with minimal scopes.
  # Additional scopes require admin approval.
  defaultScopes:
    - openid
    - profile
    - email
    - stoa:read
  optionalScopes:
    - stoa:write               # Requires approval
    # stoa:admin is NEVER available via DCR

  # --- Required Metadata ---
  # Every DCR registration must include these fields.
  requiredMetadata:
    client_name:
      type: string
      minLength: 3
      maxLength: 100
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9-_.]+$"
    contacts:
      type: array
      minItems: 1
      items:
        type: string
        format: email
    redirect_uris:
      type: array
      description: "Required for authorization_code grant. Omit for client_credentials."
      conditional:
        grantType: authorization_code

  # --- Optional Metadata ---
  optionalMetadata:
    logo_uri:
      type: string
      format: uri
    client_uri:
      type: string
      format: uri
    policy_uri:
      type: string
      format: uri
    tos_uri:
      type: string
      format: uri
    software_id:
      type: string
      description: "Unique identifier for the software (for tracking)"
    software_version:
      type: string
    organization_name:
      type: string
    environment:
      type: string
      enum: ["development", "staging", "production"]
      description: "Target environment for the client"

  # --- STOA-Specific Metadata ---
  # Additional fields tracked by the identity governance service.
  stoaMetadata:
    owner:
      type: string
      format: email
      required: true
      description: "Human owner responsible for this client"
    tenant_id:
      type: string
      required: true
      description: "Tenant this client belongs to"
    attestation_id:
      type: string
      required: false
      description: "Reference to an approval workflow or ticket"
    purpose:
      type: string
      required: true
      enum: ["api-integration", "ci-cd", "monitoring", "mcp-agent", "partner"]
      description: "Reason for client registration"

  # --- Keycloak Client Attributes ---
  # These attributes are set on every DCR-created client in Keycloak.
  keycloakAttributes:
    "stoa.managed": "true"
    "stoa.created.via": "dcr"
    "stoa.purpose": "${purpose}"
    "stoa.owner": "${owner}"
    "stoa.tenant": "${tenant_id}"
    "backchannel.logout.session.required": "true"
    "use.refresh.tokens": "true"
    "client.session.max.lifespan": "86400"
    "client.session.idle.timeout": "1800"

  # --- Protocol Mappers ---
  # Automatically added to every DCR-created client.
  protocolMappers:
    - name: tenant-id
      protocol: openid-connect
      protocolMapper: oidc-hardcoded-claim-mapper
      config:
        claim.name: tenant_id
        claim.value: "${tenant_id}"
        jsonType.label: String
        id.token.claim: "true"
        access.token.claim: "true"
        userinfo.token.claim: "true"

    - name: audience
      protocol: openid-connect
      protocolMapper: oidc-audience-mapper
      config:
        included.client.audience: control-plane-api
        id.token.claim: "false"
        access.token.claim: "true"

    - name: product-roles
      protocol: openid-connect
      protocolMapper: oidc-usermodel-attribute-mapper
      config:
        user.attribute: product_roles
        claim.name: product_roles
        jsonType.label: JSON
        multivalued: "true"
        id.token.claim: "true"
        access.token.claim: "true"
        userinfo.token.claim: "true"
