# Dynamic Client Registration Policy
# RFC 7591 (Registration) + RFC 7592 (Management) — CAB-438 Phase 3
#
# Allows automated client registration for:
#   - CI/CD pipelines registering service accounts
#   - Partner onboarding via API
#   - MCP agent self-registration
#
# Keycloak 26.x supports DCR natively. This config declares the policy
# constraints enforced by the realm and validated by the gateway.

apiVersion: stoa.io/v1
kind: Policy
metadata:
  name: dcr-policy
  description: "Dynamic Client Registration — RFC 7591/7592 constraints"
  tags:
    - security
    - authentication
    - registration
    - rfc-7591
    - rfc-7592

spec:
  type: dynamic-client-registration
  order: 20

  config:
    # --- Registration Endpoint ---
    endpoint: /realms/stoa/clients-registrations/openid-connect
    enabled: true

    # --- Access Control ---
    # Initial Access Token (IAT) required to prevent open registration abuse.
    # IATs are generated by platform admins via Keycloak Admin API or CLI.
    requireInitialAccessToken: true
    initialAccessToken:
      maxCount: 10            # Max clients per IAT (reduced from 100 — limits abuse window)
      expirationSeconds: 86400  # 24 hours (reduced from 30 days — short-lived for operational use)
      # IAT generation: Keycloak Admin Console → Realm → Client Registration → Initial Access Tokens

    # --- Software Statement ---
    # Optional signed JWT asserting client identity (for partner onboarding).
    requireSoftwareStatement: false  # Enable for regulated environments
    softwareStatement:
      trustedIssuers:
        - "https://registry.gostoa.dev"   # STOA partner registry
      requiredClaims:
        - software_id
        - software_version
        - organization_name

    # --- Allowed Client Configurations ---
    allowedGrantTypes:
      - client_credentials     # Service-to-service
      - authorization_code     # Web/mobile apps
      - refresh_token          # Token renewal
    disallowedGrantTypes:
      - implicit               # Deprecated (OAuth 2.1)
      - password               # Deprecated (ROPC)

    # PKCE is mandatory for authorization_code grants (OAuth 2.1)
    requirePkce: true
    pkceCodeChallengeMethod: S256

    # --- Token Endpoint Authentication ---
    allowedTokenEndpointAuthMethods:
      - client_secret_basic     # Standard secret
      - client_secret_post      # Secret in body
      - tls_client_auth         # mTLS (RFC 8705)
      - private_key_jwt         # Signed assertion (RFC 7523)
      - none                    # Public clients (SPA + PKCE)

    # --- Client Lifecycle ---
    registrationAccessToken:
      enabled: true
      ttl: 2592000             # 30 days
      rotateOnUse: true        # RFC 7592: rotate RAT on every management call
    clientDefaults:
      accessTokenLifespan: 300        # 5 minutes
      refreshTokenLifespan: 86400     # 24 hours
      consentRequired: false
      fullScopeAllowed: false         # Restrict to explicitly assigned scopes

    # --- Scope Restrictions ---
    # Clients registered via DCR get limited scopes by default.
    # Additional scopes require admin approval.
    defaultScopes:
      - openid
      - profile
      - email
      - stoa:read
    maxRequestableScopes:
      - openid
      - profile
      - email
      - stoa:read
    # stoa:write requires admin approval (attestation_id workflow), not self-service via DCR.
    # stoa:admin is NEVER available via DCR — admin-only assignment.

    # --- Metadata Validation ---
    requiredMetadata:
      - client_name
      - redirect_uris           # Required for authorization_code
      - contacts                # At least one contact email
    optionalMetadata:
      - logo_uri
      - client_uri
      - policy_uri
      - tos_uri
      - software_id
      - software_version

    # --- Rate Limiting ---
    rateLimit:
      registrations:
        max: 10
        window: 3600           # 10 registrations per hour per IAT
      management:
        max: 60
        window: 3600           # 60 management calls per hour per client

    # --- Audit ---
    audit:
      logRegistrations: true
      logUpdates: true
      logDeletions: true
      destination: opensearch   # Audit trail for compliance

  # --- Keycloak Realm Configuration ---
  # Applied by: deploy/platform-bootstrap/scripts/configure-sender-constrained.sh
  keycloak:
    clientRegistrationPolicies:
      # Allowed Protocol Mappers
      - name: "Allowed Protocol Mapper Types"
        providerId: allowed-protocol-mappers
        subType: anonymous
        config:
          allowedProtocolMapperTypes:
            - oidc-usermodel-attribute-mapper
            - oidc-audience-mapper
            - oidc-usermodel-realm-role-mapper

      # Allowed Client Scopes
      - name: "Allowed Client Scopes"
        providerId: allowed-client-templates
        subType: anonymous
        config:
          allowedClientScopes:
            - openid
            - profile
            - email
            - web-origins
            - stoa:read
            # stoa:write excluded — requires admin approval workflow

      # Max Clients per realm (safety valve)
      - name: "Max Clients Limit"
        providerId: max-clients
        subType: anonymous
        config:
          maxClients: "500"

      # Consent Required
      - name: "Consent Required"
        providerId: consent-required
        subType: anonymous
        config:
          consentRequired: "false"

  # --- Metrics ---
  metrics:
    registrationCounter: stoa_oauth_dcr_registrations_total
    updateCounter: stoa_oauth_dcr_updates_total
    deletionCounter: stoa_oauth_dcr_deletions_total
    rejectionCounter: stoa_oauth_dcr_rejections_total
