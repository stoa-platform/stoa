# agentgateway (Linux Foundation / Solo.io) — VPS standalone for Arena benchmarks
# Image: alpha (v1.0.0-alpha.4) — suitable for benchmarking, not production.
#
# Usage:
#   docker compose up -d
#   curl http://localhost:3000/health
#   curl http://localhost:3000/echo/get
#
# Ports:
#   3000  — MCP/HTTP proxy (Streamable HTTP, JSON-RPC 2.0)
#   15000 — Admin UI
#   15020 — Prometheus metrics

services:
  agentgateway:
    image: ghcr.io/agentgateway/agentgateway:v1.0.0-alpha.4
    container_name: agentgateway
    restart: unless-stopped
    command: ["-f", "/etc/agentgateway/config.yaml"]
    ports:
      - "3000:3000"
      - "15000:15000"
      - "15020:15020"
    volumes:
      - ./config.yaml:/etc/agentgateway/config.yaml:ro
