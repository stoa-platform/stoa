server {
    listen 8888;
    server_name _;

    # Minimal static JSON response — sub-millisecond, zero I/O.
    # Ensures the benchmark measures gateway overhead, not backend latency.
    location / {
        default_type application/json;
        add_header X-Echo-Server "nginx-echo";
        return 200 '{"status":"ok","server":"echo-local"}';
    }

    location /health {
        default_type application/json;
        return 200 '{"status":"healthy"}';
    }
}
