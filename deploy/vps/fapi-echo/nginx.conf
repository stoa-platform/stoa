# FAPI Echo Backend — simulates banking API responses for traffic seeder.
# Supports: /api/v1/accounts, /api/v1/transfers, /api/v1/balances
# Features: configurable latency (?delay_ms=N), error injection (X-Simulate-Error: 5xx)

server {
    listen 8889;
    server_name _;

    # Error injection via header
    set $simulate_error "";
    if ($http_x_simulate_error) {
        set $simulate_error $http_x_simulate_error;
    }

    # Latency simulation via query param (nginx doesn't natively delay,
    # but the seeder adds delay client-side based on expected latency)

    location /health {
        default_type application/json;
        return 200 '{"status":"healthy","service":"fapi-echo"}';
    }

    location /api/v1/accounts {
        default_type application/json;
        add_header X-Echo-Server "fapi-echo";
        add_header X-Fapi-Interaction-Id $request_id;

        if ($simulate_error = "500") {
            return 500 '{"error":"internal_server_error","message":"Simulated backend failure"}';
        }
        if ($simulate_error = "503") {
            return 503 '{"error":"service_unavailable","message":"Simulated maintenance window"}';
        }

        return 200 '{
            "accounts": [
                {"id": "acc-001", "iban": "FR76 3000 6000 0112 3456 7890 189", "currency": "EUR", "balance": 12450.75, "type": "current"},
                {"id": "acc-002", "iban": "FR76 3000 6000 0198 7654 3210 042", "currency": "EUR", "balance": 85200.00, "type": "savings"}
            ],
            "total": 2,
            "_links": {"self": "/api/v1/accounts"}
        }';
    }

    location /api/v1/transfers {
        default_type application/json;
        add_header X-Echo-Server "fapi-echo";
        add_header X-Fapi-Interaction-Id $request_id;

        if ($simulate_error = "500") {
            return 500 '{"error":"internal_server_error","message":"Simulated backend failure"}';
        }
        if ($simulate_error = "403") {
            return 403 '{"error":"insufficient_funds","message":"Simulated insufficient funds"}';
        }

        return 200 '{
            "transfer_id": "txn-20260317-001",
            "status": "completed",
            "amount": 250.00,
            "currency": "EUR",
            "debtor_iban": "FR76 3000 6000 0112 3456 7890 189",
            "creditor_iban": "DE89 3704 0044 0532 0130 00",
            "execution_date": "2026-03-17",
            "_links": {"self": "/api/v1/transfers/txn-20260317-001"}
        }';
    }

    location /api/v1/balances {
        default_type application/json;
        add_header X-Echo-Server "fapi-echo";
        add_header X-Fapi-Interaction-Id $request_id;

        if ($simulate_error = "500") {
            return 500 '{"error":"internal_server_error","message":"Simulated backend failure"}';
        }

        return 200 '{
            "balances": [
                {"account_id": "acc-001", "amount": 12450.75, "currency": "EUR", "type": "available", "date": "2026-03-17"},
                {"account_id": "acc-002", "amount": 85200.00, "currency": "EUR", "type": "available", "date": "2026-03-17"}
            ],
            "_links": {"self": "/api/v1/balances"}
        }';
    }

    # Catch-all for unknown paths
    location / {
        default_type application/json;
        add_header X-Echo-Server "fapi-echo";
        return 404 '{"error":"not_found","message":"Unknown FAPI endpoint"}';
    }
}
