# HEGEMON Gateway Stack — Internal + External STOA Gateways
#
# Internal Gateway (8090): Worker-to-worker + MCP Server communication
#   - edge-mcp mode, JWT auth, WebSocket enabled, rate limiting
#   - Workers send supervision headers, gateway enforces tiers
#
# External Gateway (8091): Worker-to-upstream API communication
#   - proxy mode, credential injection, circuit breaker, token budget
#   - Gateway injects real API keys, workers only have consumer keys
#
# Both gateways use the same Docker image, configured via env vars.
# Deploy: docker compose -f docker-compose.gateway.yml up -d

services:
  # ── Internal Gateway (port 8090) ──────────────────────────────────
  # Purpose: internal worker communication, MCP Server access
  # Auth: Keycloak JWT (hegemon-worker-N service accounts)
  # Mode: edge-mcp (MCP discovery + tool proxy + SSE)
  gateway-internal:
    image: ghcr.io/stoa-platform/stoa-gateway:latest
    container_name: hegemon-gateway-internal
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      # Server
      STOA_PORT: "8080"
      STOA_HOST: "0.0.0.0"

      # Mode
      STOA_GATEWAY_MODE: "edge-mcp"

      # Authentication — Keycloak JWT
      STOA_KEYCLOAK_URL: "${KEYCLOAK_URL:-https://auth.gostoa.dev}"
      STOA_KEYCLOAK_REALM: "stoa"
      STOA_KEYCLOAK_CLIENT_ID: "stoa-mcp"

      # WebSocket (for MCP Server SSE transport)
      STOA_WEBSOCKET_ENABLED: "true"

      # Rate limiting (per worker, 100 req/min)
      STOA_QUOTA_ENFORCEMENT_ENABLED: "true"
      STOA_QUOTA_DEFAULT_RATE_PER_MINUTE: "100"
      STOA_QUOTA_DEFAULT_DAILY_LIMIT: "10000"

      # Supervision (enabled, default tier: autopilot)
      STOA_SUPERVISION_ENABLED: "true"
      STOA_SUPERVISION_WEBHOOK_URL: "${SUPERVISION_WEBHOOK_URL:-}"
      STOA_SUPERVISION_DEFAULT_TIER: "autopilot"

      # Access log
      STOA_ACCESS_LOG_ENABLED: "true"

      # Observability
      STOA_LOG_LEVEL: "info"
      STOA_LOG_FORMAT: "json"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 128m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── External Gateway (port 8091) ──────────────────────────────────
  # Purpose: upstream API access (Anthropic, OpenAI, etc.)
  # Auth: STOA API key (consumer key per worker)
  # Mode: proxy (credential injection + LLM proxy + metering)
  gateway-external:
    image: ghcr.io/stoa-platform/stoa-gateway:latest
    container_name: hegemon-gateway-external
    restart: unless-stopped
    ports:
      - "8091:8080"
    environment:
      # Server
      STOA_PORT: "8080"
      STOA_HOST: "0.0.0.0"

      # Mode
      STOA_GATEWAY_MODE: "proxy"

      # LLM Proxy (passthrough to upstream Anthropic)
      STOA_LLM_PROXY_ENABLED: "true"
      STOA_LLM_PROXY_UPSTREAM_URL: "https://api.anthropic.com"

      # Credential injection — gateway holds the real API key
      STOA_LLM_PROXY_UPSTREAM_API_KEY: "${ANTHROPIC_API_KEY}"

      # Token budget (per worker)
      STOA_TOKEN_BUDGET_ENABLED: "true"
      STOA_TOKEN_BUDGET_DEFAULT_LIMIT: "10000000"
      STOA_TOKEN_BUDGET_WINDOW_HOURS: "24"

      # Circuit breaker (upstream protection)
      STOA_CB_FAILURE_THRESHOLD: "5"
      STOA_CB_RESET_TIMEOUT_SECS: "30"
      STOA_CB_SUCCESS_THRESHOLD: "2"

      # Rate limiting
      STOA_QUOTA_ENFORCEMENT_ENABLED: "true"
      STOA_QUOTA_DEFAULT_RATE_PER_MINUTE: "60"
      STOA_QUOTA_DEFAULT_DAILY_LIMIT: "5000"

      # Access log
      STOA_ACCESS_LOG_ENABLED: "true"

      # Observability
      STOA_LOG_LEVEL: "info"
      STOA_LOG_FORMAT: "json"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 128m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
