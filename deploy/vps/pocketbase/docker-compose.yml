# PocketBase — HEGEMON Agent State Store Remote Tier
# VPS: 51.254.139.205 (shared with n8n + Healthchecks)
# URL: state.gostoa.dev (Traefik TLS via Let's Encrypt)
#
# This file is a REFERENCE for the PocketBase service definition.
# PocketBase runs inside the n8n docker-compose stack (~/n8n/docker-compose.yml).
# Copy the 'pocketbase' service block into n8n's docker-compose.yml.
#
# IMPORTANT: Do NOT set 'command:' — the elestio image entrypoint already
# includes 'serve --http=0.0.0.0:8090'. Adding command causes double 'serve'
# which PocketBase interprets as a domain name, enabling unwanted TLS.
#
# Health: curl http://localhost:8090/api/health

services:
  pocketbase:
    image: elestio/pocketbase:latest
    container_name: pocketbase
    restart: unless-stopped
    # No command override — entrypoint already has: serve --http=0.0.0.0:8090 --dir=/pb_data
    volumes:
      - pb_data:/pb/pb_data
    env_file:
      - /opt/pocketbase/.env
    labels:
      - traefik.enable=true
      - traefik.http.routers.pocketbase.rule=Host(`state.gostoa.dev`)
      - traefik.http.routers.pocketbase.tls=true
      - traefik.http.routers.pocketbase.entrypoints=web,websecure
      - traefik.http.routers.pocketbase.tls.certresolver=mytlschallenge
      - traefik.http.services.pocketbase.loadbalancer.server.port=8090
    ports:
      - "127.0.0.1:8090:8090"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pb_data:
