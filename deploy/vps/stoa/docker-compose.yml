# STOA Gateway — VPS standalone deployment for Arena benchmarks
# Same conditions as Kong/Gravitee VPS: single container, direct HTTP, no TLS/LB/ingress
#
# Usage:
#   docker compose up -d
#   ./setup.sh   # Register httpbin proxy route
#
# Health: curl http://localhost:8080/health
# Proxy:  curl http://localhost:8080/httpbin/get

services:
  stoa-gateway:
    image: ghcr.io/stoa-platform/stoa-gateway:latest
    container_name: stoa-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      STOA_PORT: "8080"
      STOA_HOST: "0.0.0.0"
      STOA_GATEWAY_MODE: "edge-mcp"
      STOA_ADMIN_API_TOKEN: "${STOA_ADMIN_API_TOKEN:?Set STOA_ADMIN_API_TOKEN from Infisical prod/gateway/arena/ADMIN_API_TOKEN}"
      # Disable all optional features — pure proxy benchmark
      STOA_POLICY_ENABLED: "false"
      STOA_ZOMBIE_DETECTION_ENABLED: "false"
      STOA_NATIVE_TOOLS_ENABLED: "false"
      STOA_KAFKA_ENABLED: "false"
      STOA_K8S_ENABLED: "false"
      STOA_MTLS_ENABLED: "false"
      STOA_QUOTA_ENFORCEMENT_ENABLED: "false"
      STOA_ACCESS_LOG_ENABLED: "false"
      RUST_BACKTRACE: "0"
      TOKIO_WORKER_THREADS: "4"
