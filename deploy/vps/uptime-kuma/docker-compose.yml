# Uptime Kuma — Live Status Monitoring
# VPS 51.254.139.205, alongside n8n + Netbox on Traefik
# Access: https://status.gostoa.dev
#
# Deploy: scp to VPS, then docker compose up -d
# First run: visit /setup to create admin account

services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    volumes:
      - uptime-kuma-data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime-kuma.rule=Host(`status.gostoa.dev`)"
      - "traefik.http.routers.uptime-kuma.entrypoints=websecure"
      - "traefik.http.routers.uptime-kuma.tls.certresolver=letsencrypt"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - default

volumes:
  uptime-kuma-data:

networks:
  default:
    name: traefik_default
    external: true
