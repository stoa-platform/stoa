# webMethods API Gateway — Dev
# VPS: <WORKER_3_IP> (Contabo worker-3, i.e. HEGEMON_W3_IP — see stoa-infra/docs/carto/dns-inventory.md)
# Canonical copy at /opt/webmethods-dev/docker-compose.yml on VPS

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: wm-dev-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-dev-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  apigateway:
    image: softwareag/apigateway-trial:10.15
    container_name: wm-dev-apigateway
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "127.0.0.1:5555:5555"
      - "127.0.0.1:9072:9072"
    environment:
      - apigw_elasticsearch_hosts=elasticsearch:9200
      - apigw_elasticsearch_http_username=
      - apigw_elasticsearch_http_password=
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u Administrator:manage http://localhost:5555/rest/apigateway/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

volumes:
  es-dev-data:
