apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  # Multi-cluster Prometheus data sources (CAB-1426)
  # OVH MKS production — kube-prometheus-stack on OVH K8s GRA9
  - name: Prometheus-OVH-Prod
    type: prometheus
    access: proxy
    url: ${PROMETHEUS_OVH_URL:-http://prometheus:9090}
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  # Hetzner K3s staging — kube-prometheus-stack on Hetzner staging cluster
  - name: Prometheus-Hetzner-Staging
    type: prometheus
    access: proxy
    url: ${PROMETHEUS_HETZNER_URL:-http://prometheus:9090}
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
      timeout: 60
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"trace_id":"([a-f0-9]+)"'
          name: TraceID
          url: "$${__value.raw}"

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
      nodeGraph:
        enabled: true
      serviceMap:
        datasourceUid: prometheus
