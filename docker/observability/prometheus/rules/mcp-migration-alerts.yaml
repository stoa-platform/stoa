# MCP Gateway Migration Alerting Rules — REMOVED
#
# Python → Rust migration completed February 2026.
# Python MCP Gateway decommissioned. Shadow/Canary modes no longer needed.
#
# All mcp_shadow_* and mcp_request_* metrics are no longer emitted.
# Production alerting is now handled by:
#   - deploy/prometheus/alerting-rules.yaml (stoa.stoa-gateway.rules)
#   - docker/observability/prometheus/rules/stoa-slo.yaml (SLO recording rules)
#
# This file retained as a stub to prevent kubectl apply errors on clusters
# that previously had the PrometheusRule resource.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mcp-gateway-migration
  namespace: stoa-system
  labels:
    app: mcp-gateway
    prometheus: stoa
    role: alert-rules
    status: deprecated
spec:
  groups: []
