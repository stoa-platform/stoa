# STOA Platform SLO Recording Rules
# Provides pre-computed metrics for SLO dashboards and alerting
#
# Recording Rules:
# 1. Availability SLO (99.9%)
# 2. Latency SLO (P95 < 500ms)
# 3. APDEX Score
# 4. Error Budget
#
# Usage:
#   kubectl apply -f docker/observability/prometheus/rules/stoa-slo.yaml
#
# Or add to Prometheus configuration via ConfigMap/PrometheusRule CRD
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: stoa-slo
  namespace: stoa-system
  labels:
    app: stoa-platform
    prometheus: stoa
    role: recording-rules
spec:
  groups:
    # ==========================================================================
    # Availability SLO Recording Rules
    # ==========================================================================
    - name: stoa-slo-availability
      interval: 1m
      rules:
        # Overall API availability (success rate)
        - record: slo:api_availability:ratio
          expr: |
            sum(rate(stoa_mcp_gateway_http_requests_total{status_code!~"5.."}[5m]))
            / sum(rate(stoa_mcp_gateway_http_requests_total[5m]))

        # Per-tenant availability
        - record: slo:api_availability_by_tenant:ratio
          expr: |
            sum by (tenant_id) (rate(stoa_mcp_gateway_http_requests_total{status_code!~"5.."}[5m]))
            / sum by (tenant_id) (rate(stoa_mcp_gateway_http_requests_total[5m]))

        # 30-day availability (for SLO compliance)
        - record: slo:api_availability_30d:ratio
          expr: |
            sum(increase(stoa_mcp_gateway_http_requests_total{status_code!~"5.."}[30d]))
            / sum(increase(stoa_mcp_gateway_http_requests_total[30d]))

    # ==========================================================================
    # Latency SLO Recording Rules
    # ==========================================================================
    - name: stoa-slo-latency
      interval: 1m
      rules:
        # P50 Latency
        - record: slo:api_latency_p50:seconds
          expr: |
            histogram_quantile(0.50,
              sum(rate(stoa_mcp_gateway_http_request_duration_seconds_bucket[5m])) by (le)
            )

        # P95 Latency (SLO target: < 500ms)
        - record: slo:api_latency_p95:seconds
          expr: |
            histogram_quantile(0.95,
              sum(rate(stoa_mcp_gateway_http_request_duration_seconds_bucket[5m])) by (le)
            )

        # P99 Latency
        - record: slo:api_latency_p99:seconds
          expr: |
            histogram_quantile(0.99,
              sum(rate(stoa_mcp_gateway_http_request_duration_seconds_bucket[5m])) by (le)
            )

        # Per-tenant P95 latency
        - record: slo:api_latency_p95_by_tenant:seconds
          expr: |
            histogram_quantile(0.95,
              sum by (tenant_id, le) (rate(stoa_mcp_gateway_http_request_duration_seconds_bucket[5m]))
            )

        # Tool invocation latency P95
        - record: slo:tool_latency_p95:seconds
          expr: |
            histogram_quantile(0.95,
              sum by (tool_name, le) (rate(stoa_mcp_gateway_mcp_tool_invocation_duration_seconds_bucket[5m]))
            )

    # ==========================================================================
    # APDEX Score Recording Rules
    # ==========================================================================
    - name: stoa-slo-apdex
      interval: 1m
      rules:
        # Overall APDEX score
        # APDEX = (Satisfied + Tolerating/2) / Total
        - record: slo:apdex:score
          expr: |
            (
              sum(rate(stoa_mcp_gateway_apdex_satisfied_total[5m]))
              + sum(rate(stoa_mcp_gateway_apdex_tolerating_total[5m])) / 2
            )
            /
            (
              sum(rate(stoa_mcp_gateway_apdex_satisfied_total[5m]))
              + sum(rate(stoa_mcp_gateway_apdex_tolerating_total[5m]))
              + sum(rate(stoa_mcp_gateway_apdex_frustrated_total[5m]))
            )

        # Per-tenant APDEX score
        - record: slo:apdex_by_tenant:score
          expr: |
            (
              sum by (tenant_id) (rate(stoa_mcp_gateway_apdex_satisfied_total[5m]))
              + sum by (tenant_id) (rate(stoa_mcp_gateway_apdex_tolerating_total[5m])) / 2
            )
            /
            (
              sum by (tenant_id) (rate(stoa_mcp_gateway_apdex_satisfied_total[5m]))
              + sum by (tenant_id) (rate(stoa_mcp_gateway_apdex_tolerating_total[5m]))
              + sum by (tenant_id) (rate(stoa_mcp_gateway_apdex_frustrated_total[5m]))
            )

    # ==========================================================================
    # Error Budget Recording Rules
    # ==========================================================================
    - name: stoa-slo-error-budget
      interval: 5m
      rules:
        # Error budget remaining (for 99.9% SLO over 30 days)
        # If SLO is 99.9%, error budget is 0.1% of total requests
        - record: slo:error_budget:remaining_ratio
          expr: |
            1 - (
              sum(increase(stoa_mcp_gateway_http_requests_total{status_code=~"5.."}[30d]))
              /
              (sum(increase(stoa_mcp_gateway_http_requests_total[30d])) * 0.001)
            )

        # Error budget burn rate (1 = normal, >1 = burning faster than allowed)
        - record: slo:error_budget:burn_rate_1h
          expr: |
            (
              sum(rate(stoa_mcp_gateway_http_requests_total{status_code=~"5.."}[1h]))
              / sum(rate(stoa_mcp_gateway_http_requests_total[1h]))
            )
            / 0.001  # SLO target error rate

        # Fast burn rate (6h window for early warning)
        - record: slo:error_budget:burn_rate_6h
          expr: |
            (
              sum(rate(stoa_mcp_gateway_http_requests_total{status_code=~"5.."}[6h]))
              / sum(rate(stoa_mcp_gateway_http_requests_total[6h]))
            )
            / 0.001

    # ==========================================================================
    # Business Metrics Recording Rules
    # ==========================================================================
    - name: stoa-business-metrics
      interval: 5m
      rules:
        # Total active tenants (had requests in last 24h)
        - record: business:active_tenants:count
          expr: |
            count(sum by (tenant_id) (increase(stoa_mcp_gateway_http_requests_total[24h])) > 0)

        # Total API calls per hour
        - record: business:api_calls:hourly_rate
          expr: |
            sum(rate(stoa_mcp_gateway_http_requests_total[1h])) * 3600

        # Token consumption rate
        - record: business:tokens_consumed:hourly_rate
          expr: |
            sum(rate(stoa_mcp_gateway_tokens_consumed_total[1h])) * 3600

        # Top tools by usage (1h rate)
        - record: business:tool_usage:1h_rate
          expr: |
            sum by (tool_name) (rate(stoa_mcp_gateway_mcp_tool_invocations_total[1h])) * 3600

        # Billable requests per tenant (daily)
        - record: business:billable_requests_by_tenant:daily
          expr: |
            sum by (tenant_id) (increase(stoa_mcp_gateway_billable_requests_total[24h]))

    # ==========================================================================
    # SLO Compliance Indicators
    # ==========================================================================
    - name: stoa-slo-compliance
      interval: 1m
      rules:
        # Overall SLO compliance (1 = compliant, 0 = non-compliant)
        - record: slo:compliance:overall
          expr: |
            (
              # Availability >= 99.9%
              (slo:api_availability:ratio >= 0.999) * 1
              +
              # Latency P95 < 500ms
              (slo:api_latency_p95:seconds < 0.5) * 1
              +
              # APDEX >= 0.85
              (slo:apdex:score >= 0.85) * 1
            ) / 3

        # SLO status per metric (for dashboard indicators)
        - record: slo:status:availability
          expr: |
            (slo:api_availability:ratio >= 0.999) * 1 + (slo:api_availability:ratio < 0.999) * 0

        - record: slo:status:latency
          expr: |
            (slo:api_latency_p95:seconds < 0.5) * 1 + (slo:api_latency_p95:seconds >= 0.5) * 0

        - record: slo:status:apdex
          expr: |
            (slo:apdex:score >= 0.85) * 1 + (slo:apdex:score < 0.85) * 0
