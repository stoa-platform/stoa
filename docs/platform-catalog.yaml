    consumesSecrets: []
    exposedTo: []
    health: /api/status-page/heartbeat/stoa
    metrics: null
    argocdApp: null
    ciWorkflow: null
    monitors: 21
    owner: platform-team

# ==============================================================================
# INFRASTRUCTURE METADATA
# ==============================================================================

clusters:
  - name: ovh-mks
    displayName: OVH Managed Kubernetes (GRA9)
    provider: OVH
    region: GRA9
    nodes: 3
    nodeType: B2-15
    purpose: Production — control plane + gateway + data layer + observability
    namespaces:
      - stoa-system
      - monitoring
      - opensearch
      - argocd
      - kyverno

  - name: k3s-gateways
    displayName: K3s Gateway Cluster (Contabo)
    provider: Contabo
    region: Nuremberg
    nodes: 2
    nodeType: VPS L (8 vCPU, 24 GB)
    purpose: Dev + Staging data plane (gateways + sidecars)
    namespaces:
      - gateway-dev
      - gateway-staging
    argocdManaged: true
    argocdApps:
      - gateways-dev
      - gateways-staging

  - name: vps-ovh
    displayName: OVH VPS Fleet
    provider: OVH
    region: GRA
    nodes: 3
    nodeType: VPS
    hosts:
      - name: webmethods-vps
        purpose: webMethods prod + stoa-connect + stoa-link
      - name: staging-vps
        purpose: webMethods staging + stoa-connect
      - name: tooling-vps
        purpose: n8n, Netbox, Uptime Kuma, Healthchecks, PocketBase

  - name: vps-contabo
    displayName: Contabo VPS (HEGEMON Workers)
    provider: Contabo
    region: Nuremberg
    nodes: 5
    nodeType: VPS L (8 vCPU, 24 GB)
    hosts:
      - name: worker-1
        purpose: HEGEMON backend agent
      - name: worker-2
        purpose: HEGEMON frontend agent
      - name: worker-3
        purpose: webMethods dev + stoa-connect dev + K3s worker node
      - name: worker-4
        purpose: HEGEMON auth agent
      - name: worker-5
        purpose: HEGEMON QA agent

  - name: vps-vault
    displayName: OVH VPS (Vault)
    provider: OVH
    region: GRA6
    nodes: 1
    nodeType: VPS
    hosts:
      - name: vault-vps
        purpose: HashiCorp Vault (secrets management)

# ==============================================================================
# RBAC ROLES
# ==============================================================================

roles:
  - name: cpi-admin
    scope: "stoa:admin"
    description: Full platform access — create/update/delete tenants, APIs, gateways, users
  - name: tenant-admin
    scope: "stoa:write, stoa:read"
    description: Own tenant management — APIs, subscriptions, credentials
  - name: devops
    scope: "stoa:write, stoa:read"
    description: Deploy/promote, gateway integrations, quota enforcement
  - name: viewer
    scope: "stoa:read"
    description: Read-only access to dashboards, APIs, subscriptions
