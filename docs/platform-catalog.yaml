apiVersion: v1
kind: PlatformCatalog
metadata:
  name: stoa-platform
  description: STOA Platform — service inventory and dependency map
  lastUpdated: "2026-03-29"

# ==============================================================================
# CORE SERVICES — Control Plane (K8s OVH Prod)
# ==============================================================================
services:
  # --------------------------------------------------------------------------
  # Control Plane API — Backend
  # --------------------------------------------------------------------------
  - name: control-plane-api
    displayName: Control Plane API
    type: backend
    tech: Python 3.11, FastAPI, SQLAlchemy
    path: control-plane-api/
    containerPort: 8000
    image: ghcr.io/stoa-platform/control-plane-api
    deploy:
      prod:
        cluster: ovh-mks
        namespace: stoa-system
        replicas: 2
        k8sName: stoa-control-plane-api
    dependsOn:
      - postgres
      - keycloak
      - redpanda
      - opensearch
    consumesSecrets:
      - DATABASE_PASSWORD
      - KEYCLOAK_CLIENT_SECRET
      - GATEWAY_API_KEYS
      - OPENSEARCH_PASSWORD
    exposedTo:
      - control-plane-ui
      - stoa-portal
      - stoa-gateway
      - stoa-operator
      - stoa-connect
    health: /health
    metrics: /metrics
    argocdApp: control-plane-api
    ciWorkflow: control-plane-api-ci
    owner: platform-team

  # --------------------------------------------------------------------------
  # Console UI — Admin frontend
  # --------------------------------------------------------------------------
  - name: control-plane-ui
    displayName: Console (Admin UI)
    type: frontend
    tech: React 18, TypeScript, Vite
    path: control-plane-ui/
    containerPort: 8080
    image: ghcr.io/stoa-platform/control-plane-ui
    deploy:
      prod:
        cluster: ovh-mks
        namespace: stoa-system
        replicas: 2
        k8sName: control-plane-ui
    dependsOn:
      - control-plane-api
      - keycloak
    consumesSecrets: []
    exposedTo: []
    health: /health
    metrics: null
    argocdApp: control-plane-ui
    ciWorkflow: control-plane-ui-ci
    oidcClient: control-plane-ui
    owner: platform-team

  # --------------------------------------------------------------------------
  # Developer Portal — Consumer frontend
  # --------------------------------------------------------------------------
  - name: stoa-portal
    displayName: Developer Portal
    type: frontend
    tech: React 18, TypeScript, Vite
    path: portal/
    containerPort: 8080
    image: ghcr.io/stoa-platform/stoa-portal
    deploy:
      prod:
        cluster: ovh-mks
        namespace: stoa-system
        replicas: 2
        k8sName: stoa-portal
    dependsOn:
      - control-plane-api
      - keycloak
    consumesSecrets: []
    exposedTo: []
    health: /health
    metrics: null
    argocdApp: stoa-portal
    ciWorkflow: stoa-portal-ci
    oidcClient: stoa-portal
    owner: platform-team

  # --------------------------------------------------------------------------
  # STOA Gateway — Rust MCP gateway (edge-mcp mode)
  # --------------------------------------------------------------------------
  - name: stoa-gateway
    displayName: STOA Gateway (Rust)
    type: gateway
    tech: Rust, Tokio, axum
    path: stoa-gateway/
    containerPort: 8080
    image: ghcr.io/stoa-platform/stoa-gateway
    deploy:
      prod:
        cluster: ovh-mks
        namespace: stoa-system
        replicas: 2
        k8sName: stoa-gateway
        mode: edge-mcp
        url: mcp.gostoa.dev
      dev:
        cluster: k3s-gateways
        namespace: gateway-dev
        replicas: 1
        k8sName: stoa-gateway
        mode: edge-mcp
        url: dev-gw-k3s.gostoa.dev
      staging:
        cluster: k3s-gateways
        namespace: gateway-staging
        replicas: 1
        k8sName: stoa-gateway
        mode: edge-mcp
        url: staging-gw-k3s.gostoa.dev
    dependsOn:
      - control-plane-api
      - keycloak
      - redpanda
    consumesSecrets:
      - STOA_CONTROL_PLANE_API_KEY
      - KEYCLOAK_ADMIN_PASSWORD
    exposedTo: []
    health: /health
    metrics: /metrics
    argocdApp: stoa-gateway
    ciWorkflow: stoa-gateway-ci
    owner: platform-team

  # --------------------------------------------------------------------------
  # STOA Link — Sidecar for webMethods (runs stoa-gateway in sidecar mode)
  # --------------------------------------------------------------------------
  - name: stoa-link-wm
    displayName: STOA Link — webMethods (Sidecar)
    type: gateway-sidecar
    tech: Rust, Tokio, axum (stoa-gateway binary in sidecar mode)
    path: stoa-gateway/
    containerPort: 8080
    image: ghcr.io/stoa-platform/stoa-gateway
    deploy:
      prod:
        cluster: vps-ovh
        namespace: null
        replicas: 1
        host: webmethods-vps
        mode: sidecar
        url: link-webmethods.gostoa.dev
      dev:
        cluster: k3s-gateways
        namespace: gateway-dev
        replicas: 1
        k8sName: stoa-link-wm
        mode: sidecar
        url: dev-wm-k3s.gostoa.dev
      staging:
        cluster: k3s-gateways
        namespace: gateway-staging
        replicas: 1
        k8sName: stoa-link-wm
        mode: sidecar
        url: staging-wm-k3s.gostoa.dev
    dependsOn:
      - control-plane-api
      - webmethods
    consumesSecrets:
      - STOA_CONTROL_PLANE_API_KEY
    exposedTo: []
    health: /health
    metrics: /metrics
    argocdApp: null
    ciWorkflow: null
    owner: platform-team

  # --------------------------------------------------------------------------
  # STOA Connect — Go agent bridging webMethods to Control Plane
  # --------------------------------------------------------------------------
  - name: stoa-connect
    displayName: STOA Connect (Go Agent)
    type: gateway-agent
    tech: Go 1.22, stoa-go
    path: stoa-go/cmd/stoa-connect/
    containerPort: 8090
    image: null  # standalone binary, not containerized
    deploy:
      prod:
        cluster: vps-ovh
        namespace: null
        replicas: 1
        host: webmethods-vps
        systemdUnit: stoa-connect.service
      dev:
        cluster: vps-contabo
        namespace: null
        replicas: 1
        host: worker-3
        systemdUnit: stoa-connect.service
      staging:
        cluster: vps-ovh
        namespace: null
        replicas: 1
        host: staging-vps
        systemdUnit: stoa-connect.service
    dependsOn:
      - control-plane-api
      - webmethods
    consumesSecrets:
      - STOA_GATEWAY_API_KEY
    exposedTo:
      - control-plane-api
    health: /health
    metrics: null
    argocdApp: null
    ciWorkflow: null
    owner: platform-team

  # --------------------------------------------------------------------------
  # STOA Operator — K8s CRD controller
  # --------------------------------------------------------------------------
  - name: stoa-operator
    displayName: STOA Operator
    type: operator
    tech: Rust, kube-rs
    path: stoa-operator/
    containerPort: 8080
    image: ghcr.io/stoa-platform/stoa-operator
    deploy:
      prod:
        cluster: ovh-mks
        namespace: stoa-system
        replicas: 1
        k8sName: stoa-operator
    dependsOn:
      - control-plane-api
    consumesSecrets:
      - STOA_CONTROL_PLANE_API_KEY
    exposedTo: []
    health: /health
    metrics: /metrics
    argocdApp: null
    ciWorkflow: null
    owner: platform-team

# ==============================================================================
# THIRD-PARTY GATEWAYS
# ==============================================================================

  - name: webmethods
    displayName: webMethods API Gateway (Trial)
    type: gateway-external
    tech: webMethods 10.15 (trial, 25-min keepalive cron)
    path: null
    containerPort: 5555
    image: softwareag/apigateway-trial:10.15
    deploy:
      prod:
        cluster: vps-ovh
        namespace: null
        replicas: 1
        host: webmethods-vps
        url: webmethods.gostoa.dev
      dev:
        cluster: vps-contabo
        namespace: null
        replicas: 1
        host: worker-3
        url: dev-wm.gostoa.dev
      staging:
        cluster: vps-ovh
        namespace: null
        replicas: 1
        host: staging-vps
        url: staging-wm-vps.gostoa.dev
    dependsOn: []
    consumesSecrets: []
    exposedTo:
      - stoa-connect
      - stoa-link-wm
    health: /rest/apigateway/health
    metrics: null
    argocdApp: null
    ciWorkflow: null
    owner: platform-team

# ==============================================================================
# DATA LAYER
# ==============================================================================

  - name: postgres
    displayName: PostgreSQL
    type: database
    tech: PostgreSQL 15
    path: null
    containerPort: 5432
    image: postgres:15-alpine
    deploy:
      prod:
        cluster: ovh-mks
        namespace: stoa-system
        replicas: 1
        k8sName: control-plane-db
        storage: 20Gi
    dependsOn: []
    consumesSecrets:
      - POSTGRES_PASSWORD
    exposedTo:
      - control-plane-api
      - keycloak
    health: pg_isready
    metrics: null
    argocdApp: null
    ciWorkflow: null
    owner: platform-team

  - name: redpanda
    displayName: Redpanda (Kafka)
    type: messaging
    tech: Redpanda (Kafka-compatible)
    path: null
    containerPort: 9092
    image: redpandadata/redpanda
    deploy:
      prod:
        cluster: ovh-mks
        namespace: stoa-system
        replicas: 1
        k8sName: redpanda
        storage: 10Gi
    dependsOn: []
    consumesSecrets: []
    exposedTo:
      - control-plane-api
      - stoa-gateway
    health: null
    metrics: /metrics
    argocdApp: null
    ciWorkflow: null
    topics:
      - stoa.metering
      - stoa.errors
      - stoa.audit
      - stoa.policy.changes
      - stoa.deployments
    owner: platform-team

  - name: opensearch
    displayName: OpenSearch
    type: search
    tech: OpenSearch 2.11
    path: null
    containerPort: 9200
    image: opensearchproject/opensearch:2.11.1
    deploy:
      prod:
        cluster: ovh-mks
        namespace: opensearch
        replicas: 1
        k8sName: opensearch
        storage: 50Gi
    dependsOn: []
    consumesSecrets:
      - OPENSEARCH_PASSWORD
    exposedTo:
      - control-plane-api
    health: /_cluster/health
    metrics: null
    argocdApp: null
    ciWorkflow: null
    owner: platform-team

# ==============================================================================
# IDENTITY & AUTH
# ==============================================================================

  - name: keycloak
    displayName: Keycloak (OIDC)
    type: identity
    tech: Keycloak 26.5.3
    path: null
    containerPort: 8080
    image: ghcr.io/stoa-platform/keycloak:latest
    deploy:
      prod:
        cluster: ovh-mks
        namespace: stoa-system
        replicas: 1
        k8sName: keycloak
    dependsOn:
      - postgres
    consumesSecrets:
      - KEYCLOAK_ADMIN_PASSWORD
    exposedTo:
      - control-plane-api
      - control-plane-ui
      - stoa-portal
      - stoa-gateway
    health: /health/ready
    metrics: null
    argocdApp: null
    ciWorkflow: null
    realms:
      - stoa
    roles:
      - cpi-admin
      - tenant-admin
      - devops
      - viewer
    owner: platform-team

  - name: vault
    displayName: HashiCorp Vault
    type: secrets
    tech: HashiCorp Vault (self-hosted)
    path: null
    containerPort: 8200
    image: hashicorp/vault
    deploy:
      prod:
        cluster: vps-ovh
        namespace: null
        replicas: 1
        host: vault-vps
        url: hcvault.gostoa.dev
    dependsOn: []
    consumesSecrets: []
    exposedTo:
      - stoa-connect
      - stoa-gateway
    health: /v1/sys/health
    metrics: null
    argocdApp: null
    ciWorkflow: null
    owner: platform-team

  - name: infisical
    displayName: Infisical (Legacy Secrets)
    type: secrets
    tech: Infisical (self-hosted, read-only reference during Vault transition)
    path: null
    containerPort: 443
    image: infisical/infisical
    deploy:
      prod:
        cluster: vps-ovh
        namespace: null
        replicas: 1
        host: infisical-vps
        url: vault.gostoa.dev
    dependsOn: []
    consumesSecrets: []
    exposedTo:
      - control-plane-api
    health: /api/status
    metrics: null
    argocdApp: null
    ciWorkflow: null
    owner: platform-team

  - name: openldap
    displayName: OpenLDAP
    type: directory
    tech: OpenLDAP 1.5.0
    path: null
    containerPort: 389
    image: osixia/openldap:1.5.0
    deploy:
      prod:
        cluster: ovh-mks
        namespace: stoa-system
        replicas: 1
        k8sName: openldap
    dependsOn: []
    consumesSecrets:
      - LDAP_ADMIN_PASSWORD
    exposedTo:
      - control-plane-api
    health: null
    metrics: null
    argocdApp: null
    ciWorkflow: null
    owner: platform-team

