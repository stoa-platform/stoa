    displayName: Kong Standalone (VPS)
    type: gateway-external
    tech: Kong 3.x (DB-less)
    path: null
    containerPort: 8000
    image: kong:3.6
    deploy:
      prod:
        cluster: vps-ovh
        namespace: null
        replicas: 1
        k8sName: null
        host: kong-gra
    dependsOn: []
    consumesSecrets: []
    exposedTo: []
    health: ":8001/status"
    metrics: null
    argocdApp: null
    ciWorkflow: null
    purpose: Live adapter testing + VPS benchmark sidecar
    owner: platform-team

  - name: gravitee-vps
    displayName: Gravitee APIM (VPS)
    type: gateway-external
    tech: Gravitee APIM 4.x
    path: null
    containerPort: 8082
    image: graviteeio/apim-gateway:4
    deploy:
      prod:
        cluster: vps-ovh
