# Alloy values for OVH MKS — Log collection to Loki
# Standalone deployment (not via stoa-observability chart)

alloy:
  configMap:
    create: false
    name: stoa-alloy-config
    key: config.alloy
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

controller:
  type: daemonset
  tolerations:
    - operator: Exists

serviceMonitor:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
