# agentgateway (Linux Foundation / Solo.io) for Arena benchmarks
# Single pod, standalone mode, ConfigMap-based config.
# No persistence, no ingress — benchmark traffic only via ClusterIP.
# Image: v1.0.1 (GA release, 2026-03-20)
#
# Ports:
#   3000  — MCP/HTTP proxy (Streamable HTTP, JSON-RPC 2.0)
#   15000 — Admin UI
#   15020 — Prometheus metrics
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentgateway-arena-config
  namespace: stoa-system
  labels:
    app: agentgateway-arena
data:
  config.yaml: |
    # agentgateway standalone config for Arena benchmarks
    # Routes /echo/* to echo-backend via static backend
    binds:
    - port: 3000
      listeners:
      - routes:
        # Health endpoint (synthetic — agentgateway has built-in /healthz on 15021)
        - name: health
          matches:
          - path:
              pathPrefix: /health
          policies:
            directResponse:
              body: '{"status":"healthy"}'
              status: 200
        # Echo proxy route (for L0 baseline benchmarks)
        - name: echo-proxy
          matches:
          - path:
              pathPrefix: /echo
          backends:
          - host: echo-backend.stoa-system.svc:8888
        # MCP endpoint (Streamable HTTP — JSON-RPC 2.0)
        - name: mcp
          matches:
          - path:
              pathPrefix: /mcp
          policies:
            cors:
              allowOrigins: ["*"]
              allowHeaders: [mcp-protocol-version, content-type, cache-control]
              exposeHeaders: ["Mcp-Session-Id"]
          backends:
          - mcp:
              targets:
              - name: echo-tool
                sse:
                  host: http://echo-backend.stoa-system.svc:8888/mcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway-arena
  namespace: stoa-system
  labels:
    app: agentgateway-arena
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentgateway-arena
  template:
    metadata:
      labels:
        app: agentgateway-arena
    spec:
      containers:
        - name: agentgateway
          image: ghcr.io/agentgateway/agentgateway:v1.0.1
          args: ["-f", "/etc/agentgateway/config.yaml"]
          ports:
            - containerPort: 3000
              name: proxy
            - containerPort: 15000
              name: admin
            - containerPort: 15020
              name: metrics
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/agentgateway
              readOnly: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 12345
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: agentgateway-arena-config
---
apiVersion: v1
kind: Service
metadata:
  name: agentgateway-arena
  namespace: stoa-system
  labels:
    app: agentgateway-arena
spec:
  selector:
    app: agentgateway-arena
  ports:
    - name: proxy
      port: 3000
      targetPort: 3000
    - name: admin
      port: 15000
      targetPort: 15000
    - name: metrics
      port: 15020
      targetPort: 15020
