apiVersion: batch/v1
kind: CronJob
metadata:
  name: gateway-arena-enterprise
  namespace: stoa-system
  labels:
    app: gateway-arena-enterprise
    environment: production
    layer: enterprise
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 3000
      template:
        metadata:
          labels:
            app: gateway-arena-enterprise
        spec:
          imagePullSecrets:
            - name: ghcr-pull-secret
          restartPolicy: Never
          affinity:
            podAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app: stoa-gateway
                    topologyKey: kubernetes.io/hostname
          securityContext:
            runAsNonRoot: true
            runAsUser: 12345
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: arena-enterprise
              image: ghcr.io/stoa-platform/arena-bench:0.2.0
              command:
                - bash
                - /scripts/run-arena-enterprise.sh
              env:
                - name: PUSHGATEWAY_URL
                  value: "http://pushgateway.monitoring.svc:9091"
                - name: RUNS
                  value: "5"
                - name: DISCARD_FIRST
                  value: "1"
                - name: TIMEOUT
                  value: "10"
                - name: SCRIPT_PATH
                  value: "/scripts/benchmark-enterprise.js"
                - name: ARENA_INSTANCE
                  value: "k8s"
                - name: OPENSEARCH_URL
                  value: "http://opensearch.opensearch.svc:9200"
                - name: OPENSEARCH_USER
                  value: "admin"
                - name: OPENSEARCH_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: opensearch-credentials
                      key: admin-password
                      optional: true
                - name: LLM_MOCK_URL
                  value: "http://llm-mock-backend.stoa-system.svc:8889"
                  # Admin API token for gateway admin endpoints (circuit-breakers, skills, etc.)
                - name: ADMIN_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: stoa-gateway-secrets
                      key: STOA_ADMIN_API_TOKEN
                      optional: true
                  # OIDC credentials for JWT auto-fetch (reuses L2 verify config)
                  # If ARENA_JWT is empty, the orchestrator fetches a fresh token
                  # via client_credentials grant before running benchmarks.
                - name: OIDC_CLIENT_ID
                  value: "stoa-healthcheck"
                - name: OIDC_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: arena-verify-config
                      key: oidc-client-secret
                      optional: true
                - name: OIDC_TOKEN_URL
                  value: "http://keycloak.stoa-system.svc/realms/stoa/protocol/openid-connect/token"
                  # GATEWAYS: 20-dimension enterprise AI readiness benchmark.
                  # 4 gateways: 2 AI-native + 2 traditional (baseline contrast).
                  #
                  # Kong Enterprise excluded: AI License (separate from Enterprise)
                  # not available for automated CI. MCP plugins in Tech Preview (3.12+).
                  # See METHODOLOGY.md for full evaluation notes.
                  #
                  # mcp_base: null = no MCP support (scores 0 on MCP dims)
                  # mcp_protocol: "stoa" (REST) or "streamable-http" (JSON-RPC 2.0)
                  # features: self-declared capability keys (missing = score 0)
                  # Feature keys: llm_routing, llm_cost, llm_circuit_breaker,
                  #   native_tools_crud, api_bridge, uac_binding, pii_detection,
                  #   distributed_tracing, prompt_cache, skills_lifecycle, federation, diagnostic
                - name: GATEWAYS
                  value: |
                    [
                      {
                        "name": "stoa-k8s",
                        "target": "http://stoa-gateway.stoa-system.svc",
                        "mcp_base": "http://stoa-gateway.stoa-system.svc/mcp",
                        "mcp_protocol": "stoa",
                        "admin_base": "http://stoa-gateway.stoa-system.svc",
                        "health": "http://stoa-gateway.stoa-system.svc/health",
                        "features": [
                          "llm_routing", "llm_cost", "llm_circuit_breaker",
                          "native_tools_crud", "api_bridge", "uac_binding",
                          "pii_detection", "distributed_tracing", "prompt_cache",
                          "skills_lifecycle", "federation", "diagnostic"
                        ]
                      },
                      {
                        "name": "agentgateway-k8s",
                        "target": "http://agentgateway-arena.stoa-system.svc:3000",
                        "mcp_base": "http://agentgateway-arena.stoa-system.svc:3000/mcp",
                        "mcp_protocol": "streamable-http",
                        "admin_base": "http://agentgateway-arena.stoa-system.svc:15000",
                        "health": "http://agentgateway-arena.stoa-system.svc:3000/health",
                        "features": [
                          "llm_routing", "llm_cost", "llm_circuit_breaker",
                          "native_tools_crud", "api_bridge",
                          "pii_detection", "distributed_tracing", "federation"
                        ]
                      },
                      {
                        "name": "gravitee-k8s",
                        "target": "http://gravitee-arena-gw.stoa-system.svc:8082",
                        "mcp_base": null,
                        "mcp_protocol": null,
                        "admin_base": null,
                        "health": "http://gravitee-arena-gw.stoa-system.svc:8082/",
                        "features": [
                          "distributed_tracing", "quota_burst", "resilience"
                        ]
                      },
                      {
                        "name": "kong-k8s",
                        "target": "http://kong-arena.stoa-system.svc:8000",
                        "mcp_base": null,
                        "mcp_protocol": null,
                        "admin_base": null,
                        "health": "http://kong-arena.stoa-system.svc:8001/status",
                        "features": []
                      }
                    ]
              resources:
                # Guaranteed QoS: requests == limits (no CPU throttling)
                # Matches L0 cronjob-prod.yaml to avoid bench runner bottleneck
                requests:
                  cpu: "1"
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
              securityContext:
                privileged: false
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: scripts
              configMap:
                name: gateway-arena-scripts
                defaultMode: 0755
            - name: tmp
              emptyDir: {}
