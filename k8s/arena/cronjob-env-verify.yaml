apiVersion: batch/v1
kind: CronJob
metadata:
  name: env-verify
  namespace: stoa-system
  labels:
    app: env-verify
    app.kubernetes.io/component: arena
    app.kubernetes.io/part-of: stoa-platform
    stoa.dev/environment: prod
    stoa.dev/managed-by: manual
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: env-verify
        spec:
          imagePullSecrets:
            - name: ghcr-pull-secret
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 12345
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: verify
              image: ghcr.io/stoa-platform/arena-bench:0.2.0
              command:
                - bash
                - /scripts/run-env-verify.sh
              env:
                - name: PUBLIC_ENVIRONMENTS_URL
                  value: "http://stoa-control-plane-api.stoa-system.svc:8000/v1/environments/public"
                - name: PUSHGATEWAY_URL
                  value: "http://pushgateway.monitoring.svc:9091"
                - name: TIMEOUT
                  value: "5"
                - name: ARENA_INSTANCE
                  value: "k8s"
                - name: HEALTHCHECKS_URL
                  valueFrom:
                    secretKeyRef:
                      name: arena-verify-config
                      key: healthchecks-url
                      optional: true
              resources:
                requests:
                  cpu: "50m"
                  memory: 32Mi
                limits:
                  cpu: "100m"
                  memory: 64Mi
              securityContext:
                privileged: false
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: scripts
              configMap:
                name: gateway-arena-scripts
                defaultMode: 0755
            - name: tmp
              emptyDir: {}
