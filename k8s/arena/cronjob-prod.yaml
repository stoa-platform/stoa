apiVersion: batch/v1
kind: CronJob
metadata:
  name: gateway-arena
  namespace: stoa-system
  labels:
    app: gateway-arena
    environment: production
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1200
      template:
        metadata:
          labels:
            app: gateway-arena
        spec:
          imagePullSecrets:
            - name: ghcr-pull-secret
          restartPolicy: Never
          affinity:
            podAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app: stoa-gateway
                    topologyKey: kubernetes.io/hostname
          securityContext:
            runAsNonRoot: true
            runAsUser: 12345
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: arena
              image: ghcr.io/stoa-platform/arena-bench:0.1.0
              command:
                - bash
                - /scripts/run-arena.sh
              env:
                - name: PUSHGATEWAY_URL
                  value: "http://pushgateway.monitoring.svc:9091"
                - name: RUNS
                  value: "5"
                - name: DISCARD_FIRST
                  value: "1"
                - name: TIMEOUT
                  value: "5"
                - name: SCRIPT_PATH
                  value: "/scripts/benchmark.js"
                  # VPS gateways benchmarked locally via deploy/vps/bench/ (co-located)
                  # Gravitee-k8s disabled: APIM 4.6 health probe incompatible, Java startup too slow
                  # Re-enable when Gravitee probe path is fixed for v4.6
                - name: GATEWAYS
                  value: |
                    [
                      {"name":"stoa-k8s","health":"http://stoa-gateway.stoa-system.svc/health","proxy":"http://stoa-gateway.stoa-system.svc/echo/get"},
                      {"name":"kong-k8s","health":"http://kong-arena.stoa-system.svc:8001/status","proxy":"http://kong-arena.stoa-system.svc:8000/echo/get"}
                    ]
              resources:
                # Guaranteed QoS: requests == limits (no CPU throttling)
                requests:
                  cpu: "1"
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
              securityContext:
                privileged: false
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: scripts
              configMap:
                name: gateway-arena-scripts
                defaultMode: 0755
            - name: tmp
              emptyDir: {}
