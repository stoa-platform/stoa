apiVersion: batch/v1
kind: CronJob
metadata:
  name: gateway-arena
  namespace: stoa-system
  labels:
    app: gateway-arena
    environment: production
spec:
  schedule: "*/45 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 2700
      template:
        metadata:
          labels:
            app: gateway-arena
        spec:
          imagePullSecrets:
            - name: ghcr-pull-secret
          restartPolicy: Never
          affinity:
            podAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app: stoa-gateway
                    topologyKey: kubernetes.io/hostname
          securityContext:
            runAsNonRoot: true
            runAsUser: 12345
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: arena
              image: ghcr.io/stoa-platform/arena-bench:0.2.0
              command:
                - bash
                - /scripts/run-arena.sh
              env:
                - name: PUSHGATEWAY_URL
                  value: "http://pushgateway.monitoring.svc:9091"
                - name: RUNS
                  value: "5"
                - name: DISCARD_FIRST
                  value: "1"
                - name: TIMEOUT
                  value: "5"
                - name: SCRIPT_PATH
                  value: "/scripts/benchmark.js"
                - name: ARENA_INSTANCE
                  value: "k8s"
                - name: OPENSEARCH_URL
                  value: "http://opensearch.opensearch.svc:9200"
                - name: OPENSEARCH_USER
                  value: "admin"
                - name: OPENSEARCH_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: opensearch-credentials
                      key: admin-password
                      optional: true
                  # VPS gateways benchmarked locally via deploy/vps/bench/ (co-located)
                  # Gravitee-k8s re-enabled: use proxy port 8082 (not technical 18082) for health
                  # Java startup is slow but proxy port responds once K8s readiness passes
                - name: STOA_ADMIN_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: stoa-gateway-secrets
                      key: STOA_ADMIN_API_TOKEN
                - name: GATEWAYS
                  value: |
                    [
                      {"name":"stoa-k8s","health":"http://stoa-gateway.stoa-system.svc/health","proxy":"http://stoa-gateway.stoa-system.svc/echo/get","admin_base":"http://stoa-gateway.stoa-system.svc"},
                      {"name":"agentgateway-k8s","health":"http://agentgateway-arena.stoa-system.svc:3000/health","proxy":"http://agentgateway-arena.stoa-system.svc:3000/echo/get"},
                      {"name":"kong-k8s","health":"http://kong-arena.stoa-system.svc:8001/status","proxy":"http://kong-arena.stoa-system.svc:8000/echo/get"},
                      {"name":"gravitee-k8s","health":"http://gravitee-arena-gw.stoa-system.svc:8082/echo/get","proxy":"http://gravitee-arena-gw.stoa-system.svc:8082/echo/get"}
                    ]
              resources:
                # Guaranteed QoS: requests == limits (no CPU throttling)
                requests:
                  cpu: "1"
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
              securityContext:
                privileged: false
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: scripts
              configMap:
                name: gateway-arena-scripts
                defaultMode: 0755
            - name: tmp
              emptyDir: {}
