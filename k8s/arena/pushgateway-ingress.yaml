apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pushgateway
  namespace: monitoring
  labels:
    app: pushgateway
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Basic auth instead of IP whitelist (OVH LB strips client IP)
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: pushgateway-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Arena Pushgateway"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - pushgateway.gostoa.dev
      secretName: pushgateway-tls
  rules:
    - host: pushgateway.gostoa.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pushgateway
                port:
                  number: 9091
