# HTTPRoute for opensearch namespace
# SnippetsFilter increases proxy buffers for OSD OIDC headers
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: opensearch-dashboards
  namespace: opensearch
spec:
  parentRefs:
    - name: stoa
      namespace: nginx-gateway
  hostnames:
    - opensearch.gostoa.dev
  rules:
    - backendRefs:
        - name: opensearch-dashboards
          port: 5601
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.nginx.org
            kind: SnippetsFilter
            name: osd-proxy-buffers
---
# OpenSearch Data API — for n8n SEO pipeline ingestion
# Protected by OpenSearch internal basic auth (kibanaserver or admin user)
# Only seo-metrics-* indices are exposed (path-based restriction)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: opensearch-data-api
  namespace: opensearch
spec:
  parentRefs:
    - name: stoa
      namespace: nginx-gateway
  hostnames:
    - os-data.gostoa.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /seo-metrics-
      backendRefs:
        - name: opensearch
          port: 9200
