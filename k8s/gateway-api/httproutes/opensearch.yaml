# HTTPRoute for opensearch namespace
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: opensearch-dashboards
  namespace: opensearch
spec:
  parentRefs:
    - name: stoa
      namespace: nginx-gateway
  hostnames:
    - opensearch.gostoa.dev
  rules:
    - backendRefs:
        - name: opensearch-dashboards
          port: 5601
