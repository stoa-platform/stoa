  name: stoa-gateway
  namespace: stoa-system
  labels:
    app: stoa-gateway
spec:
  parentRefs:
    - name: stoa
      namespace: nginx-gateway
  hostnames:
    - mcp.gostoa.dev
  rules:
    - backendRefs:
        - name: stoa-gateway
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: stoa-portal
  namespace: stoa-system
  labels:
    app: stoa-portal
spec:
