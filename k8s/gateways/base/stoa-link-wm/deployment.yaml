apiVersion: apps/v1
kind: Deployment
metadata:
  name: stoa-link-wm
  labels:
    app: stoa-link-wm
    stoa.io/deployment-kind: standalone-link
    stoa.io/runtime-mode: sidecar
  annotations:
    stoa.io/topology: "standalone-remote-link"
    stoa.io/note: "This is not a Kubernetes sidecar; Helm stoaSidecar renders the real same-pod sidecar topology."
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stoa-link-wm
  template:
    metadata:
      labels:
        app: stoa-link-wm
        stoa.io/deployment-kind: standalone-link
        stoa.io/runtime-mode: sidecar
      annotations:
        stoa.io/topology: "standalone-remote-link"
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: stoa-gateway
          image: ghcr.io/stoa-platform/stoa-gateway:latest
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9191
              name: metrics
          env:
            - name: STOA_HOST
              value: "0.0.0.0"
            - name: STOA_PORT
              value: "8080"
            - name: STOA_LOG_LEVEL
              value: "info"
            - name: STOA_LOG_FORMAT
              value: "json"
            - name: STOA_INSTANCE_NAME
              value: "stoa-link-wm"
            - name: STOA_GATEWAY_MODE
              value: "sidecar"
            - name: STOA_AUTO_REGISTER
              value: "true"
            - name: STOA_CONTROL_PLANE_URL
              value: "https://api.gostoa.dev"
            - name: STOA_KEYCLOAK_URL
              value: "https://auth.gostoa.dev"
            - name: STOA_KEYCLOAK_REALM
              value: "stoa"
            - name: STOA_KEYCLOAK_CLIENT_ID
              value: "stoa-mcp-gateway"
            - name: STOA_TARGET_GATEWAY_URL
              value: "https://vps-wm.gostoa.dev"
            - name: STOA_RATE_LIMIT_DEFAULT
              value: "1000"
            - name: STOA_POLICY_ENABLED
              value: "false"
            - name: STOA_K8S_ENABLED
              value: "false"
            - name: STOA_KAFKA_ENABLED
              value: "false"
            - name: STOA_LLM_PROXY_ENABLED
              value: "false"
            - name: STOA_CONTROL_PLANE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stoa-gateway-secrets
                  key: STOA_CONTROL_PLANE_API_KEY
                  optional: true
            - name: STOA_ADMIN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stoa-gateway-secrets
                  key: STOA_ADMIN_API_TOKEN
                  optional: true
            - name: STOA_KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stoa-gateway-secrets
                  key: STOA_KEYCLOAK_ADMIN_PASSWORD
                  optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
