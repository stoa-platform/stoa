apiVersion: gostoa.dev/v1alpha1
kind: GatewayInstance
metadata:
  name: stoa-gateway-prod
  labels:
    stoa.dev/environment: prod
    stoa.dev/deployment-mode: edge
    stoa.dev/target-gateway-type: stoa
    stoa.dev/topology: native-edge
spec:
  displayName: STOA Gateway
  gatewayType: stoa_edge_mcp
  environment: prod
  baseUrl: http://stoa-gateway.stoa-system.svc.cluster.local:80
  deploymentMode: edge
  targetGatewayType: stoa
  topology: native-edge
  endpoints:
    publicUrl: https://mcp.gostoa.dev
    internalUrl: http://stoa-gateway.stoa-system.svc.cluster.local:80
    adminUrl: http://stoa-gateway.stoa-system.svc.cluster.local:80
    healthUrl: http://stoa-gateway.stoa-system.svc.cluster.local:80/health
  capabilities:
    - mcp
    - rest
  mode: edge-mcp
  tags:
    - edge
    - stoa
---
apiVersion: gostoa.dev/v1alpha1
