apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gateway-rec
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: stoa-gateway
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: STOA_ENVIRONMENT
          value: "rec"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: STOA_INSTANCE_NAME
          value: "stoa-gateway-rec"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: STOA_GATEWAY_EXTERNAL_URL
          value: "https://rec-mcp.gostoa.dev"
