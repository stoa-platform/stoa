# FluentBit → OpenSearch credentials
# Dedicated service account with write-only access to stoa-logs-* and stoa-errors-*
# Role: fluentbit_writer (cluster_composite_ops, write to log indices)
#
# To create on cluster:
#   kubectl create secret generic fluent-bit-opensearch \
#     --from-literal=username=logwriter \
#     --from-literal=password=<from-infisical:/opensearch/FLUENTBIT_PASSWORD> \
#     -n logging
#
# Do NOT commit real passwords — this file is a template only.
apiVersion: v1
kind: Secret
metadata:
  name: fluent-bit-opensearch
  namespace: logging
  labels:
    app: fluent-bit
    app.kubernetes.io/part-of: stoa-platform
type: Opaque
stringData:
  username: logwriter
  password: REPLACE_FROM_INFISICAL
