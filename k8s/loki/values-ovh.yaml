# Loki values for OVH MKS — Single Binary mode (lightweight)
# Adapted from docker/observability/loki/loki-config.yml (prod)

deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    type: filesystem

  limits_config:
    retention_period: 720h  # 30 days
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    per_stream_rate_limit: 5MB
    per_stream_rate_limit_burst: 15MB
    max_query_parallelism: 32
    max_query_series: 500
    max_entries_limit_per_query: 5000
    allow_structured_metadata: true

  compactor:
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 150
    delete_request_store: filesystem

  rulerConfig:
    alertmanager_url: http://prometheus-kube-prometheus-alertmanager.monitoring:9093
    storage:
      type: local
      local:
        directory: /rules
    rule_path: /tmp/rules
    enable_api: true
    enable_alertmanager_v2: true

  querier:
    max_concurrent: 20

  frontend:
    max_outstanding_per_tenant: 2048
    compress_responses: true

  analytics:
    reporting_enabled: false

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  persistence:
    enabled: true
    size: 20Gi
    storageClass: csi-cinder-high-speed
  extraVolumeMounts:
    - name: stoa-rules
      mountPath: /rules/fake
      readOnly: true
  extraVolumes:
    - name: stoa-rules
      configMap:
        name: loki-alerting-rules

# Disable components not needed in single-binary mode
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

gateway:
  enabled: false

test:
  enabled: false

minio:
  enabled: false

chunksCache:
  enabled: false
resultsCache:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false
