# DNS egress allow for all application namespaces
# Without this, pods cannot resolve service names after default-deny
# CAB-1401
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: stoa-system
  labels:
    app.kubernetes.io/part-of: stoa-platform
    security.stoa.dev/policy: cab-1401
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
