# opensearch namespace allow rules
# CAB-1401
---
# OpenSearch Dashboards ingress from NGF
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ngf-ingress
  namespace: opensearch
  labels:
    app.kubernetes.io/part-of: stoa-platform
    security.stoa.dev/policy: cab-1401
spec:
  podSelector:
    matchLabels:
      app: opensearch-dashboards
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nginx-gateway
      ports:
        - protocol: TCP
          port: 5601
---
# OpenSearch inter-service traffic (OS ↔ Dashboards)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: opensearch
  labels:
    app.kubernetes.io/part-of: stoa-platform
    security.stoa.dev/policy: cab-1401
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# OpenSearch ingress from stoa-system (log shipping from API)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-log-ingestion
  namespace: opensearch
  labels:
    app.kubernetes.io/part-of: stoa-platform
    security.stoa.dev/policy: cab-1401
spec:
  podSelector:
    matchLabels:
      app: opensearch
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: stoa-system
      ports:
        - protocol: TCP
          port: 9200
    # Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9200
