# =============================================================================
# STOA Observability Stack — ArgoCD Application
# =============================================================================
# CAB-1687: GitOps-managed dashboards, PrometheusRules, and OpenSearch init
# Self-heal enabled — manual changes in cluster are reverted to git state
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stoa-observability
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: stoa-platform
    app.kubernetes.io/component: observability
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/stoa-platform/stoa.git
    targetRevision: main
    path: k8s/observability
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: stoa-monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=false
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
