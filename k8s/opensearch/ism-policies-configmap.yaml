apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-ism-policies
  namespace: stoa-system
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/component: ism-policies
    app.kubernetes.io/managed-by: stoa
data:
  gateway-logs-free.json: |
    {
      "policy": {
        "description": "Gateway telemetry logs - Free tier (7 days retention)",
        "default_state": "hot",
        "states": [
          {
            "name": "hot",
            "actions": [{ "rollover": { "min_size": "2gb", "min_index_age": "1d" } }],
            "transitions": [{ "state_name": "delete", "conditions": { "min_index_age": "7d" } }]
          },
          {
            "name": "delete",
            "actions": [{ "delete": {} }],
            "transitions": []
          }
        ],
        "ism_template": { "index_patterns": ["stoa-*-free-*"], "priority": 50 }
      }
    }
  gateway-logs-pro.json: |
    {
      "policy": {
        "description": "Gateway telemetry logs - Pro tier (90 days retention)",
        "default_state": "hot",
        "states": [
          {
            "name": "hot",
            "actions": [{ "rollover": { "min_size": "5gb", "min_index_age": "1d" } }],
            "transitions": [{ "state_name": "warm", "conditions": { "min_index_age": "14d" } }]
          },
          {
            "name": "warm",
            "actions": [{ "replica_count": { "number_of_replicas": 0 } }, { "force_merge": { "max_num_segments": 1 } }],
            "transitions": [{ "state_name": "delete", "conditions": { "min_index_age": "90d" } }]
          },
          {
            "name": "delete",
            "actions": [{ "delete": {} }],
            "transitions": []
          }
        ],
        "ism_template": { "index_patterns": ["stoa-*-pro-*"], "priority": 150 }
      }
    }
  gateway-logs-enterprise.json: |
    {
      "policy": {
        "description": "Gateway telemetry logs - Enterprise tier (365 days retention)",
        "default_state": "hot",
        "states": [
          {
            "name": "hot",
            "actions": [{ "rollover": { "min_size": "10gb", "min_index_age": "7d" } }],
            "transitions": [{ "state_name": "warm", "conditions": { "min_index_age": "30d" } }]
          },
          {
            "name": "warm",
            "actions": [{ "replica_count": { "number_of_replicas": 0 } }, { "force_merge": { "max_num_segments": 1 } }],
            "transitions": [{ "state_name": "cold", "conditions": { "min_index_age": "90d" } }]
          },
          {
            "name": "cold",
            "actions": [{ "read_only": {} }],
            "transitions": [{ "state_name": "delete", "conditions": { "min_index_age": "365d" } }]
          },
          {
            "name": "delete",
            "actions": [{ "delete": {} }],
            "transitions": []
          }
        ],
        "ism_template": { "index_patterns": ["stoa-*-enterprise-*"], "priority": 150 }
      }
    }
