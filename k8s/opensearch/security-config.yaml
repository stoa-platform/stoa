# OpenSearch Security Configuration — Production
# All 7 security config files required by securityadmin.sh.
#
# Usage:
#   1. Update this ConfigMap
#   2. kubectl apply -f k8s/opensearch/security-config.yaml
#   3. Run the init job: kubectl create job --from=cronjob/opensearch-security-init security-init-manual -n opensearch
#      OR manually: kubectl exec opensearch-cluster-master-0 -n opensearch -c opensearch -- \
#        /usr/share/opensearch/plugins/opensearch-security/tools/securityadmin.sh \
#        -cd /usr/share/opensearch/config/opensearch-security/ \
#        -cacert /usr/share/opensearch/config/certs/root-ca.pem \
#        -cert /usr/share/opensearch/config/certs/kirk.pem \
#        -key /usr/share/opensearch/config/certs/kirk-key.pem -icl -nhnv
#
# NOTE: internal_users.yml hashes use REPLACE_FROM_VAULT placeholders.
#       Real hashes are injected by the init job from Vault secret.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-security-source
  namespace: opensearch
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: stoa-platform
data:
  config.yml: |
    _meta:
      type: "config"
      config_version: 2

    config:
      dynamic:
        http:
          anonymous_auth_enabled: false
        authc:
          basic_internal_auth_domain:
            description: "Authenticate via HTTP Basic against internal users database"
            http_enabled: true
            transport_enabled: true
            order: 0
            http_authenticator:
              type: basic
              challenge: false
            authentication_backend:
              type: intern

          openid_auth_domain:
            description: "Authenticate via Keycloak OIDC"
            http_enabled: true
            transport_enabled: false
            order: 1
            http_authenticator:
              type: openid
              challenge: false
              config:
                subject_key: preferred_username
                roles_key: roles
                openid_connect_url: "https://auth.gostoa.dev/realms/stoa/.well-known/openid-configuration"
            authentication_backend:
              type: noop

  roles.yml: |
    _meta:
      type: "roles"
      config_version: 2

    stoa_logs_admin:
      reserved: false
      cluster_permissions:
        - "cluster_monitor"
      index_permissions:
        - index_patterns:
            - "stoa-logs-*"
            - "stoa-api-*"
            - "stoa-gw-*"
          allowed_actions:
            - "crud"
            - "create_index"

    stoa_gw_admin:
      reserved: false
      cluster_permissions:
        - "cluster_monitor"
      index_permissions:
        - index_patterns:
            - "stoa-gw-*"
          allowed_actions:
            - "crud"
            - "create_index"

    stoa_gw_writer:
      reserved: false
      index_permissions:
        - index_patterns:
            - "stoa-gw-*"
            - "stoa-logs-*"
          allowed_actions:
            - "crud"
            - "create_index"

    stoa_logs_writer:
      reserved: false
      index_permissions:
        - index_patterns:
            - "stoa-logs-*"
          allowed_actions:
            - "crud"
            - "create_index"

    stoa_tenant_viewer:
      reserved: false
      index_permissions:
        - index_patterns:
            - "stoa-logs-*"
          dls: '{"term": {"tenant_id": "${attr.jwt.tenant_id}"}}'
          allowed_actions:
            - "read"

    stoa_tenant_writer:
      reserved: false
      index_permissions:
        - index_patterns:
            - "stoa-api-*"
          dls: '{"term": {"tenant_id": "${attr.jwt.tenant_id}"}}'
          allowed_actions:
            - "crud"
            - "create_index"

  internal_users.yml: |
    _meta:
      type: "internalusers"
      config_version: 2

    admin:
      hash: "REPLACE_FROM_VAULT"
      reserved: true
      backend_roles:
        - "admin"
      description: "Admin user"

    kibanaserver:
      hash: "REPLACE_FROM_VAULT"
      reserved: true
      description: "OpenSearch Dashboards internal user"

    logwriter:
      hash: "REPLACE_FROM_VAULT"
      reserved: false
      backend_roles:
        - "stoa-log-ingest"
      description: "Fluent Bit log writer"

  action_groups.yml: |
    _meta:
      type: "actiongroups"
      config_version: 2

  tenants.yml: |
    _meta:
      type: "tenants"
      config_version: 2

  nodes_dn.yml: |
    _meta:
      type: "nodesdn"
      config_version: 2

  roles_mapping.yml: |
    _meta:
      type: "rolesmapping"
      config_version: 2

    all_access:
      reserved: false
      backend_roles:
        - "admin"
        - "opensearch-admin"
        - "cpi-admin"
      description: "Maps admin and Keycloak cpi-admin to all_access"

    kibana_user:
      reserved: false
      backend_roles:
        - "kibanauser"
        - "opensearch-admin"
        - "opensearch-readonly"
        - "cpi-admin"
        - "tenant-admin"
        - "devops"
        - "viewer"
      description: "Allow dashboard access for all authenticated Keycloak users"

    kibana_server:
      reserved: true
      users:
        - "kibanaserver"
        - "admin"

    own_index:
      reserved: false
      users:
        - "*"
      description: "Allow full access to an index named like the username"

    readall:
      reserved: false
      backend_roles:
        - "readall"
        - "opensearch-readonly"
        - "cpi-admin"
      description: "Maps readonly roles to readall"

    stoa_logs_admin:
      reserved: false
      backend_roles:
        - "cpi-admin"
      description: "Platform admins see all tenant logs"

    stoa_gw_admin:
      reserved: false
      backend_roles:
        - "cpi-admin"
      description: "Platform admins see all gateway telemetry"

    stoa_gw_writer:
      reserved: false
      users:
        - "stoa-api"
      description: "Internal writer for control-plane-api"

    logwriter_role:
      reserved: false
      users:
        - "logwriter"
      backend_roles:
        - "logwriter"
      description: "Fluent-Bit log shipping account"

    stoa_logs_tenant_oasis_gunters:
      reserved: false
      users:
        - "parzival"
        - "art3mis"
        - "aech"

    stoa_gw_tenant_oasis_gunters:
      reserved: false
      users:
        - "parzival"
        - "art3mis"
        - "aech"

    stoa_gw_viewer_oasis_gunters:
      reserved: false
      users: []

    stoa_logs_tenant_ioi_sixers:
      reserved: false
      users:
        - "sorrento"
        - "sixer42"

    stoa_gw_tenant_ioi_sixers:
      reserved: false
      users:
        - "sorrento"
        - "sixer42"

    stoa_gw_viewer_ioi_sixers:
      reserved: false
      users: []

    manage_snapshots:
      reserved: false
      backend_roles:
        - "snapshotrestore"

    logstash:
      reserved: false
      backend_roles:
        - "logstash"
