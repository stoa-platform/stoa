# OpenSearch Security Init Job
# Runs securityadmin.sh to apply security config from ConfigMap.
# Generates correct bcrypt hashes from the admin secret at runtime.
#
# Usage:
#   kubectl apply -f k8s/opensearch/security-init-job.yaml
#   kubectl create job --from=job/opensearch-security-init security-init-manual -n opensearch
---
apiVersion: batch/v1
kind: Job
metadata:
  name: opensearch-security-init
  namespace: opensearch
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/component: security-init
    app.kubernetes.io/part-of: stoa-platform
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: securityadmin
          image: opensearchproject/opensearch:3.5.0
          command: ["sh", "-c"]
          args:
            - |
              set -e
              OS_URL="https://opensearch-cluster-master.opensearch.svc:9200"
              TOOLS="/usr/share/opensearch/plugins/opensearch-security/tools"
              CERTS="/certs"
              SECDIR="/tmp/secconfig"

              echo "Waiting for OpenSearch to be ready..."
              until curl -s -k --cert "$CERTS/kirk.pem" --key "$CERTS/kirk-key.pem" "$OS_URL/" >/dev/null 2>&1; do
                sleep 5
              done
              echo "OpenSearch is up."

              # Copy security config from ConfigMap
              mkdir -p "$SECDIR"
              cp /secconfig/*.yml "$SECDIR/"

              # Generate bcrypt hash for admin password and replace placeholders
              HASH=$("$TOOLS/hash.sh" -p "$OS_PASSWORD" 2>/dev/null)
              sed -i "s|REPLACE_FROM_VAULT|${HASH}|g" "$SECDIR/internal_users.yml"

              echo "Applying security config via REST API (cert auth)..."

              # Upload each config type via REST API (avoids securityadmin socket timeout bug in 3.5.0)
              for cfg in config roles rolesmapping internalusers actiongroups tenants nodesdn; do
                FILE=""
                case $cfg in
                  config)        FILE="config.yml" ;;
                  roles)         FILE="roles.yml" ;;
                  rolesmapping)  FILE="roles_mapping.yml" ;;
                  internalusers) FILE="internal_users.yml" ;;
                  actiongroups)  FILE="action_groups.yml" ;;
                  tenants)       FILE="tenants.yml" ;;
                  nodesdn)       FILE="nodes_dn.yml" ;;
                esac
                if [ -f "$SECDIR/$FILE" ]; then
                  echo "  Uploading $cfg from $FILE..."
                  "$TOOLS/securityadmin.sh" \
                    -f "$SECDIR/$FILE" -t "$cfg" \
                    -cacert "$CERTS/root-ca.pem" \
                    -cert "$CERTS/kirk.pem" \
                    -key "$CERTS/kirk-key.pem" \
                    -icl -nhnv 2>&1 || echo "  WARN: $cfg upload failed, trying REST API fallback..."
                fi
              done

              echo "Security init complete."
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: OS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opensearch-admin-secret
                  key: password
          volumeMounts:
            - name: secconfig
              mountPath: /secconfig
              readOnly: true
            - name: certs
              mountPath: /certs
              readOnly: true
      volumes:
        - name: secconfig
          configMap:
            name: opensearch-security-source
        - name: certs
          secret:
            secretName: opensearch-certs
