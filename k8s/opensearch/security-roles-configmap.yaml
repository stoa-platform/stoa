apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-security-roles
  namespace: stoa-system
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/component: security
    app.kubernetes.io/managed-by: stoa
data:
  dls-fls-role-template.json: |
    {
      "_comment": "Template for provisioner (CAB-1685) to create per-tenant DLS/FLS roles",
      "tenant_reader": {
        "description": "Tenant-scoped gateway log reader with DLS (tenant_id filter)",
        "cluster_permissions": ["cluster_composite_ops_ro"],
        "index_permissions": [
          {
            "index_patterns": ["stoa-gw-*"],
            "dls": "{\"term\": {\"tenant_id\": \"${TENANT_ID}\"}}",
            "allowed_actions": ["read", "search"]
          },
          {
            "index_patterns": [".kibana*", ".opensearch_dashboards*"],
            "allowed_actions": ["read", "write", "create_index"]
          }
        ]
      },
      "tenant_viewer": {
        "description": "Tenant-scoped viewer with DLS + FLS (no PII fields)",
        "cluster_permissions": ["cluster_composite_ops_ro"],
        "index_permissions": [
          {
            "index_patterns": ["stoa-gw-*"],
            "dls": "{\"term\": {\"tenant_id\": \"${TENANT_ID}\"}}",
            "fls": ["~request_body", "~response_body", "~auth_token"],
            "allowed_actions": ["read", "search"]
          },
          {
            "index_patterns": [".kibana*", ".opensearch_dashboards*"],
            "allowed_actions": ["read"]
          }
        ]
      }
    }
