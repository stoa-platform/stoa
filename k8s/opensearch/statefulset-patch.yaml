# OpenSearch StatefulSet patch — hostAlias for OIDC discovery (CAB-1875)
#
# OVH MKS does NOT support hairpin NAT: pods cannot reach the LB external
# IP (5.196.236.53) from within the cluster. OpenSearch's OIDC plugin
# resolves auth.gostoa.dev to this external IP and times out.
#
# Fix: override DNS for auth.gostoa.dev to point to the ingress-nginx
# ClusterIP (10.3.34.111) so traffic stays in-cluster.
#
# Apply:
#   kubectl patch statefulset opensearch-cluster-master -n opensearch \
#     --type='json' \
#     -p='[{"op":"add","path":"/spec/template/spec/hostAliases","value":[{"ip":"10.3.34.111","hostnames":["auth.gostoa.dev"]}]}]'
#
# Verify:
#   kubectl exec -n opensearch opensearch-cluster-master-0 -c opensearch -- \
#     curl -sSk --connect-timeout 5 https://auth.gostoa.dev/realms/stoa/.well-known/openid-configuration
#
# NOTE: If the ingress-nginx-controller Service ClusterIP changes (unlikely
# but possible after Service recreation), update the IP here and re-patch.
# Current ClusterIP: kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.spec.clusterIP}'
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch-cluster-master
  namespace: opensearch
spec:
  template:
    spec:
      hostAliases:
        - ip: "10.3.34.111"
          hostnames:
            - "auth.gostoa.dev"
