# CAB-1305: RBAC for security scanning jobs
# Kubescape needs read-only access to cluster resources
apiVersion: v1
kind: ServiceAccount
metadata:
  name: security-scanner
  namespace: stoa-system
  labels:
    app: security-scanner
    component: security
    app.kubernetes.io/part-of: stoa-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: security-scanner-readonly
  labels:
    app: security-scanner
    component: security
    app.kubernetes.io/part-of: stoa-platform
rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
      - configmaps
      - secrets
      - serviceaccounts
      - namespaces
      - nodes
      - persistentvolumes
      - persistentvolumeclaims
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - statefulsets
      - replicasets
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - networkpolicies
      - ingresses
    verbs: ["get", "list"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
      - clusterroles
      - clusterrolebindings
    verbs: ["get", "list"]
  - apiGroups: ["policy"]
    resources:
      - podsecuritypolicies
      - poddisruptionbudgets
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: security-scanner-readonly
  labels:
    app: security-scanner
    component: security
    app.kubernetes.io/part-of: stoa-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: security-scanner-readonly
subjects:
  - kind: ServiceAccount
    name: security-scanner
    namespace: stoa-system
