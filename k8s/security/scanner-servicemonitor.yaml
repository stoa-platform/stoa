# CAB-1492: ServiceMonitor for security scanner metrics
# Scrapes /metrics from the Control Plane API to collect security_score,
# security_findings_total, and security_scan_duration_seconds.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: security-scanner-metrics
  namespace: stoa-system
  labels:
    app: security-scanner
    component: security
    prometheus: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: control-plane-api
  endpoints:
    - port: http
      path: /metrics
      interval: 60s
      scrapeTimeout: 15s
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: "security_score|security_findings_total|security_scan_duration_seconds|security_scan_failures_total"
          action: keep
  namespaceSelector:
    matchNames:
      - stoa-system
