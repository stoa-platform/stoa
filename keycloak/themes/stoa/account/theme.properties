# STOA Platform - Keycloak Account Console Theme
# ================================================
# Extends keycloak.v2 (Account Console v2 for Keycloak 23.x)

parent=keycloak.v2
import=common/keycloak

# Theme metadata
meta=viewport==width=device-width,initial-scale=1

# Styles - PatternFly 4 overrides for STOA branding
styles=css/stoa-account.css

# Locales
locales=en,fr

# Logo configuration
logo=/resources/img/stoa-logo.svg
logoUrl=https://gostoa.dev

# Favicon (path relative to theme resources)
favIcon=/img/favicon.png
