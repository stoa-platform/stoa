apiVersion: apps/v1
kind: Deployment
metadata:
  name: stoa-portal
  namespace: stoa-system
  labels:
    app: stoa-portal
    app.kubernetes.io/name: stoa-portal
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: stoa-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: stoa-portal
  template:
    metadata:
      labels:
        app: stoa-portal
        app.kubernetes.io/name: stoa-portal
    spec:
      # CAB-945: Don't mount service account token (not needed)
      automountServiceAccountToken: false
      containers:
        - name: stoa-portal
          image: ghcr.io/stoa-platform/stoa-portal:latest
          imagePullPolicy: Always
          env:
            - name: API_BACKEND_URL
              value: "http://stoa-control-plane-api.stoa-system.svc.cluster.local:80"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          # CAB-945: Container hardening
          securityContext:
            privileged: false
            runAsNonRoot: true
            runAsUser: 101  # nginx user
            runAsGroup: 101
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          # CAB-945: Mount writable paths for nginx
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
            - name: tmp
              mountPath: /tmp
      # CAB-945: Pod-level security context
      securityContext:
        runAsNonRoot: true
        fsGroup: 101
      # CAB-945: EmptyDir volumes for nginx writable paths
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-conf
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: stoa-portal
  namespace: stoa-system
  labels:
    app: stoa-portal
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: stoa-portal
