# STOA Platform — Root Python Configuration
#
# Shared defaults for all Python components. Each component's pyproject.toml
# overrides these settings as needed (e.g., line-length, target-version).
#
# Python tools (ruff, black, mypy, pytest) resolve the closest pyproject.toml,
# so this file applies to scripts at the repo root and serves as a reference
# for new components.

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src"]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function call in default argument (FastAPI Depends)
    "B904",   # raise without from inside except
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101"]
"*/__init__.py" = ["F401"]

[tool.ruff.lint.isort]
known-first-party = ["src"]
combine-as-imports = true

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["src"]
combine_as_imports = true

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_ignores = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
python_files = ["test_*.py", "*_test.py"]
python_functions = ["test_*"]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]
