# STOA Certified Operator — Associate Tier
# Focus: Deploy & configure STOA Platform
# Passing score: 80% (24/30)

tier: associate
title: "STOA Certified Operator — Associate"
description: "Deploy, configure, and operate the STOA Platform in a standard environment."
passing_score: 80
time_limit_minutes: 45

questions:
  - id: A01
    category: architecture
    question: "What are the two planes of the STOA Platform architecture?"
    choices:
      a: "Frontend plane and backend plane"
      b: "Control plane and data plane"
      c: "Management plane and execution plane"
      d: "API plane and gateway plane"
    answer: b
    explanation: "STOA uses a control plane (API, Console, Portal, Auth) and a data plane (Gateway, on-premise gateways)."

  - id: A02
    category: architecture
    question: "Which component serves as the primary API gateway in STOA?"
    choices:
      a: "mcp-gateway (Python)"
      b: "Kong"
      c: "stoa-gateway (Rust)"
      d: "Envoy"
    answer: c
    explanation: "stoa-gateway is the primary Rust-based gateway, replacing the archived Python mcp-gateway."

  - id: A03
    category: architecture
    question: "What does UAC stand for in STOA?"
    choices:
      a: "Unified Access Control"
      b: "Universal API Contract"
      c: "Unified API Configuration"
      d: "Universal Access Certificate"
    answer: b
    explanation: "UAC (Universal API Contract) is STOA's kill feature — define once, expose everywhere."

  - id: A04
    category: deployment
    question: "What is the minimum Kubernetes version required for STOA deployment?"
    choices:
      a: "1.24"
      b: "1.26"
      c: "1.28"
      d: "1.30"
    answer: b
    explanation: "STOA requires Kubernetes 1.26+ for CRD v1 and gateway API support."

  - id: A05
    category: deployment
    question: "Which Helm command installs the STOA Platform chart?"
    choices:
      a: "helm install stoa ./charts/stoa-platform"
      b: "helm upgrade --install stoa-platform ./charts/stoa-platform -n stoa-system --create-namespace"
      c: "helm deploy stoa-platform ./charts/stoa-platform"
      d: "helm apply -f charts/stoa-platform/values.yaml"
    answer: b
    explanation: "The recommended command uses upgrade --install for idempotency with namespace creation."

  - id: A06
    category: deployment
    question: "What database does the Control Plane API use?"
    choices:
      a: "MongoDB"
      b: "MySQL"
      c: "PostgreSQL"
      d: "SQLite"
    answer: c
    explanation: "The Control Plane API uses PostgreSQL with SQLAlchemy ORM and Alembic migrations."

  - id: A07
    category: deployment
    question: "Which authentication provider does STOA use?"
    choices:
      a: "Auth0"
      b: "Keycloak"
      c: "Firebase Auth"
      d: "Okta"
    answer: b
    explanation: "STOA uses Keycloak for authentication and RBAC, accessible at auth.<domain>."

  - id: A08
    category: configuration
    question: "What is the BASE_DOMAIN environment variable used for?"
    choices:
      a: "Setting the database connection string"
      b: "Configuring SSL certificates"
      c: "Single source of truth for all service URLs"
      d: "Defining the Kubernetes namespace"
    answer: c
    explanation: "BASE_DOMAIN generates all service URLs: api.<domain>, console.<domain>, etc."

  - id: A09
    category: configuration
    question: "How many RBAC roles does STOA define?"
    choices:
      a: "2 (admin, viewer)"
      b: "3 (admin, editor, viewer)"
      c: "4 (cpi-admin, tenant-admin, devops, viewer)"
      d: "5 (superadmin, admin, editor, viewer, anonymous)"
    answer: c
    explanation: "STOA has 4 roles: cpi-admin (full), tenant-admin (own tenant), devops (deploy), viewer (read-only)."

  - id: A10
    category: configuration
    question: "What format does STOA use for API definitions?"
    choices:
      a: "RAML"
      b: "OpenAPI 3.x"
      c: "GraphQL SDL"
      d: "API Blueprint"
    answer: b
    explanation: "STOA uses OpenAPI 3.x specifications for API definitions."

  - id: A11
    category: gateway
    question: "What runtime does stoa-gateway use?"
    choices:
      a: "Node.js + Express"
      b: "Python + uvicorn"
      c: "Rust + Tokio + axum"
      d: "Go + net/http"
    answer: c
    explanation: "stoa-gateway is built with Rust using the Tokio async runtime and axum web framework."

  - id: A12
    category: gateway
    question: "Which gateway mode is currently active in production?"
    choices:
      a: "sidecar"
      b: "edge-mcp"
      c: "proxy"
      d: "shadow"
    answer: b
    explanation: "Edge-MCP is the current active mode (ADR-024). Sidecar is Q2, proxy Q3, shadow deferred."

  - id: A13
    category: gateway
    question: "What protocol does STOA use for AI agent communication?"
    choices:
      a: "gRPC"
      b: "WebSocket"
      c: "MCP (Model Context Protocol)"
      d: "REST only"
    answer: c
    explanation: "STOA implements MCP for AI agent tool discovery and execution."

  - id: A14
    category: operations
    question: "Which tool does STOA use for secrets management?"
    choices:
      a: "HashiCorp Vault"
      b: "AWS Secrets Manager"
      c: "Infisical"
      d: "Doppler"
    answer: c
    explanation: "STOA uses self-hosted Infisical at vault.gostoa.dev for centralized secrets management."

  - id: A15
    category: operations
    question: "What is the recommended way to apply database migrations?"
    choices:
      a: "Manual SQL scripts"
      b: "Django migrations"
      c: "Alembic upgrade head"
      d: "Flyway migrate"
    answer: c
    explanation: "The Control Plane API uses Alembic for database migrations."

  - id: A16
    category: operations
    question: "How does STOA handle CRD (Custom Resource Definition) management?"
    choices:
      a: "CRDs are auto-generated from code"
      b: "CRDs are defined in charts/stoa-platform/crds/"
      c: "CRDs are managed by the operator"
      d: "STOA does not use CRDs"
    answer: b
    explanation: "CRDs are defined in the Helm chart's crds/ directory and applied with kubectl."

  - id: A17
    category: monitoring
    question: "What monitoring stack does STOA use?"
    choices:
      a: "Datadog"
      b: "Prometheus + Grafana"
      c: "New Relic"
      d: "ELK Stack only"
    answer: b
    explanation: "STOA uses Prometheus for metrics collection and Grafana for visualization."

  - id: A18
    category: monitoring
    question: "What is the health check endpoint for stoa-gateway?"
    choices:
      a: "/status"
      b: "/healthz"
      c: "/health"
      d: "/api/health"
    answer: c
    explanation: "All STOA components use /health as their health check endpoint."

  - id: A19
    category: deployment
    question: "What container registry does STOA use?"
    choices:
      a: "Docker Hub"
      b: "Amazon ECR"
      c: "GitHub Container Registry (ghcr.io)"
      d: "Google Artifact Registry"
    answer: c
    explanation: "STOA publishes container images to ghcr.io/stoa-platform."

  - id: A20
    category: deployment
    question: "What is the Kyverno requirement for STOA deployments?"
    choices:
      a: "No specific requirement"
      b: "All containers must set privileged: false explicitly"
      c: "All containers must run as UID 1000"
      d: "Network policies must be defined"
    answer: b
    explanation: "Kyverno enforce policy requires explicit privileged: false in securityContext."

  - id: A21
    category: configuration
    question: "What license does STOA Platform use?"
    choices:
      a: "MIT"
      b: "GPL v3"
      c: "Apache 2.0"
      d: "BSL (Business Source License)"
    answer: c
    explanation: "STOA is licensed under Apache 2.0 with a NOTICE file."

  - id: A22
    category: gateway
    question: "What does the stoa-gateway /admin API provide?"
    choices:
      a: "User management"
      b: "Runtime configuration of routes and tools"
      c: "Log viewing"
      d: "Database management"
    answer: b
    explanation: "The /admin API allows runtime configuration of routes, tools, and policies without restart."

  - id: A23
    category: operations
    question: "What CI/CD platform does STOA use?"
    choices:
      a: "Jenkins"
      b: "GitLab CI"
      c: "GitHub Actions"
      d: "CircleCI"
    answer: c
    explanation: "STOA uses GitHub Actions with path-based triggers per component."

  - id: A24
    category: operations
    question: "How many required CI checks must pass before a PR can be merged?"
    choices:
      a: "1"
      b: "2"
      c: "3"
      d: "5"
    answer: c
    explanation: "3 required checks: License Compliance, SBOM Generation, Verify Signed Commits."

  - id: A25
    category: architecture
    question: "What is the Developer Portal built with?"
    choices:
      a: "Angular + Material"
      b: "Vue.js + Vuetify"
      c: "React + Vite + TypeScript"
      d: "Svelte + SvelteKit"
    answer: c
    explanation: "The Developer Portal uses React with Vite and TypeScript."

  - id: A26
    category: deployment
    question: "What deployment strategy should single-replica deployments use?"
    choices:
      a: "Recreate"
      b: "RollingUpdate with maxSurge: 1, maxUnavailable: 0"
      c: "RollingUpdate with maxSurge: 0, maxUnavailable: 1"
      d: "Blue-green"
    answer: c
    explanation: "Single-replica with default maxSurge:1 maxUnavailable:0 deadlocks on constrained clusters."

  - id: A27
    category: monitoring
    question: "What tool does STOA use for distributed tracing?"
    choices:
      a: "Jaeger"
      b: "Zipkin"
      c: "OpenTelemetry with traceparent injection"
      d: "AWS X-Ray"
    answer: c
    explanation: "stoa-gateway injects W3C traceparent headers for distributed tracing."

  - id: A28
    category: configuration
    question: "What is the default port for stoa-gateway?"
    choices:
      a: "3000"
      b: "8080"
      c: "8443"
      d: "9090"
    answer: b
    explanation: "stoa-gateway listens on port 8080 by default."

  - id: A29
    category: operations
    question: "What commit message format does STOA enforce?"
    choices:
      a: "Free text"
      b: "type(scope): description"
      c: "TICKET-ID: description"
      d: "[category] description"
    answer: b
    explanation: "STOA uses conventional commits enforced by commitlint: type(scope): description."

  - id: A30
    category: architecture
    question: "What is STOA's positioning in the market?"
    choices:
      a: "Cloud-only API gateway"
      b: "European Agent Gateway — AI-native open-source API management"
      c: "Enterprise service bus replacement"
      d: "Microservices mesh"
    answer: b
    explanation: "STOA is 'The European Agent Gateway' — AI-native open-source API management with Apache 2.0."
