  - id: E11
    category: architecture
    question: "What is the Phase Ownership protocol's claim mechanism?"
    choices:
      a: "Database locking"
      b: "Atomic mkdir on POSIX filesystem for lock, JSON claim files in .claude/claims/"
      c: "Redis distributed lock"
      d: "File advisory locking"
    answer: b
    explanation: "mkdir is atomic on POSIX — first call succeeds, concurrent calls get EEXIST. Lock dir + JSON claim file = conflict-free ownership."

  - id: E12
    category: architecture
    question: "When is a phase claim considered stale?"
    choices:
      a: "After 30 minutes"
      b: "claimed_at > 2 hours ago AND no SESSION-START in operations.log AND PID dead"
      c: "After 24 hours"
      d: "When another instance requests it"
    answer: b
    explanation: "All 3 conditions must be true: >2h old, no recent session activity, PID not alive. Prevents premature release."

  - id: E13
    category: ci_cd
    question: "What is the Ship Fast Path optimization in the AI Factory pipeline?"
    choices:
      a: "Skip all CI checks"
      b: "Skip Stage 2 (plan validation) for Ship-mode tickets <= 5 pts"
      c: "Auto-merge without review"
      d: "Deploy to staging only"
    answer: b
    explanation: "Ship-mode <=5pt tickets skip Council Stage 2 (plan validation). Saves ~$3 and ~5 min per ticket."

  - id: E14
    category: ci_cd
    question: "How does the AI Factory model router select between Sonnet and Opus?"
    choices:
      a: "Random selection"
      b: "Estimate <=5pts → Sonnet, >5pts → Opus (100% Sonnet failure rate on 6+ pt tickets)"
      c: "Always Opus"
      d: "Based on file count"
    answer: b
    explanation: "Sonnet hits max_turns on complex tickets (100% failure on 6+ pts). Opus resolves in fewer turns, cheaper total cost."

  - id: E15
    category: security
    question: "What is the full mTLS bypass path list in stoa-gateway?"
    choices:
      a: "/health only"
      b: "/.well-known/*, /oauth/*, /mcp/sse, /mcp/tools/*, /mcp/v1/*, /health, /ready, /metrics"
      c: "All paths bypass mTLS"
      d: "/api/* and /admin/*"
    answer: b
    explanation: "Discovery, OAuth, MCP transport, and infra paths bypass mTLS. Hardcoded intentionally — config mistakes must not break OAuth."

  - id: E16
    category: security
    question: "What does the gateway's DCR proxy do to the Keycloak client after registration?"
    choices:
      a: "Nothing — uses defaults"
      b: "Patches to publicClient:true + PKCE S256 (requires KEYCLOAK_ADMIN_PASSWORD)"
      c: "Adds client_secret"
      d: "Disables the client"
    answer: b
    explanation: "Gateway patches the KC client to be public (no client_secret) with PKCE S256, enabling Claude.ai's authorization flow."

  - id: E17
    category: operations
    question: "What are the 5 MEGA Close Gates?"
    choices:
      a: "Code review, tests, deploy, docs, release"
      b: "Decomposition invariant, per-phase PR evidence, all sub-tickets Done, live verification, sub-tickets closed on Linear"
      c: "Unit tests, integration, E2E, performance, security"
      d: "Plan, implement, test, review, merge"
    answer: b
    explanation: "Gate 0: decomposed. Gate 1: PR evidence. Gate 2: all children Done. Gate 3: live verification. Gate 4: no stale children."

  - id: E18
