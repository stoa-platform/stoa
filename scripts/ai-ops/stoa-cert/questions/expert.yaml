# STOA Certified Operator — Expert Tier
# Focus: Extend & customize STOA Platform
# Passing score: 80% (24/30)

tier: expert
title: "STOA Certified Operator — Expert"
description: "Extend, customize, and architect advanced STOA Platform deployments."
passing_score: 80
time_limit_minutes: 90

questions:
  - id: E01
    category: gateway_internals
    question: "What async runtime and web framework does stoa-gateway use?"
    choices:
      a: "async-std + actix-web"
      b: "Tokio + axum"
      c: "smol + warp"
      d: "Tokio + hyper (raw)"
    answer: b
    explanation: "stoa-gateway uses Tokio as async runtime and axum as the web framework, with anyhow/thiserror for error handling."

  - id: E02
    category: gateway_internals
    question: "In axum, when does .layer() apply to routes?"
    choices:
      a: "All routes regardless of order"
      b: "Only routes registered BEFORE the .layer() call"
      c: "Only routes registered AFTER the .layer() call"
      d: "Only the immediately preceding route"
    answer: b
    explanation: "axum .layer() only applies to routes registered before it. Routes added after are not affected by the middleware."

  - id: E03
    category: gateway_internals
    question: "What error handling pattern does stoa-gateway use?"
    choices:
      a: "panic! everywhere"
      b: "anyhow for app-level, thiserror for library-level errors"
      c: "Custom error enum only"
      d: "Box<dyn Error>"
    answer: b
    explanation: "App-level (handlers, main) uses anyhow with .context(). Library-level (traits, shared types) uses thiserror derive macros."

  - id: E04
    category: gateway_internals
    question: "Why does stoa-gateway SAST forbid todo!() and dbg!() macros?"
    choices:
      a: "Performance impact"
      b: "clippy::todo and clippy::dbg_macro are -D (deny) in security SAST to prevent debug code in production"
      c: "Compilation errors"
      d: "Memory safety"
    answer: b
    explanation: "Security SAST runs stricter clippy rules: -D clippy::todo, -D clippy::dbg_macro, -W clippy::unwrap_used to catch debug code."

  - id: E05
    category: adapter_development
    question: "What contract must all gateway adapter methods follow?"
    choices:
      a: "Raise exceptions on failure"
      b: "Return AdapterResult(success, error) — never raise exceptions, always idempotent"
      c: "Return HTTP status codes"
      d: "Write to database directly"
    answer: b
    explanation: "All 16 methods must be idempotent, catch exceptions internally, and return AdapterResult. Unsupported = success=False, error='Not supported'."

  - id: E06
    category: adapter_development
    question: "How does Kong DB-less handle tags returning null?"
    choices:
      a: "Default to empty list in Kong config"
      b: "Always use get('tags') or [] — Kong returns null not [] for empty tags"
      c: "Tags are not supported in DB-less mode"
      d: "Check for null before accessing"
    answer: b
    explanation: "Kong returns tags: null (not []) for resources without tags. Using get('tags', []) still returns null. Must use get('tags') or []."

  - id: E07
    category: adapter_development
    question: "What is the correct sequence to add a new gateway adapter?"
    choices:
      a: "Write code, add tests, deploy"
      b: "Copy template, implement 16 methods, add mappers, alembic migration, register in registry, tests, update rules"
      c: "Configure in Helm values"
      d: "Add endpoint to stoa-gateway"
    answer: b
    explanation: "7 steps: copy template → implement adapter.py → mappers.py → alembic enum migration → registry.py → tests → update rules."

  - id: E08
    category: mcp_protocol
    question: "What MCP protocol variants does Gateway Arena benchmark?"
    choices:
      a: "gRPC and REST"
      b: "Custom REST (STOA) and Streamable HTTP/JSON-RPC 2.0 (Gravitee)"
      c: "WebSocket only"
      d: "GraphQL subscriptions"
    answer: b
    explanation: "STOA uses custom REST paths (/mcp/capabilities, /mcp/tools/list). Gravitee 4.8 uses Streamable HTTP with JSON-RPC 2.0."

