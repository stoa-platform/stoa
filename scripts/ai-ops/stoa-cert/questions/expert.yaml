  - id: E25
    category: gateway_internals
    question: "What is the Enterprise Readiness dimension scoring formula?"
    choices:
      a: "Latency score only"
      b: "0.6 * availability_score + 0.4 * latency_score"
      c: "Pass/fail binary"
      d: "Weighted average of all metrics"
    answer: b
    explanation: "Each dimension: 60% availability (passes/total * 100) + 40% latency (max(0, 100*(1-p95/cap))). Availability weighted higher."

  - id: E26
