  - id: E29
    category: operations
    question: "What is the Session-End State Lint protocol?"
    choices:
      a: "Run tests"
      b: "5 mandatory checks: no DONE in active sections, stale [~] check, cross-file parity, MEGA gate"
      c: "Update README"
      d: "Close all branches"
    answer: b
    explanation: "Before SESSION-END: (1) no DONE in IN_PROGRESS, (2) no DONE in NEXT, (3) stale [~] check, (4) cross-file parity, (5) MEGA gates."

  - id: E30
