  - id: E19
    category: architecture
    question: "What is the n8n Linear-to-GitHub pipeline flow?"
    choices:
      a: "Linear webhook → GitHub Actions directly"
      b: "Linear webhook → n8n filter (In Progress only) → repository_dispatch → GitHub Actions → Slack"
      c: "Linear API polling → cron job"
      d: "Manual trigger only"
    answer: b
    explanation: "n8n receives Linear webhooks, filters for In Progress status, dispatches to GHA, and posts Pipeline Started to Slack."

  - id: E20
    category: architecture
    question: "What enrichment does n8n add to the dispatch payload for MEGA sub-tickets?"
    choices:
      a: "No enrichment"
      b: "Resolves parent ID as mega_id + extracts phase_hint from sub-issue position"
      c: "Adds priority only"
      d: "Copies parent description"
    answer: b
    explanation: "When a ticket has a Linear parent, n8n resolves the parent as mega_id and extracts phase_hint from the sub-issue's position."

  - id: E21
    category: observability
    question: "How does Gateway Arena calculate CI95 confidence intervals?"
    choices:
      a: "Normal distribution z-score"
      b: "t-distribution with df=3 (5 runs minus 1 warmup discard)"
      c: "Bootstrap resampling"
      d: "Percentile method"
    answer: b
    explanation: "5 runs, 1 discarded as warmup → 4 valid runs → df=3. t-distribution for small sample CI95 calculation."

  - id: E22
    category: observability
    question: "What consistency metric does Gateway Arena use?"
    choices:
      a: "Standard deviation"
      b: "IQR-based CV: (P75-P25)/P50 — robust to bimodal network latency"
      c: "Coefficient of variation"
      d: "Range (max-min)"
    answer: b
    explanation: "IQR-based CV is robust to bimodal latency distributions common in network benchmarks. Traditional CV is skewed by outliers."

