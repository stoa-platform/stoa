# Traffic seed configuration — versioned in git.
#
# All auth modes the seed exercises. Set to "true" to enable, "false" to skip.
# Each mode generates traces visible in Tempo / Call Flow dashboard.

# ─── Auth Modes ──────────────────────────────────────────────────────
SEED_NO_AUTH=true          # Unauthenticated calls (MCP + proxy)
SEED_BEARER_JWT=true       # OAuth2 client_credentials → Bearer token
SEED_API_KEY=true          # X-API-Key header + query param
SEED_MTLS=true             # Client certificate (scripts/demo/certs/)
SEED_DPOP=true             # RFC 9449 DPoP proof (requires PyJWT)

# ─── Proxy ───────────────────────────────────────────────────────────
SEED_PROXY=true            # Enable proxy route calls (requires admin API)
# The echo backend must be running on port 8888 for proxy calls.
# Start it: docker run -d -p 8888:80 --name echo-local ealen/echo-server

# ─── Batch Size & Interval ───────────────────────────────────────────
SEED_CALLS_PER_MODE=3      # Number of calls per auth mode per batch
SEED_INTERVAL=30           # Seconds between batches in --continuous mode

# ─── Endpoints ───────────────────────────────────────────────────────
# Override via env vars or edit here for local dev defaults.
# STOA_GATEWAY_URL=http://localhost:8081
# KC_TOKEN_URL=http://localhost:8080/realms/stoa/protocol/openid-connect/token

# ─── Keycloak Clients ───────────────────────────────────────────────
# KC_CLIENT_ID=stoa-mcp-gateway
# KC_CLIENT_SECRET=mcp-dev-secret
# KC_DPOP_CLIENT_ID=stoa-e2e-dpop
# KC_DPOP_CLIENT_SECRET=dpop-e2e-dev-secret

# ─── mTLS Certificates ──────────────────────────────────────────────
# MTLS_CLIENT_CERT=scripts/demo/certs/client-001.pem
# MTLS_CLIENT_KEY=scripts/demo/certs/client-001-key.pem
