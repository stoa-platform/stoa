apiVersion: apps/v1
kind: Deployment
metadata:
  name: stoa-gateway
  namespace: stoa-system
  labels:
    app: stoa-gateway
    app.kubernetes.io/name: stoa-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: stoa-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: stoa-gateway
  template:
    metadata:
      labels:
        app: stoa-gateway
        app.kubernetes.io/name: stoa-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: stoa-gateway
          image: ghcr.io/stoa-platform/stoa-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: STOA_PORT
              value: "8080"
            - name: STOA_HOST
              value: "0.0.0.0"
            - name: STOA_CONTROL_PLANE_URL
              value: "http://stoa-control-plane-api.stoa-system.svc.cluster.local:80"
            - name: STOA_LOG_LEVEL
              value: "info"
            - name: STOA_LOG_FORMAT
              value: "json"
            - name: STOA_KEYCLOAK_URL
              value: "https://auth.gostoa.dev"
            - name: STOA_KEYCLOAK_INTERNAL_URL
              value: "http://keycloak.stoa-system.svc.cluster.local:8080"
            - name: STOA_KEYCLOAK_REALM
              value: "stoa"
            - name: STOA_KEYCLOAK_CLIENT_ID
              value: "stoa-mcp-gateway"
            - name: STOA_RATE_LIMIT_DEFAULT
              value: "1000"
            - name: STOA_GATEWAY_EXTERNAL_URL
              value: "https://mcp.gostoa.dev"
            - name: STOA_KAFKA_ENABLED
              value: "true"
            - name: STOA_KAFKA_BROKERS
              value: "redpanda.stoa-system.svc.cluster.local:9092"
          # REQUIRED for auto-registration (ADR-028):
          # The Secret `stoa-gateway-secrets` MUST contain:
          #   STOA_CONTROL_PLANE_API_KEY - API key matching one entry in
          #     Control Plane's GATEWAY_API_KEYS env var.
          # Without this key, the gateway will skip registration and run
          # in standalone mode (no heartbeat, invisible in Console UI).
          # See: docs/runbooks/high/gateway-registration-failed.md
          envFrom:
            - secretRef:
                name: stoa-gateway-secrets
                optional: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 35  # 5s + 35*3s = 110s max — covers worst-case: 2×30s tool discovery + 10s api-bridge + 9s prewarm
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            privileged: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: stoa-gateway
  namespace: stoa-system
  labels:
    app: stoa-gateway
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: stoa-gateway
