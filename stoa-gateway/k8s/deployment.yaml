apiVersion: apps/v1
kind: Deployment
metadata:
  name: stoa-gateway
  namespace: stoa-system
  labels:
    app: stoa-gateway
    app.kubernetes.io/name: stoa-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: stoa-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stoa-gateway
  template:
    metadata:
      labels:
        app: stoa-gateway
        app.kubernetes.io/name: stoa-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: stoa-gateway
          image: 848853684735.dkr.ecr.eu-west-1.amazonaws.com/apim/stoa-gateway:dev-latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: stoa-gateway-config
                optional: true
            - secretRef:
                name: stoa-gateway-secrets
                optional: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 10  # 3s * 10 = 30s max startup time
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: stoa-gateway
  namespace: stoa-system
  labels:
    app: stoa-gateway
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: stoa-gateway
