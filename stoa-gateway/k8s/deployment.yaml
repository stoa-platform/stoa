apiVersion: apps/v1
kind: Deployment
metadata:
  name: stoa-gateway
  namespace: stoa-system
  labels:
    app: stoa-gateway
    app.kubernetes.io/name: stoa-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: stoa-platform
    stoa.dev/environment: prod
    stoa.dev/managed-by: argocd
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: stoa-gateway
  template:
    metadata:
      labels:
        app: stoa-gateway
        app.kubernetes.io/name: stoa-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: stoa-gateway
          image: ghcr.io/stoa-platform/stoa-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: STOA_PORT
              value: "8080"
            - name: STOA_HOST
              value: "0.0.0.0"
            - name: STOA_CONTROL_PLANE_URL
              value: "http://stoa-control-plane-api.stoa-system.svc.cluster.local:80"
            - name: STOA_LOG_LEVEL
              value: "info"
            - name: STOA_LOG_FORMAT
              value: "json"
            - name: STOA_KEYCLOAK_URL
              value: "https://auth.gostoa.dev"
            - name: STOA_KEYCLOAK_INTERNAL_URL
              value: "http://keycloak.stoa-system.svc.cluster.local:8080"
            - name: STOA_KEYCLOAK_REALM
              value: "stoa"
            - name: STOA_KEYCLOAK_CLIENT_ID
              value: "stoa-mcp-gateway"
            # --- Auto-Registration (ADR-028) ---
            - name: STOA_INSTANCE_NAME
              value: "stoa-gateway"
            - name: STOA_GATEWAY_MODE
              value: "edge-mcp"
            - name: STOA_ENVIRONMENT
              value: "prod"
            - name: STOA_AUTO_REGISTER
              value: "true"
            - name: STOA_RATE_LIMIT_DEFAULT
              value: "1000"
            - name: STOA_GATEWAY_EXTERNAL_URL
              value: "https://mcp.gostoa.dev"
            - name: STOA_ADVERTISE_URL
              value: "http://stoa-gateway.stoa-system.svc.cluster.local:80"
            - name: STOA_HEGEMON_ENABLED
              value: "true"
            - name: STOA_KAFKA_ENABLED
              value: "true"
            - name: STOA_KAFKA_BROKERS
              value: "redpanda.stoa-system.svc.cluster.local:9092"
            - name: STOA_LLM_PROXY_ENABLED
              value: "true"
            - name: STOA_LLM_PROXY_UPSTREAM_URL
              value: "https://api.anthropic.com"
            - name: STOA_LLM_PROXY_TIMEOUT_SECS
              value: "300"
            - name: STOA_LLM_PROXY_SKIP_VALIDATION
              value: "true"
            - name: STOA_LLM_PROXY_METERING_URL
              value: "http://stoa-control-plane-api.stoa-system.svc.cluster.local:80"
            # --- API Proxy backends (CAB-1728: dogfooding low-risk) ---
            - name: STOA_API_PROXY_ENABLED
              value: "true"
            - name: STOA_API_PROXY_REQUIRE_AUTH
              value: "true"
            - name: STOA_API_PROXY_BACKENDS_PUSHGATEWAY_ENABLED
              value: "true"
            - name: STOA_API_PROXY_BACKENDS_PUSHGATEWAY_BASE_URL
              value: "http://pushgateway.monitoring.svc:9091"
            - name: STOA_API_PROXY_BACKENDS_PUSHGATEWAY_AUTH_TYPE
              value: "api_key"
            - name: STOA_API_PROXY_BACKENDS_PUSHGATEWAY_RATE_LIMIT_RPM
              value: "0"
            - name: STOA_API_PROXY_BACKENDS_PUSHGATEWAY_TIMEOUT_SECS
              value: "60"
            - name: STOA_API_PROXY_BACKENDS_HEALTHCHECKS_ENABLED
              value: "true"
            - name: STOA_API_PROXY_BACKENDS_HEALTHCHECKS_BASE_URL
              value: "https://hc.gostoa.dev"
            - name: STOA_API_PROXY_BACKENDS_HEALTHCHECKS_AUTH_TYPE
              value: "api_key"
            - name: STOA_API_PROXY_BACKENDS_HEALTHCHECKS_RATE_LIMIT_RPM
              value: "100"
            - name: STOA_API_PROXY_BACKENDS_HEALTHCHECKS_TIMEOUT_SECS
              value: "10"
            - name: STOA_API_PROXY_BACKENDS_N8N_ENABLED
              value: "true"
            - name: STOA_API_PROXY_BACKENDS_N8N_BASE_URL
              value: "https://n8n.gostoa.dev"
            - name: STOA_API_PROXY_BACKENDS_N8N_AUTH_TYPE
              value: "api_key"
            - name: STOA_API_PROXY_BACKENDS_N8N_AUTH_HEADER
              value: "X-N8N-API-KEY"
            - name: STOA_API_PROXY_BACKENDS_N8N_RATE_LIMIT_RPM
              value: "60"
            - name: STOA_API_PROXY_BACKENDS_N8N_TIMEOUT_SECS
              value: "30"
            - name: STOA_API_PROXY_BACKENDS_CLOUDFLARE_ENABLED
              value: "true"
            - name: STOA_API_PROXY_BACKENDS_CLOUDFLARE_BASE_URL
              value: "https://api.cloudflare.com/client/v4"
            - name: STOA_API_PROXY_BACKENDS_CLOUDFLARE_AUTH_TYPE
              value: "bearer"
            - name: STOA_API_PROXY_BACKENDS_CLOUDFLARE_RATE_LIMIT_RPM
              value: "200"
            - name: STOA_API_PROXY_BACKENDS_CLOUDFLARE_TIMEOUT_SECS
              value: "30"
            # --- High-risk backends (CAB-1729) ---
            # Linear (GraphQL API, 1500 req/h)
            - name: STOA_API_PROXY_BACKENDS_LINEAR_ENABLED
              value: "true"
            - name: STOA_API_PROXY_BACKENDS_LINEAR_BASE_URL
              value: "https://api.linear.app"
            - name: STOA_API_PROXY_BACKENDS_LINEAR_AUTH_TYPE
              value: "bearer"
            - name: STOA_API_PROXY_BACKENDS_LINEAR_RATE_LIMIT_RPM
              value: "1500"
            - name: STOA_API_PROXY_BACKENDS_LINEAR_TIMEOUT_SECS
              value: "30"
            - name: STOA_API_PROXY_BACKENDS_LINEAR_CIRCUIT_BREAKER_ENABLED
              value: "true"
            - name: STOA_API_PROXY_BACKENDS_LINEAR_FALLBACK_DIRECT
              value: "true"
            # GitHub API (5000 req/h)
            - name: STOA_API_PROXY_BACKENDS_GITHUB_ENABLED
              value: "true"
            - name: STOA_API_PROXY_BACKENDS_GITHUB_BASE_URL
              value: "https://api.github.com"
            - name: STOA_API_PROXY_BACKENDS_GITHUB_AUTH_TYPE
              value: "bearer"
            - name: STOA_API_PROXY_BACKENDS_GITHUB_RATE_LIMIT_RPM
              value: "5000"
            - name: STOA_API_PROXY_BACKENDS_GITHUB_TIMEOUT_SECS
              value: "30"
            - name: STOA_API_PROXY_BACKENDS_GITHUB_CIRCUIT_BREAKER_ENABLED
              value: "true"
            - name: STOA_API_PROXY_BACKENDS_GITHUB_FALLBACK_DIRECT
              value: "true"
            # Slack Bot API
            - name: STOA_API_PROXY_BACKENDS_SLACK_ENABLED
              value: "true"
            - name: STOA_API_PROXY_BACKENDS_SLACK_BASE_URL
              value: "https://slack.com/api"
            - name: STOA_API_PROXY_BACKENDS_SLACK_AUTH_TYPE
              value: "bearer"
            - name: STOA_API_PROXY_BACKENDS_SLACK_RATE_LIMIT_RPM
              value: "60"
            - name: STOA_API_PROXY_BACKENDS_SLACK_TIMEOUT_SECS
              value: "10"
            - name: STOA_API_PROXY_BACKENDS_SLACK_CIRCUIT_BREAKER_ENABLED
              value: "true"
            - name: STOA_API_PROXY_BACKENDS_SLACK_FALLBACK_DIRECT
              value: "true"
          # REQUIRED for auto-registration (ADR-028):
          # The Secret `stoa-gateway-secrets` MUST contain:
          #   STOA_CONTROL_PLANE_API_KEY - API key matching one entry in
          #     Control Plane's GATEWAY_API_KEYS env var.
          # Without this key, the gateway will skip registration and run
          # in standalone mode (no heartbeat, invisible in Console UI).
          # See: docs/runbooks/high/gateway-registration-failed.md
          envFrom:
            - secretRef:
                name: stoa-gateway-secrets
                optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 35  # 5s + 35*3s = 110s max — covers worst-case: 2×30s tool discovery + 10s api-bridge + 9s prewarm
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            privileged: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: stoa-gateway
  namespace: stoa-system
  labels:
    app: stoa-gateway
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: stoa-gateway
