openapi: "3.0.0"
info:
  title: Petstore
  version: 1.0.0
  description: A sample Petstore API for testing stoactl bridge
servers:
  - url: https://petstore.example.com/v1
security:
  - bearerAuth: []
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      description: Returns a list of all pets in the store
      tags:
        - pets
      parameters:
        - name: limit
          in: query
          description: Maximum number of pets to return
          schema:
            type: integer
            maximum: 100
            default: 20
        - name: offset
          in: query
          description: Offset for pagination
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: A list of pets
    post:
      operationId: createPet
      summary: Create a pet
      description: Creates a new pet in the store
      tags:
        - pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The pet's name
                tag:
                  type: string
                  description: Optional classification tag
                species:
                  type: string
                  enum:
                    - dog
                    - cat
                    - bird
                    - fish
              required:
                - name
      responses:
        "201":
          description: Pet created
  /pets/{petId}:
    parameters:
      - name: petId
        in: path
        required: true
        description: The ID of the pet
        schema:
          type: string
    get:
      operationId: getPetById
      summary: Get a pet by ID
      description: Returns a single pet by its identifier
      tags:
        - pets
      responses:
        "200":
          description: A pet
        "404":
          description: Pet not found
    put:
      operationId: updatePet
      summary: Update a pet
      description: Updates an existing pet
      tags:
        - pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                tag:
                  type: string
      responses:
        "200":
          description: Pet updated
    delete:
      operationId: deletePet
      summary: Delete a pet
      description: Deletes a pet by its identifier
      tags:
        - pets
      responses:
        "204":
          description: Pet deleted
  /store/inventory:
    get:
      operationId: getInventory
      summary: Get store inventory
      description: Returns the current inventory counts
      tags:
        - store
      security: []
      responses:
        "200":
          description: Inventory counts
  /store/orders:
    post:
      operationId: placeOrder
      summary: Place an order
      description: Places an order for a pet
      tags:
        - store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                petId:
                  type: string
                quantity:
                  type: integer
                  minimum: 1
                  maximum: 10
              required:
                - petId
                - quantity
      responses:
        "201":
          description: Order placed
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
