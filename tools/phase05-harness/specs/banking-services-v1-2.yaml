        \ case of a credit entry, or cease to be available to the account owner in\
        \ case of a debit transaction entry.\nUsage: If transaction entry status is\
        \ pending and value date is present, then the value date refers to an expected/requested\
        \ value date.\nFor transaction entries subject to availability/float and for\
        \ which availability information is provided, the value date must not be used.\
