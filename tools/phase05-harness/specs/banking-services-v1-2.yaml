                            \ 500-1000 0.2%, 1000-10000 0.5%, then the applicable\
                            \ interest rate could either be 0.5% of the entire balance\
                            \ (since the account balance sits in the top interest\
                            \ tier) or (0.1%*500)+(0.2%*500)+(0.5%*1000). In the 1st\
