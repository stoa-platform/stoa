                                enables companies to target different categories of
                                consumers who perceive the full value of certain products
                                and services differently from one another.

                                Read more: Market Segmentation http://www.investopedia.com/terms/m/marketsegmentation.asp#ixzz4gfEEalTd '
                              type: string
                              enum:
                              - GEAS
                              - GEBA
                              - GEBR
                              - GEBU
                              - GECI
                              - GECS
                              - GEFB
                              - GEFG
                              - GEG
                              - GEGR
                              - GEGS
                              - GEOT
                              - GEOV
                              - GEPA
                              - GEPR
                              - GERE
                              - GEST
                              - GEYA
                              - GEYO
                              - PSCA
                              - PSES
                              - PSNC
                              - PSNP
                              - PSRG
                              - PSSS
                              - PSST
                              - PSSW
                          FeeFreeLength:
                            description: The length/duration of the fee free period
                            type: integer
                          FeeFreeLengthPeriod:
                            description: The unit of period (days, weeks, months etc.)
                              of the promotional length
                            type: string
                            enum:
                            - PACT
                            - PDAY
                            - PHYR
                            - PMTH
                            - PQTR
                            - PWEK
                            - PYER
