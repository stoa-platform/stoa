                    description: "The methodology of how overdraft is charged. It\
                      \ can be:\n'Whole'  Where the same charge/rate is applied to\
                      \ the entirety of the overdraft balance (where charges are applicable).\
                      \ \n'Tiered' Where different charges/rates are applied dependent\
                      \ on overdraft maximum and minimum balance amount tiers defined\
                      \ by the lending financial organisation\n'Banded' Where different\
                      \ charges/rates are applied dependent on overdraft maximum and\
                      \ minimum balance amount bands defined by a government organisation."
