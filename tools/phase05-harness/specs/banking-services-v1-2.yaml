                                        properties:
                                          Code:
                                            $ref: '#/components/schemas/OB_CodeMnemonic'
                                          Name:
                                            $ref: '#/components/schemas/Name_4'
                                          Description:
                                            $ref: '#/components/schemas/Description_3'
                                      OtherApplicationFrequency:
                                        $ref: '#/components/schemas/OB_OtherCodeType1_1'
                                      OtherCalculationFrequency:
                                        $ref: '#/components/schemas/OB_OtherCodeType1_2'
                                  minItems: 1
                            minItems: 1
                      Overdraft:
                        type: object
                        required:
                        - OverdraftTierBandSet
                        description: Borrowing details
                        properties:
                          Notes:
                            type: array
                            items:
                              description: Associated Notes about the overdraft rates
                              type: string
                              minLength: 1
                              maxLength: 2000
                          OverdraftTierBandSet:
                            type: array
                            items:
                              type: object
                              description: Tier band set details
                              required:
                              - TierBandMethod
                              - OverdraftTierBand
                              properties:
                                TierBandMethod:
                                  description: "The methodology of how overdraft is\
                                    \ charged. It can be:\n'Whole'  Where the same\
                                    \ charge/rate is applied to the entirety of the\
                                    \ overdraft balance (where charges are applicable).\
                                    \ \n'Tiered' Where different charges/rates are\
                                    \ applied dependent on overdraft maximum and minimum\
                                    \ balance amount tiers defined by the lending\
                                    \ financial organisation\n'Banded' Where different\
                                    \ charges/rates are applied dependent on overdraft\
                                    \ maximum and minimum balance amount bands defined\
                                    \ by a government organisation."
                                  type: string
                                  enum:
                                  - INBA
                                  - INTI
                                  - INWH
                                OverdraftType:
                                  description: An overdraft can either be 'committed'
                                    which means that the facility cannot be withdrawn
                                    without reasonable notification before it's agreed
                                    end date, or 'on demand' which means that the
                                    financial institution can demand repayment at
                                    any point in time.
                                  type: string
                                  enum:
                                  - OVCO
                                  - OVOD
                                  - OVOT
                                Identification:
                                  description: Unique and unambiguous identification
                                    of a  Tier Band for a overdraft product.
                                  type: string
                                  minLength: 1
                                  maxLength: 35
                                AuthorisedIndicator:
                                  description: Indicates if the Overdraft is authorised
                                    (Y) or unauthorised (N)
                                  type: boolean
                                BufferAmount:
                                  description: 'When a customer exceeds their credit
                                    limit, a financial institution will not charge
                                    the customer unauthorised overdraft charges if
                                    they do not exceed by more than the buffer amount.
                                    Note: Authorised overdraft charges may still apply.'
                                  type: string
                                  pattern: ^(-?\d{1,14}){1}(\.\d{1,4}){0,1}$
                                Notes:
                                  type: array
                                  items:
                                    description: Optional additional notes to supplement
                                      the overdraft Tier Band Set details
                                    type: string
                                    minLength: 1
                                    maxLength: 2000
                                OverdraftTierBand:
                                  type: array
                                  items:
                                    type: object
                                    description: Provides overdraft details for a
                                      specific tier or band
                                    required:
                                    - TierValueMin
                                    properties:
                                      Identification:
                                        description: Unique and unambiguous identification
                                          of a  Tier Band for a overdraft.
                                        type: string
                                        minLength: 1
                                        maxLength: 35
                                      TierValueMin:
                                        description: Minimum value of Overdraft Tier/Band
                                        type: string
                                        pattern: ^(-?\d{1,14}){1}(\.\d{1,4}){0,1}$
                                      TierValueMax:
                                        description: Maximum value of Overdraft Tier/Band
                                        type: string
                                        pattern: ^(-?\d{1,14}){1}(\.\d{1,4}){0,1}$
                                      EAR:
                                        description: 'EAR means Effective Annual Rate
                                          and/or Equivalent Annual Rate (frequently

                                          used interchangeably), being the actual
                                          annual interest rate of an Overdraft.'
                                        type: string
                                        pattern: ^(-?\d{1,3}){1}(\.\d{1,4}){0,1}$
                                      AgreementLengthMin:
                                        description: Specifies the minimum length
                                          of a band for a fixed overdraft agreement
                                        type: integer
                                      AgreementLengthMax:
                                        description: Specifies the maximum length
                                          of a band for a fixed overdraft agreement
                                        type: integer
                                      AgreementPeriod:
                                        description: Specifies the period of a fixed
                                          length overdraft agreement
                                        type: string
                                        enum:
                                        - PACT
                                        - PDAY
                                        - PHYR
                                        - PMTH
                                        - PQTR
                                        - PWEK
                                        - PYER
                                      OverdraftInterestChargingCoverage:
                                        description: Refers to which interest rate
                                          is applied when interests are tiered. For
                                          example, if an overdraft balance is  2k
                                          and the interest tiers are:- 0- 500 0.1%,
                                          500-1000 0.2%, 1000-10000 0.5%, then the
                                          applicable interest rate could either be
                                          0.5% of the entire balance (since the account
                                          balance sits in the top interest tier) or
                                          (0.1%*500)+(0.2%*500)+(0.5%*1000). In the
                                          1st situation, we say the interest is applied
                                          to the  Whole  of the account balance,  and
                                          in the 2nd that it is  Tiered .
                                        type: string
                                        enum:
                                        - INBA
                                        - INTI
                                        - INWH
                                      BankGuaranteedIndicator:
