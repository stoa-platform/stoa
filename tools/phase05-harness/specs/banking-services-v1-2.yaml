            Segment:
              description: "Market segmentation is a marketing term referring to the\
                \ aggregating of prospective buyers into groups, or segments, that\
                \ have common needs and respond similarly to a marketing action. Market\
                \ segmentation enables companies to target different categories of\
                \ consumers who perceive the full value of certain products and services\
                \ differently from one another.\nRead more: Market Segmentation http://www.investopedia.com/terms/m/marketsegmentation.asp#ixzz4gfEEalTd\
                \ \nWith respect to PCA products, they are segmented in relation to\
                \ different markets that they wish to focus on. "
              title: Segment
              type: array
              items:
                description: "Market segmentation is a marketing term referring to\
                  \ the aggregating of prospective buyers into groups, or segments,\
                  \ that have common needs and respond similarly to a marketing action.\
                  \ Market segmentation enables companies to target different categories\
                  \ of consumers who perceive the full value of certain products and\
                  \ services differently from one another.\nRead more: Market Segmentation\
                  \ http://www.investopedia.com/terms/m/marketsegmentation.asp#ixzz4gfEEalTd\
                  \ \nWith respect to PCA products, they are segmented in relation\
                  \ to different markets that they wish to focus on. "
                type: string
                enum:
                - Basic
                - BenefitAndReward
                - CreditInterest
                - Cashback
                - General
                - Graduate
                - Other
                - Overdraft
                - Packaged
                - Premium
