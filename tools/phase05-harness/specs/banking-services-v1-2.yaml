                        AER:
                          description: "The annual equivalent rate (AER) is interest\
                            \ that is calculated under the assumption that any interest\
                            \ paid is combined with the original balance and the next\
                            \ interest payment will be based on the slightly higher\
                            \ account balance. Overall, this means that interest can\
                            \ be compounded several times in a year depending on the\
                            \ number of times that interest payments are made. \n\
                            Read more: Annual Equivalent Rate (AER) http://www.investopedia.com/terms/a/aer.asp#ixzz4gfR7IO1A"
