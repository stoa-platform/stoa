                            type: string
                            pattern: ^(-?\d{1,14}){1}(\.\d{1,4}){0,1}$
                          Notes:
                            type: array
                            items:
                              description: Optional additional notes to supplement
                                the Core product details
                              type: string
                              minLength: 1
                              maxLength: 2000
                          OtherSegment:
                            $ref: '#/components/schemas/OB_OtherCodeType1_0'
                      CreditInterest:
                        type: object
                        required:
                        - TierBandSet
                        description: Details about the interest that may be payable
                          to the Account holders
                        properties:
                          TierBandSet:
                            type: array
                            items:
                              type: object
                              description: The group of tiers or bands for which credit
                                interest can be applied.
                              required:
                              - TierBandMethod
                              - Destination
                              - TierBand
                              properties:
                                TierBandMethod:
                                  description: 'The methodology of how credit interest
                                    is paid/applied. It can be:-

                                    1. Banded

                                    Interest rates are banded. i.e. Increasing rate
                                    on whole balance as balance increases.

                                    2. Tiered

                                    Interest rates are tiered. i.e. increasing rate
                                    for each tier as balance increases, but interest
                                    paid on tier fixed for that tier and not on whole
                                    balance.

                                    3. Whole

                                    The same interest rate is applied irrespective
                                    of the product holder''s account balance'
                                  type: string
                                  enum:
                                  - INBA
                                  - INTI
                                  - INWH
                                CalculationMethod:
                                  $ref: '#/components/schemas/OB_InterestCalculationMethod1Code'
                                Destination:
                                  description: Describes whether accrued interest
                                    is payable only to the BCA or to another bank
                                    account
                                  type: string
                                  enum:
                                  - INOT
                                  - INPA
                                  - INSC
                                Notes:
                                  type: array
                                  items:
                                    description: Optional additional notes to supplement
                                      the Tier Band Set details
                                    type: string
                                    minLength: 1
                                    maxLength: 2000
                                OtherCalculationMethod:
                                  $ref: '#/components/schemas/OB_OtherCodeType1_0'
                                OtherDestination:
                                  $ref: '#/components/schemas/OB_OtherCodeType1_0'
                                TierBand:
                                  type: array
                                  items:
                                    type: object
                                    description: Tier Band Details
                                    required:
                                    - TierValueMinimum
                                    - ApplicationFrequency
                                    - FixedVariableInterestRateType
                                    - AER
                                    properties:
                                      Identification:
                                        description: Unique and unambiguous identification
                                          of a  Tier Band for the Product.
                                        type: string
                                        minLength: 1
                                        maxLength: 35
                                      TierValueMinimum:
                                        description: Minimum deposit value for which
                                          the credit interest tier applies.
                                        type: string
                                        pattern: ^(-?\d{1,14}){1}(\.\d{1,4}){0,1}$
                                      TierValueMaximum:
                                        description: Maximum deposit value for which
                                          the credit interest tier applies.
                                        type: string
                                        pattern: ^(-?\d{1,14}){1}(\.\d{1,4}){0,1}$
                                      CalculationFrequency:
                                        description: How often is credit interest
                                          calculated for the account.
                                        type: string
                                        enum:
                                        - FQAT
                                        - FQDY
                                        - FQHY
                                        - FQMY
                                        - FQOT
                                        - FQQY
                                        - FQSD
                                        - FQWY
                                        - FQYY
                                      ApplicationFrequency:
                                        description: How often is interest applied
                                          to the Product for this tier/band i.e. how
                                          often the financial institution pays accumulated
                                          interest to the customer's account.
                                        type: string
                                        enum:
                                        - FQAT
                                        - FQDY
                                        - FQHY
                                        - FQMY
                                        - FQOT
                                        - FQQY
                                        - FQSD
                                        - FQWY
                                        - FQYY
                                      DepositInterestAppliedCoverage:
                                        description: Amount on which Interest applied.
                                        type: string
                                        enum:
                                        - INBA
                                        - INTI
                                        - INWH
                                      FixedVariableInterestRateType:
                                        $ref: '#/components/schemas/OB_InterestFixedVariableType1Code'
                                      AER:
                                        description: "The annual equivalent rate (AER)\
                                          \ is interest that is calculated under the\
                                          \ assumption that any interest paid is combined\
                                          \ with the original balance and the next\
                                          \ interest payment will be based on the\
                                          \ slightly higher account balance. Overall,\
                                          \ this means that interest can be compounded\
                                          \ several times in a year depending on the\
                                          \ number of times that interest payments\
                                          \ are made. \nRead more: Annual Equivalent\
                                          \ Rate (AER) http://www.investopedia.com/terms/a/aer.asp#ixzz4gfR7IO1A"
                                        type: string
                                        pattern: ^(-?\d{1,3}){1}(\.\d{1,4}){0,1}$
                                      BankInterestRateType:
                                        description: Interest rate types, other than
                                          AER, which financial institutions may use
                                          to describe the annual interest rate payable
                                          to the account holder's account.
                                        type: string
                                        enum:
                                        - INBB
                                        - INFR
                                        - INGR
                                        - INLR
                                        - INNE
                                        - INOT
                                      BankInterestRate:
                                        description: Bank Interest for the product
                                        type: string
                                        pattern: ^(-?\d{1,3}){1}(\.\d{1,4}){0,1}$
                                      Notes:
                                        type: array
                                        items:
                                          description: Optional additional notes to
