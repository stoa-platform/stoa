                      LoanInterest:
                        type: object
                        required:
                        - LoanInterestTierBandSet
                        description: Details about the interest that may be payable
                          to the SME Loan holders
                        properties:
                          Notes:
                            type: array
                            items:
                              description: Optional additional notes to supplement
                                the LoanInterest
                              type: string
                              minLength: 1
                              maxLength: 2000
                          LoanInterestTierBandSet:
                            type: array
                            items:
                              type: object
                              description: The group of tiers or bands for which debit
                                interest can be applied.
                              required:
                              - TierBandMethod
                              - CalculationMethod
                              - LoanInterestTierBand
                              properties:
                                TierBandMethod:
                                  description: 'The methodology of how credit interest
                                    is charged. It can be:-

                                    1. Banded

                                    Interest rates are banded. i.e. Increasing rate
                                    on whole balance as balance increases.

                                    2. Tiered

                                    Interest rates are tiered. i.e. increasing rate
                                    for each tier as balance increases, but interest
                                    paid on tier fixed for that tier and not on whole
                                    balance.

                                    3. Whole

                                    The same interest rate is applied irrespective
                                    of the SME Loan balance'
                                  type: string
                                  enum:
                                  - INBA
                                  - INTI
                                  - INWH
                                Identification:
                                  description: Loan interest tierbandset identification.
                                    Used by  loan providers for internal use purpose.
                                  type: string
                                  minLength: 1
                                  maxLength: 35
                                CalculationMethod:
                                  $ref: '#/components/schemas/OB_InterestCalculationMethod1Code'
                                Notes:
                                  type: array
                                  items:
                                    description: Optional additional notes to supplement
                                      the Tier Band Set details
                                    type: string
                                    minLength: 1
                                    maxLength: 2000
                                OtherCalculationMethod:
                                  $ref: '#/components/schemas/OB_OtherCodeType1_0'
                                LoanInterestTierBand:
                                  type: array
                                  items:
                                    type: object
                                    description: Tier Band Details
                                    required:
                                    - TierValueMinimum
                                    - TierValueMinTerm
                                    - MinTermPeriod
                                    - FixedVariableInterestRateType
                                    - RepAPR
                                    properties:
                                      Identification:
                                        description: Unique and unambiguous identification
                                          of a  Tier Band for a SME Loan.
                                        type: string
                                        minLength: 1
                                        maxLength: 35
                                      TierValueMinimum:
                                        description: Minimum loan value for which
                                          the loan interest tier applies.
                                        type: string
                                        pattern: ^(-?\d{1,14}){1}(\.\d{1,4}){0,1}$
                                      TierValueMaximum:
                                        description: Maximum loan value for which
                                          the loan interest tier applies.
                                        type: string
                                        pattern: ^(-?\d{1,14}){1}(\.\d{1,4}){0,1}$
                                      TierValueMinTerm:
                                        description: Minimum loan term for which the
                                          loan interest tier applies.
                                        type: integer
                                      MinTermPeriod:
                                        description: The unit of period (days, weeks,
                                          months etc.) of the Minimum Term
                                        type: string
                                        enum:
                                        - PACT
                                        - PDAY
                                        - PHYR
                                        - PMTH
                                        - PQTR
                                        - PWEK
                                        - PYER
