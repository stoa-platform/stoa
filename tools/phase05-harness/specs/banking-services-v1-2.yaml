              title: Notes
              type: array
              items:
                description: maxLength 2000 text
                type: string
                minLength: 1
                maxLength: 2000
          additionalProperties: false
        CreditInterest:
          description: Details about the interest that may be payable to the PCA account
            holders
          type: object
          title: CreditInterest
          properties:
            TierBandSet:
              description: The group of tiers or bands for which credit interest can
                be applied.
              type: array
              title: TierBandSet
              items:
                description: The group of tiers or bands for which credit interest
                  can be applied.
                type: object
                properties:
                  TierBandMethod:
                    description: 'The methodology of how credit interest is charged.
                      It can be:-


                      1. Banded

                      Interest rates are banded. i.e. Increasing rate on whole balance
                      as balance increases.


                      2. Tiered

                      Interest rates are tiered. i.e. increasing rate for each tier
                      as balance increases, but interest paid on tier fixed for that
                      tier and not on whole balance.


                      3. Whole

                      The same interest rate is applied irrespective of the PCA balance'
                    title: TierBandMethod
                    type: string
                    enum:
                    - Tiered
                    - Whole
                  CalculationMethod:
                    description: Methods of calculating interest
                    title: CalculationMethod
                    type: string
                    enum:
                    - Compound
                    - SimpleInterest
                  Destination:
                    description: Describes whether accrued interest is payable only
                      to the PCA or to another bank account
                    title: Destination
                    type: string
                    enum:
                    - PayAway
                    - SelfCredit
